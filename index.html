      {
        conceptId: 'language-game',
        title: '他第一次进新公司开会',
        protagonist: { name: '周野', age: 31, occupation: '新入职高管' },
        body: '周野 31 岁。他在一家叫 A 厂的科技公司做了 7 年——做到了高级总监。\n\n他跳槽到一家叫 B 厂的公司——挂"VP 产品"的头衔。\n\n第一天上班——开他第一个产品会。\n\n他用他在 A 厂的语言开始: "我们这个项目的 排期 在 Q3 出 MVP——所以这周需要 对齐 一下 北极星 ，然后 拉通 一下后端。"\n\n会议室里 8 个人——8 个人都看着他——表情奇怪。\n\n一个看上去比较友好的同事插话: "周总——你说的 排期 ——是指什么？"\n\n周野: "就是项目时间表啊。"\n\n那同事: "哦——我们这边叫 节奏 。 排期 在我们这是另一个意思——专门指资源分配会的输出。"\n\n周野: "好——节奏。那 对齐 北极星——"\n\n另一个同事插话: "我们这边——北极星 是 CEO 用的词。下面团队不用这个——我们用 主指标 。"\n\n周野: "OK——拉通 后端——"\n\n第三个同事: "我们这没有 拉通 这个动作。我们直接 进车间——意思是产品和工程坐一起 24 小时密集做。"\n\n周野默了 5 秒。\n\n他说: "我重新开始。这周——我们的产品时间表如何？需要和工程同步什么？"\n\n会议恢复了正常。\n\n那一刻他懂了一件事——\n\n他过去 7 年在 A 厂积累的"工作语言"——在 B 厂——一个词都不能直接搬。\n\n不是这些词在 B 厂"没有"——是它们在 B 厂玩的是另一个语言游戏。\n\n排期 在 A 厂 = 项目时间表。\n排期 在 B 厂 = 资源分配会的输出。\n\n是同一个词。但是它在两个公司——参与的"游戏"不同——遵循的"规则"不同——指向的"动作"不同。\n\n如果他坚持用 A 厂的意思——他不是在"说错了一个词"——他是在玩 A 厂的语言游戏——但桌子上的人都在玩 B 厂的语言游戏。\n\n你不能在两个游戏之间"翻译"——你只能加入一个游戏。\n\n⋯\n\n他做了一件他在 A 厂从不做的事——\n\n第一周——他不开会。他听。\n\n他参加所有的会——但他不说话。他只是听同事们怎么用词、怎么传递信息、怎么提建议、怎么反对。\n\n他记下了 100 多个 B 厂特有的"工作词汇"。\n\n第二周——他试着用 B 厂的词。说错了同事会笑。他学会了笑着改。\n\n第三周——他能流利地说 B 厂语言了。\n\n第四周——他开始注意到一件更深的事——\n\nB 厂的语言不仅仅是不同的词。B 厂的人——在不同的位置——说同一个词的意思也不同。\n\nCEO 说 用户——指的是 LP 和股东的代理人。\n销售说 用户——指的是合同上的甲方。\n产品说 用户——指的是真正按按钮的那个人。\n客服说 用户——指的是来骂他们的那个人。\n\n5 个人都说 用户 ——但他们在玩 5 个不同的游戏。如果你不知道这一点——你以为大家在同一件事上意见不同——其实你们根本在说不同的事。\n\n周野学着先听 5 分钟——再开口。\n\n他先弄明白——这一刻这一个人——在玩哪个语言游戏。\n\n6 个月后他主导了一个跨部门项目——成功率超出他在 A 厂时所有的项目。\n\n不是因为他懂产品——他过去 7 年都懂产品。\n\n是因为他第一次——真正听见了他的同事在说什么。\n\n他第一次——做到了维特根斯坦说的那件事——明白每一个词的意义——在于它在一个语言游戏中怎么被用。',
        layers: {
          concept: '"语言游戏" (Sprachspiel) 是后期维特根斯坦——50 岁后写的《哲学研究》——最核心的概念。\n\n他放弃了早期《逻辑哲学论》的"图像论"——因为他发现: 语言不只是画图。语言是一种活动——一种和生活交织在一起的活动。\n\n他用"游戏"做比喻——是因为游戏有这些特点:\n- 有规则——但规则不是先验的，是约定的。\n- 规则不一致——下棋的规则和打扑克的规则不一样。\n- 规则在玩中形成——你不能在不玩棋的情况下学会棋的规则。\n- 同一个动作——比如把卡片放到桌上——在不同的游戏中意思完全不同。\n\n语言也一样:\n- 同一个词——在不同的语言游戏中意思不同。\n- 说话不是"传递信息"——是"参与一种活动"。\n- 不在游戏里——你听不懂规则。\n\n意义不在词典里——在游戏中。',
          now: '今天每一个组织、每一个圈子、每一个家庭——都是一套语言游戏。\n\n互联网公司说 用户——和金融公司说 用户——和医院说 病人——和大学说 学生——都不是同一个东西。\n\n90 后说 累了——和 60 后说 累了——是不同的事。\n\n你和你伴侣说 我没事——可能意味着 别问 ，可能意味着 安慰我 ——这是你们俩的语言游戏。\n\n跨圈子的人——常常误解——以为是 意见不同 ——其实是 游戏不同。\n\n社交媒体上 90% 的争论——都是不同的语言游戏在交错——双方用同一个词——但在玩不同的游戏。\n\n知道了这点——你能做一件事: 在开口之前——先问——这一刻这个人在玩哪个游戏。',
          deeper: '"语言游戏"最深的层面: 没有一个 元游戏 ——可以说所有别的游戏的规则。\n\n后现代有一种诱惑——你站到 元位置——说: 啊，他们都在玩自己的游戏——只有我看穿了。\n\n维特根斯坦说: 不。你那个 看穿 ——也是一个语言游戏(哲学的游戏)。你没有站在所有游戏之外。\n\n这是一个深刻的反相对主义。它不说 一切都相对 ——它说 你永远在某个游戏里——但每个游戏有它自己的客观性。\n\n你在 国际象棋的游戏里——王后能斜着走是客观的事实——不是你的主观看法。\n\n你在 医疗诊断的游戏里——血压 140/90 是客观的高血压——不是相对的。\n\n但是 客观——在游戏里。游戏之外——没有 抽象的客观。\n\n这让你既不能犬儒——又不能独断。你必须严肃地玩你所在的游戏——同时知道你在玩游戏。',
          links: { pre: ['梯子'], post: ['意义即用法', '家族相似'] },
        },

      {
        conceptId: 'meaning-as-use',
        title: '她和妈吵了 30 年的 尊重',
        protagonist: { name: '何苹', age: 32, occupation: '心理咨询师' },
        body: '何苹 32 岁。她妈妈何凤娣 60 岁。\n\n母女俩从何苹 5 岁起就吵架。一直吵到 32 岁。\n\n她们吵的事 100 件——但核心永远是一个词: 尊重。\n\n何凤娣说: "你不尊重我。"\n何苹说: "我尊重您啊——是您不尊重我。"\n\n这个循环——重复了 27 年。\n\n5 岁时——何苹想自己选衣服——何凤娣说"你不尊重妈"。\n15 岁时——何苹想自己选高中文理科——何凤娣说"你不尊重妈"。\n20 岁时——何苹想自己选大学专业——何凤娣说"你不尊重妈"。\n25 岁时——何苹想自己选男朋友——何凤娣说"你不尊重妈"。\n30 岁时——何苹决定不要孩子——何凤娣说"你太不尊重妈了"。\n\n每一次——何苹的回答是: "妈我尊重您。但这是我的人生。"\n\n何凤娣听了——更生气: "你说尊重我——你做的事一件都不顺我的意。你这哪叫尊重？"\n\n母女僵了。\n\n⋯\n\n32 岁那年何苹去做心理咨询(她自己是心理咨询师——但她去找另一个咨询师)。\n\n咨询师听了 3 次——第三次说: "你和你妈——可能根本没在吵同一件事。"\n\n何苹: "怎么会。我们吵的是 尊重 啊。"\n\n咨询师: "对——你们都用 尊重 这个词。但这个词——在你们之间——意义不一样。"\n\n何苹愣住。\n\n咨询师: "在你妈的世界里——尊重 = 听话。你按她的意思做——叫尊重。你不按——叫不尊重。她 60 年的人生——都用这个意义在玩 尊重 这个词。"\n\n"在你的世界里——尊重 = 认可对方的独立性。你做你的决定——这叫尊重你自己。你不强迫你妈做某事——这叫尊重她。你按她的意思活——反而是不尊重——因为你没把她当成能接受 不同意见 的成年人。"\n\n"你们一直在吵 尊重——但你妈是用她的字典——你是用你的字典。你们 30 年从没在说同一件事。"\n\n何苹哭了 20 分钟。\n\n那一刻她懂了——她和她妈这 30 年——不是 意见不同 ——是用同一个词——玩两个不同的游戏。\n\n⋯\n\n她做了一件她过去 27 年没做过的事——\n\n下周她回家——和她妈吃饭。她没说 我尊重您 这种话。\n\n她说: "妈——我们这辈子一直在吵 尊重 ——但是我才发现——我们说的 尊重 不是一个意思。"\n\n"您说的 尊重 ——是 听您的。"\n\n"我说的 尊重 ——是 让您是您、让我是我。"\n\n"这两个意思——都对——只是不一样。"\n\n"我没办法用您的意义去做 尊重 ——因为如果我那样——我就不是 我 了。"\n\n"但我可以告诉您: 在我的意义上——我从 5 岁起就尊重您。我从来没想过让您改变什么。"\n\n何凤娣听了 5 分钟没说话。\n\n然后她说: "你这个意义的尊重——我以前不懂。"\n\n何苹: "嗯。"\n\n何凤娣: "我现在也不全懂。但是我知道——你是在尊重我——只是用你的意义。"\n\n这是何苹这辈子——和她妈第一次——真正听懂对方说什么。\n\n6 个月后她妈生病了——胃癌——早期。\n\n何苹陪了 4 个月。\n\n手术成功了。\n\n她妈出院那天——拉着她的手说: "苹苹——你的 尊重 ——我现在懂了。"\n\n何苹也握着她妈的手: "我也终于懂了您的 听话——背后是 怕。我以前以为是 控制 ——其实是 怕 ——怕我吃亏。"\n\n两个人都哭了。\n\n维特根斯坦说: "不要问意义——问用法。"\n\n何苹 32 岁那一刻懂了——她妈的 尊重 = 听话——不是 错 ——是这个词在何凤娣的世界里的 用法。何苹的 尊重 = 让你是你——也是 用法 ——是另一个世界。\n\n两个用法 都对——但你不能用一个去判断另一个。',
        layers: {
          concept: '"意义即用法" (Bedeutung ist Gebrauch) 是后期维特根斯坦最有名的一句话。\n\n出自《哲学研究》§43:\n"对一个词的意义的解释——可以这样定义: 一个词的意义——是它在语言中的用法。"\n\n这句话听起来简单——但它推翻了 2500 年的哲学传统。\n\n传统观点: 词有 意义 ——这个意义是一种实体——可能是心里的图像、可能是定义、可能是柏拉图的理念。词通过 指代 这个实体——获得意义。\n\n维特根斯坦说: 不存在这种实体。词的意义——就是它怎么被用——在什么情境下、为什么、产生什么后果、被谁说、对谁说。\n\n你要懂一个词——不要查词典——查它的 使用模式。\n\n这听起来抽象——但极其具体。",\n你以为你"懂" 爱、责任、自由 ——其实你只是 用 这些词。你和别人 吵 这些词的意义——其实是在 比较你们的用法。',
          now: '现代人最大的痛——是 用同一个词玩不同游戏 而不自知。\n\n夫妻吵 我们要不要孩子 ——其实在吵 我们对生命的态度 ——但表面是孩子。\n\n同事吵 是否高效——其实在吵 我们看不看见对方的辛苦——但表面是效率。\n\n网络上吵 自由 ——一方说 不被限制——另一方说 不被剥削。两个 自由 都对——但是用法不同。\n\n知道了 意义即用法——你能做的事:\n\n吵架时——不要争 词的意义——问 你这个词怎么用？\n\n比方说有人说 你不爱我 ——你不要争 我爱不爱你 ——你问 你说的爱是什么用法？是 时间投入？是 性？是 不忽视？是 接住情绪？\n\n80% 的关系冲突——这一问就化解了 60%。',

        title: '她 41 岁那天问"在"是什么意思',
        protagonist: { name: '叶静', age: 41, occupation: '律师' },
        body: '叶静 41 岁。北京某红圈律所的合伙人。她办公室在 30 楼——朝东——早 7 点能看见太阳从京通高速那一头升起来。\n\n那一天她到办公室——做了一件她过去 18 年没做过的事——她在窗边坐了 20 分钟——没看手机、没回邮件、没看卷宗。\n\n她只是看太阳升起来。\n\n那一刻她想了一句话——"我在这里。"\n\n然后她想——什么叫"在"？\n\n她从来没问过这个问题。她 41 年——做了无数事——但她从来没问过——做这些事的"我"——是怎么"在"的。\n\n她试着分析:\n- 一块石头"在"——这是物体的在。\n- 一棵树"在"——这是生命的在。\n- 一只猫"在"——这是感觉的在。\n- 她"在"——是什么的在？\n\n她突然意识到——\n\n她和石头不一样——和树不一样——和猫不一样——的那个东西——\n\n是她能问"在"是什么意思。\n\n石头不能问。树不能问。猫不能问。\n\n只有她——这个 41 岁的、有焦虑、有遗憾、有渴望的"我"——能问。\n\n这种"在"——是一种 特别的在——它包含 对它自己的提问。\n\n她过去 41 年——把自己当作 一个律师、一个母亲、一个妻子、一个 41 岁的人 ——她有许多 标签。但她从来没——只是 在。\n\n标签不是 在。标签是回答 谁。\n\n在 是 谁 之前的那个东西。\n\n⋯\n\n她那天下午——做了一件让她团队震惊的事——她临时取消了 3 个会——回家了。\n\n她在家——没看手机——只是在屋里走。\n\n她突然懂了一件事——她过去 18 年——一直在 做——但她很少 在。\n\n她做案子、做合伙人、做母亲、做妻子。她从来没 只是在。\n\n做 是把自己投到一个目标里——你在 做 的时候——你不在 现在 ——你在 目标 那里。\n\n在 不是 做。在 是 在这里——眼前、现在、不去别处。\n\n她第一次——只是 在 ——3 个小时。她什么都没做。她也没 想 什么。\n\n但她出来时——她是另一个人。',
        layers: {
          concept: '"此在" (Dasein) 是海德格尔《存在与时间》(1927) 的核心概念——也是 20 世纪哲学最难翻译的词之一。\n\n字面意思: Da (那里) + sein (在) = 在那里。\n\n海德格尔用这个词专指人。但他不直接说"人"——因为"人"这个词已经被无数预设填满 (理性的动物、有灵魂的存在、社会动物)。\n\n他用"此在"——意思是——这是一种 特殊的在——它的特殊性在于: 它能对自己的"在"提问。\n\n石头是。树是。猫是。但只有人——是 以"对自己的在感到困惑"的方式 而在。\n\n你早上醒来——意识到 我醒着——这个意识到——是石头永远不会有的事。这就是"此在"。',
          now: '现代人的疾病——是 我们做了太多事——但我们很少 在。\n\n你每天 100% 时间——在 做: 工作、刷手机、聊天、运动、看剧、计划、复盘。\n\n你 几乎没有 1 分钟——只是 在 这里。\n\n海德格尔说: 这种 全是在做、几乎没有在 的状态——是现代性给我们的特殊形态——它让 此在 退化了。\n\n试一件事: 今天找 10 分钟——什么都不做。不刷手机。不思考。不计划。\n\n只是 在 这里。\n\n如果你能做到——你会发现一件事——你已经多久没真正 在 过了。',
          deeper: '"此在"最深的层面: 它不是 我意识到我自己 这种笛卡尔式的内省。\n\n笛卡尔说: 我思故我在。这里的 我 是一个 主体——观察自己的 客体。\n\n海德格尔说: 不。此在 不是主体观察客体。此在 是 在世界中——已经和 世界、他人、工具、时间 缠绕在一起的状态。\n\n你 在 ——不是先有一个内在的 我 ——然后这个 我 看外面的世界。是 你和世界 是一个不可分的整体——叶静和窗外的太阳和她的办公室和她的咖啡——共同构成 此在。\n\n这意味着: 你不可能 找到真正的自己 ——通过 进入内心。你只能在 你和世界的关系 中找到自己。',

        protagonist: { name: '宋怀远', age: 30, occupation: '初中老师' },
        body: '宋怀远 30 岁。他 5 岁从孤儿院被领养——但他不知道。他养父母告诉他他是亲生的——他相信了 25 年。\n\n他 30 岁那年——他养母去世——遗物里有一份收养文件。\n\n他读了那份文件——读了 3 遍。\n\n他不哭。他不愤怒。他只是——彻底地 不知道自己是谁。\n\n他过去 25 年——以为自己是宋家的儿子——继承宋家的脾气、宋家的家风、宋家的世代是教师。他成了老师——他以为这是 家族基因。\n\n现在他知道——这一切——都不是他的 起点。\n\n他真正的起点——是他不知道的那一对父母。他真正的起点——是被他不知道的某种原因——丢在孤儿院门口。\n\n他既不知道——他从哪里来——也不知道——为什么他被丢。\n\n他不知道——他血脉中——有什么。\n\n他可能 不该 是老师。他可能 应该 是音乐家、应该是渔民、应该是别的什么。\n\n⋯\n\n他崩溃了 3 个月。\n\n他咨询了一个心理师。\n\n心理师听他讲了 5 次。\n\n第 5 次心理师说: "你一直在问 我真正是谁。但是你假设了一件事——存在一个 真正的你 ——你从那个起点开始才是真的。"\n\n"现实是——你 5 岁之前的 那个孩子——已经不再是 你了。你 现在的 你 ——是被宋家养大的、当了 25 年宋怀远的那个人。"\n\n"你的起点——不在你 5 岁之前。你的起点——就在 你被宋家收养 那一刻。"\n\n"你不是 选 了被宋家收养。你是 被扔到 这个家里。这是你的 被抛性。"\n\n"但是 被抛 ——不等于 不是你的人生。是你的人生——只是你不是它的作者。"\n\n宋怀远默了。\n\n他想——他过去 30 年的 我——是宋家的儿子——这件事——他没有选。他完全可以是孤儿院的孩子——他完全可以被另一家收养——他完全可以早死——他完全可以是音乐家。\n\n但是他不是。他是宋家的宋怀远——一个初中老师。\n\n这是他被抛到的位置。\n\n他不是因为 选了 这个位置——他才在这里。他是 已经在了 这里——然后他要 接受 这里——然后他要在这里 活下去。\n\n那一刻他懂了一件 真正解放 的事——\n\n他不需要 找到他真正的起点。因为没有 真正的起点。\n\n他需要做的——是 接受他被抛的位置 ——然后从这里活下去。\n\n⋯\n\n6 个月后他做了一件事——他去他出生的城市——找到了那个孤儿院。他没找到 真正的父母 ——孤儿院说当年也不知道。\n\n但是他给孤儿院捐了 10 万——并申请——每周来做志愿者。\n\n他不是为了 找到自己。他是为了 在这个被抛的位置上——做一件 他自己选择 的事。\n\n海德格尔说: 被抛 是你的起点。从这里——你才能开始 投出 自己。',
        layers: {
          concept: '"被抛" (Geworfenheit) 是海德格尔的另一个核心概念。\n\n他说: 你不是 选了 在这个世界——你是被抛 (geworfen) 到了这里。\n\n你没选你的父母、出生地、性别、年代、母语、最初的家庭文化、社会阶级、最初的语言习惯——这些都不是你的选择。\n\n但是——它们是你的 起点。你的一切——从这里展开。\n\n被抛 不是悲观: 不是 你被困了 的意思。\n\n被抛 是诚实: 你不是 从虚空中开始 的。你已经 在某个具体的位置 ——你的全部"自由"——是从这个位置 开始 的自由。\n\n海德格尔的关键洞察: 自由 不等于 没有起点。真正的自由——是 接受你的起点——然后从这里——投出你的人生。',
          now: '现代人有一种幻觉——"真正的自己"是和家庭、文化、社会都分开的那个 纯粹的我。\n\n如果你 摆脱 这些 外在影响——你就找到 真正的你。\n\n这是一个 美式心灵鸡汤 的版本——但它是错的。\n\n海德格尔的洞察: 那个 摆脱一切的纯粹的我 ——根本不存在。\n\n你的 我 ——本来就是 你被扔到的位置 的产物。你想找的 真正的你 ——也是从这个位置发展出来的。\n\n这不是说 你被困了。这是说: 你的自由 不在 摆脱起点 ——而在 从这个起点出发——选择往哪里去。\n\n你妈妈的脾气在你身上——不是你的 不自由。是你 从哪里出发 的事实。你可以 在这个出发点上——做你的事。但你做不到 没有这个出发点。',
          deeper: '"被抛"最深的层面: 你也在 抛 别人。\n\n你以为只有你 被抛——你的孩子也被你抛。你的下属——被你这个老板抛进一个特定的工作环境。你的配偶——被你抛进 你的家庭文化。\n\n这是 责任 的真实位置——\n\n你不能选 谁抛你。但你能选 你如何抛别人。\n\n你做家长的方式——决定了你孩子的 被抛起点。\n\n你做老板的方式——决定了你下属的 被抛起点。\n\n你做爱人的方式——决定了你伴侣的 被抛起点。\n\n你被抛——是过去式。你抛别人——是现在进行时。\n\n海德格尔让你看见——你 不只是 起点的产物——你 也在塑造起点。\n\n这是 此在 的真正重量——你是被抛的——但你也是在抛的。',

        body: '陈毅 38 岁。他大学室友——比他小 1 岁的徐昭——上周突然脑溢血去世。\n\n葬礼。\n\n来了 200 多人——大多是徐昭的同事、朋友、社交圈。\n\n陈毅坐在第三排。\n\n他听了 5 个人发言。\n\n每一个发言都很相似——\n\n"昭哥是一个特别有责任感的人。"\n"昭哥工作上特别认真。"\n"昭哥对朋友特别仗义。"\n"昭哥才 37 岁——上有老下有小——太可惜了。"\n"我们要化悲痛为力量——更好地工作和生活。"\n\n陈毅听着——胸口堵。\n\n这些话——都对——但都没说 徐昭。\n\n这些话——可以放在任何一个早死的中年男的葬礼上——一模一样。\n\n没有一个人——说出 徐昭这个具体的人 ——他 20 岁时候喜欢摇滚、他 25 岁时候做过一年厨师、他 30 岁时候说过最想去阿拉斯加看极光——但他从来没去过——因为他 一直觉得 30 岁还有时间——但 37 岁他没了。\n\n陈毅意识到——\n\n这个葬礼——不在 哀悼徐昭——这个葬礼——在 表演 一种 应该如何哀悼。\n\n大家说 应该说的话——做 应该做的姿态——流 应该流的泪。\n\n大家不是个体——是 大家 ——在做 大家应该做 的事。\n\n他突然觉得这个房间让他窒息。\n\n他悄悄站起来——走出去——没人注意。\n\n他走到大堂——没人。他坐在大堂的长椅上——10 分钟。\n\n他想徐昭。\n\n他想——19 岁那年——他和徐昭蹲在宿舍楼下抽烟——徐昭说——他想去阿拉斯加看极光。\n\n他想——25 岁那年——徐昭辞职做厨师那 1 年——做的红烧肉特别好吃——他每次去吃——徐昭都说 这是我的第 X 个版本。\n\n他想——30 岁那年——徐昭结婚的时候——徐昭说 不知道我做了对的决定吗。陈毅当时没接话。\n\n他想了 1 个小时。\n\n他流了眼泪。但他没有 流应该流的泪。他流的是——徐昭那个具体的人——的眼泪。\n\n他坐完——回去葬礼——继续坐到结束。\n\n但他知道——他在大堂的那 1 小时——是他唯一 真的 在徐昭葬礼的时间。\n\n其他所有时间——他都在 大家 里——在 应该 里——在 表演 里。\n\n那 1 小时——他是 他自己——他在 真的 哀悼。\n\n这就是海德格尔说的——本真。\n\n你 99% 的时间——是 das Man——大家、人们、应该如此。\n\n本真 ——是从 大家 里出来——回到 我自己 ——哪怕只是几分钟。',
        layers: {
          concept: '"本真" (Eigentlichkeit) 来自德语 eigen (自己的)——直译 属己性。\n\n它的反面是 das Man——大家、众人、不特定的"人们" (常翻译为 常人)。\n\n海德格尔说: 你 99% 的时间——活在 das Man 中——\n\n"人们 这样做。"\n"大家 都这么想。"\n"应该 这样。"\n"现在的人 都喜欢这个。"\n\n这个 人们/大家/应该 ——是 没有具体主体 的。它不属于任何人——但它统治着每个人。\n\n你穿什么、读什么、追什么——大多数都是 人们 在决定——不是你。\n\n本真 不是说 完全摆脱 人们——你做不到。\n\n本真 是: 在某个时刻——你 看穿了 人们 的运作——然后你 选择了你自己 的方式——而不是 人们 的方式。\n\n这种 看穿+选择 ——是你 真正在 的时刻。',
          now: '今天 das Man 通过算法运作。\n\n抖音 你点的视频——是 人们 的视频。\n小红书 你看到的生活方式——是 人们 想看到的。\n朋友圈 你发的状态——是 人们 期望的状态。\n\n你 几乎所有信息输入 ——是 大家 都在看 的东西。\n\n这个 大家 ——没有具体的人。但它强大到——它在每天塑造你 想什么、要什么、做什么。\n\n本真的时刻——是你 注意到 这一点——然后做一件 大家不做 的事。\n\n不是为了 反潮流——而是因为 你自己想做。\n\n陈毅在葬礼上离场——不是为了 反对 那个葬礼——他是因为 在那一刻他认出了 das Man——他要回到 真正的徐昭。\n\n这种回到——是 本真。',
          deeper: '"本真"最深的层面: 它不是一个 你可以维持 的状态——它是一个 瞬间。\n\n你不能 一辈子都本真。这是不可能的。\n\n你一定要在 das Man 中——因为生活必须用共享的语言、概念、习俗。\n\n但你可以——在某些关键时刻——醒过来——做一个 你自己的选择。\n\n陈毅葬礼离场——是几分钟。然后他回去——继续在 das Man 中。\n\n这没关系。\n\n本真 不是一种身份——是一种 时刻 ——一种 你认出了自己 的瞬间。\n\n海德格尔说: 一个人——一辈子有几个这样的瞬间——就够了。\n\n那几个瞬间——决定了他 是不是 真的活过。',

        body: '王思琪 45 岁。某科技公司财务总监。\n\n那个周三——她例行体检。\n\n3 天后医生打电话: "王女士——您的肺部 CT 显示有 1 个 8mm 的结节——形态不太规则。我们建议做增强 CT 复查。最早能约到 3 周后。"\n\n3 周。\n\n她挂了电话——坐在办公室里——发呆了 30 分钟。\n\n8mm 不规则结节——可能是良性——可能是早期肺癌——可能是别的什么。3 周后才知道。\n\n这 3 周——她不知道 自己是不是癌症 ——她不知道 自己还有多少时间。\n\n她过去 45 年——从来没有真正想过 死。\n\n她以为死是 70 岁以后的事。她以为死是 别人的事。她以为死是 抽象的事。\n\n但 8mm 那个结节——把死亡变得 具体——变成 可能在 3 周后告诉她——她还剩 6 个月。\n\n第一周她完全 dysfunctional。\n\n她去上班——但她坐在工位上 8 小时——什么都没做。她回家——但她吃饭都没胃口。她和孩子说话——但她想的不是孩子说什么——是 我可能没了她的高中毕业。\n\n第二周——她变了。\n\n她突然——非常清楚——什么对她重要——什么不重要。\n\n那个跟她吵了 5 年的同事——不重要。\n\n那个让她每天加班 2 小时的项目——不重要。\n\n那个她一直想去但没去的西藏——重要。\n\n那个她已经 1 年没主动陪的女儿——重要。\n\n那个她拖了 3 年没和老公认真谈的事——重要。\n\n她做了 3 件事——\n\n第一件——她跟老公说: "如果我有事——我想让你知道一件——我这 15 年其实有 3 件事一直憋着没说。我现在说。"\n\n她说了 2 个小时。老公也哭了 2 个小时。15 年的隔阂——3 周可能要结束之前——他们终于 真的 说了。\n\n第二件——她跟女儿说: "妈妈最近想——你 13 岁了——我陪你 13 年——但是我大多数时间——只是 在你旁边 ——不是 和你在一起。这是不一样的。从今天起——每周六晚上——你想干什么我陪你。"\n\n女儿哭了。"妈我以为你不爱我。"\n\n第三件——她在工作上 砍掉 ——她跟领导说: "我不接 X 项目了。我接受降级。"\n\n领导震惊。但她不解释。\n\n第三周——复查报告。良性。结节是 一个老炎症 ——没事——不用处理。\n\n王思琪从医院走出来——她应该 庆幸 ——但她内部很复杂。\n\n这 3 周——她活得 比过去 45 年加起来 还真实。\n\n如果她没那 8mm 结节——她不会跟老公说那些憋了 15 年的话——她不会跟女儿说那些话——她不会砍掉那个项目。\n\n她会继续 像没事 ——一直到 真的 没事——也没活过。\n\n她回家——告诉老公: "我不要回到 3 周前的我。"\n\n老公: "嗯。"\n\n海德格尔说: 向死而生。\n\n她懂了——死亡——不是终点——是让 在 变得真实的视野。\n\n你不 想死 ——你才 活得真。\n\n你 永远 想 还有时间 ——你就一直在 not yet。',
        layers: {
          concept: '"向死而生" (Sein-zum-Tode) 是《存在与时间》最有名也最被误读的概念。\n\n常见误读: 海德格尔在说 想着死 / 接受死 / 准备死。\n\n不是。\n\n海德格尔说的是: 死亡不是一个 未来的事件 ——死亡是 此在 的一个 永恒可能性 ——它一直 已经在那里 ——但你大多数时候 把它推开。\n\n当你 真正面对 这个 永恒可能性 ——你的 在 ——变得不一样。\n\n你的优先级 自动调整——你能看清 什么真的重要——你不再 浪费 自己。\n\n这不是悲观。这是 让 在 真实化 的方法。\n\n人 几乎所有时候 ——都活在 das Man 的"还有时间"幻觉中。死亡——是唯一能把你从这个幻觉里 拉回 此在 的力量。',

        body: '林泽 28 岁。某独角兽 AI 公司的工程师。\n\n他过去 3 年——焦虑——失眠——惊恐发作——做过 4 次 MRI——做过血液检查——做过心电图——做过甲状腺检查——一切正常。\n\n他换了 3 个心理医生。\n\n第 4 个咨询师——50 岁的赵医生——听了他讲 4 次。\n\n第 5 次——她说了一句话——\n\n"林泽——你的焦虑——不是病。是你的自由。"\n\n林泽: "什么？"\n\n赵医生: "你列出来的 让你焦虑的事 ——是什么？"\n\n他列: "我担心房贷还不上。我担心 35 岁被裁。我担心 AI 革命让我失业。我担心选错方向。我担心错过窗口期。我担心 30 岁还没买房。我担心 30 岁还没结婚。"\n\n赵医生: "你看这个清单——所有事——你都觉得 我必须做对 ——但 我可能做错。"\n\n林泽: "对。"\n\n赵医生: "你为什么觉得 你必须做对 ？"\n\n林泽: "因为如果做错——一辈子就完了。"\n\n赵医生: "谁说 一辈子就完了 ？"\n\n林泽: "……我父母？社会？常识？"\n\n赵医生: "嗯。这就是 你以为 你必须 但其实 你不必。"\n\n"但是——这里有个深层的问题——你的焦虑——不是 这些具体的事 引起的。"\n\n"你的焦虑——是因为 你知道 ——所有这些事——你都可以 选不同。"\n\n"你可以 选不买房——你父母会怎么说？算了——但你可以选。"\n"你可以 选不结婚——别人怎么看？算了——但你可以选。"\n"你可以 选辞职——还房贷怎么办？也许卖房——但你可以选。"\n"你可以 选搬到三线城市——所有的标准都不适用——但你可以选。"\n\n"你可以选每一件事 不同 ——但你不敢。"\n\n"你的焦虑——不是 这些事让你焦虑 ——是 你的 我可以但我不敢 ——让你焦虑。"\n\n"这是萨特说的 焦虑 (anguish)——它不是病。它是 自由 的另一面。"\n\n"如果你 没有自由 ——你不会焦虑。你只会有命。"\n\n"但是你 有自由 ——每一刻——你都站在 选哪条路 前——你都知道 你可以选不同。"\n\n"这个 知道 ——让你焦虑。"\n\n林泽愣了 30 秒。\n\n他说: "我不知道我能不能接受 我是自由的 这件事。"\n\n赵医生: "嗯。这正是问题。大多数人——更愿意 不自由 ——因为 不自由 简单——你只要服从。"\n\n"自由——意味着你要 承担。每一次选择——都是你的。错了——你的。对了——也是你的。"\n\n"但你 想躲——所以你 假装 你没得选——你假装 是别人的期望 / 房贷 / AI 革命 / 你父母 ——决定了你。"\n\n"这就是 自欺。我们下次讲这个。"\n\n林泽那天回家——失眠到 4 点。\n\n但是第二天早上——他做了一件 第一次 ——他给他领导发了一条信息: "我想 1 个月 part-time——我需要 试一件事。"\n\n他不知道他要试什么。他只知道——他要 选 一件他自己的事。\n\n哪怕这件事——会让 35 岁被裁 这个焦虑 ——变成 30 岁就被裁。\n\n他可以承担。\n\n他第一次——感到一种 怪怪的 ——但 真实 的 平静。\n\n他懂了——他过去 3 年焦虑——是因为他 知道他自由 ——但他 不敢用 这份自由。\n\n现在他用了。焦虑还在——但已经不一样了。',

        body: '吴蓉 38 岁。江苏一个小县城的小学英语老师。\n\n她婚姻不快乐——15 年了。她老公酗酒——大约 5 年。最近 2 年——开始 推搡 她——还没动手——但她知道——可能会有那天。\n\n她和姐姐聊。\n\n姐姐: "你为什么不离婚？"\n\n吴蓉: "我离不了。"\n\n姐姐: "为什么离不了？"\n\n吴蓉: "我女儿初二——再 4 年高考——这时候离婚会影响她。"\n\n姐姐: "那 4 年后？"\n\n吴蓉: "4 年后她上大学——但是 4 年后我 42 岁了——我离婚还能干什么——我职业又不能换。"\n\n姐姐: "你 42 岁——还有 30 年工作时间——你为什么不能换工作？"\n\n吴蓉: "我是老师——我没别的技能。"\n\n姐姐: "你可以学。"\n\n吴蓉: "我没时间学。"\n\n姐姐: "你下班 4 点。"\n\n吴蓉: "我要做饭——管孩子。"\n\n姐姐: "孩子初二了——能自己。"\n\n吴蓉: "你不懂——县城的离婚妈——别人看不起。"\n\n姐姐: "你为什么在乎别人看？"\n\n吴蓉: "我不能 不在乎。"\n\n姐姐沉默了 10 秒。\n\n姐姐说: "蓉——你说了 5 分钟——每一句话——都是 我没得选。"\n\n"但是——你 在选。你选 留下。你选 不学新东西。你选 让别人的评价决定你的生活。"\n\n"你每一句 我没办法 ——后面都是 一个我不敢选的选项。"\n\n吴蓉哭了。\n\n"那我能怎么办？我离了——我承担不了。"\n\n姐姐: "你 承担不了 ——可能是真的。也可能 你 觉得 你承担不了——但其实你能。但这不重要——重要的是 你承认 ——你在选 留下。"\n\n"如果你说: 我选 留下——因为我承担不了 ——这是 一个选择 ——你的选择。"\n\n"但你说 我没办法 ——这是 自欺。"\n\n"自欺 和 选择 ——表面上结果一样——你都留下了。"\n\n"但是 内里 ——完全不一样。"\n\n"自欺 ——是说服你自己 你不是自由的 ——这样你不用承担。"\n\n"选择 ——是看着 你自由 ——然后承担你的选择。"\n\n"你 15 年 ——一直在 自欺。这就是为什么 你这么痛苦。"\n\n吴蓉哭了 1 个小时。\n\n那一晚——她在日记里写了一行字: "我 选 了留下。"\n\n她没离婚。\n\n但是 那一晚之后 ——她变了。\n\n她不再说 我没办法。她开始说 我选的。\n\n她选 留下 ——她也接受了 留下 的代价。\n\n3 个月后——她也开始做另一件事——她每天 5 点起——学口语——开网课。她不知道这个能不能用——但她要 学。\n\n6 个月后——她有了一个 plan B——如果情况恶化——她有路走。\n\n她跟她老公的关系——也变了。她不再 受气 ——她 选 了留下——但不是 受气的留下。\n\n她老公 第一次 在她面前 害怕 ——因为她 不一样了。\n\n3 年后 她离了。她那时已经存了 18 万——线上英语课开了 2 年。\n\n她和姐姐说: "我现在懂了。我之前 15 年 ——不是没得选。我是 不敢承认我在选。"\n\n姐姐: "嗯。"\n\n吴蓉: "萨特说的对。说 我没办法 ——是最严重的撒谎。"\n\n姐姐: "因为骗的是自己。"',
        layers: {
          concept: '"自欺" (mauvaise foi) 是萨特最有名的诊断——出自《存在与虚无》。\n\n字面是 坏的信念 ——但意思是 对自己撒谎。\n\n他举的例子是个咖啡馆服务员——他 完全 演 服务员的角色——动作、表情、语调——都很标准。\n\n他在做一件事: 他假装 他是 服务员 ——而不是 一个 选择了做服务员的人。\n\n这种假装——把 自己 ——从 选择的主体 ——降级为 角色的执行者。\n\n这给了他一个心理 解脱 ——我不用为我做的事负责——我只是 服务员 在做服务员的事。\n\n萨特说: 这就是 自欺。\n\n它的核心结构是: 把 自由的事实 ——伪装成 必然的事实。\n\n你说 我没办法 ——把 选择 伪装成 必然。\n\n你说 这是我的性格 ——把 习惯 伪装成 本质。\n\n你说 我就是这样 ——把 现在的选择 伪装成 永恒的事实。\n\n所有的 自欺 ——都有同一个目的: 逃避 你是自由的 ——这个 不能逃 的事实。',
          now: '现代人是 自欺大师。\n\n你听到的句子: \n"我没办法——房贷。"\n"我没办法——孩子。"\n"我没办法——父母。"\n"我没办法——年纪。"\n"我没办法——市场行情。"\n"我没办法——形势。"\n\n80% 是自欺。\n\n你不是 没办法 ——你是 选了 一条路——这条路上 这件事不可能——但 你可以选另一条路 ——那条路上 这件事可能。\n\n你不选 另一条路 ——是因为它有 别的代价——你不愿付。\n\n这是合理的选择——但 它是选择 ——不是 没办法。\n\n说 我没办法 ——是给自己 心理减负 ——但代价是 你失去了你的人生。\n\n练习: 这周一次——你说 我没办法 的时候——停下——改说 我选了X 因为我不愿付 Y 的代价。\n\n这一改 ——会改变 你的整个体验。',

        body: '黎芸 26 岁。某战略咨询公司的初级顾问。\n\n年会。圆桌晚宴。她坐在一个 8 人桌——隔壁是公司全球 CEO——一个 60 岁的英国男人——他从来不和初级员工互动。\n\n她紧张——但她正常吃饭、聊天。\n\n中途 CEO 突然转向她: "Liyun——你最近做的那个零售案子——我看了——你做的 Q4 财报模型——有一处的假设很有创意。"\n\n她愣了 3 秒。\n\n她: "谢谢您 Mr. Carter——是的——那个我用了一种新的 SKU 滚动方式——"\n\nCEO: "嗯——很不一般。"\n\n他继续吃。\n\n但是 黎芸感到一件事——\n\n在那 30 秒里——CEO 看 她——以一种 她从来不看自己 的方式。\n\n他看到她——是一个 公司未来的可能 ——他看到她——是 战略思考能力突出的人。\n\n她自己——从来没这样看过自己。\n\n她看自己——是 26 岁的初级员工——刚入职 2 年——还在学——可能会犯错——希望不被注意到。\n\n但是 Mr. Carter 那一眼——把她从 她自己的视角 ——拉到了 他的视角。\n\n她突然意识到——\n\n她 不只是 她从内部看到的自己。\n\n她 也是 别人从外部看到的某个人——一个有 客观特质 的人——可以被评估、被分类、被排序、被期待。\n\n她突然 不舒服。\n\n不是因为 CEO 看错了她——而是因为 他看到的她 ——超出了她对自己的认识。\n\n她过去 2 年——一直觉得自己 不知道自己在做什么 ——觉得自己是 撑着不被发现的初级员工。\n\n但是 那 30 秒 ——CEO 让她看见——别人看见的她——已经是另一个人了。\n\n她不能 再 完全 沉浸在 自己看自己 的视角里。\n\n她现在 知道 ——她也是一个 客体 ——在 别人的眼里。\n\n⋯\n\n她回家后 3 天——焦虑。\n\n她朋友说: "你不应该高兴吗？CEO 注意到你了。"\n\n她说: "我是高兴。但我也害怕。"\n\n朋友: "怕什么？"\n\n她: "怕我变成 他眼里的那个 Liyun ——而不是 我自己 知道的 Liyun。"\n\n"在他眼里——Liyun = 未来的合伙人。"\n"在我眼里——Liyun = 还在挣扎的小孩。"\n\n"如果我 接受 他的看法——我就 变 成了 他眼里的人——我就被 他的目光 塑造了。"\n\n"如果我 拒绝 他的看法——我就还是 自己 ——但我可能就 错过 他给我的机会。"\n\n"我两边都不行。"\n\n这就是萨特说的——他人的目光——让你 异化 ——把你变成一个客体。\n\n你以前是 自己的主体 ——你看世界。\n\n他人的目光出现——你突然意识到——你 也被看。\n\n而 被看 是不一样的 在 ——你 在 ——以 一个客体 的方式——在某人 的眼里。\n\n你 不能消除 这个。\n\n你只能选——你怎么 在 这个 被看 的 状态里。\n\n⋯\n\n黎芸 3 个月后——做了一个决定——\n\n她接受 CEO 的看法——但她 不让 它定义她。\n\n她 用 CEO 的看法——给自己机会——她申请了一个海外项目。\n\n她 不沉浸 在 CEO 的看法——她内部——还保留 那个挣扎的小孩 的视角。\n\n她两个视角 都用 ——不让任何一个 完全 替换另一个。\n\n这就是 和他人的目光共处 ——而不是 被它吃掉。\n\n萨特说: 他人是地狱。\n\n他说的不是 他人本身是坏的——他说的是: 当 他人的目光 完全 接管你的视角——你就不再 自己看自己 ——你只在 他人看你 ——这种状态——是地狱。\n\n但是 不和他人的目光接触 ——也不行。你不可能 完全独自 ——因为你 本来就在世界中。\n\n你的任务——是学会 在他人的目光下 ——还能保留 自己看自己 的可能。\n\n黎芸学到了。',

        body: '邵青 50 岁。他爸爸 30 年前创办的化工厂——他接手了 18 年。\n\n那年他爸爸去世——一周后——他做了一件 18 年没做过的事——他独自坐在他爸爸的办公室里——3 小时——什么都没做。\n\n他问了自己一个问题——\n\n"这 18 年——我做的每一个决定——有几个是 我自己想 的？"\n\n他试着算——\n\n2007 年扩产能——他爸爸的主意。\n2010 年并购同行——他爸爸临终前安排的。\n2013 年环保升级——政策要求。\n2015 年布局新材料——咨询公司建议。\n2018 年数字化——管理层会议决定。\n2020 年裁员——CFO 建议。\n2022 年布局东南亚——董事会决议。\n\n他想——这 18 年——他签了 200 多份文件。他做了 100 多个 重大决定。\n\n他自己 想 的——他自己 真正问 我觉得这是对的吗 的——\n\n是 0 个。\n\n他都是在 听从。\n\n听爸爸的——听政策的——听顾问的——听 CFO 的——听管理层的——听董事会的——听 这个时代的所谓主流 的。\n\n他从来没问过——这件事——按 我邵青的判断——对不对？\n\n那一刻他懂了——\n\n他 50 年——没有 自己 的过。\n\n他是 一个执行系统 ——执行别人的判断。\n\n但他 没有判断。\n\n⋯\n\n他做了一件让所有人 confuse 的事——\n\n他在公司管理会议上说: "下周开始——所有重大决议——我要 自己再想一遍 ——3 天之后——我才签。"\n\n管理层震惊。这意味着——所有决策——慢 3 天。\n\nCFO: "邵总——这会影响效率。"\n\n邵青: "效率不是我的第一优先了。我想清楚——比快——重要。"\n\nCFO: "您之前从不这样。"\n\n邵青: "我之前 18 年——做了很多 高效但我没想 的事——很多事我现在看 是错的。我不要 高效地继续做错的事。"\n\nCFO 沉默。\n\n那年——邵青改了 3 个 已经走流程一半 的决议。\n\n第一个决议——之前是要扩产能 30%——他改成 不扩。原因: 他算了 3 天——觉得 5 年内化工原料需求会跌——之前的扩张决定 是看了某咨询公司的"行业增长报告"——但那个报告基于 2019 年的数据。\n\n这一个决定——后来证明——救了公司 8 亿——因为 5 年内市场确实跌了。\n\n他想——\n\n康德说: 敢于使用你自己的理性。这是启蒙的口号。\n\n他过去 50 年——一直在 不敢。\n\n不敢 不是因为蠢——是因为 让别人替你想 简单——你不用承担——你只要执行。\n\n50 岁那年——他终于敢了。\n\n康德说这句话是 240 多年前——但今天——它和那时一样难做到。',

          now: '今天 启蒙 比 1784 年 更难。\n\n康德时代——你的 信息源 是有限的: 教会、报纸、长辈。要 独立思考 ——你要 找信息。\n\n今天——你的信息源 无限——但 每一个都在告诉你怎么想。\n\n算法替你筛——你的 视野 已经被裁剪。\n社交媒体替你判断——你的 朋友圈共识 ——告诉你哪种立场 体面。\n意见领袖替你简化——复杂的事 ——被压缩为 60 秒短视频。\n\n你的 独立思考 ——比康德时代——更被外包。\n\n练习——一周——拿一件你 自动有立场 的事——比如 AI 会不会取代人 / 房价会不会跌 / 应不应该 X。\n\n停下你的立场。\n\n问自己: 我的立场——从哪里来的？我 自己想过吗？我看过相反的论据吗？我能 自己 把双方都写出来吗？\n\n90% 的人 ——做不到。\n\n这就是康德 240 年前指的 不成熟。',

        body: '梁宁 42 岁。某科研所天体物理学家。她研究 系外行星 18 年。\n\n那年她做了一个 突破性研究 ——通过分析星光的微小变化——推断出一颗距地球 120 光年的行星 上面 可能有 液态水。\n\n她的论文上了《Nature》。她被采访: "您的发现意味着什么？我们看到 那颗行星了吗？"\n\n她说: "我们没看到那颗行星。我们看到 星光的变化。我们 推断 那颗行星 的存在和它的成分。"\n\n记者: "那您 知道 那颗行星 真实的样子吗？"\n\n梁宁犹豫了 5 秒。\n\n她说: "不。我们 不知道 那颗行星 真实的样子。我们 只知道 通过我们的仪器和理论 推算出来的样子。"\n\n记者: "但 它的成分是 您测出来的——这不是 真实 吗？"\n\n梁宁: "我们测的——是某些频率的光的吸收。我们 用我们的化学理论 ——把这些吸收 翻译成 元素。"\n\n"但是这翻译——基于 我们的认知工具。我们的认知工具——是 18 世纪以来 通过物理实验 在地球上 测试出来的。"\n\n"那颗行星——120 光年远——我们 不可能去 直接验证。"\n\n"如果那颗星 的环境 让 我们的物理规律 在某种程度上 不成立 ——我们的推断就是错的——但我们 永远不知道。"\n\n采访结束后——梁宁回家——夜里失眠。\n\n她意识到一件事——她研究宇宙 18 年——她一直以为她在 看宇宙。\n\n但她其实——一直在看 她的仪器和理论生成的关于宇宙的图像。\n\n这两件事 不一样。\n\n她 永远 看不到 宇宙的 真实 ——她只能看 宇宙 经过她的认知装置 加工 之后的图像。\n\n如果有一个 100% 不通过任何仪器、不基于任何理论 的 直接的宇宙——她 不可能 接触到它。\n\n她 接触的——永远是 加工后的现象。\n\n物自体——那个 不被加工 的宇宙——是 永远 在她视野之外。\n\n她 不悲伤 ——她 释怀。\n\n因为她懂了——她研究的——不是 不真实。\n\n她研究的是 在人类认知装置内 真实 的图像。这种图像 有它的客观性——但 不等于物自体本身。\n\n她做的是 高级的科学 ——不是 神的视角。\n\n康德 240 年前就说了——\n\n人 永远只能认识 现象——不能认识 物自体。\n\n这不是 悲观——是 把人放在合适的位置。\n\n人 不是神——人 也不是无知。人是 一个有特定认知装置的存在 ——在这个装置内 ——做出能做的认识。\n\n这就是康德革命。',
        layers: {

          deeper: '"现象与物自体"最深的层面: 它不是 悲观主义。\n\n听到 你不能认识真实 ——很多人觉得 那一切就不真。\n\n康德不是这意思。\n\n他说: 现象 是 真实的。它有 客观性。它是 所有正常人共享的 ——因为 我们的认知装置 大体一样。\n\n你看到的 红色 ——和别人看到的 红色 ——大致一样。你算出的 1+1=2 ——和别人算的 一样。\n\n这种 共享的现象 ——是 科学 的基础——是 客观性 的基础。\n\n但是——这个 共享性 ——不延伸到 物自体。\n\n物自体 是什么——我们 不知道。它甚至可能 不分种 / 不分一二 / 不分时间 ——我们的认知装置 强加 了这些范畴。\n\n康德的结论——既不是悲观——也不是 全知。\n\n是一个 有边界的乐观: 在边界内——我们能知道很多。出了边界——我们必须沉默。\n\n这和维特根斯坦的 凡不可说的——保持沉默 ——是 异曲同工。',

        body: '钟玮 36 岁。某科技公司副总裁——管 80 人团队。\n\n那年公司压力大——她接到指令——"压一压 996"。\n\n意思是: 让团队 多加班——别给加班费。\n\n她两难。\n\n如果 她 听 ——她个人会受到表扬——公司短期数字好看。她升职机会大。\n\n但 她团队 80 人 ——每个人多干 200 小时——没钱——可能很多人 burn out。\n\n如果 她 不听 ——团队保住了——但她个人受罚——可能被边缘化。\n\n她跟她导师聊。她导师是个学哲学出身的咨询师。\n\n导师问: "你做这个决定——你会用什么方法判断？"\n\n钟玮: "我可以算: 如果我听——我升职几率从 30% 升到 60%——但我 80 人受苦。如果不听——我个人发展受损——但 80 人不受苦。"\n\n导师: "这是 后果计算。你算的是 不同选择的总收益。"\n\n"但是这种算 有问题: 你怎么 衡量 你升职 vs 80 人受苦 ？这两个 不在一个 单位 上。"\n\n钟玮: "那怎么判断？"\n\n导师: "试康德的方法。"\n\n"康德说: 做事之前问——如果 所有人 都这样做——这个世界还能运转吗？"\n\n"具体到你这个事——你的逻辑是: 我作为高管——压团队——拿到我的升职。"\n\n"问: 如果 所有高管 都这样做——会怎样？"\n\n钟玮想了 10 秒。\n\n她说: "如果所有高管都这样做——那 整个行业 ——没人愿意当员工。每个员工 都会 burn out。最后高管也没人可压了。"\n\n"系统会崩溃。"\n\n导师: "对。这就叫 不能普遍化 的行动。"\n\n"康德说: 不能普遍化的行动——就是 不道德 的。"\n\n"为什么？因为它 利用了别人 不像你一样行动 这个事实。"\n\n"如果 所有高管都压团队——你的策略 不灵了。所以你这策略 只能 在 别的高管不压 的前提下 工作。"\n\n"你在 利用 其他高管 是道德的 ——来让你 不道德 地获益。"\n\n"这是 寄生 ——不是 自立。"\n\n钟玮愣了 30 秒。\n\n她说: "那我应该 不听？"\n\n导师: "康德的 绝对命令 不告诉你 应该听不听。它告诉你—— 不能这样听。\n\n"如果你 听——你必须知道 你是 寄生在 道德 体系上 ——你 在 利用 别人的善 ——来获得 不该得的。\n\n"你可能 接受 这个 ——很多人接受。\n\n"但 你不能 同时 ——一边做 ——一边觉得自己 没问题。这就是康德的诚实。"\n\nizes钟玮回去——做了一件 中间方案 ——\n\n她跟她团队 透明: "公司有这压力——我不会强迫你们 996。但我自己 会 加班。希望大家自愿。"\n\n结果: 大约 60% 团队 自愿 加班 一些 ——其余 40% 不加。\n\n公司目标 没完全达到——但完成了 80%。\n\n她个人——没升职——但也没被边缘化。她做了 一个她自己能 普遍化 的选择: 我作为高管——透明地告知压力——不强迫——自己以身作则。\n\n这个 ——所有高管都做 ——系统不崩。\n\n2 年后——她当年那个直接领导 因为 长期压团队 被举报 ——离职。\n\n钟玮 反而接了 那个位置。\n\n她在日记里写——"康德的 绝对命令 ——不只是 道德 ——也是 长期 的 战略。"',
        layers: {
          concept: '"绝对命令" (kategorischer Imperativ) 是康德伦理学的核心——出自《道德形而上学奠基》(1785)。\n\n它有几个公式——最有名的是:\n\n"只按你能同时希望它成为普遍法则的准则行动。"\n\n意思: 在你做某事之前——问——如果 所有人 都这样做——这个世界还合理吗？\n\n如果合理——你可以做。如果不合理——你不应该做——哪怕你的具体行动看起来 不会被发现。\n\n比如: 我可以 撒谎一次救我自己。\n\n康德问: 如果 所有人 都 撒谎救自己 ——这个世界怎样？\n\n答: 撒谎 失去意义——没人信任何话——人际交流崩溃。\n\n所以——不能撒谎。哪怕这一次对你有利。\n\n康德的洞察——道德不是 后果好不好 ——是 你的行动逻辑能不能普遍化。',
          now: '绝对命令 今天最常被用在 系统性博弈 中。\n\n你坐地铁——逃票——一次没事。\n你说: 我 一次 不影响系统。\n康德: 如果 所有人 都 一次 ——系统崩。所以 不应该。\n\n你电影院 占座——空座位反正没人坐。\n你说: 我一次没事。\n康德: 如果所有人都占——空座不存在了。所以 不应该。\n\n你工作中 撒一个无关大局的谎——同事都这样。\n你说: 我一次。\n康德: 如果所有同事都这样——什么都不能信。所以 不应该。\n\n绝对命令 让你看见——你每一次 我就这一次 ——其实你在 寄生 在 别人不这样 上。\n\n这种意识——让你 选择更自觉。',
          deeper: '"绝对命令"最深的层面: 它不是 实用主义 也不是 后果主义。\n\n康德区别于他的对手 (功利主义、效用计算)——\n\n功利主义: 算 总幸福 ——做使总幸福最大化的事。\n\n康德: 不算后果。看 行动的逻辑结构。\n\n比如: 一个无辜的人 被错误指控 ——如果我撒谎——只有这一个人受益。如果我 说真话 ——一个无辜的人受死。\n\n功利主义: 撒谎。\n康德: 真话。\n\n康德的说法被批评得很多。但他的逻辑是: 一旦 真话 不是 道德的 ——就 任何 真话义务 都站不住。\n\n所以——道德 不是 哪个具体后果好 的算计。\n\n道德是 你的行动是否 在逻辑上 可普遍 的 测试。\n\n这听起来 反直觉 ——但它有一个好处: 它 不允许 你 例外。每个人 都有一种 自我例外的诱惑 ——我可以这样 因为我特殊 / 因为这是特殊情况 / 因为我有好理由。\n\n康德说: 不。\n\n这种 不允许例外 ——是 道德的力量 ——也是它的 不近人情。',

        body: '齐扬 33 岁。他做初中物理老师 9 年。\n\n他过去 9 年——按所有 优秀老师 的方法上课: 讲清楚知识点、举例、做题、纠错。学生听话——成绩中上。\n\n但他 33 岁那年——做了一件 让校长震惊 的事——\n\n他 不再讲课 了。\n\n他每堂课——只问问题。\n\n第一堂——他讲 牛顿第一定律。但他不讲。\n\n他在黑板上画一个 球。\n\n他问: "你推一下这个球 ——它会一直滚下去吗？"\n\n学生 A: "不会——会停。"\n\n齐扬: "为什么停？"\n\n学生 B: "因为它没力了。"\n\n齐扬: "什么叫 没力了？力 是什么？"\n\n学生 B 卡住了。\n\n学生 C: "因为摩擦力。"\n\n齐扬: "如果 没有 摩擦力呢？"\n\n学生 D: "那它就一直滚。"\n\n齐扬: "你怎么知道？你见过没有摩擦力的情况吗？"\n\n学生 D 卡住了。\n\n学生 E: "那不可能——任何地方都有摩擦力。"\n\n齐扬: "如果有一种地方 没有摩擦力 ——你推一下球 它会怎样？"\n\n学生们一起讨论了 8 分钟。\n\n最后他们自己得出: "如果没有任何阻力——球应该一直保持原来的运动状态。"\n\n齐扬: "你们刚刚发现了 牛顿第一定律 ——一个物体 在不受外力作用下 ——保持静止或匀速直线运动。"\n\n"牛顿 300 年前发现这个——花了几年。"\n\n"你们 用了 12 分钟。"\n\n学生们震惊。\n\n校长来听课——课后跟他说: "齐老师——你这方法 不在 教学大纲里。"\n\n齐扬: "校长——我用了 9 年大纲方法。我的学生——记得知识点——但他们 不真的 懂。"\n\n"今天这堂课——我没 讲 ——我 问 ——他们 自己 推出 牛顿第一定律。他们 真的 懂了。"\n\n校长怀疑——但允许他 实验一个学期。\n\n那一学期结束——他班级的物理 平均分 不是最高的 (因为他不再 刷题)。但他班级的 物理思维能力测试 ——是全校第一 (因为他们 真的会推)。\n\n更重要的是——他班级的学生——开始 自发 在数学课、生物课、化学课——也用同样的 自己问问题 的方式。\n\n他们 学会了 一种 比知识点更深的东西 ——\n\n他们 学会了 怎么 自己想 ——\n\n这就是苏格拉底法。\n\n苏格拉底 2400 年前 在雅典街上 做的事——和齐扬 33 岁在他的初中教室里 做的事——是同一件事——\n\n不是 给答案。是 问问题 让对方 自己 生出 答案。\n\n苏格拉底叫这个 助产术 (maieutic) ——因为他妈妈是助产士。\n\n他说: 我 不教 知识。我 帮你 把你 心里 已经在的 知识 生出来。\n\n齐扬 8 年后—升任了某重点中学的教务主任。他在全校推行这套方法。\n\n3 年后——这所学校的学生 大学录取率没大变——但他们 退学率 ——降到了同类学校的 1/3。\n\n因为他们 在中学就学会了 自己想 ——大学里 不依赖老师 ——不退学。\n\n齐扬的笔记里写——"我做老师的 终极目标 ——是让学生 不需要 老师。"\n\n这话听着反常。但这就是 苏格拉底的真意。',

          concept: '"苏格拉底法" (Socratic Method) ——又叫 助产术 (maieutic)。\n\n苏格拉底说: 我的母亲是 助产士。她不 生 婴儿——她 帮女人 把婴儿生出来。\n\n我做哲学也一样。我 不 教知识——我 帮你 把你心里 已经有的 知识 生出来。\n\n方法: 不断 提问。\n\n你说 "公正 是 给每个人应得的" ——我问 那如果我借了别人的刀——他疯了——还给他他会杀人——我该 还吗？\n你说 "那不应该还" ——我问 那 公正 = 给应得的 ——这个定义 是不是 不对？\n\n通过这种 一连串 的 反问——你 自己 发现 你的定义有漏洞 ——你 自己 修正——你 自己 想得更深。\n\n苏格拉底 不 给 你答案。他 帮你 自己 找到 ——比之前更接近真相 的答案。\n\n这种方法 ——比 直接告诉你答案 ——更慢——但 更深 ——也 更 你自己的。',
          now: '今天 苏格拉底法 ——在心理咨询、coaching、领导力培训 ——都被广泛使用——但 通常被简化 了。\n\n真正的 苏格拉底法 不是 多问问题。是 严格 的 逻辑追问。\n\n关键: 你 不能 满足于 第一个答案。\n\n对方说一个答案——你要问: 你 怎么知道？你的根据是什么？这个根据 在 X 情况 下 还成立吗？\n\n这种 一层一层往下问 ——会让对方 不舒服——但 这就是 哲学。\n\n练习: 下次 跟人 讨论 一个有分歧的事——\n\n不要立刻 反驳。\n\n问 3 个 你怎么知道 / 这个 根据 在什么情况下不成立 / 如果 你的逻辑应用到这件相邻的事——你会怎么说。\n\n大多数人——3 个问题 之内——会承认 我 不真的 想清楚。\n\n这不是 把对方打败。这是 帮 双方 想得更深。',
          deeper: '"苏格拉底法"最深的层面: 它 假设 ——人的 心里 已经有 真相 ——只是被 不准确的概念 遮住。\n\n这是 一个 形而上学的假设 ——后来发展为 柏拉图的 回忆说 (anamnesis) ——学习 = 回忆。\n\n你不学新东西——你 想起 你 永恒灵魂 早就知道 的东西。\n\n这听起来 玄。但有一个 实践的意义 ——\n\n如果你 用助产术 帮一个人——你 假设 他 心里 有 比他现在认识 更深的 真相 ——你只是 帮他 抵达。\n\n这种 假设 ——让你 尊重对方。\n\n反过来——如果你 假设 对方 心里 没有真相 ——你 必须 灌输 真相 ——你就成了 老师 / 权威 / 灌输者。\n\n苏格拉底的姿态: 我 不是 权威。我 帮你 找你自己的真相。\n\n这种姿态——比 灌输 ——更困难——但 更可持续 ——因为 学生 学到的 ——是他 自己的。\n\n齐扬的物理课——好的地方 ——是他 假设 他的学生 心里有 物理的真相 ——他只需要 帮他们 抵达。\n\n大多数老师 ——假设 学生没有 ——所以 必须 灌输。\n\n但是 学生 实际上 心里 有 ——\n\n你 推一个球 ——球 停。\n\n这个 经验 ——已经包含了 牛顿第一定律 的种子。\n\n只是 学生 没学过 用 语言 把它表达出来。\n\n好老师 ——帮他们 表达。\n\n这是苏格拉底的真意。',
          links: { pre: ['无知之知'], post: ['省察的生活'] },

        body: '崔铭 55 岁。某国企做了 30 年工程师——刚退休。\n\n他退休那天——同事送他——他妻子来接他——晚上他独自坐在阳台上——突然——他哭了。\n\n他不是 因为 退休伤感。他是 因为 一个突然的发现。\n\n他 30 年——做工程师——做了 1000 多个项目——评了 多次 优秀员工——升到 副总工。\n\n但是 他想了想 ——他这 30 年 ——没有问过 一个 为什么。\n\n他做项目——按规范做。\n他升职——领导让他升他就升。\n他结婚——介绍人介绍的——合适。\n他生子——大家都生。\n他买房——大家都买。\n他买车——大家都买。\n他送孩子去英语班——大家都送。\n\n每一件事——他都做了。但每一件事——他都没 问过——为什么做 / 这是对的吗 / 我自己想做吗。\n\n55 年——他全是 行动 ——没有 反思。\n\n他做了一件他从来没做过的事——他列出来 他生命中 重要的 10 件事 ——然后在每件事旁边问 我为什么做这件事 ?\n\n他写不出来。\n\n每一件 ——他的答案 都是 大家都这样 / 应该这样 / 当时不做不行 / 想都没想过。\n\n没有一件 ——是 因为 我想清楚 它 重要 才 做。\n\n他坐在阳台上——意识到一件事——\n\n他做工程师 ——一辈子在 做事 ——但他 没 活过。\n\n做 不等于 活。活 ——需要 看见 ——你做的事——为什么做。\n\n他不看见。\n\n他 高效执行 了 30 年 一个 没看清楚的剧本。\n\n那一刻他不哭了。\n\n他做了一个决定——\n\n他不再 听 任何人说 你退休应该干啥 。\n\n他要 自己问 ——他 60 岁的人生 ——他自己 想 怎么过。\n\n这是 苏格拉底说的——未经省察的人生——不值得过。\n\n⋯\n\n他用了 4 个月 ——\n\n第一个月他 什么都不做 ——只是 想。\n\n第二个月他 试着 ——想他 真正 喜欢什么。\n\n第三个月他 排除掉 ——所有 大家都说退休应该做 的事——他 不做。\n\n第四个月他 决定——\n\n他要 学木工。\n\n他从小看他爸爸做木工——但他自己一辈子 没碰过。他以为他 不喜欢。他现在 想 ——其实 他 一直想试 ——但他 一直觉得 这没用。\n\n他报了一个 60 岁的木工班。班上 同学 都是 60 岁以上 ——他是 最 年轻的。\n\n3 年后 ——他做了 17 个家具 ——送给了他孙女。\n\n他妻子说: "你退休后 比退休前 ——年轻 10 岁。"\n\n他笑了 ——"因为 我退休前 30 年 ——我没活过。我退休后 才 活。"\n\n他不是 反对 工程师 ——他 反对 没省察 的工程师。\n\n他后悔的 ——不是 他做了 30 年工程师 ——是 他 30 年从不问 自己 ——为什么 做 这个 ——这是 我吗。\n\n如果他 30 年前 ——就 省察过 ——然后 仍然 选 工程师 ——他这 30 年 会很不一样 ——他会 投入 ——而不是 自动驾驶 ——他会 享受 ——而不是 执行。\n\n崔铭 55 岁明白了一件事 ——\n\n问题不是 你做什么 ——是 你 有没有 想清楚 你做的。\n\n这就是 省察 的力量。',
        layers: {
          concept: '"省察的生活" (the examined life) ——出自柏拉图《申辩篇》——苏格拉底受审时的辩护词。\n\n他说: "未经省察的生活——不值得过。" (The unexamined life is not worth living.)\n\n这是 西方哲学 最有名的一句话 ——但常被误读。\n\n常见误读: 你要 反思 / 你要 沉思 / 你要 自我分析。\n\n苏格拉底的意思 更精确。\n\n省察 = 不断 问 你的生活 ——\n你 在做什么？\n为什么 你做？\n你做的事 ——是好的吗？\n你的 好 ——是 真的好——还是你 假设 是好？\n\n这种 持续追问 ——是 哲学。\n\n他说: 没有这种追问的人生 ——不是 失败 ——是 不值得过。\n\n这是 强烈的话。\n\n他的意思: 一个 不省察 的人生 ——不是 你的人生 ——是 别人的剧本 借你的身体 走过。你 没 活过。',
          now: '今天 我们的生活 ——99% 是 不省察 的。\n\n你早起——刷牙——这是 习惯 ——不是 你决定的。\n你上班 ——你 不真的 选 ——是 经济压力 + 教育路径 + 父母期望 累积的结果。\n你 晚上看抖音 ——不是 选择 ——是 默认行为。\n你周末做的事 ——大半 ——是 别人也这样 / 我习惯这样。\n\n苏格拉底说: 这种 自动驾驶 的生活 ——不值得过。\n\n他不是 反对 习惯——他是 反对 你 没问 这个习惯 你 同意吗。\n\n你 想过 ——同意 ——继续 ——好。\n\n你 没想过 ——执行——你 不在 你的人生里。\n\n练习: 这周 ——选 一个 你每天做的事 ——比如 早上喝咖啡 / 通勤路上听播客 / 晚上看剧。\n\n问 ——为什么 ——真的吗 ——我 自己 想 这样吗 ——还是 因为 大家这样 / 我习惯 / 自动 ？\n\n大多数 ——你会发现 ——你 没真的 想过。\n\n问的本身 ——已经是 省察 ——已经 让你 多 活了 一点。',
          deeper: '"省察的生活"最深的层面: 它 不能 一次完成。\n\n常见错误: 我 30 岁 ——做了一次 大反思 ——找到 真正的自己 ——以后 按这个 走 ——不用 再省察。\n\n这 错了。\n\n苏格拉底的 省察 ——是 终身的、持续的、嵌入日常的。\n\n每个决定 之前 ——都问 一下。\n每个习惯 ——周期性 重新 看 一下。\n每个 你 觉得理所当然 的事 ——隔一段 重新 问 一下。\n\n这种 持续 ——很 累。但它 是 你 在 的 方式。\n\n崔铭 55 岁懂了 ——他 现在 开始省察 ——已经晚了 30 年——但 也比 永远不省察 好。\n\n他剩下的人生 ——是 省察的。\n\n他 余生 ——25 年 ——会 比 之前 30 年 ——活得 多。\n\n苏格拉底 说: 不值得过 ——不是 字面意思 ——是 没活到值得过 的程度。\n\n所有人都活——但很少有人 活到 值得过 的程度。\n\n活到 ——需要 持续省察。',

        body: '韦昊 30 岁。某商业银行的客户经理。\n\n他 30 岁那年 ——发现一件 让他困惑的事——\n\n他 总是 做 他 明知不对 的事。\n\n他 知道 久坐对身体不好 ——但他 周末 一个 不出门 8 小时。\n他 知道 应该 早睡 ——但他 每晚 凌晨 1 点。\n他 知道 应该 戒糖 ——但他 每天 一杯奶茶。\n他 知道 跟父母通电话很重要 ——但他 1 个月 1 次。\n他 知道 不应该 跟同事说 别人的坏话 ——但他 1 周 1 次。\n\n他不是 故意做 不对的 ——他 每次 知道 都打算 不做 ——但 他 还是 做。\n\n他 不懂 ——我 知道 不对 ——为什么我还做？\n\n他去做心理咨询。\n\n咨询师听了 5 次——第 5 次说了一句 让韦昊 愣 的话——\n\n"你 不是 知道 不对 ——还做。"\n\n"你是 没真的知道 不对 ——所以 你做。"\n\n韦昊: "我 当然知道 ——我都列出来了。"\n\n咨询师: "你 嘴上 说 你 知道。但你 心里 ——还 没真的 同意。"\n\n"举例 ——你说 你 知道 应该 早睡。但 你 真的 知道吗 ——你 想过 不早睡 在你 30 岁、40 岁、50 岁 ——分别会让你 失去什么 吗？"\n\n"你 真的 体验过 一周早睡之后 你的身体 和 一周晚睡 的不同吗？"\n\n"你 真的 列出过 早睡 给你的具体好处 ——和 不早睡 给你的具体损失 吗？"\n\n"没有。"\n\n"你 知道 ——只是 大家都说 早睡好 ——你 默认 同意。"\n\n"这种 默认同意 ——不是 真的 知道。"\n\n"如果你 真的 知道 早睡好 ——以一种 深的 / 体验过的 / 算清账的 方式 ——你 不会 不早睡。你的身体 会 自动 想早睡。"\n\n"你之所以 总做不对的事 ——是因为 你 嘴上 知道 ——心里 不知道。"\n\n这就是 苏格拉底说的——德即知识。\n\n真正知道 ——你不会做 你知道不对 的事。\n\n如果你 还在做 ——你 还没 真知道。\n\n韦昊愣了 1 周。\n\n他试了一件事 ——他选 戒奶茶 ——做 真知道 的实验。\n\n他列出 ——\n\n奶茶 给他 5 分钟 快感。\n奶茶 让他 下午 困 (糖尾)。\n奶茶 每天 30 块 ——10 年 是 11 万。\n奶茶 让他 胖 ——影响形象 + 健康。\n奶茶 让他 早 老 ——皮肤、内分泌、糖化。\n\n他不只是 列。他 计算 ——他算 11 万 + 健康 + 形象 + 早老 + 下午困 ——换 5 分钟 快感 × 365 天 × 10 年。\n\n他算完——感到一种 真实的 反感 ——不是 道德反感 ——是 一种 看到清楚的 不值。\n\n那一刻他 真知道 ——这件事 不值。\n\n第二天 ——他面对奶茶店 ——他 不再 决心戒 ——他 单纯 不想要 ——因为他 看到 不值。\n\n他过了 ——不靠 自律 ——靠 看清。\n\n2 年后——他用同样方法 戒了 其他 几件 事。\n\n每一件 ——他 真算账 ——然后 真知道 ——然后 自动不做。\n\n他懂了 ——苏格拉底说的 不是道德学 ——是 心理学。\n\n你 做 不对的事 ——不是因为 你坏 ——是因为 你 没真的 看清 。\n\n看清 = 不做。\n\n这才是 德 = 知。',

const LEVEL_THRESHOLDS = [
  { min: 0,   name: '初见', symbol: '·' },
  { min: 6,   name: '浮现', symbol: '◌' },
  { min: 16,  name: '凝聚', symbol: '◐' },
  { min: 31,  name: '稳固', symbol: '●' },
  { min: 51,  name: '通透', symbol: '✦' },
];
function getLevel(score) {
  let lvl = LEVEL_THRESHOLDS[0];
  for (const l of LEVEL_THRESHOLDS) if (score >= l.min) lvl = l;
  return lvl;
}

function getChallengeResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/challenge/' + id + '/result'));
  } catch { return null; }
}
function saveChallengeResult(id, score, total) {
  const result = { score, total, at: new Date().toISOString(), perfect: score === total };
  localStorage.setItem('echo/challenge/' + id + '/result', JSON.stringify(result));
  return result;
}
function isChallengePerfect(id) {
  const r = getChallengeResult(id);
  return r && r.perfect;
}
function getCompletedChallenges() {
  return FAKE_CHALLENGES.filter(c => isChallengePerfect(c.id)).map(c => c.id);
}

// ═══ 7 天实践 — 闯关进度跟踪 ═══
function getPracticeProgress(practiceId) {
  try {
    return JSON.parse(localStorage.getItem('echo/practice/' + practiceId + '/progress')) || [];
  } catch { return []; }
}

function completeDay(practiceId, day) {
  const done = getPracticeProgress(practiceId);
  if (done.includes(day)) return 'ALREADY';
  done.push(day);
  done.sort((a,b) => a-b);
  localStorage.setItem('echo/practice/' + practiceId + '/progress', JSON.stringify(done));
  if (done.length === 7) {
    localStorage.setItem('echo/practice/' + practiceId + '/completed-at', new Date().toISOString());
    return 'COMPLETED';
  }
  return 'PROGRESS';
}

function getCurrentDay(practiceId) {
  const done = getPracticeProgress(practiceId);
  if (done.length === 0) return 1;
  if (done.length >= 7) return 7;
  // Find lowest day not yet done
  for (let i = 1; i <= 7; i++) {
    if (!done.includes(i)) return i;
  }
  return 7;
}

function isPracticeStarted(practiceId) {
  return getPracticeProgress(practiceId).length > 0;
}

function isPracticeCompleted(practiceId) {
  return getPracticeProgress(practiceId).length >= 7;
}

function getCompletedPractices() {
  return PRACTICES.filter(p => isPracticeCompleted(p.id)).map(p => p.id);
}

function getInProgressPractices() {
  return PRACTICES.filter(p => isPracticeStarted(p.id) && !isPracticeCompleted(p.id));
}

function calculateOverallStats() {
  const completedP = getCompletedPractices();
  const passedC = getCompletedChallenges();
  const completedA = getCompletedArguments();
  const stats = { readCount: 0, reflectionCount: 0, streak: 0, dims: { awareness:0, criticality:0, composure:0, autonomy:0, action:0 }, nietzsche:0, stoic:0, camus:0, foucault:0, practiceCompleted: completedP.length, completedPractices: completedP, completedPracticesCount: completedP.length, passedChallenges: passedC, completedArguments: completedA };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      const refls = JSON.parse(localStorage.getItem(storageKey(p.id, 'reflections'))) || {};
      const readKeys = Object.keys(prog).filter(k => prog[k]);
      stats.readCount += readKeys.length;
      stats[p.id] = readKeys.length;
      Object.values(refls).forEach(r => {
        const txt = typeof r === 'string' ? r : r?.text;
        if (txt && txt.trim()) stats.reflectionCount++;
      });
      readKeys.forEach(id => {
        const c = CONCEPT_DIMENSIONS[id];
        if (c) Object.entries(c).forEach(([k,v]) => stats.dims[k] += v);
      });
    } catch {}
  });
  stats.streak = computeStreak();
  return stats;
}

function computeStreak() {
  try {
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (visits.length === 0) return 0;
    // Sort descending
    const days = [...new Set(visits)].sort().reverse();
    const today = new Date().toISOString().slice(0,10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (days[0] !== today && days[0] !== yesterday) return 0;
    let streak = 1;
    let prev = new Date(days[0]);
    for (let i = 1; i < days.length; i++) {
      const cur = new Date(days[i]);
      const diff = (prev - cur) / 86400000;
      if (diff === 1) { streak++; prev = cur; }
      else break;
    }
    return streak;
  } catch { return 0; }
}

function recordVisit() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (!visits.includes(today)) {
      visits.push(today);
      // Keep last 90 days
      if (visits.length > 90) visits.shift();
      localStorage.setItem('echo/visits', JSON.stringify(visits));
    }
  } catch {}
}

function checkNewAchievements() {
  const stats = calculateOverallStats();
  const earned = JSON.parse(localStorage.getItem('echo/achievements') || '[]');
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (!earned.includes(a.id) && a.check(stats)) {
      earned.push(a.id);
      newly.push(a);
    }
  });
  localStorage.setItem('echo/achievements', JSON.stringify(earned));
  return { earned, newly };
}

function calculateBrainStats() {
  const stats = { awareness: 0, criticality: 0, composure: 0, autonomy: 0, action: 0 };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      Object.keys(prog).forEach(conceptId => {
        if (!prog[conceptId]) return;
        const contrib = CONCEPT_DIMENSIONS[conceptId];
        if (!contrib) return;
        Object.entries(contrib).forEach(([dim, val]) => { stats[dim] += val; });
      });
    } catch {}
  });
  return stats;
}

function totalBrainScore(stats) {
  return Object.values(stats).reduce((a, b) => a + b, 0);
}

function getArgumentResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/argument/' + id + '/result'));
  } catch { return null; }
}
function saveArgumentResult(id, correct) {
  localStorage.setItem('echo/argument/' + id + '/result', JSON.stringify({ correct, at: new Date().toISOString() }));
}
function isArgumentCompleted(id) {
  const r = getArgumentResult(id);
  return r && r.correct;
}
function getCompletedArguments() {
  return ARGUMENTS.filter(a => isArgumentCompleted(a.id)).map(a => a.id);
}

// Reverse lookup: concept ID → philosopher ID
function findPhilosopherForConcept(conceptId) {
  // Heuristic by concept ID prefix patterns
  const nietzscheIds = new Set(['god-is-dead','perspectivism','truth-as-fiction','ressentiment','slave-morality','master-morality','will-to-power','apollonian-dionysian','three-metamorphoses','free-spirit','amor-fati','ubermensch','last-man','herd-animal','pity-danger','eternal-return','nihilism','bad-conscience','ascetic-ideal','genealogy','revaluation','pathos-of-distance','gay-science','creator-solitude','abyss']);
  const stoicIds = new Set(['dichotomy-of-control','logos','virtue-as-sole-good','apatheia','premeditatio-malorum','memento-mori','present-moment','amor-fati-stoic','inner-citadel','cosmopolitan','obstacle-is-way','voluntary-discomfort']);
  const camusIds = new Set(['absurd','philosophical-suicide','lucidity','revolt','sisyphus','indifference-of-world','freedom-without-hope','passion-quantity','creation-absurd','solidarity']);
  const foucaultIds = new Set(['discourse','power-knowledge','archaeology','normalization','panopticon','biopower','governmentality','technologies-of-self','parrhesia','heterotopia']);
  if (nietzscheIds.has(conceptId)) return 'nietzsche';
  if (stoicIds.has(conceptId)) return 'stoic';
  if (camusIds.has(conceptId)) return 'camus';
  if (foucaultIds.has(conceptId)) return 'foucault';
  return null;
}

// ═══ Haptic feedback ═══
function haptic(style = 'light') {
  if (navigator.vibrate) {
    if (style === 'light') navigator.vibrate(10);
    else if (style === 'medium') navigator.vibrate(20);
    else if (style === 'success') navigator.vibrate([10, 50, 10]);
  }
}

function isUnlocked(conceptId) {
  const concept = concepts.find(c => c.id === conceptId);
  if (!concept) return false;
  if (concept.dependencies.length === 0) return true;
  return concept.dependencies.every(dep => progress[dep]);
}

function showScreen(name) {
  // Journal opens as a sheet modal over the previous screen — don't hide siblings
  if (name === 'journal') {
    document.getElementById('journal-screen').classList.add('active');
    ensureJournalScrim().classList.add('active');
    document.body.style.overflow = 'hidden';
    return;
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + '-screen').classList.add('active');
  window.scrollTo(0, 0);
  closeJournalScrim();
}

function ensureJournalScrim() {
  let scrim = document.getElementById('journal-scrim');
  if (!scrim) {
    scrim = document.createElement('div');
    scrim.id = 'journal-scrim';
    scrim.className = 'journal-scrim';
    scrim.addEventListener('click', closeJournalSheet);
    document.body.appendChild(scrim);
  }
  return scrim;
}
function closeJournalScrim() {
  const scrim = document.getElementById('journal-scrim');
  if (scrim) scrim.classList.remove('active');
  document.body.style.overflow = '';
}
function closeJournalSheet() {
  const sheet = document.getElementById('journal-screen');
  if (!sheet.classList.contains('active')) return;
  sheet.classList.remove('active');
  sheet.classList.add('screen-exit');
  closeJournalScrim();
  setTimeout(() => { sheet.classList.remove('screen-exit'); }, 320);
}

// Roman numeral helper (RANEPA editorial style)
function toRomanNumeral(n) {
  const map = [['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let s = '', x = n;
  for (const [r, v] of map) while (x >= v) { s += r; x -= v; }
  return s;
}

// ═══ Radar chart ═══
function buildRadarSVG(stats, size = 200) {
  const cx = size / 2, cy = size / 2;
  const radius = size * 0.38;
  const n = DIMENSIONS.length;
  const maxScore = 60; // visual cap

  // Points on each axis (vertex top, going clockwise)
  function pt(idx, factor) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * idx) / n;
    return [cx + Math.cos(angle) * radius * factor, cy + Math.sin(angle) * radius * factor];
  }

  // Background polygons at 25/50/75/100%
  const bgPolys = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = DIMENSIONS.map((_, i) => pt(i, f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Axis lines
  const axes = DIMENSIONS.map((_, i) => {
    const [x, y] = pt(i, 1);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Actual stat polygon
  const statPts = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    return pt(i, f).join(',');
  }).join(' ');
  const statPoly = `<polygon points="${statPts}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>`;

  // Dots at each point
  const dots = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    const [x, y] = pt(i, f);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent-strong)"/>`;
  }).join('');

  // Labels at vertices
  const labels = DIMENSIONS.map((d, i) => {
    const [x, y] = pt(i, 1.22);
    return `<text x="${x}" y="${y}" fill="rgba(237,229,211,0.5)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="inherit">${d.name}</text>`;
  }).join('');

  return `<svg class="mind-radar" width="${size}" height="${size + 20}" viewBox="0 -10 ${size} ${size + 20}">${bgPolys}${axes}${statPoly}${dots}${labels}</svg>`;
}

let chatPhilosopher = null;
let chatHistory = [];

function getApiKey() {
  return localStorage.getItem('echo/deepseek-key') || '';
}

function setApiKey(key) {
  localStorage.setItem('echo/deepseek-key', key);
}

async function callDeepSeek(messages) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('请先在设置中填入 DeepSeek API key');

  const resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: messages,
      temperature: 0.7,
      max_tokens: 600,
    }),
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error('API 错误: ' + resp.status + ' ' + txt.slice(0, 100));
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}

function appendBubble(role, text, isLoading = false) {
  const scroll = document.getElementById('chat-scroll');
  // Remove intro if present
  const intro = scroll.querySelector('.chat-intro');
  if (intro) intro.remove();

  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + (role === 'user' ? 'user' : 'philosopher');
  if (isLoading) bubble.classList.add('loading');
  if (role !== 'user' && chatPhilosopher) {
    bubble.innerHTML = `<div class="chat-bubble-name">${escapeHtml(chatPhilosopher.name)}</div>${escapeHtml(text)}`;
  } else {
    bubble.textContent = text;
  }
  scroll.appendChild(bubble);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  return bubble;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const apiKey = getApiKey();
  if (!apiKey) { window.__goToSettings(); return; }

  input.value = '';
  input.style.height = 'auto';
  appendBubble('user', text);
  chatHistory.push({ role: 'user', content: text });

  const loading = appendBubble('philosopher', '', true);
  document.getElementById('chat-send').disabled = true;

  try {
    const response = await callDeepSeek(chatHistory);
    loading.remove();
    appendBubble('philosopher', response);
    chatHistory.push({ role: 'assistant', content: response });
  } catch (e) {
    loading.remove();
    appendBubble('philosopher', '× ' + e.message);
  } finally {
    document.getElementById('chat-send').disabled = false;
  }
}

function renderPracticeDetail(p) {
  const scroll = document.getElementById('practice-detail-scroll');
  const done = getPracticeProgress(p.id);
  const completed = done.length >= 7;
  const currentDay = getCurrentDay(p.id);

  const days = p.days.map(d => {
    const isDone = done.includes(d.day);
    const isCurrent = !completed && d.day === currentDay;
    const isLocked = !isDone && !isCurrent;
    const isBoss = d.day === 7;

    let cls = 'pr-day';
    if (isDone) cls += ' done';
    if (isCurrent) cls += ' current';
    if (isLocked) cls += ' locked';
    if (isBoss) cls += ' boss';

    const button = isCurrent
      ? `<button class="pr-day-complete-btn" data-day="${d.day}">${isBoss ? '完成最终一日 ⚜' : '完成今天'}</button>`
      : '';

    const stateLabel = isDone ? '<span class="pr-day-state done">✓ 已完成</span>'
                     : isCurrent ? (isBoss ? '<span class="pr-day-state boss-label">最 终 关</span>' : '<span class="pr-day-state current-label">今 日</span>')
                     : '<span class="pr-day-state">未解锁</span>';

    return `
      <div class="${cls}" data-day="${d.day}">
        <div class="pr-day-header">
          <span class="pr-day-number">${isBoss ? '⚜ DAY 7' : 'DAY ' + d.day}</span>
          ${stateLabel}
        </div>
        ${isLocked ? '' : `
          <div class="pr-day-task">${escapeHtml(d.task)}</div>
          <div class="pr-day-why">${escapeHtml(d.why)}</div>
          ${button}
        `}
      </div>
    `;
  }).join('');

  const headerStatus = completed
    ? `<div class="pr-completed-badge">✓ 已完成 · 通关</div>`
    : `<div class="pr-progress-bar"><div class="pr-progress-fill" style="width:${(done.length/7)*100}%"></div></div>
       <div class="pr-progress-text">${done.length} / 7 已完成 · 当前 Day ${currentDay}</div>`;

  scroll.innerHTML = `
    <div class="pr-title">${escapeHtml(p.title)}</div>
    <div class="pr-who">${escapeHtml(p.philosopher)}</div>
    <div class="pr-intro">${escapeHtml(p.intro)}</div>
    ${headerStatus}
    ${days}
  `;

  scroll.querySelectorAll('.pr-day-complete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const day = parseInt(btn.getAttribute('data-day'));
      const result = completeDay(p.id, day);
      haptic('success');
      if (result === 'COMPLETED') {
        showPracticeBossCompletion(p);
      } else {
        showToast('Day ' + day + ' 已完成 ✓');
        renderPracticeDetail(p);
        setTimeout(checkAndShowAchievements, 800);
      }
    });
  });
}

// Socratic interactive state
let socraticArgument = null;
let socraticStepIndex = 0;
let socraticMode = 'premise'; // premise → stepping → choose → done

function openArgument(id) {
  const a = ARGUMENTS.find(x => x.id === id);
  if (!a) return;
  socraticArgument = a;
  socraticStepIndex = 0;
  socraticMode = 'premise';
  renderSocratic();
  showScreen('argument-detail');
  window.scrollTo(0, 0);
}

function renderSocratic() {
  const a = socraticArgument;
  const scroll = document.getElementById('argument-detail-scroll');
  const completed = isArgumentCompleted(a.id);

  // Always show header + premise
  let html = `
    <div class="ag-detail-who">${escapeHtml(a.philosopher)}${completed ? ' · <span style="color:var(--gold);">✦ 已推出</span>' : ''}</div>
    <div class="ag-title">${escapeHtml(a.title)}</div>
    <div class="ag-target">对应迷思: ${escapeHtml(a.target)}</div>

    <div class="ag-section">
      <div class="ag-section-label">起点</div>
      <div class="ag-premise">${escapeHtml(a.premise)}</div>
    </div>
  `;

  if (socraticMode === 'premise') {
    html += `
      <div class="socratic-prompt">
        <div class="sp-label">现 在 开 始 推 导</div>
        <div class="sp-hint">不要急着读结论——让自己先想想接下来会怎么发展。</div>
        <button class="cp-submit-btn" id="socratic-start">开 始</button>
      </div>
    `;
  }

  // Show revealed steps
  if (socraticStepIndex > 0 || socraticMode === 'stepping' || socraticMode === 'choose' || socraticMode === 'done') {
    const shownSteps = a.steps.slice(0, socraticStepIndex);
    if (shownSteps.length > 0) {
      const steps = shownSteps.map(s => `<div class="ag-step">${escapeHtml(s)}</div>`).join('');
      html += `
        <div class="ag-section">
          <div class="ag-section-label">推 理</div>
          <div class="ag-steps">${steps}</div>
        </div>
      `;
    }
  }

  // Show next-step button or stepping prompt
  if (socraticMode === 'stepping') {
    if (socraticStepIndex < a.steps.length) {
      html += `
        <div class="socratic-prompt">
          <div class="sp-label">下 一 步 会 怎 么 发 展？</div>
          <div class="sp-hint">先在心里想一下——然后看你的猜测对不对。</div>
          <button class="cp-submit-btn" id="socratic-next">揭 晓 下 一 步</button>
        </div>
      `;
    } else {
      // All steps shown, now ask for conclusion
      socraticMode = 'choose';
    }
  }

  if (socraticMode === 'choose') {
    const opts = SOCRATIC_OPTIONS[a.id] || [];
    // Shuffle (stable by argument id)
    const shuffled = [...opts].map((o, i) => ({...o, _idx: i})).sort((a, b) => (a.text.length % 7) - (b.text.length % 7));
    const optionsHtml = shuffled.map((o) => `
      <button class="socratic-option" data-correct="${o.correct ? '1' : '0'}" data-hint="${escapeHtml(o.hint || '')}">
        <div class="so-text">${escapeHtml(o.text)}</div>
      </button>
    `).join('');
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论 是 什 么？</div>
        <div class="socratic-question-hint">从下面三个中选——只有一个是这个论证真正得出的结论。</div>
        ${optionsHtml}
      </div>
    `;
  }

  if (socraticMode === 'done') {
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论</div>
        <div class="ag-conclusion">${escapeHtml(a.conclusion)}</div>
      </div>

      <div class="ag-section">
        <div class="ag-section-label">这 个 论 证 的 力 量</div>
        <div class="ag-power">${escapeHtml(a.power)}</div>
      </div>

      <div style="text-align:center; padding:24px 0;">
        <button class="cp-submit-btn" id="socratic-back-list">回 到 论 证 列 表</button>
      </div>
    `;
  }

  scroll.innerHTML = html;

  // Wire buttons
  const startBtn = document.getElementById('socratic-start');
  if (startBtn) startBtn.addEventListener('click', () => {
    haptic('light');
    socraticMode = 'stepping';
    socraticStepIndex = 1;
    renderSocratic();
  });

  const nextBtn = document.getElementById('socratic-next');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    haptic('light');
    socraticStepIndex++;
    if (socraticStepIndex >= a.steps.length + 1) {
      socraticStepIndex = a.steps.length;
      socraticMode = 'choose';
    }
    renderSocratic();
  });

  scroll.querySelectorAll('.socratic-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const correct = opt.getAttribute('data-correct') === '1';
      const hint = opt.getAttribute('data-hint');
      if (correct) {
        haptic('success');
        saveArgumentResult(a.id, true);
        // Show success — gold the option
        opt.classList.add('correct');
        setTimeout(() => {
          showSocraticVictory(a);
        }, 600);
      } else {
        haptic('medium');
        opt.classList.add('wrong');
        // Show hint in-place
        const hintEl = document.createElement('div');
        hintEl.className = 'so-hint';
        hintEl.textContent = hint;
        opt.appendChild(hintEl);
      }
    });
  });

  const backBtn = document.getElementById('socratic-back-list');
  if (backBtn) backBtn.addEventListener('click', () => {
    renderArguments();
    showScreen('arguments');
  });
}

function openChallenge(id) {
  const c = FAKE_CHALLENGES.find(x => x.id === id);
  if (!c) return;
  currentChallenge = c;
  challengeSelection = new Set();
  challengeResultMode = false;
  renderChallengePlay();
  showScreen('challenge-play');
  window.scrollTo(0, 0);
}

function renderChallengePlay() {
  const c = currentChallenge;
  document.getElementById('challenge-play-label').textContent = c.title;
  const scroll = document.getElementById('challenge-play-scroll');

  if (challengeResultMode) {
    renderChallengeResult();
    return;
  }

  const items = c.items.map((item, idx) => {
    const selected = challengeSelection.has(idx);
    return `
      <button class="cp-question${selected ? ' selected' : ''}" data-idx="${idx}">
        <div class="cp-q-text">"${escapeHtml(item.q)}"</div>
      </button>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="cp-title">${escapeHtml(c.title)}</div>
    <div class="cp-subtitle">${escapeHtml(c.subtitle)} · 点击你认为是"问错了"的问题</div>
    ${items}
    <div class="cp-submit-bar">
      <button class="cp-submit-btn" id="cp-submit-btn">提 交</button>
    </div>
  `;

  scroll.querySelectorAll('.cp-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-idx'));
      if (challengeSelection.has(idx)) challengeSelection.delete(idx);
      else challengeSelection.add(idx);
      haptic('light');
      btn.classList.toggle('selected');
    });
  });

  document.getElementById('cp-submit-btn').addEventListener('click', () => {
    haptic('medium');
    submitChallenge();
  });
}

function submitChallenge() {
  const c = currentChallenge;
  let score = 0;
  c.items.forEach((item, idx) => {
    const userSays = challengeSelection.has(idx);
    if (userSays === item.isFake) score++;
  });
  const result = saveChallengeResult(c.id, score, c.items.length);
  if (result.perfect) {
    showChallengePerfect(c, result);
  } else {
    challengeResultMode = true;
    renderChallengeResult();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  setTimeout(checkAndShowAchievements, 1000);
}

let lexiconFilter = 'all';
function renderLexicon() {
  const scroll = document.getElementById('lexicon-scroll');
  const groups = {
    nietzsche: { name: '尼采', entries: [] },
    stoic: { name: '斯多葛', entries: [] },
    camus: { name: '加缪', entries: [] },
    foucault: { name: '福柯', entries: [] },
  };
  LEXICON.forEach(e => {
    if (groups[e.school]) groups[e.school].entries.push(e);
  });

  const filterBar = `
    <div class="lexicon-filter-bar">
      <button class="lexicon-filter-btn ${lexiconFilter==='all' ? 'active' : ''}" data-filter="all">全部</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='nietzsche' ? 'active' : ''}" data-filter="nietzsche">尼采</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='stoic' ? 'active' : ''}" data-filter="stoic">斯多葛</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='camus' ? 'active' : ''}" data-filter="camus">加缪</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='foucault' ? 'active' : ''}" data-filter="foucault">福柯</button>
    </div>
  `;

  const groupHtml = Object.entries(groups).map(([key, g]) => {
    if (lexiconFilter !== 'all' && lexiconFilter !== key) return '';
    if (g.entries.length === 0) return '';
    const entries = g.entries.map(e => {
      const conceptTags = e.concepts.map(cId => {
        const name = CONCEPT_NAMES[cId] || cId;
        return `<button class="lexicon-concept-tag" data-concept="${cId}">${escapeHtml(name)}</button>`;
      }).join('');
      return `
        <div class="lexicon-entry">
          <div class="lexicon-entry-head">
            <span class="lexicon-zh">${escapeHtml(e.zh)}</span>
            <span class="lexicon-orig">${escapeHtml(e.orig)}</span>
            <span class="lexicon-lang">${escapeHtml(e.lang)}</span>
          </div>
          <div class="lexicon-etym">字源：${escapeHtml(e.etym)}</div>
          <div class="lexicon-def">${escapeHtml(e.def)}</div>
          ${conceptTags ? `<div class="lexicon-concepts">${conceptTags}</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="lexicon-group">
        <div class="lexicon-group-label">${g.name}</div>
        ${entries}
      </div>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="lexicon-title">辞海</div>
    <div class="lexicon-subtitle">关键术语 · 字源 · 释义</div>
    ${filterBar}
    ${groupHtml}
  `;

  scroll.querySelectorAll('.lexicon-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lexiconFilter = btn.getAttribute('data-filter');
      haptic('light');
      renderLexicon();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  scroll.querySelectorAll('.lexicon-concept-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const conceptId = tag.getAttribute('data-concept');
      const phId = findPhilosopherForConcept(conceptId);
      const philosopher = PHILOSOPHERS.find(p => p.id === phId);
      if (philosopher) {
        haptic('light');
        enterPhilosopher(philosopher).then(() => {
          setTimeout(() => openStory(conceptId), 400);
        });
      }
    });
  });
}

function renderArchive() {
  if (!currentPhilosopher) return;
  const archive = PHILOSOPHER_ARCHIVES[currentPhilosopher.id];
  const scroll = document.getElementById('archive-scroll');
  if (!archive) {
    scroll.innerHTML = '<div style="opacity:0.3; font-size:14px;">档案暂未整理。</div>';
    return;
  }
  const p = currentPhilosopher;

  // Stats
  let readCount = 0;
  const total = CONCEPT_COUNTS[p.id] || 0;
  try {
    const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
    readCount = Object.keys(prog).filter(k => prog[k]).length;
  } catch {}
  const pct = total > 0 ? Math.round((readCount / total) * 100) : 0;

  // Corner mark = initials from English header
  const initials = (p.header || p.name).replace(/[^A-Z]/g, '').slice(0, 3).split('').join('.') + '.';

  // First passage → quote card (short version of first sentence)
  const firstPassage = archive.passages[0];
  const quoteText = firstPassage ? firstPassage.text.split(/[\n。.!?！？]/)[0].slice(0, 56) : '';
  const quoteSrc = firstPassage ? firstPassage.source : '';

  // Era / lifespan from timeline
  const firstTL = archive.timeline[0];
  const lastTL = archive.timeline[archive.timeline.length - 1];
  const birthPlace = (firstTL && /(?:于|在)([一-鿿 A-Za-z\- ]+)/.exec(firstTL.event)) ? RegExp.$1.trim() : '';
  const deathPlace = (lastTL && /(?:于|在)([一-鿿 A-Za-z\- ]+)/.exec(lastTL.event)) ? RegExp.$1.trim() : '';

  // Works grid — pick the events that mention specific works (《...》)
  const works = archive.timeline.filter(t => /《[^》]+》/.test(t.event)).slice(0, 8).map(t => {
    const m = t.event.match(/《([^》]+)》/);
    return { y: t.year, title: m[1], current: false };
  });
  // Mark first as "current" if we're actively reading this philosopher
  if (works.length && readCount > 0) works[0].current = true;

  // Eras and concept counts
  const conceptNames = (p.inlineConcepts || []).map(c => c.name).join(' · ');

// ═══ 心智之灯 — editorial hairline 五维雷达 ═══
function buildBrainLightSVG(readCount, maxConcepts = 57) {
  const stats = calculateOverallStats();
  const dims = DIMENSIONS.map(d => ({
    id: d.id,
    label: d.name,
    sub: d.subtitle,
    v: Math.min(1, (stats.dims[d.id] || 0) / 30),
  }));

  const size = 280;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 56;
  const n = dims.length;
  const angleFor = (i) => -Math.PI/2 + (i * 2 * Math.PI / n);

  const ringPts = (factor) =>
    dims.map((_, i) => {
      const a = angleFor(i);
      return [cx + r * factor * Math.cos(a), cy + r * factor * Math.sin(a)];
    });

  const valuePts = dims.map((d, i) => {
    const a = angleFor(i);
    const v = Math.max(d.v, 0.02);
    return [cx + r * v * Math.cos(a), cy + r * v * Math.sin(a)];
  });
  const poly = (pts) => pts.map(p => p.map(c => c.toFixed(1)).join(',')).join(' ');

  const el = [];

  // Concentric ring polygons — hairline
  [0.25, 0.5, 0.75, 1.0].forEach((f, idx) => {
    el.push(`<polygon points="${poly(ringPts(f))}" fill="none" stroke="var(--border-faint)" stroke-width="${idx===3?1:0.5}"/>`);
  });
  // Spokes
  ringPts(1).forEach(([x, y]) => {
    el.push(`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border-faint)" stroke-width="0.5"/>`);
  });
  // Value polygon
  if (readCount > 0) {
    el.push(`<polygon points="${poly(valuePts)}" fill="rgba(163,2,54,0.08)" stroke="var(--crimson)" stroke-width="1.5"/>`);
    // Value dots
    valuePts.forEach(([x, y]) => {
      el.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#fff" stroke="var(--crimson)" stroke-width="1.5"/>`);
    });
  }
  // Center dot
  el.push(`<circle cx="${cx}" cy="${cy}" r="1.5" fill="var(--text-primary)"/>`);

  // Labels
  dims.forEach((d, i) => {
    const a = angleFor(i);
    const lr = r + 26;
    const x = cx + lr * Math.cos(a);
    const y = cy + lr * Math.sin(a);
    const anchor = Math.abs(Math.cos(a)) < 0.3 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end');
    const pct = Math.round(d.v * 100);
    el.push(`<text x="${x.toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="${anchor}" style="font-family: var(--font-display); font-size: 11px; font-weight: 700; fill: var(--text-primary); letter-spacing: 0.04em;">${d.label}</text>`);
    el.push(`<text x="${x.toFixed(1)}" y="${(y+9).toFixed(1)}" text-anchor="${anchor}" style="font-family: var(--font-display); font-size: 9px; font-style: italic; fill: var(--text-tertiary); letter-spacing: 0.04em;">${pct}%</text>`);
  });

  return `<svg class="bl-svg" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="overflow: visible; width: 100%; max-width: 320px;">${el.join('')}</svg>`;
}

// ═══ Concept Map ═══
function getDepthMap(nodes) {
  const depthMap = new Map();
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  function calcDepth(id) {
    if (depthMap.has(id)) return depthMap.get(id);
    const node = nodeMap.get(id);
    if (!node || node.dependencies.length === 0) { depthMap.set(id, 0); return 0; }
    const d = 1 + Math.max(...node.dependencies.map(dep => calcDepth(dep)));
    depthMap.set(id, d);
    return d;
  }
  nodes.forEach(n => calcDepth(n.id));
  return depthMap;
}

function renderMap() {
  const list = document.getElementById('concept-list');
  list.innerHTML = '';

  const readCount = concepts.filter(c => progress[c.id]).length;
  const progressEl = document.getElementById('map-progress');
  const pct = concepts.length > 0 ? Math.round((readCount / concepts.length) * 100) : 0;
  progressEl.innerHTML = readCount > 0
    ? `${readCount}<span style="font-size:13px;color:var(--text-tertiary);margin-left:6px;font-weight:400;">/ ${concepts.length}</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;">${pct}% 已读</span>`
    : `<span style="font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-tertiary);">${concepts.length} 个概念 · 待启程</span>`;

  // Progress bar (legacy hidden in editorial mode)
  const barFill = document.getElementById('map-bar-fill');
  if (barFill) barFill.style.width = pct + '%';

  // Track currently unlocked set
  const currentUnlocked = new Set();

  const order = topologicalSort(concepts);
  const depthMap = getDepthMap(concepts);

  order.forEach((concept, idx) => {
    const card = document.createElement('button');
    const unlocked = isUnlocked(concept.id);
    const read = !!progress[concept.id];
    const depth = Math.min(depthMap.get(concept.id) || 0, 4);

    if (unlocked) currentUnlocked.add(concept.id);

    // Was this concept just unlocked? (wasn't in previous set)
    const justUnlocked = unlocked && !read && previouslyUnlocked.size > 0 && !previouslyUnlocked.has(concept.id);

    card.className = 'concept-card depth-' + depth
      + (unlocked ? '' : ' locked')
      + (read ? ' read' : '')
      + (justUnlocked ? ' just-unlocked' : '');

    // Dimension hint (only for unlocked, unread)
    let dimHint = '';
    if (unlocked && !read) {
      const dims = CONCEPT_DIMENSIONS[concept.id];
      if (dims) {
        const symbols = Object.entries(dims)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 2)
          .map(([id]) => {
            const meta = DIMENSIONS.find(d => d.id === id);
            return meta ? meta.symbol : '';
          })
          .filter(Boolean)
          .join(' ');
        if (symbols) dimHint = `<div class="concept-dim-hint">${symbols}</div>`;
      }
    }

    card.innerHTML = `
      <div class="concept-numeral">${toRomanNumeral(idx + 1)}</div>
      <div class="concept-body">
        <div class="concept-name">${concept.name}${concept.original ? '<span class="concept-orig">' + concept.original + '</span>' : ''}</div>
        <div class="concept-brief">${concept.brief}</div>
        ${dimHint}
      </div>
      <div class="concept-indicator"></div>
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        haptic('light');
        openStory(concept.id);
      });
    }

    list.appendChild(card);
  });

  // Update previously unlocked set
  previouslyUnlocked = currentUnlocked;

  // Map stats footer
  const statsEl = document.getElementById('map-stats');
  if (statsEl) {
    const unlockedCount = currentUnlocked.size;
    const reflectionCount = Object.values(reflections).filter(r => {
      const text = typeof r === 'string' ? r : r?.text;
      return text && text.trim();
    }).length;
    statsEl.innerHTML = `${currentPhilosopher.ornament} &nbsp; 已解锁 ${unlockedCount} · 已读 ${readCount} · 已记录 ${reflectionCount}`;
  }

  // Scroll-reveal with IntersectionObserver
  requestAnimationFrame(() => {
    const cards = list.querySelectorAll('.concept-card');
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
      cards.forEach(c => observer.observe(c));
    } else {
      cards.forEach(c => c.classList.add('revealed'));
    }
  });

  // Check for philosopher completion
  if (readCount === concepts.length && concepts.length > 0) {
    const celebKey = `echo/${currentPhilosopher.id}/celebrated`;
    if (!localStorage.getItem(celebKey)) {
      localStorage.setItem(celebKey, 'true');
      setTimeout(() => showCelebration(currentPhilosopher), 300);
    }
  }
}

function showStatGain(conceptId, oldStats, newStats) {

  if (!contrib) return;

  // Build overlay
  const overlay = document.createElement('div');
  overlay.className = 'stat-gain';
  const rows = Object.entries(contrib).map(([dim, val]) => {
    const meta = DIMENSIONS.find(d => d.id === dim);
    if (!meta) return '';
    return `<div class="stat-gain-row">
      <span class="stat-gain-symbol">${meta.symbol}</span>
      <span class="stat-gain-name">${meta.name}</span>
      <span class="stat-gain-delta">+${val}</span>
    </div>`;
  }).join('');
  overlay.innerHTML = rows;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => {
    overlay.classList.add('show');
    haptic('success');
  });
  setTimeout(() => overlay.remove(), 2700);

  // Check for level-ups
  setTimeout(() => {
    const levelUps = [];
    Object.keys(contrib).forEach(dim => {
      const oldLvl = getLevel(oldStats[dim] || 0);

      if (oldLvl.name !== newLvl.name) {
        levelUps.push({ dim, oldLvl, newLvl });

}

function topologicalSort(nodes) {
  const visited = new Set();
  const result = [];
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  function visit(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const node = nodeMap.get(id);
    if (!node) return;
    node.dependencies.forEach(dep => visit(dep));
    result.push(node);
  }

  nodes.forEach(n => visit(n.id));
  return result;
}

function openStory(conceptId) {
  currentConceptId = conceptId;
  const story = storyMap.get(conceptId);
  if (!story) return;

  // Track last visit
  if (currentPhilosopher) {
    setLastVisited(currentPhilosopher.id, conceptId);
  }

  const concept = concepts.find(c => c.id === conceptId);
  document.getElementById('story-concept-label').textContent = concept ? concept.name : '';

  // Reset reading progress
  document.getElementById('reading-progress').style.width = '0%';

  const scroll = document.getElementById('story-scroll');
  scroll.innerHTML = '';

  // Title
  const title = document.createElement('div');
  title.className = 'story-title fade-in';
  title.textContent = story.title;
  scroll.appendChild(title);

  // Meta + reading time
  const charCount = (story.body || '').length;
  const readingMin = Math.max(1, Math.round(charCount / 500));
  const meta = document.createElement('div');
  meta.className = 'story-meta fade-in';
  meta.innerHTML = `${story.protagonist.name}，${story.protagonist.age}岁，${story.protagonist.occupation}`
    + `<div class="story-reading-time">约 ${readingMin} 分钟</div>`;
  scroll.appendChild(meta);

  // Re-read prompt (if already read with a reflection)
  const existingRefl = reflections[conceptId];
  const wasRead = !!progress[conceptId];
  if (wasRead && existingRefl) {
    const reread = document.createElement('div');
    reread.className = 'reread-prompt fade-in';
    const oldText = typeof existingRefl === 'string' ? existingRefl : existingRefl.text;
    reread.innerHTML = `<div class="reread-prompt-label">上次你写过</div>${escapeHtml(oldText.slice(0, 80))}${oldText.length > 80 ? '...' : ''}`;
    scroll.appendChild(reread);
  }

  // Epigraph
  const ep = EPIGRAPHS[conceptId];
  if (ep) {
    const epi = document.createElement('div');
    epi.className = 'story-epigraph fade-in';
    epi.innerHTML = `"${escapeHtml(ep.text)}"<span class="story-epigraph-source">— ${escapeHtml(ep.source)}</span>`;
    scroll.appendChild(epi);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'story-body rendered fade-in';
  body.innerHTML = renderMarkdown(story.body);
  scroll.appendChild(body);

  // Divider
  const divider = document.createElement('div');
  divider.className = 'section-divider';
  divider.textContent = '···';
  scroll.appendChild(divider);

  // Layers
  const layersSection = document.createElement('div');
  layersSection.className = 'layers-section fade-in';

  const tabs = [
    { key: 'concept', label: '🜲 概念' },
    { key: 'now', label: '🜂 此刻' },
    { key: 'deeper', label: '🜍 更深' },
  ];

  const tabBar = document.createElement('div');
  tabBar.className = 'layer-tab-bar';

  const contentEl = document.createElement('div');
  contentEl.className = 'layer-content rendered';

  function setTab(key) {
    tabBar.querySelectorAll('.layer-tab').forEach((t, i) => {
      t.classList.toggle('active', tabs[i].key === key);
    });
    contentEl.innerHTML = renderMarkdown(story.layers[key] || '');
  }

  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'layer-tab';
    btn.textContent = tab.label;
    btn.addEventListener('click', () => setTab(tab.key));
    tabBar.appendChild(btn);
  });

  layersSection.appendChild(tabBar);
  layersSection.appendChild(contentEl);
  scroll.appendChild(layersSection);

  setTab('concept');

  // Links
  const allLinks = [...(story.layers.links.pre || []), ...(story.layers.links.post || [])];
  if (allLinks.length > 0) {
    const linksSection = document.createElement('div');
    linksSection.className = 'links-section';

    if (story.layers.links.pre.length > 0) {
      const preLabel = document.createElement('div');
      preLabel.className = 'links-label';
      preLabel.textContent = '前置';
      linksSection.appendChild(preLabel);
      story.layers.links.pre.forEach(name => {
        const chip = createLinkChip(name);
        linksSection.appendChild(chip);
      });
    }

    if (story.layers.links.post.length > 0) {

      postLabel.className = 'links-label';

        linksSection.appendChild(chip);
      });
    }

    scroll.appendChild(linksSection);
  }

  // Deep read (misreading + modern application + critique)
  const deepRead = DEEP_READS[conceptId];
  const critique = CRITIQUES[conceptId];
  if (deepRead || critique) {

    dr.className = 'deep-read';

    if (deepRead) {

      `;

      html += `

          <div class="deep-read-label">批判与反思</div>
          <div class="deep-read-body">${escapeHtml(critique)}</div>
        </div>
      `;
    }
    dr.innerHTML = html;
    scroll.appendChild(dr);
  }

  // Cross-philosopher echo
  const crossText = CROSS_ECHOES[conceptId];
  if (crossText) {

    cross.className = 'cross-echo';
    cross.innerHTML = `<div class="cross-echo-label">回声</div>${escapeHtml(crossText)}`;
    scroll.appendChild(cross);

  reflectSection.className = 'reflect-section';

  reflectPrompt.className = 'reflect-prompt';
  reflectPrompt.textContent = existing

  reflectSection.appendChild(reflectInput);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-top:20px;';

  reflectSkip.className = 'reflect-save';
