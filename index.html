<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>回声 · Echo</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ═══════════════════════════════════════════════════════════════════
   RANEPA / Yandex Sans — Editorial Design System
   ═══════════════════════════════════════════════════════════════════ */

@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 300; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Thin.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 400; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Regular.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 400; font-style: italic; font-display: swap;
  src: url("fonts/YandexSansDisplay-RegularItalic.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 700; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Bold.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 300; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Light.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 400; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Regular.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 400; font-style: italic; font-display: swap;
  src: url("fonts/YandexSansText-RegularItalic.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 500; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Medium.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 700; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Bold.woff2") format("woff2");
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  scroll-behavior: smooth;

  /* ── RANEPA Editorial — paper / crimson / ink ── */
  --bg-base:        #FFFFFF;
  --bg-elevated:    #FFFFFF;
  --bg-card:        #FFFFFF;
  --bg-deep:        #F7F5F1;   /* warm cream for hero / reading mode */

  /* Ink ramp */
  --text-primary:   #262626;   /* strongest text */
  --text-secondary: #404040;   /* body */
  --text-tertiary:  #6D6D6D;   /* caption */
  --text-faint:     #999999;   /* hint */
  --text-disabled:  #AFABAB;   /* divider */

  --border-faint:   #E6E6E6;   /* 1px hairlines */
  --border-soft:    #AFABAB;

  /* RANEPA brand */
  --crimson:        #A30236;   /* primary brand */
  --crimson-dark:   #BE003E;
  --crimson-tint:   #EEA5B4;
  --navy:           #061A6C;   /* secondary, sparingly used */
  --orange:         #F1A23F;
  --red-orange:     #EB5E3F;

  /* Legacy alias mapping (old tokens → editorial palette) */
  --gold:           var(--crimson);
  --gold-bright:    var(--crimson-dark);
  --gold-deep:      #5C0120;
  --copper:         var(--crimson);

  --accent:         var(--crimson);
  --accent-soft:    rgba(163, 2, 54, 0.04);
  --accent-strong:  var(--crimson);

  /* Fonts */
  --font-display: "Yandex Sans Display", "Yandex Sans Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-body:    "Yandex Sans Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  /* Soft shadows — used sparingly */
  --shadow-sm: 0 1px 2px rgba(38,38,38,0.04);
  --shadow-md: 0 2px 4px rgba(38,38,38,0.04), 0 8px 24px rgba(38,38,38,0.05);
  --shadow-lg: 0 8px 32px rgba(38,38,38,0.08);

  background: var(--bg-base);
  color: var(--text-primary);
}

/* All philosopher accents map to RANEPA crimson — single editorial accent */
html[data-philosopher] {
  --accent:        var(--crimson);
  --accent-soft:   rgba(163, 2, 54, 0.04);
  --accent-strong: var(--crimson);
}
/* Optional: navy variant reserved for cross-references / contrast */
html[data-philosopher="foucault"] {
  --accent:        var(--navy);
  --accent-soft:   rgba(6, 26, 108, 0.04);
  --accent-strong: var(--navy);
}

body {
  min-height: 100%;
  color: var(--text-primary);
  font-family: var(--font-body);
  background: var(--bg-base);
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  position: relative;
  font-feature-settings: 'tnum' 1, 'ss01' 1;
  font-size: 15px;
  line-height: 1.55;
}

/* Display font for editorial headings */
.serif-display,
.t-display, .t-h1, .t-h2 {
  font-family: var(--font-display);
  letter-spacing: -0.01em;
}

/* Editorial eyebrow — small uppercase label */
.eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}

/* Short hairline rule (28px) */
.rule {
  width: 28px;
  height: 1px;
  background: var(--text-primary);
  border: none;
  margin: 14px 0;
}
.rule--grey { background: var(--text-tertiary); }
.rule--crimson { background: var(--crimson); }

/* ZNum-style oversized numeric */
.znum {
  font-family: var(--font-display);
  font-feature-settings: 'tnum' 1;
  letter-spacing: 0.02em;
}

body > * { position: relative; z-index: 1; }

/* ── Screens with transitions ── */
.screen { display: none; min-height: 100vh; opacity: 0; }
.screen.active { display: block; animation: screenIn 0.5s ease-out forwards; }
.screen.screen-exit { animation: screenOut 0.3s ease-in forwards; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Story slides in from right */
#story-screen.active { animation: slideInRight 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Journal — opens as a bottom-sheet modal (78% height) over the previous screen */
#journal-screen.active {
  display: block;
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  top: 22%;
  z-index: 80;
  background: var(--bg-base);
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -12px 40px rgba(38, 38, 38, 0.18);
  overflow-y: auto;
  min-height: 0;
  animation: sheetUp 0.42s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
#journal-screen.screen-exit {
  animation: sheetDown 0.32s cubic-bezier(0.4, 0, 1, 1) forwards;
}
@keyframes sheetUp {
  from { transform: translateY(100%); opacity: 1; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes sheetDown {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(100%); opacity: 1; }
}

/* Scrim under journal */
.journal-scrim {
  position: fixed;
  inset: 0;
  background: rgba(38, 38, 38, 0.35);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 75;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.journal-scrim.active {
  opacity: 1;
  pointer-events: auto;
}

/* Drag handle on top of the sheet */
#journal-screen::before {
  content: '';
  position: sticky;
  top: 0;
  display: block;
  width: 38px;
  height: 4px;
  background: var(--border-faint);
  border-radius: 2px;
  margin: 8px auto 0;
  z-index: 12;
}

/* ── Map (concept list) — editorial table of contents ── */
.map-header {
  padding: calc(40px + env(safe-area-inset-top, 32px)) 24px 4px;
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}
.map-progress {
  padding: 8px 24px 6px;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--crimson);
  letter-spacing: -0.005em;
  font-feature-settings: 'tnum' 1;
}
.map-progress::after {
  content: '';
  display: block;
  width: 28px; height: 1px;
  background: var(--text-primary);
  margin-top: 14px;
}
.map-bar {
  display: none;
}
.map-bar-fill { display: none; }

.concept-list { padding: 0 0 80px; }
.concept-card {
  display: grid;
  grid-template-columns: 34px 1fr 22px;
  gap: 14px;
  align-items: center;
  width: 100%;
  padding: 14px 24px 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: background 0.18s ease;
}
.concept-card:focus { outline: none; }
.concept-card:hover:not(.locked) { background: rgba(163, 2, 54, 0.025); }
.concept-card.locked { cursor: default; }

/* Numeral column */
.concept-numeral {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0;
  font-feature-settings: 'tnum' 1;
  line-height: 1.1;
}
.concept-card.locked .concept-numeral {
  color: var(--text-faint);
}
.concept-card.read .concept-numeral {
  color: var(--text-faint);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}

.concept-body { min-width: 0; }
.concept-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
  letter-spacing: -0.003em;
  margin-bottom: 0;
}
.concept-card.read .concept-name { color: var(--text-tertiary); }
.concept-card.locked .concept-name { color: var(--text-faint); }
.concept-orig {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text-tertiary);
  font-style: italic;
  font-weight: 300;
  margin-left: 8px;
}
.concept-brief {
  font-family: var(--font-body);
  font-size: 11px;
  line-height: 1.45;
  color: var(--text-tertiary);
  margin-top: 4px;
  letter-spacing: 0.02em;
}
.concept-card.read .concept-brief { color: var(--text-faint); }
.concept-card.locked .concept-brief { color: var(--text-faint); }

/* Right indicator column */
.concept-indicator {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.concept-card.read .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  background: var(--text-faint);
  border-radius: 50%;
}
.concept-card:not(.locked):not(.read) .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  border: 1px solid var(--text-faint);
}
.concept-card.locked .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  border: 1px dashed var(--text-disabled);
}

/* Legacy concept-dot — hidden (replaced by indicator column) */
.concept-dot { display: none; }

/* Depth indent (slightly smaller in editorial style) */
.concept-card.depth-0 { padding-left: 24px; }
.concept-card.depth-1 { padding-left: 38px; }
.concept-card.depth-2 { padding-left: 52px; }
.concept-card.depth-3 { padding-left: 66px; }
.concept-card.depth-4 { padding-left: 80px; }

/* Scroll-reveal */
.concept-card {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease, background 0.2s ease;
}
.concept-card.revealed {
  transform: translateY(0);
  opacity: 1;
}
.concept-card.revealed.locked { opacity: 0.45; }

/* Newly-unlocked subtle flash */
.concept-card.just-unlocked {
  animation: unlockFlash 1.5s ease-out forwards;
}
@keyframes unlockFlash {
  0% { background: rgba(163, 2, 54, 0.06); }
  100% { background: transparent; }
}

/* ── Story reader — editorial chapter layout ── */
.story-back {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(10px + env(safe-area-inset-top, 32px)) 20px 12px;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-faint);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 14px;
}
.back-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  padding: 10px 6px;
  margin: -10px -6px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.back-btn:focus { outline: none; }
.back-btn:active { color: var(--crimson); }
.story-concept-label {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}

.story-scroll {
  padding: calc(72px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
  background: var(--bg-deep);
}
.story-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.18;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  color: var(--text-primary);
}
.story-meta {
  font-family: var(--font-display);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-faint);
}
.story-body {
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.72;
  letter-spacing: 0.005em;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  margin-top: 22px;
}
.story-body p { margin-bottom: 1.05em; }
.story-body p:first-child::first-letter {
  font-family: var(--font-display);
  font-size: 3.6em;
  float: left;
  line-height: 0.85;
  margin: 4px 8px 0 -2px;
  color: var(--text-primary);
  font-weight: 700;
}

/* ── Reading progress bar ── */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 1px;
  background: var(--crimson);
  z-index: 50;
  transition: width 0.15s linear;
  pointer-events: none;
}

/* ── Reading time estimate ── */
.story-reading-time {
  font-family: var(--font-display);
  font-size: 10px;
  color: var(--text-faint);
  margin-top: 4px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ── Layers (concept / now / deeper) — editorial section ── */
.layers-section {
  margin-top: 64px;
  border-top: 1px solid var(--border-faint);
  padding-top: 36px;
  position: relative;
}
.layers-section::before {
  content: '层 次';
  display: block;
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 18px;
}
.layer-tab-bar {
  display: flex;
  gap: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border-faint);
  padding-bottom: 0;
}
.layer-tab {
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 8px 0 12px;
  cursor: pointer;
  transition: color 0.2s;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
}
.layer-tab:focus { outline: none; }
.layer-tab.active {
  color: var(--crimson);
  border-bottom: 1px solid var(--crimson);
  font-weight: 700;
}
.layer-content {
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.72;
  color: var(--text-secondary);
  word-break: break-word;
  min-height: 120px;
}
.layer-content p { margin-bottom: 1em; }

/* ── Links ── */
.links-section {
  margin-top: 44px;
  padding-top: 22px;
  border-top: 1px solid var(--border-faint);
}
.links-label {
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 14px;
}
.link-chip {
  display: inline-flex;
  align-items: center;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--text-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 4px 0 4px;
  margin: 0 18px 8px 0;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.link-chip::after {
  content: '›';
  margin-left: 6px;
  font-weight: 400;
  color: var(--crimson);
}
.link-chip:hover { color: var(--crimson); border-bottom-color: var(--crimson); }
.link-chip:focus { outline: none; }

/* ── Reflect — editorial section ── */
.reflect-section {
  margin-top: 56px;
  padding: 32px 0 24px;
  border: none;
  border-top: 1px solid var(--border-faint);
  border-radius: 0;
  margin-bottom: 60px;
  position: relative;
}
.reflect-section::before {
  content: '回 声';
  display: block;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--crimson);
  margin-bottom: 18px;
  background: transparent;
  position: static;
  top: auto;
  left: auto;
  padding: 0;
}
.reflect-prompt {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 14px;
  line-height: 1.4;
  letter-spacing: -0.005em;
  max-width: 30em;
}
.reflect-input {
  width: 100%;
  min-height: 132px;
  background: var(--bg-deep);
  border: none;
  border-left: 2px solid var(--crimson);
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.7;
  resize: none;
  padding: 14px 16px;
}
.reflect-input:focus { background: rgba(163, 2, 54, 0.04); }
.reflect-input::placeholder { color: var(--text-faint); font-style: italic; }
.reflect-save {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  margin-left: auto;
  background: var(--text-primary);
  border: none;
  color: #fff;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 10px 18px;
  border-radius: 0;
  transition: background 0.2s;
}
.reflect-save:hover { background: var(--crimson); }
.reflect-save:focus { outline: none; }

/* Modal sheet variant — pulled up from bottom 78% */
.reflect-modal-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(2px);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.reflect-modal-scrim.active {
  opacity: 1;
  pointer-events: auto;
}
.reflect-modal-sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 78%;
  max-height: 78vh;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.18);
  z-index: 70;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.reflect-modal-sheet.active { transform: translateY(0); }
.reflect-modal-handle {
  width: 38px;
  height: 4px;
  background: var(--border-faint);
  border-radius: 2px;
  margin: 8px auto 4px;
}

/* ── Markdown rendering — editorial ── */
.rendered strong {
  font-weight: 700;
  color: var(--text-primary);
}
.rendered em { font-style: italic; }

/* Quote callout — crimson left border + faint tint */
.rendered blockquote {
  position: relative;
  margin: 18px -10px;
  padding: 12px 16px 14px 20px;
  background: rgba(163, 2, 54, 0.04);
  border-left: 2px solid var(--crimson);
  border-radius: 0;
  opacity: 1;
  font-style: normal;
  color: var(--text-primary);
  font-weight: 500;
}
.rendered blockquote::before {
  content: '已 标 记';
  position: absolute;
  right: 6px;
  top: -8px;
  background: var(--bg-deep);
  padding: 0 6px;
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--crimson);
  line-height: 16px;
}
.rendered blockquote p { margin: 0; }
.rendered blockquote strong { color: var(--crimson); }

.rendered ul {
  list-style: none;
  padding-left: 0;
  margin: 12px 0;
}
.rendered li {
  position: relative;
  padding-left: 18px;
  margin-bottom: 6px;
  line-height: 1.75;
}
.rendered li::before {
  content: '·';
  position: absolute;
  left: 4px;
  color: var(--crimson);
  font-weight: 700;
}

/* ── Horizontal rule — editorial dot ornament ── */
.rendered hr {
  border: none;
  height: 0;
  text-align: center;
  position: relative;
  margin: 32px 0;
}
.rendered hr::before {
  content: '⋯';
  display: inline-block;
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--text-tertiary);
  letter-spacing: 0.4em;
}

/* ── Section ornament ── */
.section-divider {
  text-align: center;
  padding: 48px 0 12px;
  font-size: 14px;
  opacity: 0.12;
  letter-spacing: 1em;
}

/* ── Tap feedback ── */
.concept-card:not(.locked):active { opacity: 0.7; }
.link-chip:active { opacity: 0.9; }
.layer-tab:active { opacity: 0.6; }

/* ── Theme toggle ── */
.theme-toggle {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top, 32px));
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(237,229,211,0.04);
  border: 1px solid rgba(237,229,211,0.1);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.3s;
}
.theme-toggle:hover { background: rgba(237,229,211,0.08); }
.theme-toggle:focus { outline: none; }
.theme-toggle:active { transform: scale(0.92); }

/* ── Paper-mode overrides for elements using rgba(237,229,211,X) ── */
html[data-theme="paper"] .theme-toggle {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .theme-toggle:hover {
  background: rgba(42,37,32,0.08);
}

/* Paper mode: dial back the brightness of borders, dividers, surfaces */
html[data-theme="paper"] body::after { opacity: 0.04; }
html[data-theme="paper"] body::before {
  background:
    radial-gradient(ellipse at 50% 0%, var(--ambient) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(160,130,80,0.06) 0%, transparent 70%);
}

/* In paper mode, the cream-tint rgbas become dark-tints */
html[data-theme="paper"] .nav-entry {
  background: var(--bg-base);
}
html[data-theme="paper"] .nav-grid {
  background: rgba(42,37,32,0.1);
  border-color: rgba(42,37,32,0.12);
}
html[data-theme="paper"] .nav-entry:hover {
  background: rgba(42,37,32,0.05);
}
html[data-theme="paper"] .nav-entry:active {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .nav-group-sub {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .brain-light {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(42,37,32,0.04) 0%, transparent 70%),
    rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card {
  border-bottom-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card:hover {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge:hover {
  background: rgba(42,37,32,0.06);
}
html[data-theme="paper"] .mind-card {
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card {
  background: rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card:hover {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.18);
}
html[data-theme="paper"] .concept-card {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .concept-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .map-bar,
html[data-theme="paper"] .philosopher-bar,
html[data-theme="paper"] .dim-row-track,
html[data-theme="paper"] .mini-bar-track {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .story-back,
html[data-theme="paper"] .journal-header {
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .echo-banner {
  background: linear-gradient(to top, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .reflect-section {
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .reflect-section::before {
  background: var(--bg-base);
}
html[data-theme="paper"] .quote-card:hover,
html[data-theme="paper"] .scenario-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .stat-gain-row {
  background: rgba(244,237,224,0.95);
  border-color: var(--accent);
}
html[data-theme="paper"] .level-up,
html[data-theme="paper"] .celebration {
  background: rgba(244,237,224,0.92);
}
html[data-theme="paper"] .achievement-popup {
  background: rgba(244,237,224,0.95);
}

/* ── Home — editorial masthead ── */
.home-header {
  padding: calc(40px + env(safe-area-inset-top, 32px)) 24px 4px;
  text-align: left;
  font-family: var(--font-body);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--text-tertiary);
}
.home-title {
  padding: 8px 24px 4px;
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1.05;
  font-weight: 700;
  letter-spacing: -0.01em;
  text-align: left;
  color: var(--text-primary);
}
.home-title em {
  font-weight: 300;
  font-style: italic;
  color: var(--crimson);
}
.home-subtitle {
  padding: 6px 24px 4px;
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-tertiary);
  text-align: left;
  font-style: italic;
}
.home-subtitle::after {
  content: '';
  display: block;
  width: 28px; height: 1px;
  background: var(--text-primary);
  margin-top: 16px;
  margin-bottom: 4px;
}
.home-quote {
  margin: 0 28px 44px;
  padding: 18px 22px;
  font-size: 15px;
  line-height: 1.75;
  font-style: italic;
  max-width: none;
  text-align: left;
  transition: opacity 0.8s ease;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  box-shadow: var(--shadow-sm);
}
.philosopher-list {
  padding: 0 0 48px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.philosopher-card {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 16px;
  align-items: start;
  width: 100%;
  padding: 22px 24px 20px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: background 0.18s ease;
}
.philosopher-card:last-child {
  border-bottom: 1px solid var(--border-faint);
}
.philosopher-card:hover {
  background: rgba(163, 2, 54, 0.025);
}
.philosopher-card:active { background: rgba(163, 2, 54, 0.045); }
.philosopher-card:focus { outline: none; }

/* Roman numeral column */
.philosopher-numeral {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0;
  font-feature-settings: 'tnum' 1;
  line-height: 1.1;
  padding-top: 2px;
}
.philosopher-numeral--read {
  color: var(--text-faint);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}
.philosopher-numeral--current {
  color: var(--crimson);
  font-weight: 700;
}

.philosopher-body { min-width: 0; }
.philosopher-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.005em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.philosopher-orig {
  font-family: var(--font-display);
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  margin-left: 8px;
  color: var(--text-tertiary);
  letter-spacing: 0;
}
.philosopher-dates {
  font-family: var(--font-display);
  font-size: 10.5px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  letter-spacing: 0.16em;
  font-feature-settings: 'tnum' 1;
  text-transform: uppercase;
}
.philosopher-question {
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text-secondary);
  margin-bottom: 12px;
  max-width: 28em;
}
.philosopher-progress {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
}
.philosopher-progress--active { color: var(--crimson); }
.philosopher-bar {
  margin-top: 8px;
  height: 1px;
  background: var(--border-faint);
  overflow: hidden;
  max-width: 140px;
}
.philosopher-bar-fill {
  height: 100%;
  background: var(--crimson);
  transition: width 0.4s ease;
}

/* Right indicator column */
.philosopher-indicator {
  align-self: center;
  color: var(--text-faint);
  display: flex;
  align-items: center;
}

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 1;
  transition: opacity 0.4s ease;
}
.loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loading-dots { font-size: 18px; opacity: 0.2; letter-spacing: 0.3em; }
@keyframes pulse { 0%,100%{ opacity:0.15 } 50%{ opacity:0.4 } }
.loading-dots { animation: pulse 1.2s ease-in-out infinite; }

/* ── Journal screen — sheet modal ── */
.journal-header {
  position: sticky;
  top: 12px;
  left: 0; right: 0;
  padding: 6px 20px 14px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--border-faint);
  z-index: 11;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.journal-header .story-concept-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}
.journal-scroll {
  padding: 24px 24px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.journal-title {
  font-size: 22px;
  margin-bottom: 32px;
  opacity: 0.6;
}
.journal-empty {
  font-size: 15px;
  opacity: 0.2;
  line-height: 1.8;
  padding-top: 40px;
}
.journal-entry {
  margin-bottom: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(237,229,211,0.06);
}
.journal-entry-concept {
  font-size: 16px;
  opacity: 0.6;
  margin-bottom: 4px;
}
.journal-entry-date {
  font-size: 11px;
  opacity: 0.15;
  margin-bottom: 12px;
}
.journal-entry-text {
  font-size: 15px;
  line-height: 1.8;
  opacity: 0.7;
  white-space: pre-wrap;
}
.journal-entry-philosopher {
  font-size: 10px;
  opacity: 0.2;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

/* ── Map nav bar (home + journal buttons) ── */
.map-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 28px 8px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.2;
  padding: 8px 4px;
}
.nav-btn:hover { opacity: 0.4; }
.nav-btn:focus { outline: none; }

/* ── Transitions ── */
.fade-in {
  animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Staggered fade-in for child elements */
.stagger > :nth-child(1) { animation-delay: 0s; }
.stagger > :nth-child(2) { animation-delay: 0.08s; }
.stagger > :nth-child(3) { animation-delay: 0.16s; }
.stagger > :nth-child(4) { animation-delay: 0.24s; }
.stagger > :nth-child(5) { animation-delay: 0.32s; }
.stagger > * { animation-fill-mode: backwards; }

/* ── Swipe hint on story screen ── */
.swipe-indicator {
  position: fixed;
  left: 0; top: 50%;
  width: 4px; height: 48px;
  margin-top: -24px;
  background: rgba(237,229,211,0.08);
  border-radius: 0 4px 4px 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 11;
}
.swipe-indicator.visible { opacity: 1; }

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(237,229,211,0.08);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
.toast.show {
  opacity: 0.7;
  transform: translateX(-50%) translateY(0);
}

/* ── 正在进行的实践 ── */
.in-progress-practice {
  margin: 0 28px 24px;
  padding: 18px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.in-progress-practice:hover {
  background: var(--bg-card);
  border-color: var(--gold);
}
.ipp-label {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--gold);
  margin-bottom: 8px;
}
.ipp-title {
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.9;
}
.ipp-status {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  color: var(--gold-bright);
  letter-spacing: 0.05em;
}
.ipp-bar {
  height: 2px;
  background: var(--border-faint);
  border-radius: 1px;
  overflow: hidden;
}
.ipp-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}

/* ── 心智之灯 — editorial 雷达图 ── */
.brain-light {
  margin: 0 24px 32px;
  padding: 24px 0 18px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-faint);
  border-bottom: 1px solid var(--border-faint);
  border-radius: 0;
  position: relative;
  overflow: visible;
  box-shadow: none;
}
.bl-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
  padding: 0 4px;
}
.bl-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}
.bl-level {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--crimson);
}
.bl-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px 12px 8px;
  position: relative;
  min-height: 280px;
}
.bl-svg { width: 100%; max-width: 320px; height: auto; }
.bl-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 8px;
  padding: 0 4px;
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.bl-meta .bl-readcount-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--crimson);
  margin-right: 4px;
  letter-spacing: 0;
}
.bl-streak {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.bl-streak-flame {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--crimson);
  margin-right: 6px;
  vertical-align: middle;
}
.bl-desc {
  font-family: var(--font-body);
  font-size: 12.5px;
  color: var(--text-tertiary);
  margin-top: 8px;
  text-align: left;
  padding: 0 4px;
  font-style: italic;
  max-width: 30em;
  line-height: 1.5;
}

/* ── 每日挑战 — 简洁卡片 ── */
.daily-challenge {
  margin: 0 28px 32px;
  padding: 20px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.daily-challenge:hover {
  border-color: var(--border-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.daily-challenge:active { transform: translateY(0); }
.dc-label {
  font-size: 12px;
  letter-spacing: 0.2em;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--gold);
}
.dc-text {
  font-size: 17px;
  opacity: 0.95;
  line-height: 1.55;
  font-weight: 500;
}
.dc-action {
  font-size: 13px;
  opacity: 0.65;
  margin-top: 10px;
  color: var(--gold);
  letter-spacing: 0.01em;
}

/* ── 成就弹层 ── */
.achievement-popup {
  position: fixed;
  top: calc(60px + env(safe-area-inset-top, 32px));
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(10,8,7,0.95);
  border: 1px solid var(--accent);
  border-radius: 30px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  z-index: 200;
  transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter: blur(10px);
}
.achievement-popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.ap-icon {
  font-size: 20px;
  color: var(--accent-strong);
}
.ap-text {
  font-size: 13px;
}
.ap-label {
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 0.2em;
}
.ap-name {
  opacity: 0.95;
}

/* ── Achievements screen ── */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.achievement-tile {
  padding: 20px 14px 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
}
/* Heraldic corner ornaments */
.achievement-tile::before,
.achievement-tile::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border: 1px solid var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.achievement-tile::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
.achievement-tile::after { bottom: 3px; right: 3px; border-left: none; border-top: none; }
.achievement-tile.locked {
  opacity: 0.3;
}
.achievement-tile.earned {
  border-color: var(--gold);
  background:
    radial-gradient(circle at 50% 30%, var(--accent-soft) 0%, transparent 60%),
    var(--bg-card);
}
.achievement-tile.earned::before,
.achievement-tile.earned::after {
  opacity: 0.7;
}
.at-icon {
  font-size: 32px;
  opacity: 0.85;
  margin-bottom: 10px;
  color: var(--gold-bright);
  display: block;
}
.achievement-tile.locked .at-icon {
  color: var(--text-tertiary);
}
.at-name {
  font-size: 13px;
  margin-bottom: 6px;
  opacity: 0.95;
  letter-spacing: 0.02em;
}
.at-desc {
  font-size: 11px;
  opacity: 0.5;
  line-height: 1.55;
  font-style: italic;
}

/* ── Mind card (home) ── */
.mind-card {
  margin: 0 28px 32px;
  padding: 22px 24px;
  border: 1px solid rgba(237,229,211,0.06);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
.mind-card:hover { background: rgba(237,229,211,0.02); border-color: rgba(237,229,211,0.12); }
.mind-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.mind-card-label {
  font-size: 10px;
  opacity: 0.35;
  letter-spacing: 0.25em;
}
.mind-card-total {
  font-size: 13px;
  opacity: 0.5;
}
.mind-card-radar {
  display: flex;
  align-items: center;
  gap: 18px;
}
.mind-card-radar svg { flex-shrink: 0; }
.mind-card-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mini-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.mini-bar-label { width: 42px; opacity: 0.5; }
.mini-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(237,229,211,0.06);
  border-radius: 1.5px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: rgba(237,229,211,0.4);
  transition: width 0.6s ease;
}
.mini-bar-val {
  width: 24px;
  text-align: right;
  opacity: 0.4;
  font-size: 10px;
}

/* ── Mind screen ── */
.mind-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 560px;
  margin: 0 auto;
}
.mind-title {
  font-size: 24px;
  opacity: 0.85;
  margin-bottom: 4px;
}
.mind-subtitle {
  font-size: 12px;
  opacity: 0.3;
  margin-bottom: 36px;
  letter-spacing: 0.1em;
}
.mind-radar-wrapper {
  display: flex;
  justify-content: center;
  margin: 0 0 40px;
}
.mind-radar { display: block; }
.dim-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 24px;
}
.dim-row {
  position: relative;
}
.dim-row-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.dim-row-symbol {
  font-size: 14px;
  opacity: 0.5;
}
.dim-row-name {
  font-size: 17px;
  opacity: 0.9;
}
.dim-row-sub {
  font-size: 12px;
  opacity: 0.3;
  margin-left: auto;
  font-style: italic;
}
.dim-row-track {
  height: 4px;
  background: rgba(237,229,211,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.dim-row-fill {
  height: 100%;
  background: rgba(237,229,211,0.45);
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.dim-row-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.4;
}
.dim-level { letter-spacing: 0.1em; }
.dim-score { font-feature-settings: 'tnum'; }
.mind-total {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(237,229,211,0.06);
  text-align: center;
  font-size: 13px;
  opacity: 0.4;
  letter-spacing: 0.15em;
}

/* ── Stat gain animation overlay ── */
.stat-gain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 110;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
}
.stat-gain.show {
  animation: statGainFlow 2.5s ease-out forwards;
}
@keyframes statGainFlow {
  0%   { opacity: 0; transform: translateY(20px); }
  20%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.stat-gain-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  background: rgba(0,0,0,0.85);
  padding: 10px 22px;
  border: 1px solid var(--accent);
  border-radius: 24px;
  opacity: 0.95;
}
.stat-gain-symbol { opacity: 0.7; }
.stat-gain-name { opacity: 0.85; }
.stat-gain-delta {
  color: var(--accent-strong);
  font-weight: 600;
  font-feature-settings: 'tnum';
}

/* ── Level-up overlay ── */
.level-up {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 160;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
}
.level-up-label {
  font-size: 11px;
  opacity: 0.4;
  letter-spacing: 0.35em;
  margin-bottom: 24px;
}
.level-up-symbol {
  font-size: 48px;
  opacity: 0.7;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.level-up-text {
  font-size: 26px;
  line-height: 1.6;
  opacity: 0.85;
  margin-bottom: 36px;
}
.level-up-dim {
  font-size: 14px;
  opacity: 0.45;
  letter-spacing: 0.1em;
}

/* ── Concept card dimension hint ── */
.concept-dim-hint {
  display: inline-flex;
  gap: 4px;
  margin-top: 6px;
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.15em;
}

/* ── Home grouped navigation (illuminated manuscript style) ── */
.home-nav-groups {
  padding: 24px 28px 100px;
  display: flex;
  flex-direction: column;
  gap: 52px;
}
.nav-group {
  display: flex;
  flex-direction: column;
  position: relative;
}
.nav-group-label {
  font-size: 13px;
  letter-spacing: 0.18em;
  opacity: 0.95;
  margin-bottom: 4px;
  color: var(--text-primary);
  text-align: left;
  font-weight: 600;
}
.nav-group-sub {
  font-size: 13px;
  opacity: 0.45;
  text-align: left;
  margin-bottom: 18px;
  letter-spacing: 0.01em;
  color: var(--text-secondary);
}
.nav-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
  position: relative;
  box-shadow: none;
}
.nav-entry {
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 20px 20px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 86px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.nav-entry:hover {
  border-color: var(--border-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.nav-entry:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}
.nav-entry:focus { outline: none; }
.ne-icon {
  width: 22px;
  height: 22px;
  margin-bottom: 12px;
  opacity: 0.85;
  color: var(--gold);
  display: block;
}
.ne-icon svg {
  width: 100%;
  height: 100%;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ne-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.005em;
  color: var(--text-primary);
}
.ne-meta {
  font-size: 12px;
  opacity: 0.55;
  letter-spacing: 0.01em;
  line-height: 1.5;
  color: var(--text-secondary);
  font-style: normal;
}

/* ── Settings screen — editorial list ── */
.settings-section {
  margin-bottom: 32px;
  padding-top: 22px;
  border-top: 1px solid var(--border-faint);
}
.settings-section:first-of-type {
  border-top: none;
  padding-top: 0;
}
.settings-label {
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 16px;
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.settings-label::before {
  content: '';
  display: inline-block;
  width: 14px;
  height: 1px;
  background: var(--text-primary);
  vertical-align: middle;
}
.settings-row {
  padding: 12px 0;
  border-bottom: 1px solid var(--border-faint);
  display: block;
}
.settings-row:last-of-type { border-bottom: none; }
.settings-input {
  width: 100%;
  background: var(--bg-deep);
  border: none;
  border-left: 2px solid var(--border-faint);
  border-radius: 0;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.settings-input:focus {
  border-left-color: var(--crimson);
  background: rgba(163, 2, 54, 0.04);
}
.settings-help {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 10px;
  line-height: 1.6;
  font-style: italic;
}
.settings-btn {
  background: var(--text-primary);
  border: none;
  color: #fff;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 11px 22px;
  border-radius: 0;
  cursor: pointer;
  margin-top: 14px;
  transition: background 0.2s;
}
.settings-btn:hover { background: var(--crimson); }
.settings-btn:focus { outline: none; }
.settings-status {
  font-family: var(--font-body);
  font-size: 11.5px;
  margin-top: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  font-style: normal;
}
.settings-status.ok { color: var(--navy); }
.settings-status.err { color: var(--crimson); }

/* ── Chat screen ── */
.chat-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 680px;
  margin: 0 auto;
  min-height: calc(100vh - 80px);
}
.chat-intro {
  text-align: center;
  padding: 40px 20px;
  opacity: 0.5;
  font-size: 14px;
  line-height: 1.85;
  font-style: italic;
}
.chat-bubble {
  margin-bottom: 18px;
  padding: 14px 18px;
  border-radius: 14px;
  max-width: 85%;
  font-size: 15px;
  line-height: 1.85;
  white-space: pre-wrap;
}
.chat-bubble.user {
  background: rgba(237,229,211,0.06);
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.chat-bubble.philosopher {
  background: rgba(237,229,211,0.02);
  border: 1px solid var(--accent-soft);
  border-bottom-left-radius: 4px;
  position: relative;
}
.chat-bubble-name {
  font-size: 11px;
  opacity: 0.55;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
  color: var(--accent-strong);
}
.chat-bubble.loading::after {
  content: '...';
  display: inline-block;
  animation: chatPulse 1.2s ease-in-out infinite;
}
@keyframes chatPulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.9; }
}
.chat-input-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, var(--bg-base) 70%, transparent);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  z-index: 20;
}
.chat-input {
  flex: 1;
  background: rgba(237,229,211,0.04);
  border: 1px solid rgba(237,229,211,0.08);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  padding: 12px 14px;
  border-radius: 20px;
  outline: none;
  resize: none;
  max-height: 120px;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  background: var(--accent);
  border: none;
  color: var(--text-primary);
  font-size: 18px;
  width: 44px;
  height: 44px;
  border-radius: 22px;
  cursor: pointer;
  flex-shrink: 0;
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.chat-send:focus { outline: none; }

/* Chat button on philosopher / archive screen */
.chat-fab {
  display: inline-block;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 22px;
  cursor: pointer;
  opacity: 0.85;
  margin-top: 20px;
}
.chat-fab:hover { background: var(--accent-soft); opacity: 1; }
.chat-fab:focus { outline: none; }

/* ── Extended Masters screens ── */
.extended-scroll, .extended-master-scroll, .extended-concept-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 680px;
  margin: 0 auto;
}
.ext-title {
  font-size: 28px;
  opacity: 0.95;
  margin-bottom: 6px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.ext-subtitle {
  font-size: 13px;
  opacity: 0.55;
  margin-bottom: 32px;
}
.ext-master-card {
  display: block;
  width: 100%;
  padding: 24px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.ext-master-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-soft);
}
.ext-master-card:focus { outline: none; }
.ext-master-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 50%;
  background: radial-gradient(circle at 100% 50%, var(--card-accent, transparent) 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
}
.ext-master-card[data-color="nietzsche"] { --card-accent: rgba(140,90,30,0.4); }
.ext-master-card[data-color="foucault"] { --card-accent: rgba(95,60,130,0.4); }
.ext-master-name {
  font-size: 26px;
  line-height: 1.25;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.005em;
}
.ext-master-orig {
  font-size: 13px;
  color: var(--gold);
  font-style: italic;
  margin-left: 10px;
  font-weight: 400;
}
.ext-master-meta {
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 14px;
}
.ext-master-intro {
  font-size: 14px;
  line-height: 1.7;
  opacity: 0.75;
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.ext-master-count {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}

/* Master detail (intro + concept list) */
.ext-master-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-faint);
}
.ext-master-bigname {
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.ext-master-bigorig {
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 10px;
}
.ext-master-bigmeta {
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 20px;
  letter-spacing: 0.03em;
}
.ext-master-bigintro {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.78;
  white-space: pre-wrap;
}
.ext-concepts-label {
  font-size: 13px;
  letter-spacing: 0.18em;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.ext-concept-card {
  display: block;
  width: 100%;
  padding: 20px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.ext-concept-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.ext-concept-card:focus { outline: none; }
.ext-concept-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
.ext-concept-orig {
  font-size: 12px;
  color: var(--gold);
  font-style: italic;
  margin-bottom: 8px;
}
.ext-concept-brief {
  font-size: 13px;
  line-height: 1.6;
  opacity: 0.65;
}

/* Concept detail (parable + teaching) */
.ext-c-name {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.ext-c-orig {
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 8px;
}
.ext-c-brief {
  font-size: 15px;
  line-height: 1.7;
  opacity: 0.85;
  padding: 14px 18px;
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  margin-bottom: 36px;
}
.ext-c-section {
  margin-bottom: 36px;
}
.ext-c-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.ext-c-parable {
  font-size: 16px;
  line-height: 1.9;
  white-space: pre-wrap;
  font-family: 'Cormorant Garamond', 'Songti SC', Georgia, serif;
  padding: 24px 24px;
  background: var(--bg-deep);
  border-radius: 12px;
  color: var(--text-primary);
}
.ext-c-teaching {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.85;
  white-space: pre-wrap;
}

/* ── Letters screens ── */
.letters-scroll, .letter-detail-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
}
.letters-title {
  font-size: 28px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.letters-subtitle {
  font-size: 12px;
  opacity: 0.35;
  font-style: italic;
  margin-bottom: 40px;
}
.letter-card {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(237,229,211,0.05);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 22px 0;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.letter-card:active { opacity: 0.7; transform: translateX(3px); }
.letter-card:focus { outline: none; }
.lc-pair {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.lc-arrow { opacity: 0.4; margin: 0 8px; }
.lc-date {
  font-size: 11px;
  letter-spacing: 0.15em;
  opacity: 0.4;
  margin-bottom: 8px;
}
.lc-summary {
  font-size: 13px;
  opacity: 0.55;
  font-style: italic;
  line-height: 1.6;
}

/* Detail — typed-letter feel */
.letter-paper {
  margin: 20px 0 0;
  padding: 36px 36px 32px;
  background: rgba(237,229,211,0.02);
  border: 1px solid rgba(237,229,211,0.06);
  border-radius: 2px;
  position: relative;
}
.letter-meta-top {
  font-size: 12px;
  opacity: 0.45;
  margin-bottom: 24px;
  line-height: 1.7;
  font-style: italic;
}
.letter-salute {
  font-size: 17px;
  opacity: 0.92;
  margin-bottom: 24px;
  font-style: italic;
}
.letter-body {
  font-size: 16px;
  line-height: 2.0;
  opacity: 0.88;
  white-space: pre-wrap;
  font-family: 'Cormorant Garamond', 'Songti SC', 'STSong', Georgia, serif;
}
.letter-signature {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px dashed rgba(237,229,211,0.08);
  font-size: 15px;
  opacity: 0.85;
  font-style: italic;
  white-space: pre-wrap;
  text-align: right;
}
.letter-summary {
  font-size: 13px;
  opacity: 0.55;
  font-style: italic;
  text-align: center;
  padding: 14px 0;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(237,229,211,0.05);
}

/* ── Practice card progress states ── */
.pr-card-status {
  font-size: 11px;

/* ── Challenge play ── */

  font-size: 26px;

}

  font-size: 13px;

}
.cp-question {
  display: block;

  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 18px 22px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  position: relative;
}
.cp-question:hover { border-color: var(--gold); }
.cp-question:focus { outline: none; }
.cp-question.selected {
  background: var(--accent-soft);
  border-color: var(--gold);
}
.cp-question.selected::after {
  content: '× 伪';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--gold-bright);
  letter-spacing: 0.15em;
}

  font-size: 16px;

  border-radius: 22px;

  letter-spacing: 0.15em;

.cp-submit-btn:active { transform: scale(0.97); }
.cp-submit-btn:focus { outline: none; }

/* Challenge result */

  text-align: center;
  padding: 32px 20px 28px;

  font-size: 48px;

  color: var(--gold-bright);
  margin-bottom: 12px;

  background-clip: text;

  position: relative;
  background: var(--text-primary);
  color: #fff;
  margin: 0 24px 14px;
  padding: 22px 22px 20px;
  overflow: hidden;
  min-height: 200px;
}
.arc-hero-eyebrow {
  font-family: var(--font-body);
  font-size: 10px;

}

  font-family: var(--font-display);

  font-weight: 700;

  margin-bottom: 8px;
}

  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.04em;
  color: rgba(255, 255, 255, 0.78);
  margin-bottom: 14px;
}

  font-size: 11px;
  font-weight: 300;

.arc-hero-bio {
  font-family: var(--font-body);
  font-size: 12.5px;
  line-height: 1.55;
  color: rgba(255, 255, 255, 0.82);

}

  position: absolute;
  top: 20px;
  right: 22px;
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.78);
  letter-spacing: 0.18em;
  text-align: right;
  line-height: 1.3;
  writing-mode: vertical-rl;
}

.arc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 24px;
  margin-bottom: 32px;
}
.arc-card {
  padding: 14px;
  min-height: 96px;
  position: relative;
  overflow: hidden;
}
.arc-card--full { grid-column: span 2; }
.arc-card--cream { background: var(--bg-deep); }
.arc-card--line { border: 1px solid var(--border-faint); background: transparent; }
.arc-card--ink { background: var(--text-primary); color: #fff; }
.arc-card--quote {
  background: var(--crimson);
  color: #fff;
}

.arc-card-eyebrow {
  font-family: var(--font-body);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 10px;
}

.arc-card--ink .arc-card-eyebrow { color: rgba(255, 255, 255, 0.6); }

.arc-card-quote {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 400;
  font-style: italic;
  line-height: 1.35;
  letter-spacing: -0.005em;
  color: #fff;
  margin-bottom: 8px;
}
.arc-card-quote-src {
  font-family: var(--font-body);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.75);
  letter-spacing: 0.06em;
}

.arc-card-stat {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.arc-card-stat--crimson { color: var(--crimson); }

.arc-card-meta {
  font-family: var(--font-body);
  font-size: 10.5px;
  line-height: 1.45;
  color: var(--text-tertiary);
  letter-spacing: 0.02em;
}
.arc-card--ink .arc-card-meta { color: rgba(255, 255, 255, 0.7); }

.arc-card-lifespan {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;

.arc-card-progress {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 700;
  color: var(--crimson);

  margin-bottom: 6px;

.arc-card-bar {
  height: 1px;

  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 400;

/* ── Onboarding — RANEPA crimson hero ── */
.onboarding {
  position: fixed;
  inset: 0;
  background: var(--crimson);
  color: #fff;
  z-index: 300;
  display: flex;
  flex-direction: column;
  padding: calc(54px + env(safe-area-inset-top, 0px)) 28px 36px;
  animation: fadeIn 0.6s ease-out;
  overflow: hidden;
}

/* Ghost watermark crest in upper-right */
.onboarding::before {
  content: '';
  position: absolute;
  top: 64px;
  right: -60px;
  width: 320px;
  height: 320px;
  opacity: 0.06;
  pointer-events: none;
  background: radial-gradient(circle, transparent 60%, #fff 60%, #fff 61%, transparent 61%);
  border-radius: 50%;
}

/* Step indicator at top */
.onboarding-dots {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  padding: 0;
  align-items: stretch;
  flex: none;
}
.onboarding-dot {
  flex: 1;
  height: 2px;
  width: auto;
  border-radius: 0;
  background: rgba(255, 255, 255, 0.25);
  transition: background 0.3s;
}
.onboarding-dot.active { background: #fff; }

/* Eyebrow row */
.onboarding-eyebrow {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.7);
  display: flex;

        body: '老周 55 岁退休那天，他朋友给他发了一条祝福: "祝你退休生活精彩——发挥余热，活出第二人生。"\n\n老周看着这条消息——突然有点累。\n\n他在脑子里数——他这一辈子做的所有事，都是"有用"的事:\n\n18 岁高考——为了"有用"的大学。\n22 岁工作——选了"有用"的行业。\n28 岁结婚——找了一个"有用"的对象（门当户对、家境稳定）。\n35 岁买房——为了"有用"的资产。\n45 岁升职——为了"有用"的地位。\n55 岁退休——朋友说应该"发挥余热"——做"有用"的事。\n\n他这一辈子做的所有事都是为了有用。\n\n他想做点没用的事。\n\n那天他去花鸟市场，买了 10 盆兰花。他不懂养兰——他选的全凭"看着喜欢"。\n\n他妻子问: "你买这些干嘛？"\n\n他说: "看。"\n\n妻子: "看什么？"\n\n他说: "就看着。"\n\n妻子摇头: "你也太闲了。"\n\n第一周他每天看 2 小时。第二周他开始研究兰花——但不是为了"养好"——是为了知道每一盆叫什么名字。第三周他写了一个本子——记录每一盆的状态。\n\n他妻子说: "你这样下去，可以开兰花店了——有商机。"\n\n他笑了笑没说话。\n\n那本子他没给任何人看。他不打算开店。他不打算"做成什么"。\n\n他就是想看着这 10 盆兰花。\n\n半年后，他朋友圈里同期退休的人——一个开始做自媒体（发挥余热）、一个开始做投资讲座（发挥余热）、一个开始做志愿者协会会长（发挥余热）。\n\n他和这些朋友聚餐——他们说他: "老周你怎么什么都不做？"\n\n老周说: "我在养兰花。"\n\n"养了多少盆？"\n\n"10 盆。"\n\n"卖多少钱？"\n\n"不卖。"\n\n"那你养它们干嘛？"\n\n老周想了想: "我就喜欢看它们。"\n\n朋友们换话题了。\n\n但 3 年后——老周和这些朋友重逢——他比所有"发挥余热"的同事都健康、都安静、都满足。\n\n开自媒体的那个——焦虑症了。开讲座的那个——血压上了。做协会的那个——天天和理事会斗争。\n\n老周还是在看兰花。\n\n他不"做"任何事。他只是存在、看、偶尔浇水。\n\n那位开自媒体的朋友某天问他: "你怎么这么平静？"\n\n老周想了 30 秒。他说: "因为我不想再被使用了。"\n\n朋友: "什么意思？"\n\n"我一辈子都在做有用的事。我成了被使用的工具——被公司用、被家庭用、被社会用。我现在做点没用的事——是因为我想做自己，不是做工具。"\n\n朋友愣住。\n\n老周继续: "你看一棵大树——它为什么能活几百年？因为它没用。木匠看不上它——所以它没人砍。\n\n人也一样。被使用得越多，活得越短。"\n\n朋友那天回家——把自媒体账号交给了助理。他开始什么都不做。\n\n3 个月后他血压降下来了。\n\n那年春节，老周妻子给他买了 5 盆新兰花。她说: "我也学着——养兰花吧。"\n\n老周笑了笑。',
        layers: {
          concept: '庄子《人间世》里有一个故事——一个匠人和他徒弟路过一棵巨大的栎树。徒弟以为师傅会赞美——但师傅说: "这是散木——没用的木头。所以它能活这么久。"\n\n庄子的洞察: 有用是危险的。一棵树木质好——会被做成家具，3 年后烂掉。木质坏——没人砍它，能活几百年。\n\n人也一样。被"用"得越多——你越快被消耗。\n\n这听起来像鼓励懒惰——但庄子的意思更深。他不是说不要做事——他是说: 不要让"有用"成为你做事的唯一理由。\n\n做一件事——可以为它本身。不为产出、不为别人的评价、不为"成为什么"——只为它本身。\n\n这种"无用"的事——往往才是真正塑造你的事。',
          now: '我们这个时代——所有事都要"有用"。\n\n你看书——朋友会问"有用吗"。\n你健身——是为了"对身体有用"。\n你交朋友——朋友圈被叫做"人脉" (有用)。\n你旅游——目的是"开阔眼界" (有用)。\n你做爱好——必须"变现"。\n\n所有事都被"用"绑架。\n\n庄子会说: 留 10% 的时间做完全"没用"的事。看云、听雨、和老朋友说废话、画一张没人看的画。\n\n这 10% 的"无用"——可能是你"有用"的 90% 之所以可承受的原因。',
          deeper: '"无用之用"最深的层面: 你自己也可以是"无用"的。\n\n你以为你的价值是: 你做了什么、你贡献了什么、你产出了什么。\n\n但如果你失业、生病、被裁——这些都没了——你还是你吗？\n\n大多数现代人答不出。因为他们把"我"和"我有用"等同了。\n\n庄子说: 你应该有一部分是"无用"的。那部分——别人砍不掉、市场夺不走、绩效衡量不到。\n\n那部分——才是真正的"你"。',
          links: { pre: ['齐物'], post: ['逍遥游'] },
        },

        body: '老李是某高端餐厅的主厨，30 年。\n\n他切肉的速度比所有徒弟都快——但他从不"用力"。\n\n年轻厨子小王跟他学了 3 年。他想不通老李怎么做到的。\n\n那天厨房没人。小王问: "李师傅，您怎么切得这么轻松？我用力切，刀很快就钝了。您用了一个月的刀还像新的。"\n\n老李停下手里的活，看了小王 5 秒。\n\n他没回答。他做了一件事——他拿出一块牛肩肉，放在案板上。\n\n"你来切。"\n\n小王拿起刀，开始切。3 分钟后牛肉切完了——刀刃上沾了油，他用了 70% 的力气。\n\n老李拿过另一块同样的牛肩肉。他没说话，开始切。\n\n小王在旁边看。\n\n老李切了 1 分钟。牛肉切完了——同样的厚度、同样的均匀——但刀刃几乎没沾油。\n\n小王看不出他用力。\n\n他问: "您是怎么——"\n\n老李说: "你试着不切。"\n\n小王愣: "什么意思？"\n\n"你刚才切的时候——你脑子里在想怎么切。你想着刀要怎么走、力要怎么用、角度要怎么调。"\n\n"对。"\n\n"我不想。"\n\n"那您想什么？"\n\n老李: "我看着牛肉。"\n\n小王不懂。\n\n老李把刀放下: "你看这块肉——你看见什么？"\n\n小王看: "牛肩肉。"\n\n老李: "再看。"\n\n小王盯着: "纹理。"\n\n老李: "再看。"\n\n小王盯了 30 秒: "我看到——肉块之间有一些……空隙？"\n\n老李笑了: "对。你的刀应该走那些空隙。不是切肉——是让肉自己分开。"\n\n小王第一次明白他做错了什么。\n\n他切肉时——他在"对抗"肉。他用刀"切开"肉的紧密部分——所以费力、刀钝。\n\n老李做的是——他看见肉本身已经有的"分开"的可能性——他的刀只是顺着那些可能性走。\n\n他不"切"——他让肉自己分开。\n\n那天小王试着这样做。\n\n第一刀——他还是用了 60% 的力气，因为他不习惯"看"。\n\n第二刀——他停下来，先盯着肉 10 秒。然后下刀——他用了 40% 的力气。\n\n第十刀——他第一次感到刀几乎是"自己"在走。\n\n他切完那块肉——刀刃干干净净。他比平时快了 2 倍。\n\n他抬头看老李——眼眶湿了。\n\n他不知道为什么。他只是突然明白了什么。\n\n那天下班，小王找老李喝酒。\n\n他问: "李师傅，您这套——能用在切肉之外吗？"\n\n老李喝了一口酒: "可以。"\n\n"用在哪？"\n\n"所有的事。"\n\n小王: "比如？"\n\n老李: "比如和你老婆吵架。"\n\n小王笑了。\n\n老李说: "你和老婆吵架——你是不是在切开她？你用语言切——一句你应该这样、一句你不应该那样。她抵抗——所以你越切越费力，她越伤越深。"\n\n"那应该怎么办？"\n\n"看她——看她真正的纹理在哪。她为什么生气？背后是什么？她想要的真正是什么？看清这些空隙——然后你的话顺着这些空隙说。"\n\n"你不是要切开她——你是要让她自己慢慢松开——松开她不舒服的那部分，留下你们的关系。"\n\n小王那天回家——和老婆吵了 3 个月的事——他第一次没"切"。\n\n他坐下来——看着她——10 秒。\n\n然后他说: "我可能没看清你。你跟我说说。"\n\n老婆哭了。\n\n他们没"和好"——他们做了别的。他们都看清了——那个吵架的根源——他妈每月来看他们的方式。\n\n第二天他和他妈说了一些话。\n\n3 个月没吵的架——从那天起减少了 80%。\n\n小王 35 岁——明白了庄子说的"庖丁解牛"。\n\n他后来 5 年——所有的事都用这套方法。\n\n40 岁那年他自己开了餐厅。他不再用力——他看。',
        layers: {
          concept: '《庄子·养生主》里的"庖丁解牛"——可能是中国哲学最有名的寓言。\n\n庖丁是宫廷里的厨师。他给国王解牛——刀划过去，肉和骨头自然分开。国王惊讶。\n\n庖丁说: "我开始解牛时，看到的是整头牛。3 年后，我看不到整头牛——我看到的只有空隙。又过几年——我用神去解，不用眼。"\n\n他的刀用了 19 年——还像新的。普通的屠夫一个月就要换刀。\n\n为什么？\n\n因为他不"切"——他顺着牛体的"天然结构"走。\n\n这是庄子最核心的"实践智慧"——顺势而行。',
          now: '"庖丁解牛"是所有专业领域的最高境界。\n\n好的厨师不"做菜"——他让食材自己呈现。\n好的医生不"治病"——他帮身体自己恢复。\n好的老师不"教"——他让学生自己看见。\n好的咨询师不"解决问题"——他帮来访者自己看清。\n好的产品经理不"设计"——他听用户真正的需要。\n好的销售不"说服"——他匹配需求。\n\n用力的人——是看不见结构的人。\n不用力——不是"放弃"——是真的看见了。',
          deeper: '"庖丁解牛"最深的层面: 这种"不用力"——需要 19 年的磨练。\n\n庖丁不是天生会的。他用 3 年从"看到整头牛"——到"看到部位"。再用几年——到"看到空隙"。\n\n每一步都需要练习。\n\n现代人常常误读: "顺势而行 = 躺平"。\n\n错。\n\n"顺势"是看清形势——这需要长期的训练。一个真正"顺势"的人——已经在"势"里浸泡了 10 年。\n\n他的"不用力"——是 10000 次"用力"的结果。',

      {
        conceptId: 'meng-die',
        title: '那个早晨她不知道自己是谁',
        protagonist: { name: '周岚', age: 38, occupation: 'CEO' },
        body: '周岚 38 岁。她是一家女性内衣电商品牌的创始人兼 CEO。她创业 10 年。公司年营收 8 个亿。\n\n那是一个普通的周三早上。\n\n她 6 点醒来。打开手机——27 条消息、12 个邮件、3 个紧急 Slack。她回了 5 分钟。\n\n然后她下床——洗漱、化妆、穿衣。\n\n她走到衣柜前。她有 200 件衣服——但她每天穿的都差不多——是符合她 CEO 形象的那几套。\n\n她拿了一件西装。\n\n她坐在镜子前——梳头。\n\n那一刻——她看着镜子里的自己——她突然不知道她是谁。\n\n她不是抑郁。她不是疲倦。她在最好的状态——公司在融 D 轮、估值 30 亿、她上了福布斯。\n\n但是镜子里那个人——她不认识。\n\n她试着问自己: 我是谁？\n\n第一反应: 我是周岚——LUME 的 CEO。\n\n但这是答案吗？\n\n她 10 年前的梦——是创办这家公司、成为这样的人。她梦了 10 年——她实现了。\n\n但是现在她在这个梦里——醒不出来了。\n\n她不知道——是她做了这个公司——还是这个公司做了她。\n\n她过去 10 年所有的选择——读什么书、见什么人、说什么话、穿什么衣服、想什么事——都被这个 CEO 周岚塑造。\n\n如果你今天把 CEO 周岚 拿走——剩下的那个人——她不认识。\n\n⋯\n\n她那天没去上班。\n\n她告诉助理: "我今天身体不舒服。"\n\n她在家里坐了 8 个小时。\n\n她试着想: 如果我不是 CEO——我会做什么？\n\n她答不出。\n\n她试着想: 我喜欢什么？\n\n她想了 10 分钟。\n\n第一个答案: 我喜欢工作。\n\n但是她知道这是被训练出来的答案。\n\n她试着再问: 我真正喜欢什么？\n\n她答不出。\n\n她 38 岁了——她在最成功的位置——她不知道自己真正喜欢什么。\n\n那天晚上她哭了。\n\n不是因为悲伤——是因为发现这件事——她以为她在做她的事——但她其实是被这个事做出来的。\n\n她是这家公司的产物——比这家公司是她的产物更彻底。\n\n⋯\n\n第二天她去上班——她照常开会、签字、做决定。\n\n但是她的内部——已经变了。\n\n她开始做一件事——每天给自己留 1 小时——这 1 小时她不能做 CEO 周岚 会做的事。\n\n第一周她不知道做什么。\n\n第二周她试着画画——她小时候喜欢的。她画了 6 张——画得很差。但是她画了。\n\n第三周她开始学陶艺——一个完全不有用的事。\n\n第四周她允许自己——不准备议程——和老朋友吃一顿饭——不谈工作。\n\n3 个月后她瘦了 4 斤——不是减肥——是因为她吃饭时不再用手机。\n\n6 个月后她做了一个决定——她不再做 D 轮融资。她让公司维持现状——不再追求估值 50 亿 的那个梦。\n\n董事会大反对。\n\n她说: "我已经在一个梦里 10 年了。我醒过来一次——我不想再回去。"\n\n⋯\n\n5 年后。\n\n周岚 43 岁。她的公司没有 更大 ——但她活得更 在 了。\n\n她有时候还会想起庄子的那个故事——庄周梦蝶。\n\n醒过来后他不知道——是他在梦蝶，还是蝶在梦他。\n\n她现在明白这个故事了。\n\n不是要回答这个问题——是要停下来问这个问题。\n\n因为只要你不问——你就一直是那只被梦做出来的 自己。',
        layers: {
          concept: '"庄周梦蝶" 出自《庄子·齐物论》的结尾——可能是中国哲学最深的隐喻之一。\n\n原文: "昔者庄周梦为蝴蝶，栩栩然蝴蝶也。自喻适志与！不知周也。俄然觉，则蘧蘧然周也。不知周之梦为蝴蝶与，蝴蝶之梦为周与？"\n\n庄周梦见自己变成蝴蝶——栩栩如生。醒来后——他不知道是庄周梦见自己变成蝴蝶，还是蝴蝶梦见自己变成庄周。\n\n这不是一个关于梦的故事。这是一个关于 "我" 的故事。\n\n你以为有一个稳定的"我"——这个我在做事、在选择、在喜欢、在恨。\n\n庄子说: 这个"我"——也是被梦做出来的。\n\n你今天的 "我"——是 30 年的家庭、教育、社会、工作、关系——一点一点梦出来的。换一个起点——你会是完全不同的人。\n\n所以"我"不是起点——"我"是结果。',
          now: '现代人比庄子时代更深地活在"梦"里。\n\n你 18 岁选大学——选了"有前途"的专业。但这个"前途"是谁的梦？\n\n你 25 岁结婚——选了"合适"的人。但这个"合适"是谁定义的？\n\n你 30 岁买房——为了"稳定"。但这个"稳定"是不是一个被推销给你的梦？\n\n你 35 岁做了"中产"——你以为这是你"选"的——但这条路径是 5 亿人在走的同一条路径。\n\n这不是选择。这是梦。你是被梦做出来的。\n\n醒过来不容易——但有一个时刻——你会突然不认识镜子里的人。\n\n那个时刻——你不要回避。那是庄子说的"觉"。',
          deeper: '"庄周梦蝶"最深的洞察: 醒来之后——也不要急着定义自己。\n\n大多数人醒来——立刻又找一个新的身份钻进去。"我不再是 CEO 了——我现在是一个 修行人 / 自由职业者 / 数字游民"。\n\n这只是换了一个梦。\n\n庄子的意思是: 不要急着回答"我是谁"。\n\n在"庄周"和"蝴蝶"之间——有一个"不知道"的位置。那个位置才是清醒的位置。\n\n大多数人受不了"不知道"——所以他们立刻找一个标签贴上去。\n\n真正的觉——是允许自己长时间不知道。',
          links: { pre: ['齐物'], post: ['心斋'] },

        protagonist: { name: '苏婉', age: 38, occupation: 'GIS 工程师' },
        body: '苏婉做 GIS 地图 12 年。她做过城市规划地图、交通图、地下管线图。她相信——好的地图是对世界精准的"图像"。\n\n那年她接了一个市政项目——给某区做一份"绿地资源图"。她做得很专业: 卫星图测面积，分类标注，颜色编码: 深绿是树林、浅绿是草坪、灰绿是城市公园。\n\n她交了图。\n\n两个月后她路过那个区做的一个"公园"。地图上标的是浅绿——3.2 公顷的草坪。\n\n她到现场——发现"草坪"上住着 30 个无家可归的人。他们搭了简易帐篷。这些人在这里住了 4 年。\n\n她的地图上没有他们。\n\n不是地图错了——是地图的"图像系统"里没有"无家可归者居住区"这个分类。地图的分类是: 树林/草坪/公园/绿化带。无家者不算分类。\n\n所以在地图上——他们不存在。\n\n她回家想了 3 天。\n\n她意识到——她过去 12 年做的每一张地图——都是一个"图像"。但每一幅图——都是从某个角度画的。\n\n她做的"绿地图"——是从市政"绿化指标"的角度画的。在那个角度里——3.2 公顷是 3.2 公顷的草坪。\n\n但是同样这 3.2 公顷——从"住房短缺"的角度——是 30 个人的家。\n\n两幅图都对——但它们图的是完全不同的东西。\n\n语言也一样。她突然懂了。\n\n你说"这是一个公园"——这句话是一幅图。但这幅图——从"市政绿化"的角度画——只看到草坪。从"无家者"的角度画——看到的是家。\n\n你说出的每一句话——都是一幅图。每一幅图——都有它的视角和它看不见的东西。\n\n⋯\n\n苏婉做了一件 12 年没做过的事。\n\n她在那张"绿地图"上——加了一层新的分类: "非正式居住"。她标了那 30 个人住的地方——和另外 7 个她后来调研出来的地方。\n\n她交了第二版图。\n\n甲方很恼火: "你这是什么意思？我们要的是绿地资源图——不是无家者地图。"\n\n苏婉: "我知道。但是这两张图——画的是同一片土地——只是看的角度不同。如果你们的政策要让这 3.2 公顷再绿一点——你们可能会驱赶这 30 个人。我做这版图——是让你们知道你们要做的事。"\n\n甲方还是用了第一版。\n\n但是 6 个月后——甲方的项目经理私下找苏婉: "我后来跟我们领导提了你那个第二版。我们没驱赶。我们建了一个临时的安置房——把这 30 个人安顿到了别的地方——然后再做绿化。"\n\n苏婉没说话。她只是想——多了一幅图——可能改了一件事。\n\n⋯\n\n那之后她变了。\n\n她做的每一张图——都开始写一行小字: "本图基于以下分类系统：xxx。其他视角下的同一土地可能不同。"\n\n她知道——没有"客观"的地图。每一张图都是从某个位置画的图像。\n\n但她也知道——这不是说图没有用。图很有用。但用图的人——要记得这是哪一幅图。\n\n维特根斯坦在《逻辑哲学论》里说: "命题是现实的图像。"\n\n苏婉觉得他说对了——但还差一句:\n\n"——每一幅图，都是从某个位置画的。"',
        layers: {
          concept: '维特根斯坦在他第一本书《逻辑哲学论》(1921) 里提出"图像论"——这是他 32 岁前的核心思想。\n\n基本意思: 语言之所以能描述世界——是因为命题和世界共享一个"逻辑形式"。一句话——像一幅画——画出了世界的某个状态。\n\n"猫在垫子上"——这句话是世界状态的图像。其中"猫"对应一只猫，"垫子上"对应一个位置关系。\n\n这看起来很直接——但它的革命性在于: 它解释了为什么我们能用语言谈论从未发生的事。\n\n你可以说"猫在月亮上"——这句话也是一幅图。它不真实——因为它对应的世界状态不存在。但它仍然是一幅可理解的图。\n\n关键洞察: 一句话能被理解 = 它能被画成一幅图。\n\n反过来: 不能被画成图的"语句"——它根本不是在说什么。',
          now: '今天我们对"图像"的理解比 1921 年深得多。\n\n地图、数据可视化、PPT、社交媒体头像、产品 UI——全都是图像。\n\n但维特根斯坦的关键洞察今天更重要: 每一幅图——都是从某个角度画的。\n\n你看到的"经济增长率"——是一幅图。它从"国家整体"的角度画。同样这个数字——从"普通家庭"角度画——是完全不同的图。\n\n你看到的"幸福指数"——是一幅图。从"心理学家"角度画——只看自我报告的满意度。从"社会学家"角度画——还要看不平等、归属感、社会支持。\n\n你今天每一刻都在"读图"——但你常常忘了问: 这是从哪里画的图？',
          deeper: '"图像论"最深的层面: 维特根斯坦后来推翻了自己。\n\n《逻辑哲学论》的图像论说: 语言 = 图像。\n\n但 1930 年代他写《哲学研究》时说: "我错了。"\n\n语言不只是画图。语言还在做事——许诺、命令、问候、辱骂、安抚、玩笑。这些不是在画世界——是在世界中行动。\n\n但即使是"行动"——也包含"图像"的层面。当你说"对不起"——你在做一件事(道歉)——但你的话也画了一幅图(你认为某件事错了)。\n\n苏婉的地图——既是图像，也是行动。她加了"非正式居住"这一层——既画了一幅新图，也做了一件事(让政策者看见之前看不见的人)。\n\n图像和行动——是同一件事的两面。',

      {

        title: '她写不出来的那封信',
        protagonist: { name: '顾岚', age: 42, occupation: '心理咨询师' },
        body: '顾岚 42 岁。她做心理咨询师 14 年。她的母亲被诊断胰腺癌晚期——医生说"3 个月"。\n\n她想给妈妈写一封信。\n\n她想说的事很多。她妈妈这一辈子——对她严苛但隐藏的爱。她想说她懂了。她想说她原谅了那些她小时候不能原谅的事。她想说她感谢。她想说她爱她。\n\n她坐在桌前 3 个小时——写了 10 个版本。\n\n第一版: "妈，谢谢您一辈子的付出。"\n她读了一遍——撕了。这话太空。她妈妈听过 1000 次"谢谢付出"——这话已经没意义了。\n\n第二版: "妈，您知道吗——我小时候那次您打我——我现在懂您是为我好。"\n她撕了。这话像在给妈妈"开脱"——可能她妈妈根本不需要开脱，可能她自己内心其实没完全和解。\n\n第三版: "妈，我爱您。"\n她撕了。她说不出口"我爱您"——她妈妈从来没说过——她也从来没说过。这三个字在她们的关系里——没有位置。她写出来——感觉是在演一部别人的戏。\n\n第四版到第十版——每一版都被撕。\n\n她突然意识到一件事——\n\n她和她妈妈之间——重要的那些东西——根本没法说。\n\n不是因为她词汇不够。她是心理咨询师——她每天用词形容情感。\n\n是因为——她和她妈妈之间这 42 年——是用沉默搭起来的。不是冷漠的沉默——是充满意义的沉默。妈妈一句"少穿这件衣服"——她懂那不是嫌弃，是怕她冷。妈妈一个眼神——她懂那是骄傲。妈妈把饺子皮擀得比别人都薄——她懂那是爱。\n\n这些她都"懂"——但都说不出来。\n\n如果她现在把这些"说出来"——就是把它们简化了、平庸了、变成一封情感咨询师写的得体信。\n\n她不要那种信。\n\n⋯\n\n她做了一件不像她的事。\n\n她拿了一张空白的信纸。\n\n上面她写了她的签名——"小岚"。她妈妈小时候叫她小岚。\n\n就这两个字。\n\n她把这张纸装进信封。\n\n3 天后她去医院。她把信封递给她妈妈。\n\n她妈妈打开——看着那张几乎空白的纸——上面只有"小岚"。\n\n她妈妈看了 10 秒。\n\n然后她妈妈笑了。然后她妈妈哭了。\n\n她妈妈说: "你长大了。"\n\n顾岚也哭了。她妈妈说的"你长大了"——什么意思？她妈妈在哭什么？她妈妈在笑什么？\n\n她不知道。\n\n但她妈妈知道。她也知道。\n\n这就够了。\n\n⋯\n\n6 周后她妈妈走了。\n\n顾岚后来在工作里——开始更小心地用语言。\n\n她跟来访者说: "你说不出来的——也是真的。你只是不知道我怎么也能懂。但我懂——可能不是因为你说了什么——是你站在这里的样子、你的眼神、你刚才停顿的 5 秒。"\n\n来访者哭了。\n\n顾岚知道——很多最重要的事——不能说。它们只能显示。\n\n维特根斯坦在《逻辑哲学论》最后说: "存在着不可言说的东西。它显示自己。它是神秘的。"',
        layers: {
          concept: '"说" (sagen) 和 "显示" (zeigen) 的区别——是维特根斯坦《逻辑哲学论》最深的区分之一。\n\n他说: 有些东西可以被说出来——比如事实。"今天下雨"是事实，可以说。\n\n但有些东西不能被说——只能显示。比如:\n- 一句话和它描绘的事实之间的逻辑关系——不能被另一句话说出来，否则就要无穷倒退。\n- 伦理价值不能被说——一个人的善——通过他的行为显示。\n- 美学不能被说——通过艺术品本身显示。\n- 一个人对另一个人的爱——不能被一句话说出来——通过 30 年的相处显示。\n\n这不是"语言不够好"。这是逻辑上的不可能——任何"说"都已经在使用某个框架——而那个框架本身不能在这个框架内被说。',
          now: '现代人有一种病: 想把一切都"说"出来。\n\n你的感受——必须能用情感词描述。\n你的关系——必须能用"我们这是什么状态"定义。\n你的工作——必须能用 30 秒电梯陈述总结。\n你的人生——必须能写成一篇朋友圈。\n\n社交媒体把这个推到了极端——所有体验都必须被翻译成可发布的内容。\n\n但顾岚知道一件事——她最深的关系，是用沉默搭起来的。最重要的事，靠"显示"传达。\n\n你妈擀饺子皮比别人都薄——这"显示"了什么——没人能说。但你懂。\n\n现代人正在丢失"懂得不可说之事"的能力——因为我们太习惯把一切翻译成可说的。',
          deeper: '"显示"最深的层面: 显示不是"暗示"。\n\n暗示是: 我没说但我让你猜。这还是在"说"——只是用了别的方式。\n\n显示是: 这件事本来就不在"说/不说"的层面上。它是它自己——通过存在显示出来。\n\n顾岚的空白信——不是"她暗示了爱"。是"她和她妈妈的关系本身——通过那个空白信——成了一个事件"。\n\n那个事件——超出了"说了什么"和"没说什么"的对立。\n\n这种显示——只能在最高的诚实之中发生。任何想"利用"显示的人——比如故意空白来让对方感动——都失败了。因为他们还在"说"——只是用沉默来说。\n\n真正的显示——是你停止"说"——而你的存在本身——成了它的语言。',

      {
        conceptId: 'mystical',
        title: '他在 ICU 的 7 天',
        protagonist: { name: '老陈', age: 56, occupation: '工程师' },
        body: '老陈 56 岁。他女儿 26 岁——一个温柔的姑娘——刚从国外留学回来——开车去见男朋友的路上撞了护栏。\n\nICU。\n\n第一天医生说: "情况很危险。但是有希望。"\n\n第一天来了很多人。同事、亲戚、朋友。\n\n他们都说话。\n\n"老陈，你不要太悲伤。"\n"老陈，你要坚强。"\n"老陈，往好的想——医学很发达。"\n"老陈，这是劫，过去就好了。"\n"老陈，我们都为你祈祷。"\n"老陈，需要钱跟我说，多少都行。"\n\n老陈听着——一句都没回应。他不是不感激这些人。他知道他们都是好意。\n\n但是他们说的每一句话——他都觉得不对。\n\n不是"事实"上的错——是"层次"上的错。\n\n他女儿可能再也醒不过来——这件事——和"不要悲伤"、"要坚强"、"医学发达"、"过去就好"——不在一个层面上。\n\n那些话——好像在试图把这件事"装进"一个可以被处理的框架里。但这件事——不在任何框架里。\n\n它就这么大。它没有"道理"。它没有"出口"。它没有"应该怎么想"。\n\n它就在那。\n\n他没办法用语言抓住它——他自己也不能。\n\n⋯\n\n第三天的凌晨 3 点。\n\nICU 外面只剩下他一个人。他妻子去了医院旁边的酒店休息。\n\n清洁工进来扫地。\n\n那是一个 50 岁左右的女人。她默默扫了一遍走廊。\n\n她扫完——经过老陈面前——停了一下。\n\n她没说话。\n\n她从她的清洁车上拿出一个保温杯——倒了一杯热水——递给老陈。\n\n然后她继续往前扫。\n\n老陈拿着那杯水——哭了。\n\n他从看见女儿被推进 ICU 那一刻起——第一次哭。\n\n这个清洁工——她可能不知道发生了什么。她可能只是看到一个守了 3 天没睡的男人。她什么都没说。她只是给了他一杯水。\n\n但是她做的这件事——是这 3 天来——唯一对的事。\n\n所有其他人——说了 1000 句话——都不如这杯水。\n\n因为这杯水——它不在"说"的层面上。它在事件本身的层面上。它不试图"解释"或"安慰"。它就是"在"——和他一起在。\n\n那一刻老陈懂了一件——他之前 56 年没懂的事。\n\n有些事——根本不应该说。\n\n说——本身就是一种逃避。你想用语言去"框住"一件事——你就是不想真正面对它。你想用语言去"安慰"一个人——你就是不想真正陪伴他。\n\n面对真正的痛苦——唯一对的事——是沉默和在场。\n\n维特根斯坦说过一句话: "凡是不可说的，必须保持沉默。"\n\n老陈以前以为这是哲学家的玄虚。\n\n那一夜他懂了——这是一个非常具体的、实用的、关于怎么活的指令。\n\n⋯\n\n第七天。\n\n他女儿醒了。\n\n医生说: "奇迹。"\n\n他女儿之后做了 8 个月的康复。她能走能说能笑。她回了原来的工作。\n\n老陈变了。\n\n他变成了一个说很少话的人。\n\n他同事说他变冷漠了。其实他不是。他比以前更深地在场——只是他不说出来。\n\n他的女儿后来跟他说: "爸，你以前话多——我都不知道你内心在想什么。你现在话少了——我反而觉得我懂你了。"\n\n老陈笑了。\n\n他想——他的清洁工朋友——那个递给他热水的女人——他从此以后每次在医院里看见清洁工——他都点头微笑。\n\n他从来没问过她的名字。\n\n他不需要。',
        layers: {
          concept: '《逻辑哲学论》最后一条命题(7) 是哲学史上最有名的一句话:\n\n"凡是不可说的，必须保持沉默。" (Wovon man nicht sprechen kann, darüber muss man schweigen.)\n\n这句话常被误读为: "玄学是胡说，闭嘴吧。"\n\n错。\n\n维特根斯坦的意思更精微: 有一类东西——是真实的、重要的、最重要的——但是它们超出了语言的边界。\n\n这些东西包括: 伦理的绝对性、美、上帝、生命的意义、死亡的意义、爱、痛苦的本质。\n\n这些东西——不能被"说"——因为任何"说"都会把它们降级为可处理的概念。但它们是真实的——它们以"显示"的方式存在。\n\n维特根斯坦称这个层面为"神秘的" (das Mystische)。\n\n他不是说这些东西不存在——是说这些东西不在"说"的层面。',
          now: '现代人对"神秘"有两种错误反应:\n\n一: 把它降级。把痛苦说成"情绪管理问题"、把死亡说成"生命周期"、把爱说成"多巴胺"、把美说成"审美偏好"。这是科学主义的话语暴力——把不可言说的强行翻译成可量化的。\n\n二: 把它神秘化。说"这是上帝的安排"、"这是命运"、"这是业力"——用一个神秘的词替换另一个不能说的事。这其实还是"说"——只是用了玄学的话术。\n\n维特根斯坦的"沉默"不是上面两种。\n\n它是: 你站在事件面前——不试图把它装进任何框架——你只是在场。你的存在本身是对它的最高尊重。\n\n这非常难。我们的训练让我们一遇到痛苦就想"做点什么"、"说点什么"。\n\n真正的对待——是不做、不说、只在。',
          deeper: '"神秘的"最深的层面: 它不是"还没被说的"——是"原则上不能被说的"。\n\n你今天不能解释清楚——但科学发达了未来能解释——这种"不能"不算神秘。\n\n维特根斯坦说的神秘——是逻辑上不能被说的。\n\n你为什么爱一个人？任何回答——"因为她善良"、"因为她聪明"——都不是答案。因为善良聪明的人很多——你不是爱所有的。"我就是爱她"——这才是真相——但它已经是沉默。\n\n生命的意义是什么？任何回答都是空。但是当你在 ICU 守 7 天——你的女儿握你的手——你懂了。这个懂——不在词里。\n\n维特根斯坦说: "生命问题的解决在生命问题的消失中显示出来。"\n\n意思是: 那些重要的问题——不是有答案——是当你活得对的时候——问题自己消失了。',

        body: '杨惟 36 岁。她是国内某互联网大厂的产品总监。\n\n她 28 岁的时候——读了一本叫《精益创业》的书——里面讲了一套产品方法论: MVP、用户访谈、漏斗、A/B测试、北极星指标。\n\n她按照这套方法论——从一个新人 product manager——做到了总监。\n\n她做了一件她引以为傲的事——把这套方法论本土化、系统化——写成了一本中文书。\n\n《产品经理的 12 个工作流》——卖了 5 万本。\n\n她成了行业里的 KOL。她开课。她做咨询。她给 30 家公司讲过这套体系。\n\n但是 36 岁那年——她做了一件让她团队震惊的事。\n\n她在公司内部开了一个会——叫所有产品经理来。她说:\n\n"我要宣布一件事。从今天起——我不再要求大家按那 12 个工作流做事。"\n\n团队懵了。\n\n她说: "那 12 个流程——是脚手架。是给一个不会做产品的人——一个起点。\n\n"我用它 8 年。它让我从不会到会。\n\n"但是——它现在成了我做产品的障碍。\n\n"上周我做那个新产品——我一开始按流程走: 用户访谈、漏斗设计、MVP。\n\n"我做出来的东西——是 行业标准 ——但它没有灵魂。\n\n"我退了一步——把流程扔掉——我重新去看用户。我没有访谈大纲。我没有指标。\n\n"我只看着她。我和她吃饭。我们 4 个小时。\n\n"我懂了一件事——是任何漏斗都不会告诉我的事。\n\n"那个产品——我重做了。比第一版好十倍。"\n\n团队问她: "那我们以后怎么办？没有流程怎么做产品？"\n\n杨惟笑了: "你们现在不一样。你们用流程用了几年——你们已经在流程里了。\n\n"对新人——流程是脚手架——他们应该学。\n\n"对你们——继续按流程——你们就被流程困住了。\n\n"流程教你的——是它能教的。它教不了你的——你只能扔了它才能学。"\n\n⋯\n\n3 个月后——杨惟做了一件更让大家震惊的事。\n\n她在她那本 5 万册的畅销书的修订版扉页——加了一段话:\n\n"读完这本书的人——请把这本书扔掉。\n\n"如果你还在用这本书做产品——你没真懂这本书。\n\n"这本书教你 12 个流程——但产品最重要的——是你自己看见的能力。\n\n"流程是梯子——梯子是为了让你爬到上面去。\n\n"爬上去之后——你的位置在那个梯子之上。\n\n"如果你还抓着梯子不放——你就站在了梯子上——而不是它带你去的那个地方。\n\n"扔掉梯子。"\n\n出版社不太理解——但还是印了。\n\n书反而卖得更好了。\n\n那是 2024 年初。她在朋友圈写: "我用了 8 年——才学会扔掉自己写的书。"\n\n维特根斯坦在《逻辑哲学论》的倒数第二条命题写道:\n\n"我的命题是这样起作用的: 任何理解我的人，最终都把它们认作是无意义的——当他通过它们爬上去——超越了它们之后。(他必须扔掉梯子——在他爬上之后。)"\n\n杨惟从来没读过维特根斯坦。\n\n但是 100 年——一个人在做产品——和一个哲学家在写哲学——发现了同一件事。',
        layers: {
          concept: '《逻辑哲学论》6.54——维特根斯坦说出了一句让所有读者都困惑的话:\n\n"任何理解我的人——最终会发现我的话是无意义的。他用我的话——爬到一个更高的位置——然后他必须把我的话当作梯子扔掉。"\n\n这段话非常重要——它彻底改变了哲学的自我理解。\n\n传统哲学认为: 哲学的真理 = 哲学的命题正确。如果亚里士多德说的对——那他的话本身是真理。\n\n维特根斯坦说: 不。哲学的目的不是说出正确的命题。是把你带到一个新的位置。到了那个位置——那些命题就不再是"真理"——它们是脚手架。\n\n这种自我消解的姿态——在哲学史上是革命性的。它意味着: 哲学不像科学——不积累命题。哲学是治疗——治好了——治疗的工具就该扔了。',
          now: '"梯子"是所有"工具"和"理论"的共同处境。\n\n你刚学开车——你有一套规则: 看后视镜、打转向灯、踩刹车、踩油门。\n你 10 年后开车——你不"想"这些规则。你的身体会做。\n\n你刚学英语——你查词典、记语法。\n你 5 年后说英语——你不查词典。你的脑子直接想英语。\n\n你刚做投资——你有一套理论: 估值模型、行业研究、组合分配。\n你 15 年后做投资——你看一眼报告就知道这个公司——你的判断超过了理论。\n\n所有"专家"——都是这样形成的。从规则——到内化——到超越规则。\n\n维特根斯坦的洞察: 这个 超越 是必要的。如果你 15 年了还在用第一年的规则——你不是 专家——你是 严格的初学者。',
          deeper: '"梯子"最深的层面: 它不是"工具用完就丢"——是"工具是为了让你成为另一个人"。\n\n如果工具只是工具——你可以一直用——锤子你 30 年都还在用同一个锤子。\n\n但梯子不是锤子。梯子是为了把你从 A 带到 B。到了 B——你就在 B 了——不再在梯子上。\n\n这意味着: 哲学不是给你 知识。哲学是改变你 是谁。\n\n你读了维特根斯坦——你不应该多了几个 哲学知识点 ——你应该变成了另一个看世界的人。\n\n如果你读完还在用 维特根斯坦说……来开篇——你没读懂。\n\n你应该: 不引用他。但你看待 语言、说话、沉默的方式——已经不一样了。\n\n这才是 扔掉梯子 的真意。',
          links: { pre: ['神秘的'], post: ['语言游戏'] },
        },
