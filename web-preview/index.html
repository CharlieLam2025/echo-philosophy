<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>回声 · Echo</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  background: #000;
  scroll-behavior: smooth;
  --accent: rgba(245,241,232,0.3);
  --accent-soft: rgba(245,241,232,0.12);
  --accent-strong: rgba(245,241,232,0.45);
}
html[data-philosopher="nietzsche"] {
  --accent: rgba(196,164,105,0.45);
  --accent-soft: rgba(196,164,105,0.15);
  --accent-strong: rgba(220,185,120,0.6);
}
html[data-philosopher="stoic"] {
  --accent: rgba(150,170,180,0.45);
  --accent-soft: rgba(150,170,180,0.15);
  --accent-strong: rgba(170,190,200,0.6);
}
html[data-philosopher="camus"] {
  --accent: rgba(200,130,100,0.45);
  --accent-soft: rgba(200,130,100,0.15);
  --accent-strong: rgba(220,150,115,0.6);
}
html[data-philosopher="foucault"] {
  --accent: rgba(165,140,185,0.45);
  --accent-soft: rgba(165,140,185,0.15);
  --accent-strong: rgba(185,160,205,0.6);
}
body {
  min-height: 100%;
  color: #f5f1e8;
  font-family: 'Cormorant Garamond', 'Songti SC', 'STSong', Georgia, 'Times New Roman', serif;
  background: #000;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ── Grain texture overlay ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 9999;
}

/* ── Screens with transitions ── */
.screen { display: none; min-height: 100vh; opacity: 0; }
.screen.active { display: block; animation: screenIn 0.5s ease-out forwards; }
.screen.screen-exit { animation: screenOut 0.3s ease-in forwards; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Story slides in from right */
#story-screen.active { animation: slideInRight 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Journal slides up */
#journal-screen.active { animation: slideInUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Map (concept list) ── */
.map-header {
  padding: calc(48px + env(safe-area-inset-top, 32px)) 28px 12px;
  font-size: 13px;
  opacity: 0.35;
  letter-spacing: 0.15em;
}
.map-progress {
  padding: 0 28px 12px;
  font-size: 12px;
  opacity: 0.18;
  letter-spacing: 0.05em;
}
.map-bar {
  margin: 0 28px 24px;
  height: 2px;
  background: rgba(245,241,232,0.06);
  border-radius: 1px;
  overflow: hidden;
}
.map-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.6s ease;
}
.concept-list { padding: 0 0 80px; }
.concept-card {
  display: block;
  width: 100%;
  padding: 22px 28px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(245,241,232,0.06);
  color: #f5f1e8;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: opacity 0.2s;
}
.concept-card:focus { outline: none; }
.concept-card.locked {
  opacity: 0.2;
  cursor: default;
}
.concept-card.read { opacity: 0.5; }
.concept-name {
  font-size: 19px;
  line-height: 1.5;
  margin-bottom: 4px;
}
.concept-orig {
  font-size: 12px;
  opacity: 0.35;
  font-style: italic;
  margin-left: 8px;
}
.concept-brief {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.5;
}
.concept-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  border: 1px solid var(--accent-strong);
  background: transparent;
  margin-right: 12px;
  vertical-align: middle;
  transition: background 0.3s, border-color 0.3s;
}
/* Unlocked but not read: hollow circle */
.concept-card:not(.locked):not(.read) .concept-dot {
  border-color: var(--accent-strong);
}
/* Read: filled circle */
.concept-card.read .concept-dot {
  background: var(--accent);
  border-color: var(--accent);
}
/* Locked: dashed faint circle */
.concept-card.locked .concept-dot {
  border-color: rgba(245,241,232,0.15);
  border-style: dashed;
}
.concept-card.depth-0 { padding-left: 28px; }
.concept-card.depth-1 { padding-left: 44px; }
.concept-card.depth-2 { padding-left: 60px; }
.concept-card.depth-3 { padding-left: 76px; }
.concept-card.depth-4 { padding-left: 92px; }

/* Scroll-reveal: cards start invisible, JS adds .revealed */
.concept-card {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s ease, background 0.6s ease;
}
.concept-card.revealed {
  transform: translateY(0);
}
.concept-card.revealed:not(.locked) { opacity: 1; }
.concept-card.revealed.locked { opacity: 0.2; }
.concept-card.revealed.read { opacity: 0.5; }

/* Newly-unlocked glow */
.concept-card.just-unlocked {
  background: rgba(245,241,232,0.04);
  animation: unlockPulse 1.5s ease-out forwards;
}
@keyframes unlockPulse {
  0% { background: rgba(245,241,232,0.08); }
  100% { background: transparent; }
}

/* Tap ripple */
.concept-card:not(.locked)::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--tap-x,50%) var(--tap-y,50%), rgba(245,241,232,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.concept-card:not(.locked):active::after { opacity: 1; }
.concept-card { position: relative; overflow: hidden; }

/* ── Story reader ── */
.story-back {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(16px + env(safe-area-inset-top, 32px)) 20px 16px;
  background: linear-gradient(to bottom, #000 60%, transparent);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  opacity: 0.5;
  padding: 12px 8px;
  margin: -12px -8px;
}
.back-btn:focus { outline: none; }
.back-btn:active { opacity: 0.8; }
.story-concept-label {
  font-size: 12px;
  opacity: 0.3;
  letter-spacing: 0.1em;
}

.story-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.story-title {
  font-size: 28px;
  line-height: 1.5;
  margin-bottom: 12px;
}
.story-meta {
  font-size: 12px;
  opacity: 0.25;
  margin-bottom: 48px;
}
.story-body {
  font-size: 17px;
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: break-word;
}
.story-body p { margin-bottom: 1.2em; }
.story-body p:first-child::first-letter {
  font-size: 3.2em;
  float: left;
  line-height: 0.8;
  margin: 6px 10px 0 -2px;
  opacity: 0.85;
  font-weight: 400;
}

/* ── Reading progress bar ── */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 2px;
  background: rgba(245,241,232,0.2);
  z-index: 50;
  transition: width 0.15s linear;
  pointer-events: none;
}

/* ── Reading time estimate ── */
.story-reading-time {
  font-size: 11px;
  opacity: 0.15;
  margin-top: 4px;
}

/* ── Layers ── */
.layers-section {
  margin-top: 80px;
  border-top: 1px solid rgba(245,241,232,0.08);
  padding-top: 48px;
}
.layer-tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(245,241,232,0.08);
}
.layer-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 14px;
  padding: 12px 0;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.2s;
  border-bottom: 2px solid transparent;
}
.layer-tab:focus { outline: none; }
.layer-tab.active {
  opacity: 0.95;
  border-bottom-color: var(--accent-strong);
  color: #f5f1e8;
}
.layer-content {
  font-size: 15px;
  line-height: 1.8;
  word-break: break-word;
  min-height: 120px;
}
.layer-content p { margin-bottom: 1.1em; }

/* ── Links ── */
.links-section {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid rgba(245,241,232,0.06);
}
.links-label {
  font-size: 12px;
  opacity: 0.25;
  margin-bottom: 12px;
}
.link-chip {
  display: inline-block;
  background: transparent;
  border: 1px solid rgba(245,241,232,0.12);
  color: #f5f1e8;
  font-family: inherit;
  font-size: 13px;
  padding: 6px 14px;
  margin: 0 8px 8px 0;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.link-chip:hover { opacity: 0.8; }
.link-chip:focus { outline: none; }

/* ── Reflect ── */
.reflect-section {
  margin-top: 60px;
  padding: 32px 24px 28px;
  border: 1px dashed var(--accent-soft);
  border-radius: 4px;
  margin-bottom: 60px;
  position: relative;
}
.reflect-section::before {
  content: '✎';
  position: absolute;
  top: -12px;
  left: 20px;
  background: #000;
  padding: 0 8px;
  font-size: 14px;
  opacity: 0.4;
  color: #f5f1e8;
}
.reflect-prompt {
  font-size: 15px;
  opacity: 0.4;
  margin-bottom: 20px;
  line-height: 1.6;
}
.reflect-input {
  width: 100%;
  min-height: 120px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(245,241,232,0.06);
  outline: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 16px;
  line-height: 1.75;
  resize: none;
  padding-bottom: 16px;
}
.reflect-input:focus {
  border-bottom-color: rgba(245,241,232,0.15);
}
.reflect-input::placeholder { color: rgba(245,241,232,0.12); }
.reflect-save {
  display: block;
  margin-top: 20px;
  margin-left: auto;
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  padding: 8px 4px;
  opacity: 0.5;
}
.reflect-save:hover { opacity: 0.8; }
.reflect-save:focus { outline: none; }

/* ── Markdown-like rendering ── */
.rendered strong { font-weight: 600; }
.rendered em { font-style: italic; }
.rendered blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 18px;
  margin: 20px 0;
  opacity: 0.78;
  font-style: italic;
}
.rendered ul {
  list-style: none;
  padding-left: 0;
  margin: 12px 0;
}
.rendered li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 6px;
  line-height: 1.8;
}
.rendered li::before {
  content: '\B7';
  position: absolute;
  left: 2px;
  opacity: 0.35;
}

/* ── Horizontal rule ── */
.rendered hr {
  border: none;
  border-top: 1px solid rgba(245,241,232,0.08);
  margin: 28px 0;
}

/* ── Section ornament ── */
.section-divider {
  text-align: center;
  padding: 48px 0 12px;
  font-size: 14px;
  opacity: 0.12;
  letter-spacing: 1em;
}

/* ── Tap feedback ── */
.concept-card:not(.locked):active { opacity: 0.7; }
.link-chip:active { opacity: 0.9; }
.layer-tab:active { opacity: 0.6; }

/* ── Home screen ── */
.home-header {
  padding: calc(72px + env(safe-area-inset-top, 32px)) 28px 8px;
  font-size: 11px;
  opacity: 0.2;
  letter-spacing: 0.35em;
}
.home-title {
  padding: 0 28px 6px;
  font-size: 28px;
  line-height: 1.4;
  opacity: 0.85;
}
.home-subtitle {
  padding: 0 28px 12px;
  font-size: 12px;
  opacity: 0.12;
}
.home-quote {
  padding: 0 28px 48px;
  font-size: 13px;
  line-height: 1.7;
  opacity: 0.18;
  font-style: italic;
  max-width: 320px;
  transition: opacity 0.8s ease;
}
.philosopher-list { padding: 0 0 80px; }
.philosopher-card {
  display: block;
  width: 100%;
  padding: 28px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(245,241,232,0.06);
  color: #f5f1e8;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s, background 0.3s;
  position: relative;
}
.philosopher-card:focus { outline: none; }
.philosopher-card:active { opacity: 0.85; transform: scale(0.985); }
.philosopher-card:hover { background: rgba(245,241,232,0.02); }
.philosopher-name {
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 2px;
}
.philosopher-orig {
  font-size: 12px;
  opacity: 0.25;
  font-style: italic;
  margin-left: 8px;
}
.philosopher-dates {
  font-size: 11px;
  opacity: 0.15;
  margin-bottom: 10px;
}
.philosopher-question {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.45;
  margin-bottom: 8px;
}
.philosopher-progress {
  font-size: 11px;
  opacity: 0.15;
}
.philosopher-bar {
  margin-top: 10px;
  height: 2px;
  background: rgba(245,241,232,0.06);
  border-radius: 1px;
  overflow: hidden;
  max-width: 200px;
}
.philosopher-bar-fill {
  height: 100%;
  background: rgba(245,241,232,0.25);
  border-radius: 1px;
  transition: width 0.4s ease;
}
.philosopher-card[data-philosopher] .philosopher-bar-fill { background: var(--card-accent, rgba(245,241,232,0.25)); }
.philosopher-card[data-philosopher="nietzsche"] { --card-accent: rgba(196,164,105,0.45); }
.philosopher-card[data-philosopher="stoic"] { --card-accent: rgba(150,170,180,0.45); }
.philosopher-card[data-philosopher="camus"] { --card-accent: rgba(200,130,100,0.45); }
.philosopher-card[data-philosopher="foucault"] { --card-accent: rgba(165,140,185,0.45); }
.philosopher-card::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 2px; height: 40px;
  margin-top: -20px;
  background: var(--card-accent, rgba(245,241,232,0.15));
  opacity: 0.5;
  transition: opacity 0.3s, height 0.3s;
}
.philosopher-card:hover::before { opacity: 0.9; height: 60px; margin-top: -30px; }

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 1;
  transition: opacity 0.4s ease;
}
.loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loading-dots { font-size: 18px; opacity: 0.2; letter-spacing: 0.3em; }
@keyframes pulse { 0%,100%{ opacity:0.15 } 50%{ opacity:0.4 } }
.loading-dots { animation: pulse 1.2s ease-in-out infinite; }

/* ── Journal screen ── */
.journal-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(16px + env(safe-area-inset-top, 32px)) 20px 16px;
  background: linear-gradient(to bottom, #000 60%, transparent);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
.journal-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.journal-title {
  font-size: 22px;
  margin-bottom: 32px;
  opacity: 0.6;
}
.journal-empty {
  font-size: 15px;
  opacity: 0.2;
  line-height: 1.8;
  padding-top: 40px;
}
.journal-entry {
  margin-bottom: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(245,241,232,0.06);
}
.journal-entry-concept {
  font-size: 16px;
  opacity: 0.6;
  margin-bottom: 4px;
}
.journal-entry-date {
  font-size: 11px;
  opacity: 0.15;
  margin-bottom: 12px;
}
.journal-entry-text {
  font-size: 15px;
  line-height: 1.8;
  opacity: 0.7;
  white-space: pre-wrap;
}
.journal-entry-philosopher {
  font-size: 10px;
  opacity: 0.2;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

/* ── Map nav bar (home + journal buttons) ── */
.map-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 28px 8px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.2;
  padding: 8px 4px;
}
.nav-btn:hover { opacity: 0.4; }
.nav-btn:focus { outline: none; }

/* ── Transitions ── */
.fade-in {
  animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Staggered fade-in for child elements */
.stagger > :nth-child(1) { animation-delay: 0s; }
.stagger > :nth-child(2) { animation-delay: 0.08s; }
.stagger > :nth-child(3) { animation-delay: 0.16s; }
.stagger > :nth-child(4) { animation-delay: 0.24s; }
.stagger > :nth-child(5) { animation-delay: 0.32s; }
.stagger > * { animation-fill-mode: backwards; }

/* ── Swipe hint on story screen ── */
.swipe-indicator {
  position: fixed;
  left: 0; top: 50%;
  width: 4px; height: 48px;
  margin-top: -24px;
  background: rgba(245,241,232,0.08);
  border-radius: 0 4px 4px 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 11;
}
.swipe-indicator.visible { opacity: 1; }

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(245,241,232,0.08);
  color: #f5f1e8;
  font-family: inherit;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
.toast.show {
  opacity: 0.7;
  transform: translateX(-50%) translateY(0);
}

/* ── Mind card (home) ── */
.mind-card {
  margin: 0 28px 32px;
  padding: 22px 24px;
  border: 1px solid rgba(245,241,232,0.06);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
.mind-card:hover { background: rgba(245,241,232,0.02); border-color: rgba(245,241,232,0.12); }
.mind-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.mind-card-label {
  font-size: 10px;
  opacity: 0.35;
  letter-spacing: 0.25em;
}
.mind-card-total {
  font-size: 13px;
  opacity: 0.5;
}
.mind-card-radar {
  display: flex;
  align-items: center;
  gap: 18px;
}
.mind-card-radar svg { flex-shrink: 0; }
.mind-card-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mini-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.mini-bar-label { width: 42px; opacity: 0.5; }
.mini-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(245,241,232,0.06);
  border-radius: 1.5px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: rgba(245,241,232,0.4);
  transition: width 0.6s ease;
}
.mini-bar-val {
  width: 24px;
  text-align: right;
  opacity: 0.4;
  font-size: 10px;
}

/* ── Mind screen ── */
.mind-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 560px;
  margin: 0 auto;
}
.mind-title {
  font-size: 24px;
  opacity: 0.85;
  margin-bottom: 4px;
}
.mind-subtitle {
  font-size: 12px;
  opacity: 0.3;
  margin-bottom: 36px;
  letter-spacing: 0.1em;
}
.mind-radar-wrapper {
  display: flex;
  justify-content: center;
  margin: 0 0 40px;
}
.mind-radar { display: block; }
.dim-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 24px;
}
.dim-row {
  position: relative;
}
.dim-row-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.dim-row-symbol {
  font-size: 14px;
  opacity: 0.5;
}
.dim-row-name {
  font-size: 17px;
  opacity: 0.9;
}
.dim-row-sub {
  font-size: 12px;
  opacity: 0.3;
  margin-left: auto;
  font-style: italic;
}
.dim-row-track {
  height: 4px;
  background: rgba(245,241,232,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.dim-row-fill {
  height: 100%;
  background: rgba(245,241,232,0.45);
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.dim-row-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.4;
}
.dim-level { letter-spacing: 0.1em; }
.dim-score { font-feature-settings: 'tnum'; }
.mind-total {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(245,241,232,0.06);
  text-align: center;
  font-size: 13px;
  opacity: 0.4;
  letter-spacing: 0.15em;
}

/* ── Stat gain animation overlay ── */
.stat-gain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 110;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
}
.stat-gain.show {
  animation: statGainFlow 2.5s ease-out forwards;
}
@keyframes statGainFlow {
  0%   { opacity: 0; transform: translateY(20px); }
  20%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.stat-gain-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  background: rgba(0,0,0,0.85);
  padding: 10px 22px;
  border: 1px solid var(--accent);
  border-radius: 24px;
  opacity: 0.95;
}
.stat-gain-symbol { opacity: 0.7; }
.stat-gain-name { opacity: 0.85; }
.stat-gain-delta {
  color: var(--accent-strong);
  font-weight: 600;
  font-feature-settings: 'tnum';
}

/* ── Level-up overlay ── */
.level-up {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 160;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
}
.level-up-label {
  font-size: 11px;
  opacity: 0.4;
  letter-spacing: 0.35em;
  margin-bottom: 24px;
}
.level-up-symbol {
  font-size: 48px;
  opacity: 0.7;
  margin-bottom: 16px;
  color: #f5f1e8;
}
.level-up-text {
  font-size: 26px;
  line-height: 1.6;
  opacity: 0.85;
  margin-bottom: 36px;
}
.level-up-dim {
  font-size: 14px;
  opacity: 0.45;
  letter-spacing: 0.1em;
}

/* ── Concept card dimension hint ── */
.concept-dim-hint {
  display: inline-flex;
  gap: 4px;
  margin-top: 6px;
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.15em;
}

/* ── Lexicon screen ── */
.lexicon-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 700px;
  margin: 0 auto;
}
.lexicon-title {
  font-size: 28px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.lexicon-subtitle {
  font-size: 12px;
  opacity: 0.35;
  font-style: italic;
  letter-spacing: 0.1em;
  margin-bottom: 28px;
}
.lexicon-filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 16px 0;
  border-top: 1px solid rgba(245,241,232,0.06);
  border-bottom: 1px solid rgba(245,241,232,0.06);
  margin-bottom: 32px;
}
.lexicon-filter-btn {
  background: transparent;
  border: 1px solid rgba(245,241,232,0.1);
  color: #f5f1e8;
  font-family: inherit;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 16px;
  cursor: pointer;
  opacity: 0.55;
  transition: all 0.2s;
}
.lexicon-filter-btn.active {
  opacity: 1;
  border-color: var(--accent);
  background: var(--accent-soft);
}
.lexicon-filter-btn:focus { outline: none; }

.lexicon-group { margin-bottom: 40px; }
.lexicon-group-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.35;
  margin-bottom: 18px;
  color: rgba(245,241,232,0.5);
}
.lexicon-entry {
  padding: 18px 0;
  border-bottom: 1px solid rgba(245,241,232,0.04);
}
.lexicon-entry-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.lexicon-zh {
  font-size: 18px;
  opacity: 0.9;
}
.lexicon-orig {
  font-size: 14px;
  opacity: 0.45;
  font-style: italic;
}
.lexicon-lang {
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.15em;
  padding: 2px 8px;
  border: 1px solid rgba(245,241,232,0.1);
  border-radius: 10px;
  margin-left: auto;
}
.lexicon-etym {
  font-size: 12px;
  opacity: 0.4;
  font-style: italic;
  margin-bottom: 10px;
}
.lexicon-def {
  font-size: 14px;
  line-height: 1.8;
  opacity: 0.78;
}
.lexicon-concepts {
  margin-top: 10px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.lexicon-concept-tag {
  background: transparent;
  border: 1px solid rgba(245,241,232,0.08);
  color: #f5f1e8;
  font-family: inherit;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 10px;
  cursor: pointer;
  opacity: 0.55;
  transition: opacity 0.2s;
}
.lexicon-concept-tag:hover { opacity: 0.9; }
.lexicon-concept-tag:focus { outline: none; }

/* ── Themes section (home) ── */
.themes-section {
  padding: 40px 28px 32px;
  border-top: 1px solid rgba(245,241,232,0.06);
  margin: 0 0 12px;
}
.themes-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  opacity: 0.3;
  margin-bottom: 6px;
}
.themes-sublabel {
  font-size: 12px;
  opacity: 0.18;
  margin-bottom: 24px;
}
.theme-card {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  padding: 16px 0;
  border-bottom: 1px solid rgba(245,241,232,0.04);
  transition: opacity 0.2s, transform 0.2s;
}
.theme-card:focus { outline: none; }
.theme-card:active { opacity: 0.7; transform: scale(0.99); }
.theme-card-row {
  display: flex;
  align-items: baseline;
  gap: 14px;
}
.theme-card-symbol {
  font-size: 16px;
  opacity: 0.4;
  width: 18px;
}
.theme-card-name {
  font-size: 17px;
  opacity: 0.85;
}
.theme-card-sub {
  font-size: 12px;
  opacity: 0.3;
  margin-left: auto;
  font-style: italic;
}

/* ── Theme detail screen ── */
.theme-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
}
.theme-symbol-large {
  font-size: 40px;
  opacity: 0.5;
  margin-bottom: 12px;
}
.theme-name {
  font-size: 28px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.theme-subtitle {
  font-size: 13px;
  opacity: 0.35;
  font-style: italic;
  margin-bottom: 36px;
  letter-spacing: 0.05em;
}
.theme-intro {
  font-size: 15px;
  line-height: 1.9;
  opacity: 0.78;
  padding: 24px 0 28px;
  border-top: 1px solid rgba(245,241,232,0.06);
  border-bottom: 1px solid rgba(245,241,232,0.06);
  margin-bottom: 40px;
  white-space: pre-wrap;
}
.theme-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 24px;
  color: rgba(245,241,232,0.5);
}
.theme-dialogue { margin-bottom: 52px; }
.dialogue-row {
  margin-bottom: 24px;
  padding-left: 16px;
  border-left: 2px solid;
  font-size: 14px;
  line-height: 1.8;
}
.dialogue-row[data-philosopher="nietzsche"] { border-left-color: rgba(196,164,105,0.5); }
.dialogue-row[data-philosopher="stoic"]     { border-left-color: rgba(150,170,180,0.5); }
.dialogue-row[data-philosopher="camus"]     { border-left-color: rgba(200,130,100,0.5); }
.dialogue-row[data-philosopher="foucault"]  { border-left-color: rgba(165,140,185,0.5); }
.dialogue-name {
  font-size: 12px;
  letter-spacing: 0.15em;
  opacity: 0.55;
  margin-bottom: 6px;
}
.dialogue-text { opacity: 0.85; }

.theme-concept-list {
  margin-top: 20px;
}
.theme-concept-row {
  display: flex;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(245,241,232,0.05);
  color: #f5f1e8;
  font-family: inherit;
  text-align: left;
  padding: 14px 0;
  cursor: pointer;
  gap: 14px;
  align-items: center;
  transition: opacity 0.2s, transform 0.2s;
}
.theme-concept-row:active { opacity: 0.7; transform: translateX(2px); }
.theme-concept-row:focus { outline: none; }
.theme-concept-symbol {
  font-size: 12px;
  width: 14px;
  opacity: 0.4;
}
.theme-concept-symbol[data-philosopher="nietzsche"] { color: rgba(196,164,105,0.7); }
.theme-concept-symbol[data-philosopher="stoic"]     { color: rgba(150,170,180,0.7); }
.theme-concept-symbol[data-philosopher="camus"]     { color: rgba(200,130,100,0.7); }
.theme-concept-symbol[data-philosopher="foucault"]  { color: rgba(165,140,185,0.7); }
.theme-concept-text {
  flex: 1;
  font-size: 15px;
  opacity: 0.85;
}
.theme-concept-pname {
  font-size: 11px;
  opacity: 0.35;
  font-style: italic;
}

/* ── Archive screen ── */
.archive-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
}
.archive-name {
  font-size: 28px;
  opacity: 0.9;
  margin-bottom: 4px;
}
.archive-orig {
  font-size: 13px;
  opacity: 0.4;
  font-style: italic;
  margin-bottom: 6px;
}
.archive-dates {
  font-size: 11px;
  opacity: 0.25;
  margin-bottom: 28px;
  letter-spacing: 0.1em;
}
.archive-bio {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.75;
  padding: 20px 0 32px;
  border-top: 1px solid rgba(245,241,232,0.06);
  border-bottom: 1px solid rgba(245,241,232,0.06);
  margin-bottom: 40px;
}
.archive-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.4;
  margin-bottom: 24px;
  color: var(--accent-strong);
}

.archive-timeline {
  margin-bottom: 56px;
}
.timeline-row {
  display: flex;
  gap: 20px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(245,241,232,0.04);
  font-size: 14px;
  line-height: 1.6;
}
.timeline-row:last-child { border-bottom: none; }
.timeline-year {
  flex-shrink: 0;
  width: 80px;
  opacity: 0.45;
  font-feature-settings: 'tnum';
}
.timeline-event {
  flex: 1;
  opacity: 0.75;
}

.archive-passages {
  margin-bottom: 40px;
}
.passage {
  margin-bottom: 36px;
  padding: 20px 22px;
  background: rgba(245,241,232,0.02);
  border-left: 2px solid var(--accent);
  border-radius: 0 4px 4px 0;
}
.passage-source {
  font-size: 11px;
  opacity: 0.4;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
  color: var(--accent-strong);
}
.passage-text {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.85;
  white-space: pre-wrap;
  font-style: italic;
}

/* ── Onboarding ── */
.onboarding {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.6s ease-out;
}
.onboarding-content {
  text-align: center;
  padding: 40px;
  max-width: 480px;
}
.onboarding-text {
  font-size: 22px;
  line-height: 1.7;
  opacity: 0.8;
  margin-bottom: 80px;
  min-height: 100px;
  transition: opacity 0.4s;
}
.onboarding-text.fade { opacity: 0; }
.onboarding-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 40px;
}
.onboarding-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(245,241,232,0.15);
  transition: background 0.3s;
}
.onboarding-dot.active { background: rgba(245,241,232,0.5); }
.onboarding-next {
  background: transparent;
  border: 1px solid rgba(245,241,232,0.2);
  color: #f5f1e8;
  font-family: inherit;
  font-size: 14px;
  padding: 12px 28px;
  border-radius: 24px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.3s, border-color 0.3s;
}
.onboarding-next:hover { opacity: 1; border-color: rgba(245,241,232,0.4); }
.onboarding-next:focus { outline: none; }

/* ── Continue card ── */
.continue-card {
  margin: 0 28px 32px;
  padding: 18px 20px;
  border: 1px solid var(--accent-soft);
  border-radius: 6px;
  background: rgba(245,241,232,0.02);
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
  position: relative;
}
.continue-card:hover { background: rgba(245,241,232,0.04); border-color: var(--accent); }
.continue-card-label {
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.2em;
  margin-bottom: 8px;
}
.continue-card-title {
  font-size: 16px;
  line-height: 1.5;
  opacity: 0.85;
  margin-bottom: 4px;
}
.continue-card-arrow {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.3;
  font-size: 18px;
}

/* ── Daily wisdom ── */
.daily-wisdom {
  margin: 36px 28px 0;
  padding: 24px 0;
  border-top: 1px solid rgba(245,241,232,0.06);
  border-bottom: 1px solid rgba(245,241,232,0.06);
  cursor: pointer;
}
.daily-wisdom-label {
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.2em;
  margin-bottom: 12px;
}
.daily-wisdom-text {
  font-size: 15px;
  line-height: 1.75;
  opacity: 0.55;
  font-style: italic;
  margin-bottom: 8px;
}
.daily-wisdom-source {
  font-size: 11px;
  opacity: 0.25;
}

/* ── Echo banner (after reading) ── */
.echo-banner {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 20px 28px calc(20px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, #000 60%, transparent);
  transform: translateY(100%);
  transition: transform 0.6s cubic-bezier(0.16,1,0.3,1), opacity 0.4s;
  z-index: 80;
  opacity: 0;
  pointer-events: none;
}
.echo-banner.show {
  transform: translateY(0);
  opacity: 1;
}
.echo-banner-text {
  font-size: 14px;
  line-height: 1.7;
  opacity: 0.55;
  font-style: italic;
  max-width: 500px;
}
.echo-banner-label {
  font-size: 10px;
  opacity: 0.25;
  letter-spacing: 0.2em;
  margin-bottom: 6px;
}

/* ── Map stats footer ── */
.map-stats {
  padding: 24px 28px 80px;
  text-align: center;
  font-size: 11px;
  opacity: 0.2;
  letter-spacing: 0.1em;
  line-height: 1.8;
}

/* ── Story epigraph ── */
.story-epigraph {
  margin: 0 0 36px;
  padding: 16px 0 16px 18px;
  border-left: 2px solid var(--accent);
  font-style: italic;
  font-size: 16px;
  line-height: 1.7;
  opacity: 0.6;
}
.story-epigraph-source {
  display: block;
  margin-top: 6px;
  font-size: 12px;
  opacity: 0.6;
  font-style: normal;
}

/* ── Re-read prompt ── */
.reread-prompt {
  margin: 0 0 28px;
  padding: 14px 18px;
  background: rgba(245,241,232,0.025);
  border-radius: 4px;
  font-size: 13px;
  opacity: 0.6;
  line-height: 1.6;
}
.reread-prompt-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  opacity: 0.5;
  margin-bottom: 6px;
}

/* ── Deep read (misreading + application) ── */
.deep-read {
  margin: 48px 0 0;
}
.deep-read-divider {
  text-align: center;
  font-size: 12px;
  letter-spacing: 1em;
  opacity: 0.25;
  padding: 24px 0 28px;
}
.deep-read-block {
  margin-bottom: 32px;
}
.deep-read-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 12px;
  color: var(--accent-strong);
}
.deep-read-body {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.75;
}
.deep-read-body p {
  margin-bottom: 1em;
  white-space: pre-wrap;
}
.deep-read-body p:last-child { margin-bottom: 0; }

/* Critique block — slightly different to signal "another voice" */
.deep-read-block.critique-block {
  margin-top: 36px;
  padding: 18px 0 0;
  border-top: 1px solid rgba(245,241,232,0.05);
}
.critique-block .deep-read-label {
  color: rgba(245,241,232,0.4);
  font-style: italic;
}
.critique-block .deep-read-body {
  opacity: 0.65;
  font-style: italic;
}

/* ── Cross-philosopher echo ── */
.cross-echo {
  margin-top: 36px;
  padding: 18px;
  border: 1px dashed var(--accent-soft);
  border-radius: 4px;
  font-size: 13px;
  line-height: 1.75;
  opacity: 0.7;
}
.cross-echo-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  opacity: 0.5;
  margin-bottom: 8px;
}

/* ── Journal stats ── */
.journal-stats {
  font-size: 11px;
  opacity: 0.25;
  margin-bottom: 32px;
  letter-spacing: 0.1em;
}

/* ── Journal entry actions ── */
.journal-entry {
  cursor: pointer;
  transition: background 0.2s;
  border-radius: 4px;
  padding: 16px;
  margin: 0 -16px 24px;
}
.journal-entry:hover { background: rgba(245,241,232,0.02); }
.journal-entry-actions {
  display: none;
  gap: 16px;
  margin-top: 12px;
  font-size: 11px;
  opacity: 0.4;
}
.journal-entry.editing .journal-entry-actions { display: flex; }
.journal-entry-editor {
  width: 100%;
  background: transparent;
  border: 1px solid var(--accent-soft);
  border-radius: 4px;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.8;
  padding: 12px;
  resize: vertical;
  min-height: 100px;
  outline: none;
}
.journal-entry-editor:focus { border-color: var(--accent); }
.journal-action-btn {
  background: transparent;
  border: none;
  color: #f5f1e8;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  padding: 4px 8px;
  opacity: 0.8;
}
.journal-action-btn.danger { color: #c08070; }
.journal-action-btn:focus { outline: none; }

/* ── Section divider per philosopher ── */
.philosopher-divider {
  text-align: center;
  font-size: 18px;
  padding: 36px 0 12px;
  opacity: 0.18;

  'heterotopia':         { autonomy: 2, awareness: 2 },
};

const LEVEL_THRESHOLDS = [
  { min: 0,   name: '初见', symbol: '·' },
  { min: 6,   name: '浮现', symbol: '◌' },
  { min: 16,  name: '凝聚', symbol: '◐' },
  { min: 31,  name: '稳固', symbol: '●' },
  { min: 51,  name: '通透', symbol: '✦' },
];
function getLevel(score) {
  let lvl = LEVEL_THRESHOLDS[0];
  for (const l of LEVEL_THRESHOLDS) if (score >= l.min) lvl = l;
  return lvl;
}

function calculateBrainStats() {
  const stats = { awareness: 0, criticality: 0, composure: 0, autonomy: 0, action: 0 };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      Object.keys(prog).forEach(conceptId => {
        if (!prog[conceptId]) return;
        const contrib = CONCEPT_DIMENSIONS[conceptId];
        if (!contrib) return;
        Object.entries(contrib).forEach(([dim, val]) => { stats[dim] += val; });
      });
    } catch {}
  });
  return stats;
}

function totalBrainScore(stats) {
  return Object.values(stats).reduce((a, b) => a + b, 0);
}

// Reverse lookup: concept ID → philosopher ID
function findPhilosopherForConcept(conceptId) {
  // Heuristic by concept ID prefix patterns
  const nietzscheIds = new Set(['god-is-dead','perspectivism','truth-as-fiction','ressentiment','slave-morality','master-morality','will-to-power','apollonian-dionysian','three-metamorphoses','free-spirit','amor-fati','ubermensch','last-man','herd-animal','pity-danger','eternal-return','nihilism','bad-conscience','ascetic-ideal','genealogy','revaluation','pathos-of-distance','gay-science','creator-solitude','abyss']);
  const stoicIds = new Set(['dichotomy-of-control','logos','virtue-as-sole-good','apatheia','premeditatio-malorum','memento-mori','present-moment','amor-fati-stoic','inner-citadel','cosmopolitan','obstacle-is-way','voluntary-discomfort']);
  const camusIds = new Set(['absurd','philosophical-suicide','lucidity','revolt','sisyphus','indifference-of-world','freedom-without-hope','passion-quantity','creation-absurd','solidarity']);
  const foucaultIds = new Set(['discourse','power-knowledge','archaeology','normalization','panopticon','biopower','governmentality','technologies-of-self','parrhesia','heterotopia']);
  if (nietzscheIds.has(conceptId)) return 'nietzsche';
  if (stoicIds.has(conceptId)) return 'stoic';
  if (camusIds.has(conceptId)) return 'camus';
  if (foucaultIds.has(conceptId)) return 'foucault';
  return null;
}

// ═══ Haptic feedback ═══
function haptic(style = 'light') {
  if (navigator.vibrate) {
    if (style === 'light') navigator.vibrate(10);
    else if (style === 'medium') navigator.vibrate(20);
    else if (style === 'success') navigator.vibrate([10, 50, 10]);
  }
}

// ═══ Toast ═══
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function isUnlocked(conceptId) {
  const concept = concepts.find(c => c.id === conceptId);
  if (!concept) return false;
  if (concept.dependencies.length === 0) return true;
  return concept.dependencies.every(dep => progress[dep]);
}

// ═══ Radar chart ═══
function buildRadarSVG(stats, size = 200) {
  const cx = size / 2, cy = size / 2;
  const radius = size * 0.38;
  const n = DIMENSIONS.length;
  const maxScore = 60; // visual cap

  // Points on each axis (vertex top, going clockwise)
  function pt(idx, factor) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * idx) / n;
    return [cx + Math.cos(angle) * radius * factor, cy + Math.sin(angle) * radius * factor];
  }

  // Background polygons at 25/50/75/100%
  const bgPolys = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = DIMENSIONS.map((_, i) => pt(i, f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(245,241,232,0.06)" stroke-width="1"/>`;
  }).join('');

  // Axis lines
  const axes = DIMENSIONS.map((_, i) => {
    const [x, y] = pt(i, 1);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(245,241,232,0.06)" stroke-width="1"/>`;
  }).join('');

  // Actual stat polygon
  const statPts = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    return pt(i, f).join(',');
  }).join(' ');
  const statPoly = `<polygon points="${statPts}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>`;

  // Dots at each point
  const dots = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    const [x, y] = pt(i, f);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent-strong)"/>`;
  }).join('');

  // Labels at vertices
  const labels = DIMENSIONS.map((d, i) => {
    const [x, y] = pt(i, 1.22);
    return `<text x="${x}" y="${y}" fill="rgba(245,241,232,0.5)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="inherit">${d.name}</text>`;
  }).join('');

  return `<svg class="mind-radar" width="${size}" height="${size + 20}" viewBox="0 -10 ${size} ${size + 20}">${bgPolys}${axes}${statPoly}${dots}${labels}</svg>`;
}

let lexiconFilter = 'all';
function renderLexicon() {
  const scroll = document.getElementById('lexicon-scroll');
  const groups = {
    nietzsche: { name: '尼采', entries: [] },
    stoic: { name: '斯多葛', entries: [] },
    camus: { name: '加缪', entries: [] },
    foucault: { name: '福柯', entries: [] },
  };
  LEXICON.forEach(e => {
    if (groups[e.school]) groups[e.school].entries.push(e);
  });

  const filterBar = `
    <div class="lexicon-filter-bar">
      <button class="lexicon-filter-btn ${lexiconFilter==='all' ? 'active' : ''}" data-filter="all">全部</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='nietzsche' ? 'active' : ''}" data-filter="nietzsche">尼采</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='stoic' ? 'active' : ''}" data-filter="stoic">斯多葛</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='camus' ? 'active' : ''}" data-filter="camus">加缪</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='foucault' ? 'active' : ''}" data-filter="foucault">福柯</button>
    </div>
  `;

  const groupHtml = Object.entries(groups).map(([key, g]) => {
    if (lexiconFilter !== 'all' && lexiconFilter !== key) return '';
    if (g.entries.length === 0) return '';
    const entries = g.entries.map(e => {
      const conceptTags = e.concepts.map(cId => {
        const name = CONCEPT_NAMES[cId] || cId;
        return `<button class="lexicon-concept-tag" data-concept="${cId}">${escapeHtml(name)}</button>`;
      }).join('');
      return `
        <div class="lexicon-entry">
          <div class="lexicon-entry-head">
            <span class="lexicon-zh">${escapeHtml(e.zh)}</span>
            <span class="lexicon-orig">${escapeHtml(e.orig)}</span>
            <span class="lexicon-lang">${escapeHtml(e.lang)}</span>
          </div>
          <div class="lexicon-etym">字源：${escapeHtml(e.etym)}</div>
          <div class="lexicon-def">${escapeHtml(e.def)}</div>
          ${conceptTags ? `<div class="lexicon-concepts">${conceptTags}</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="lexicon-group">
        <div class="lexicon-group-label">${g.name}</div>
        ${entries}
      </div>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="lexicon-title">辞海</div>
    <div class="lexicon-subtitle">关键术语 · 字源 · 释义</div>
    ${filterBar}
    ${groupHtml}
  `;

  scroll.querySelectorAll('.lexicon-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lexiconFilter = btn.getAttribute('data-filter');
      haptic('light');
      renderLexicon();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  scroll.querySelectorAll('.lexicon-concept-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const conceptId = tag.getAttribute('data-concept');
      const phId = findPhilosopherForConcept(conceptId);
      const philosopher = PHILOSOPHERS.find(p => p.id === phId);
      if (philosopher) {
        haptic('light');
        enterPhilosopher(philosopher).then(() => {
          setTimeout(() => openStory(conceptId), 400);
        });
      }
    });
  });
}

  const scroll = document.getElementById('theme-scroll');

    return `

        <div class="dialogue-text">${escapeHtml(d.text)}</div>

  const concepts = theme.concepts.map(cId => {
    const phId = findPhilosopherForConcept(cId);

        <span class="theme-concept-pname">${philosopher ? philosopher.name : ''}</span>

  }).join('');

  scroll.innerHTML = `
    <div class="theme-symbol-large">${theme.symbol}</div>
    <div class="theme-name">${escapeHtml(theme.name)}</div>
    <div class="theme-subtitle">${escapeHtml(theme.subtitle)}</div>

    </div>

    <div class="theme-concept-list">
      <div class="theme-section-label">相关概念</div>
      ${concepts}
    </div>
  `;

  scroll.querySelectorAll('.theme-concept-row').forEach(row => {
    row.addEventListener('click', () => {
      haptic('light');
      const conceptId = row.getAttribute('data-concept');
      const phId = row.getAttribute('data-philosopher');

      if (philosopher) {
        enterPhilosopher(philosopher).then(() => {
          setTimeout(() => openStory(conceptId), 400);
        });
      }
    });
  });

  showScreen('theme');
}

// ═══ Concept Map ═══
function getDepthMap(nodes) {
  const depthMap = new Map();
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  function calcDepth(id) {
    if (depthMap.has(id)) return depthMap.get(id);
    const node = nodeMap.get(id);
    if (!node || node.dependencies.length === 0) { depthMap.set(id, 0); return 0; }
    const d = 1 + Math.max(...node.dependencies.map(dep => calcDepth(dep)));
    depthMap.set(id, d);
    return d;
  }
  nodes.forEach(n => calcDepth(n.id));
  return depthMap;
}

function renderMap() {
  const list = document.getElementById('concept-list');
  list.innerHTML = '';

  const readCount = concepts.filter(c => progress[c.id]).length;
  const progressEl = document.getElementById('map-progress');
  progressEl.textContent = readCount > 0 ? `${readCount} / ${concepts.length}` : '';

  // Progress bar
  const pct = concepts.length > 0 ? Math.round((readCount / concepts.length) * 100) : 0;
  document.getElementById('map-bar-fill').style.width = pct + '%';

  // Track currently unlocked set
  const currentUnlocked = new Set();

  const order = topologicalSort(concepts);
  const depthMap = getDepthMap(concepts);

  order.forEach((concept, idx) => {
    const card = document.createElement('button');
    const unlocked = isUnlocked(concept.id);
    const read = !!progress[concept.id];
    const depth = Math.min(depthMap.get(concept.id) || 0, 4);

    if (unlocked) currentUnlocked.add(concept.id);

    // Was this concept just unlocked? (wasn't in previous set)
    const justUnlocked = unlocked && !read && previouslyUnlocked.size > 0 && !previouslyUnlocked.has(concept.id);

    card.className = 'concept-card depth-' + depth
      + (unlocked ? '' : ' locked')
      + (read ? ' read' : '')
      + (justUnlocked ? ' just-unlocked' : '');

    // Dimension hint (only for unlocked, unread)
    let dimHint = '';
    if (unlocked && !read) {
      const dims = CONCEPT_DIMENSIONS[concept.id];
      if (dims) {
        const symbols = Object.entries(dims)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 2)
          .map(([id]) => {
            const meta = DIMENSIONS.find(d => d.id === id);
            return meta ? meta.symbol : '';
          })
          .filter(Boolean)
          .join(' ');
        if (symbols) dimHint = `<div class="concept-dim-hint">${symbols}</div>`;
      }
    }

    card.innerHTML = `
      <div class="concept-name">
        <span class="concept-dot"></span>${concept.name}${concept.original ? '<span class="concept-orig">' + concept.original + '</span>' : ''}
      </div>
      <div class="concept-brief">${concept.brief}</div>
      ${dimHint}
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        haptic('light');
        openStory(concept.id);
      });
    }

    list.appendChild(card);
  });

  // Update previously unlocked set
  previouslyUnlocked = currentUnlocked;

  // Map stats footer
  const statsEl = document.getElementById('map-stats');
  if (statsEl) {
    const unlockedCount = currentUnlocked.size;
    const reflectionCount = Object.values(reflections).filter(r => {
      const text = typeof r === 'string' ? r : r?.text;
      return text && text.trim();
    }).length;
    statsEl.innerHTML = `${currentPhilosopher.ornament} &nbsp; 已解锁 ${unlockedCount} · 已读 ${readCount} · 已记录 ${reflectionCount}`;
  }

  // Scroll-reveal with IntersectionObserver
  requestAnimationFrame(() => {
    const cards = list.querySelectorAll('.concept-card');
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
      cards.forEach(c => observer.observe(c));
    } else {
      cards.forEach(c => c.classList.add('revealed'));
    }
  });

  // Check for philosopher completion
  if (readCount === concepts.length && concepts.length > 0) {
    const celebKey = `echo/${currentPhilosopher.id}/celebrated`;
    if (!localStorage.getItem(celebKey)) {
      localStorage.setItem(celebKey, 'true');
      setTimeout(() => showCelebration(currentPhilosopher), 300);
    }
  }
}

  const rows = Object.entries(contrib).map(([dim, val]) => {
    const meta = DIMENSIONS.find(d => d.id === dim);
    if (!meta) return '';
    return `<div class="stat-gain-row">
      <span class="stat-gain-symbol">${meta.symbol}</span>
      <span class="stat-gain-name">${meta.name}</span>
      <span class="stat-gain-delta">+${val}</span>
    </div>`;
  }).join('');
  overlay.innerHTML = rows;
  document.body.appendChild(overlay);
  requestAnimationFrame(() => {
    overlay.classList.add('show');
    haptic('success');
  });
  setTimeout(() => overlay.remove(), 2700);

  // Check for level-ups
  setTimeout(() => {
    const levelUps = [];
    Object.keys(contrib).forEach(dim => {
      const oldLvl = getLevel(oldStats[dim] || 0);
      const newLvl = getLevel(newStats[dim] || 0);
      if (oldLvl.name !== newLvl.name) {
        levelUps.push({ dim, oldLvl, newLvl });
      }
    });
    if (levelUps.length > 0) showLevelUp(levelUps[0]);
  }, 1800);
}

function topologicalSort(nodes) {
  const visited = new Set();
  const result = [];
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  function visit(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const node = nodeMap.get(id);
    if (!node) return;
    node.dependencies.forEach(dep => visit(dep));
    result.push(node);
  }

  nodes.forEach(n => visit(n.id));
  return result;
}

// ═══ Story Reader ═══
function openStory(conceptId) {
  currentConceptId = conceptId;
  const story = storyMap.get(conceptId);
  if (!story) return;

  // Track last visit
  if (currentPhilosopher) {
    setLastVisited(currentPhilosopher.id, conceptId);
  }

  const concept = concepts.find(c => c.id === conceptId);
  document.getElementById('story-concept-label').textContent = concept ? concept.name : '';

  // Reset reading progress
  document.getElementById('reading-progress').style.width = '0%';

  const scroll = document.getElementById('story-scroll');
  scroll.innerHTML = '';

  // Title
  const title = document.createElement('div');
  title.className = 'story-title fade-in';
  title.textContent = story.title;
  scroll.appendChild(title);

  // Meta + reading time
  const charCount = (story.body || '').length;
  const readingMin = Math.max(1, Math.round(charCount / 500));
  const meta = document.createElement('div');
  meta.className = 'story-meta fade-in';
  meta.innerHTML = `${story.protagonist.name}，${story.protagonist.age}岁，${story.protagonist.occupation}`
    + `<div class="story-reading-time">约 ${readingMin} 分钟</div>`;
  scroll.appendChild(meta);

  // Re-read prompt (if already read with a reflection)
  const existingRefl = reflections[conceptId];
  const wasRead = !!progress[conceptId];
  if (wasRead && existingRefl) {
    const reread = document.createElement('div');
    reread.className = 'reread-prompt fade-in';
    const oldText = typeof existingRefl === 'string' ? existingRefl : existingRefl.text;
    reread.innerHTML = `<div class="reread-prompt-label">上次你写过</div>${escapeHtml(oldText.slice(0, 80))}${oldText.length > 80 ? '...' : ''}`;
    scroll.appendChild(reread);
  }

  // Epigraph
  const ep = EPIGRAPHS[conceptId];
  if (ep) {
    const epi = document.createElement('div');
    epi.className = 'story-epigraph fade-in';
    epi.innerHTML = `"${escapeHtml(ep.text)}"<span class="story-epigraph-source">— ${escapeHtml(ep.source)}</span>`;
    scroll.appendChild(epi);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'story-body rendered fade-in';
  body.innerHTML = renderMarkdown(story.body);
  scroll.appendChild(body);

  // Divider
  const divider = document.createElement('div');
  divider.className = 'section-divider';
  divider.textContent = '···';
  scroll.appendChild(divider);

  // Layers
  const layersSection = document.createElement('div');
  layersSection.className = 'layers-section fade-in';

  const tabs = [
    { key: 'concept', label: '🜲 概念' },
    { key: 'now', label: '🜂 此刻' },
    { key: 'deeper', label: '🜍 更深' },
  ];

  const tabBar = document.createElement('div');
  tabBar.className = 'layer-tab-bar';

  const contentEl = document.createElement('div');
  contentEl.className = 'layer-content rendered';

  function setTab(key) {
    tabBar.querySelectorAll('.layer-tab').forEach((t, i) => {
      t.classList.toggle('active', tabs[i].key === key);
    });
    contentEl.innerHTML = renderMarkdown(story.layers[key] || '');
  }

  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'layer-tab';
    btn.textContent = tab.label;
    btn.addEventListener('click', () => setTab(tab.key));
    tabBar.appendChild(btn);
  });

  layersSection.appendChild(tabBar);
  layersSection.appendChild(contentEl);
  scroll.appendChild(layersSection);

  setTab('concept');

  // Links
  const allLinks = [...(story.layers.links.pre || []), ...(story.layers.links.post || [])];
  if (allLinks.length > 0) {
    const linksSection = document.createElement('div');
    linksSection.className = 'links-section';

    if (story.layers.links.pre.length > 0) {
      const preLabel = document.createElement('div');
      preLabel.className = 'links-label';
      preLabel.textContent = '前置';
      linksSection.appendChild(preLabel);
      story.layers.links.pre.forEach(name => {
        const chip = createLinkChip(name);
        linksSection.appendChild(chip);
      });
    }

    if (story.layers.links.post.length > 0) {
      const postLabel = document.createElement('div');
      postLabel.className = 'links-label';
      postLabel.style.marginTop = '16px';
      postLabel.textContent = '延伸';
      linksSection.appendChild(postLabel);
      story.layers.links.post.forEach(name => {
        const chip = createLinkChip(name);
        linksSection.appendChild(chip);
      });
    }

    scroll.appendChild(linksSection);
  }

  // Deep read (misreading + modern application + critique)
  const deepRead = DEEP_READS[conceptId];
  const critique = CRITIQUES[conceptId];
  if (deepRead || critique) {
    const dr = document.createElement('div');
    dr.className = 'deep-read';
    let html = `<div class="deep-read-divider">深 读</div>`;
    if (deepRead) {
      html += `
        <div class="deep-read-block">
          <div class="deep-read-label">常见误读</div>
          <div class="deep-read-body">${escapeHtml(deepRead.misread)}</div>
        </div>
        <div class="deep-read-block">
          <div class="deep-read-label">现代应用</div>
          <div class="deep-read-body">${escapeHtml(deepRead.apply).replace(/\n\n/g, '</p><p>').replace(/^/, '<p>').replace(/$/, '</p>')}</div>
        </div>
      `;
    }
    if (critique) {
      html += `
        <div class="deep-read-block critique-block">
          <div class="deep-read-label">批判与反思</div>
          <div class="deep-read-body">${escapeHtml(critique)}</div>
        </div>
      `;
    }
    dr.innerHTML = html;
    scroll.appendChild(dr);
  }

  // Cross-philosopher echo
  const crossText = CROSS_ECHOES[conceptId];
  if (crossText) {
    const cross = document.createElement('div');
    cross.className = 'cross-echo';
    cross.innerHTML = `<div class="cross-echo-label">回声</div>${escapeHtml(crossText)}`;
    scroll.appendChild(cross);
  }

  // Reflect
  const reflectSection = document.createElement('div');
  reflectSection.className = 'reflect-section';

  const existing = reflections[conceptId];
  const reflectPrompt = document.createElement('div');
  reflectPrompt.className = 'reflect-prompt';
  reflectPrompt.textContent = existing
    ? '你之前写过：'
    : '读完这个故事，你想到了什么？';
  reflectSection.appendChild(reflectPrompt);

  const reflectInput = document.createElement('textarea');
  reflectInput.className = 'reflect-input';
  reflectInput.placeholder = '写下你此刻的想法...';
  reflectInput.value = existing ? existing.text || existing : '';
  reflectSection.appendChild(reflectInput);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-top:20px;';

  const reflectSkip = document.createElement('button');
  reflectSkip.className = 'reflect-save';
  reflectSkip.textContent = '读过了';
  reflectSkip.style.opacity = '0.25';
  reflectSkip.addEventListener('click', () => {
    const wasUnread = !progress[conceptId];
    const oldStats = calculateBrainStats();
    progress[conceptId] = true;
    saveProgress();
    document.getElementById('reading-progress').style.width = '0%';
    showScreen('map');
    renderMap();
    if (wasUnread) {
      const newStats = calculateBrainStats();
      showStatGain(conceptId, oldStats, newStats);
      setTimeout(() => showEchoAftertaste(conceptId, concept), 2800);
    }
  });
  btnRow.appendChild(reflectSkip);

  const reflectSave = document.createElement('button');
  reflectSave.className = 'reflect-save';
  reflectSave.textContent = '留下';
  reflectSave.addEventListener('click', () => {
    const text = reflectInput.value.trim();
    const wasUnread = !progress[conceptId];
    const oldStats = calculateBrainStats();
    if (text) {
      reflections[conceptId] = {
        text: text,
        date: new Date().toISOString(),
        conceptName: concept ? concept.name : conceptId,
      };
      saveReflections();
      haptic('success');
      showToast('已记录');
    }
    progress[conceptId] = true;
    saveProgress();
    document.getElementById('reading-progress').style.width = '0%';
    showScreen('map');
    renderMap();
    if (wasUnread) {
      const newStats = calculateBrainStats();
      showStatGain(conceptId, oldStats, newStats);
      setTimeout(() => showEchoAftertaste(conceptId, concept), 2800);
    }
  });
  btnRow.appendChild(reflectSave);

  reflectSection.appendChild(btnRow);
  scroll.appendChild(reflectSection);

  showScreen('story');
}

function createLinkChip(conceptName) {
  const chip = document.createElement('button');
  chip.className = 'link-chip';

  const matchedConcept = concepts.find(c => c.name === conceptName || c.id === conceptName);
  chip.textContent = matchedConcept ? matchedConcept.name : conceptName;

  if (matchedConcept && isUnlocked(matchedConcept.id)) {
    chip.addEventListener('click', () => openStory(matchedConcept.id));
  } else {
    chip.style.opacity = '0.2';
    chip.style.cursor = 'default';
  }
  return chip;
}

// ═══ Journal ═══
let journalGlobal = false; // false = current philosopher, true = all

function renderJournal() {
  const scroll = document.getElementById('journal-scroll');
  scroll.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'journal-title';
  title.textContent = journalGlobal ? '全部思考记录' : (currentPhilosopher ? currentPhilosopher.name + ' · 思考记录' : '思考记录');
  scroll.appendChild(title);

  // Collect entries
  let allEntries = [];

  if (journalGlobal) {
    PHILOSOPHERS.forEach(p => {
      try {
        const refs = JSON.parse(localStorage.getItem(storageKey(p.id, 'reflections'))) || {};
        Object.entries(refs).forEach(([id, val]) => {
          allEntries.push({ id, val, philosopherId: p.id, philosopherName: p.name });
        });
      } catch {}
    });
  } else {
    Object.entries(reflections).forEach(([id, val]) => {
      allEntries.push({ id, val, philosopherId: currentPhilosopher?.id, philosopherName: currentPhilosopher?.name || '' });
    });
  }

  allEntries = allEntries
    .filter(e => {
      const text = typeof e.val === 'string' ? e.val : e.val?.text;
      return text && text.trim();
    })
    .sort((a, b) => {
      const dateA = typeof a.val === 'object' ? a.val.date || '' : '';
      const dateB = typeof b.val === 'object' ? b.val.date || '' : '';
      return dateB.localeCompare(dateA);
    });

  if (allEntries.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'journal-empty';
    empty.textContent = '还没有写过任何反思。\n\n读完一个概念后，在底部的输入框里写下你的想法，点"留下"——它会出现在这里。';
    scroll.appendChild(empty);
    return;
  }

  // Stats
  const dates = allEntries
    .map(e => typeof e.val === 'object' ? e.val.date : null)
    .filter(Boolean)
    .map(d => new Date(d));
  const earliestDate = dates.length > 0
    ? new Date(Math.min(...dates)).toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' })
    : '';
  const stats = document.createElement('div');
  stats.className = 'journal-stats';
  stats.textContent = earliestDate
    ? `${allEntries.length} 条思考 · 始于 ${earliestDate}`
    : `${allEntries.length} 条思考`;
  scroll.appendChild(stats);

  allEntries.forEach(({ id, val, philosopherId, philosopherName }) => {
    const entry = document.createElement('div');
    entry.className = 'journal-entry fade-in';
    entry.setAttribute('data-concept-id', id);
    entry.setAttribute('data-philosopher-id', philosopherId);

    if (journalGlobal) {
      const pTag = document.createElement('div');
      pTag.className = 'journal-entry-philosopher';
      pTag.textContent = philosopherName;
      entry.appendChild(pTag);
    }

    const conceptName = typeof val === 'object' ? (val.conceptName || id) : id;
    const text = typeof val === 'string' ? val : val.text;
    const date = typeof val === 'object' && val.date
      ? new Date(val.date).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';

    const nameEl = document.createElement('div');
    nameEl.className = 'journal-entry-concept';
    nameEl.textContent = conceptName;
    entry.appendChild(nameEl);

    if (date) {
      const dateEl = document.createElement('div');
      dateEl.className = 'journal-entry-date';
      dateEl.textContent = date;
      entry.appendChild(dateEl);
    }

    const textEl = document.createElement('div');
    textEl.className = 'journal-entry-text';
    textEl.textContent = text;
    entry.appendChild(textEl);

    // Actions row (hidden until clicked)
    const actions = document.createElement('div');
    actions.className = 'journal-entry-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'journal-action-btn';
    editBtn.textContent = '编辑';
    editBtn.onclick = (e) => {
      e.stopPropagation();
      // Replace text with textarea
      const editor = document.createElement('textarea');
      editor.className = 'journal-entry-editor';
      editor.value = text;
      textEl.replaceWith(editor);
      editor.focus();
      editBtn.style.display = 'none';
      // Add save button
      const saveBtn = document.createElement('button');
      saveBtn.className = 'journal-action-btn';
      saveBtn.textContent = '保存';
      saveBtn.onclick = (ev) => {
        ev.stopPropagation();
        const newText = editor.value.trim();
        if (newText) {
          const refs = JSON.parse(localStorage.getItem(storageKey(philosopherId, 'reflections'))) || {};
          if (typeof refs[id] === 'object') {
            refs[id].text = newText;
          } else {
            refs[id] = { text: newText, date: new Date().toISOString(), conceptName };
          }
          localStorage.setItem(storageKey(philosopherId, 'reflections'), JSON.stringify(refs));
          if (currentPhilosopher && currentPhilosopher.id === philosopherId) {
            reflections = refs;
          }
          haptic('success');
          showToast('已更新');
          renderJournal();
        }
      };
      actions.insertBefore(saveBtn, deleteBtn);
    };

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'journal-action-btn danger';
    deleteBtn.textContent = '删除';
    let confirmTimer = null;
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      if (deleteBtn.textContent === '删除') {
        deleteBtn.textContent = '确定删除？';
        confirmTimer = setTimeout(() => {
          deleteBtn.textContent = '删除';
        }, 3000);
      } else {
        clearTimeout(confirmTimer);
        const refs = JSON.parse(localStorage.getItem(storageKey(philosopherId, 'reflections'))) || {};
        delete refs[id];
        localStorage.setItem(storageKey(philosopherId, 'reflections'), JSON.stringify(refs));
        if (currentPhilosopher && currentPhilosopher.id === philosopherId) {
          reflections = refs;
        }
        haptic('medium');
        showToast('已删除');
        renderJournal();
      }
    };

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);
    entry.appendChild(actions);

    entry.addEventListener('click', () => {
      // Close any other editing entries first
      document.querySelectorAll('.journal-entry.editing').forEach(el => {
        if (el !== entry) el.classList.remove('editing');
      });
      entry.classList.toggle('editing');
    });

    scroll.appendChild(entry);
  });
}

// ═══ Markdown-ish rendering ═══
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .split('\n\n')
    .map(para => {
      const trimmed = para.trim();
      if (!trimmed) return '';

      if (/^-{3,}$/.test(trimmed)) return '<hr>';

      if (trimmed.startsWith('> ')) {
        const inner = trimmed.replace(/^> ?/gm, '');
        let html = escapeHtml(inner)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>');
        return '<blockquote>' + html + '</blockquote>';
      }

      if (/^- /m.test(trimmed)) {
        const items = trimmed.split('\n').map(line => {
          const stripped = line.replace(/^- /, '');
          let html = escapeHtml(stripped)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
          return '<li>' + html + '</li>';
        });
        return '<ul>' + items.join('') + '</ul>';
      }

      let html = escapeHtml(trimmed)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
      return '<p>' + html + '</p>';
    })
    .join('');
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══ Reading progress bar ═══
window.addEventListener('scroll', () => {
  const active = document.querySelector('.screen.active');
  if (active?.id !== 'story-screen') return;
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? Math.min(100, (scrollTop / docHeight) * 100) : 0;
  document.getElementById('reading-progress').style.width = pct + '%';
}, { passive: true });

// ═══ Swipe-back gesture ═══
let touchStartX = 0;
let touchStartY = 0;
let swiping = false;
const swipeIndicator = document.getElementById('swipe-indicator');

document.addEventListener('touchstart', (e) => {
  const active = document.querySelector('.screen.active');
  if (active?.id !== 'story-screen' && active?.id !== 'journal-screen') return;
  const touch = e.touches[0];
  if (touch.clientX < 30) { // Left edge
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    swiping = true;
    swipeIndicator.classList.add('visible');
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dy > dx) { swiping = false; swipeIndicator.classList.remove('visible'); }
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!swiping) return;
  swipeIndicator.classList.remove('visible');
  const dx = e.changedTouches[0].clientX - touchStartX;
  swiping = false;
  if (dx > 80) {
    haptic('light');
    const active = document.querySelector('.screen.active');
    if (active?.id === 'story-screen') {
      document.getElementById('reading-progress').style.width = '0%';
      showScreen('map');
      renderMap();
    } else if (active?.id === 'journal-screen') {
      if (journalGlobal) { renderHome(); showScreen('home'); }
      else { showScreen('map'); renderMap(); }
    }
  }
});

// ═══ Onboarding ═══
const ONBOARDING_SLIDES = [
  '这不是教科书。',
  '每一个概念，是一个故事。',
  '读完，写下你想到的——\n它会成为你自己的回响。',
];
let onbIdx = 0;
function showOnboarding() {
  const ob = document.getElementById('onboarding');
  const textEl = document.getElementById('onboarding-text');
  const dots = document.querySelectorAll('.onboarding-dot');
  const nextBtn = document.getElementById('onboarding-next');
  onbIdx = 0;
  textEl.textContent = ONBOARDING_SLIDES[0];
  dots.forEach((d, i) => d.classList.toggle('active', i === 0));
  nextBtn.textContent = '继续 →';
  ob.style.display = 'flex';

  nextBtn.onclick = () => {
    haptic('light');
    onbIdx++;
    if (onbIdx >= ONBOARDING_SLIDES.length) {
      localStorage.setItem('echo/onboarded', 'true');
      ob.style.transition = 'opacity 0.6s';
      ob.style.opacity = '0';
      setTimeout(() => { ob.style.display = 'none'; ob.style.opacity = '1'; }, 600);
      return;
    }
    textEl.classList.add('fade');
    setTimeout(() => {
      textEl.textContent = ONBOARDING_SLIDES[onbIdx];
      textEl.classList.remove('fade');
      dots.forEach((d, i) => d.classList.toggle('active', i === onbIdx));
      if (onbIdx === ONBOARDING_SLIDES.length - 1) nextBtn.textContent = '开始 →';
    }, 400);
  };
}

// ═══ Keyboard shortcuts ═══
document.addEventListener('keydown', (e) => {
  // Only when no input is focused
  if (document.activeElement && ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const active = document.querySelector('.screen.active');
  if (e.key === 'j' || e.key === 'J') {
    if (active?.id === 'map-screen') {
      journalGlobal = false; renderJournal(); showScreen('journal');
    } else if (active?.id === 'home-screen') {
      journalGlobal = true; renderJournal(); showScreen('journal');
    }
  }
  if (active?.id === 'story-screen' && e.key === ' ') {
    e.preventDefault();
    window.scrollBy({ top: window.innerHeight * 0.8, behavior: 'smooth' });
  }
});
