<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>回声 · Echo</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
/* ═══════════════════════════════════════════════════════════════════
   RANEPA / Yandex Sans — Editorial Design System
   ═══════════════════════════════════════════════════════════════════ */

@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 300; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Thin.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 400; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Regular.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 400; font-style: italic; font-display: swap;
  src: url("fonts/YandexSansDisplay-RegularItalic.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Display";
  font-weight: 700; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansDisplay-Bold.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 300; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Light.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 400; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Regular.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 400; font-style: italic; font-display: swap;
  src: url("fonts/YandexSansText-RegularItalic.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 500; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Medium.woff2") format("woff2");
}
@font-face {
  font-family: "Yandex Sans Text";
  font-weight: 700; font-style: normal; font-display: swap;
  src: url("fonts/YandexSansText-Bold.woff2") format("woff2");
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  scroll-behavior: smooth;

  /* ── RANEPA Editorial — paper / crimson / ink ── */
  --bg-base:        #FFFFFF;
  --bg-elevated:    #FFFFFF;
  --bg-card:        #FFFFFF;
  --bg-deep:        #F7F5F1;   /* warm cream for hero / reading mode */

  /* Ink ramp */
  --text-primary:   #262626;   /* strongest text */
  --text-secondary: #404040;   /* body */
  --text-tertiary:  #6D6D6D;   /* caption */
  --text-faint:     #999999;   /* hint */
  --text-disabled:  #AFABAB;   /* divider */

  --border-faint:   #E6E6E6;   /* 1px hairlines */
  --border-soft:    #AFABAB;

  /* RANEPA brand */
  --crimson:        #A30236;   /* primary brand */
  --crimson-dark:   #BE003E;
  --crimson-tint:   #EEA5B4;
  --navy:           #061A6C;   /* secondary, sparingly used */
  --orange:         #F1A23F;
  --red-orange:     #EB5E3F;

  /* Legacy alias mapping (old tokens → editorial palette) */
  --gold:           var(--crimson);
  --gold-bright:    var(--crimson-dark);
  --gold-deep:      #5C0120;
  --copper:         var(--crimson);

  --accent:         var(--crimson);
  --accent-soft:    rgba(163, 2, 54, 0.04);
  --accent-strong:  var(--crimson);

  /* Fonts */
  --font-display: "Yandex Sans Display", "Yandex Sans Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --font-body:    "Yandex Sans Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

  /* Soft shadows — used sparingly */
  --shadow-sm: 0 1px 2px rgba(38,38,38,0.04);
  --shadow-md: 0 2px 4px rgba(38,38,38,0.04), 0 8px 24px rgba(38,38,38,0.05);
  --shadow-lg: 0 8px 32px rgba(38,38,38,0.08);

  background: var(--bg-base);
  color: var(--text-primary);
}

/* All philosopher accents map to RANEPA crimson — single editorial accent */
html[data-philosopher] {
  --accent:        var(--crimson);
  --accent-soft:   rgba(163, 2, 54, 0.04);
  --accent-strong: var(--crimson);
}
/* Optional: navy variant reserved for cross-references / contrast */
html[data-philosopher="foucault"] {
  --accent:        var(--navy);
  --accent-soft:   rgba(6, 26, 108, 0.04);
  --accent-strong: var(--navy);
}

body {
  min-height: 100%;
  color: var(--text-primary);
  font-family: var(--font-body);
  background: var(--bg-base);
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  position: relative;
  font-feature-settings: 'tnum' 1, 'ss01' 1;
  font-size: 15px;
  line-height: 1.55;
}

/* Display font for editorial headings */
.serif-display,
.t-display, .t-h1, .t-h2 {
  font-family: var(--font-display);
  letter-spacing: -0.01em;
}

/* Editorial eyebrow — small uppercase label */
.eyebrow {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}

/* Short hairline rule (28px) */
.rule {
  width: 28px;
  height: 1px;
  background: var(--text-primary);
  border: none;
  margin: 14px 0;
}
.rule--grey { background: var(--text-tertiary); }
.rule--crimson { background: var(--crimson); }

/* ZNum-style oversized numeric */
.znum {
  font-family: var(--font-display);
  font-feature-settings: 'tnum' 1;
  letter-spacing: 0.02em;
}

body > * { position: relative; z-index: 1; }

/* ── Screens with transitions ── */
.screen { display: none; min-height: 100vh; opacity: 0; }
.screen.active { display: block; animation: screenIn 0.5s ease-out forwards; }
.screen.screen-exit { animation: screenOut 0.3s ease-in forwards; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Story slides in from right */
#story-screen.active { animation: slideInRight 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Journal slides up */
#journal-screen.active { animation: slideInUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Map (concept list) — editorial table of contents ── */
.map-header {
  padding: calc(40px + env(safe-area-inset-top, 32px)) 24px 4px;
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}
.map-progress {
  padding: 8px 24px 6px;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--crimson);
  letter-spacing: -0.005em;
  font-feature-settings: 'tnum' 1;
}
.map-progress::after {
  content: '';
  display: block;
  width: 28px; height: 1px;
  background: var(--text-primary);
  margin-top: 14px;
}
.map-bar {
  display: none;
}
.map-bar-fill { display: none; }

.concept-list { padding: 0 0 80px; }
.concept-card {
  display: grid;
  grid-template-columns: 34px 1fr 22px;
  gap: 14px;
  align-items: center;
  width: 100%;
  padding: 14px 24px 12px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: background 0.18s ease;
}
.concept-card:focus { outline: none; }
.concept-card:hover:not(.locked) { background: rgba(163, 2, 54, 0.025); }
.concept-card.locked { cursor: default; }

/* Numeral column */
.concept-numeral {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0;
  font-feature-settings: 'tnum' 1;
  line-height: 1.1;
}
.concept-card.locked .concept-numeral {
  color: var(--text-faint);
}
.concept-card.read .concept-numeral {
  color: var(--text-faint);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}

.concept-body { min-width: 0; }
.concept-name {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 400;
  line-height: 1.2;
  color: var(--text-primary);
  letter-spacing: -0.003em;
  margin-bottom: 0;
}
.concept-card.read .concept-name { color: var(--text-tertiary); }
.concept-card.locked .concept-name { color: var(--text-faint); }
.concept-orig {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text-tertiary);
  font-style: italic;
  font-weight: 300;
  margin-left: 8px;
}
.concept-brief {
  font-family: var(--font-body);
  font-size: 11px;
  line-height: 1.45;
  color: var(--text-tertiary);
  margin-top: 4px;
  letter-spacing: 0.02em;
}
.concept-card.read .concept-brief { color: var(--text-faint); }
.concept-card.locked .concept-brief { color: var(--text-faint); }

/* Right indicator column */
.concept-indicator {
  display: flex;
  justify-content: flex-end;
  align-items: center;
}
.concept-card.read .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  background: var(--text-faint);
  border-radius: 50%;
}
.concept-card:not(.locked):not(.read) .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  border: 1px solid var(--text-faint);
}
.concept-card.locked .concept-indicator::after {
  content: '';
  width: 8px; height: 8px;
  border: 1px dashed var(--text-disabled);
}

/* Legacy concept-dot — hidden (replaced by indicator column) */
.concept-dot { display: none; }

/* Depth indent (slightly smaller in editorial style) */
.concept-card.depth-0 { padding-left: 24px; }
.concept-card.depth-1 { padding-left: 38px; }
.concept-card.depth-2 { padding-left: 52px; }
.concept-card.depth-3 { padding-left: 66px; }
.concept-card.depth-4 { padding-left: 80px; }

/* Scroll-reveal */
.concept-card {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease, background 0.2s ease;
}
.concept-card.revealed {
  transform: translateY(0);
  opacity: 1;
}
.concept-card.revealed.locked { opacity: 0.45; }

/* Newly-unlocked subtle flash */
.concept-card.just-unlocked {
  animation: unlockFlash 1.5s ease-out forwards;
}
@keyframes unlockFlash {
  0% { background: rgba(163, 2, 54, 0.06); }
  100% { background: transparent; }
}

/* ── Story reader — editorial chapter layout ── */
.story-back {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(10px + env(safe-area-inset-top, 32px)) 20px 12px;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-faint);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 14px;
}
.back-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  cursor: pointer;
  padding: 10px 6px;
  margin: -10px -6px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.back-btn:focus { outline: none; }
.back-btn:active { color: var(--crimson); }
.story-concept-label {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}

.story-scroll {
  padding: calc(72px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
  background: var(--bg-deep);
}
.story-title {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.18;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  color: var(--text-primary);
}
.story-meta {
  font-family: var(--font-display);
  font-size: 10.5px;
  font-weight: 400;
  letter-spacing: 0.18em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-faint);
}
.story-body {
  font-family: var(--font-body);
  font-size: 15.5px;
  line-height: 1.72;
  letter-spacing: 0.005em;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  margin-top: 22px;
}
.story-body p { margin-bottom: 1.05em; }
.story-body p:first-child::first-letter {
  font-family: var(--font-display);
  font-size: 3.6em;
  float: left;
  line-height: 0.85;
  margin: 4px 8px 0 -2px;
  color: var(--text-primary);
  font-weight: 700;
}

/* ── Reading progress bar ── */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 1px;
  background: var(--crimson);
  z-index: 50;
  transition: width 0.15s linear;
  pointer-events: none;
}

/* ── Reading time estimate ── */
.story-reading-time {
  font-family: var(--font-display);
  font-size: 10px;
  color: var(--text-faint);
  margin-top: 4px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

/* ── Layers (concept / now / deeper) — editorial section ── */
.layers-section {
  margin-top: 64px;
  border-top: 1px solid var(--border-faint);
  padding-top: 36px;
  position: relative;
}
.layers-section::before {
  content: '层 次';
  display: block;
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 18px;
}
.layer-tab-bar {
  display: flex;
  gap: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border-faint);
  padding-bottom: 0;
}
.layer-tab {
  background: transparent;
  border: none;
  color: var(--text-tertiary);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 8px 0 12px;
  cursor: pointer;
  transition: color 0.2s;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
}
.layer-tab:focus { outline: none; }
.layer-tab.active {
  color: var(--crimson);
  border-bottom: 1px solid var(--crimson);
  font-weight: 700;
}
.layer-content {
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.72;
  color: var(--text-secondary);
  word-break: break-word;
  min-height: 120px;
}
.layer-content p { margin-bottom: 1em; }

/* ── Links ── */
.links-section {
  margin-top: 44px;
  padding-top: 22px;
  border-top: 1px solid var(--border-faint);
}
.links-label {
  font-family: var(--font-body);
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
  margin-bottom: 14px;
}
.link-chip {
  display: inline-flex;
  align-items: center;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--text-primary);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 12.5px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 4px 0 4px;
  margin: 0 18px 8px 0;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.link-chip::after {
  content: '›';
  margin-left: 6px;
  font-weight: 400;
  color: var(--crimson);
}
.link-chip:hover { color: var(--crimson); border-bottom-color: var(--crimson); }
.link-chip:focus { outline: none; }

/* ── Reflect — editorial section ── */
.reflect-section {
  margin-top: 56px;
  padding: 32px 0 24px;
  border: none;
  border-top: 1px solid var(--border-faint);
  border-radius: 0;
  margin-bottom: 60px;
  position: relative;
}
.reflect-section::before {
  content: '回 声';
  display: block;
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--crimson);
  margin-bottom: 18px;
  background: transparent;
  position: static;
  top: auto;
  left: auto;
  padding: 0;
}
.reflect-prompt {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 14px;
  line-height: 1.4;
  letter-spacing: -0.005em;
  max-width: 30em;
}
.reflect-input {
  width: 100%;
  min-height: 132px;
  background: var(--bg-deep);
  border: none;
  border-left: 2px solid var(--crimson);
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14.5px;
  line-height: 1.7;
  resize: none;
  padding: 14px 16px;
}
.reflect-input:focus { background: rgba(163, 2, 54, 0.04); }
.reflect-input::placeholder { color: var(--text-faint); font-style: italic; }
.reflect-save {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  margin-left: auto;
  background: var(--text-primary);
  border: none;
  color: #fff;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 10px 18px;
  border-radius: 0;
  transition: background 0.2s;
}
.reflect-save:hover { background: var(--crimson); }
.reflect-save:focus { outline: none; }

/* Modal sheet variant — pulled up from bottom 78% */
.reflect-modal-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(2px);
  z-index: 60;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.reflect-modal-scrim.active {
  opacity: 1;
  pointer-events: auto;
}
.reflect-modal-sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  height: 78%;
  max-height: 78vh;
  background: #fff;
  border-radius: 16px 16px 0 0;
  box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.18);
  z-index: 70;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.reflect-modal-sheet.active { transform: translateY(0); }
.reflect-modal-handle {
  width: 38px;
  height: 4px;
  background: var(--border-faint);
  border-radius: 2px;
  margin: 8px auto 4px;
}

/* ── Markdown-like rendering ── */
.rendered strong { font-weight: 600; }
.rendered em { font-style: italic; }
.rendered blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 18px;
  margin: 20px 0;
  opacity: 0.78;
  font-style: italic;
}
.rendered ul {
  list-style: none;
  padding-left: 0;
  margin: 12px 0;
}
.rendered li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 6px;
  line-height: 1.8;
}
.rendered li::before {
  content: '\B7';
  position: absolute;
  left: 2px;
  opacity: 0.35;
}

/* ── Horizontal rule ── */
.rendered hr {
  border: none;
  border-top: 1px solid rgba(237,229,211,0.08);
  margin: 28px 0;
}

/* ── Section ornament ── */
.section-divider {
  text-align: center;
  padding: 48px 0 12px;
  font-size: 14px;
  opacity: 0.12;
  letter-spacing: 1em;
}

/* ── Tap feedback ── */
.concept-card:not(.locked):active { opacity: 0.7; }
.link-chip:active { opacity: 0.9; }
.layer-tab:active { opacity: 0.6; }

/* ── Theme toggle ── */
.theme-toggle {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top, 32px));
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(237,229,211,0.04);
  border: 1px solid rgba(237,229,211,0.1);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.3s;
}
.theme-toggle:hover { background: rgba(237,229,211,0.08); }
.theme-toggle:focus { outline: none; }
.theme-toggle:active { transform: scale(0.92); }

/* ── Paper-mode overrides for elements using rgba(237,229,211,X) ── */
html[data-theme="paper"] .theme-toggle {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .theme-toggle:hover {
  background: rgba(42,37,32,0.08);
}

/* Paper mode: dial back the brightness of borders, dividers, surfaces */
html[data-theme="paper"] body::after { opacity: 0.04; }
html[data-theme="paper"] body::before {
  background:
    radial-gradient(ellipse at 50% 0%, var(--ambient) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(160,130,80,0.06) 0%, transparent 70%);
}

/* In paper mode, the cream-tint rgbas become dark-tints */
html[data-theme="paper"] .nav-entry {
  background: var(--bg-base);
}
html[data-theme="paper"] .nav-grid {
  background: rgba(42,37,32,0.1);
  border-color: rgba(42,37,32,0.12);
}
html[data-theme="paper"] .nav-entry:hover {
  background: rgba(42,37,32,0.05);
}
html[data-theme="paper"] .nav-entry:active {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .nav-group-sub {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .brain-light {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(42,37,32,0.04) 0%, transparent 70%),
    rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card {
  border-bottom-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card:hover {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge:hover {
  background: rgba(42,37,32,0.06);
}
html[data-theme="paper"] .mind-card {
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card {
  background: rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card:hover {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.18);
}
html[data-theme="paper"] .concept-card {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .concept-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .map-bar,
html[data-theme="paper"] .philosopher-bar,
html[data-theme="paper"] .dim-row-track,
html[data-theme="paper"] .mini-bar-track {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .story-back,
html[data-theme="paper"] .journal-header {
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .echo-banner {
  background: linear-gradient(to top, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .reflect-section {
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .reflect-section::before {
  background: var(--bg-base);
}
html[data-theme="paper"] .quote-card:hover,
html[data-theme="paper"] .scenario-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .stat-gain-row {
  background: rgba(244,237,224,0.95);
  border-color: var(--accent);
}
html[data-theme="paper"] .level-up,
html[data-theme="paper"] .celebration {
  background: rgba(244,237,224,0.92);
}
html[data-theme="paper"] .achievement-popup {
  background: rgba(244,237,224,0.95);
}

/* ── Home — editorial masthead ── */
.home-header {
  padding: calc(40px + env(safe-area-inset-top, 32px)) 24px 4px;
  text-align: left;
  font-family: var(--font-body);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 600;
  color: var(--text-tertiary);
}
.home-title {
  padding: 8px 24px 4px;
  font-family: var(--font-display);
  font-size: 36px;
  line-height: 1.05;
  font-weight: 700;
  letter-spacing: -0.01em;
  text-align: left;
  color: var(--text-primary);
}
.home-title em {
  font-weight: 300;
  font-style: italic;
  color: var(--crimson);
}
.home-subtitle {
  padding: 6px 24px 4px;
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-tertiary);
  text-align: left;
  font-style: italic;
}
.home-subtitle::after {
  content: '';
  display: block;
  width: 28px; height: 1px;
  background: var(--text-primary);
  margin-top: 16px;
  margin-bottom: 4px;
}
.home-quote {
  margin: 0 28px 44px;
  padding: 18px 22px;
  font-size: 15px;
  line-height: 1.75;
  font-style: italic;
  max-width: none;
  text-align: left;
  transition: opacity 0.8s ease;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  box-shadow: var(--shadow-sm);
}
.philosopher-list {
  padding: 0 0 48px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.philosopher-card {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 16px;
  align-items: start;
  width: 100%;
  padding: 22px 24px 20px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  position: relative;
  transition: background 0.18s ease;
}
.philosopher-card:last-child {
  border-bottom: 1px solid var(--border-faint);
}
.philosopher-card:hover {
  background: rgba(163, 2, 54, 0.025);
}
.philosopher-card:active { background: rgba(163, 2, 54, 0.045); }
.philosopher-card:focus { outline: none; }

/* Roman numeral column */
.philosopher-numeral {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0;
  font-feature-settings: 'tnum' 1;
  line-height: 1.1;
  padding-top: 2px;
}
.philosopher-numeral--read {
  color: var(--text-faint);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}
.philosopher-numeral--current {
  color: var(--crimson);
  font-weight: 700;
}

.philosopher-body { min-width: 0; }
.philosopher-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.005em;
  color: var(--text-primary);
  margin-bottom: 6px;
}
.philosopher-orig {
  font-family: var(--font-display);
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  margin-left: 8px;
  color: var(--text-tertiary);
  letter-spacing: 0;
}
.philosopher-dates {
  font-family: var(--font-display);
  font-size: 10.5px;
  color: var(--text-tertiary);
  margin-bottom: 12px;
  letter-spacing: 0.16em;
  font-feature-settings: 'tnum' 1;
  text-transform: uppercase;
}
.philosopher-question {
  font-family: var(--font-body);
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--text-secondary);
  margin-bottom: 12px;
  max-width: 28em;
}
.philosopher-progress {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-tertiary);
}
.philosopher-progress--active { color: var(--crimson); }
.philosopher-bar {
  margin-top: 8px;
  height: 1px;
  background: var(--border-faint);
  overflow: hidden;
  max-width: 140px;
}
.philosopher-bar-fill {
  height: 100%;
  background: var(--crimson);
  transition: width 0.4s ease;
}

/* Right indicator column */
.philosopher-indicator {
  align-self: center;
  color: var(--text-faint);
  display: flex;
  align-items: center;
}

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 1;
  transition: opacity 0.4s ease;
}
.loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loading-dots { font-size: 18px; opacity: 0.2; letter-spacing: 0.3em; }
@keyframes pulse { 0%,100%{ opacity:0.15 } 50%{ opacity:0.4 } }
.loading-dots { animation: pulse 1.2s ease-in-out infinite; }

/* ── Journal screen ── */
.journal-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(16px + env(safe-area-inset-top, 32px)) 20px 16px;
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
.journal-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.journal-title {
  font-size: 22px;
  margin-bottom: 32px;
  opacity: 0.6;
}
.journal-empty {
  font-size: 15px;
  opacity: 0.2;
  line-height: 1.8;
  padding-top: 40px;
}
.journal-entry {
  margin-bottom: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(237,229,211,0.06);
}
.journal-entry-concept {
  font-size: 16px;
  opacity: 0.6;
  margin-bottom: 4px;
}
.journal-entry-date {
  font-size: 11px;
  opacity: 0.15;
  margin-bottom: 12px;
}
.journal-entry-text {
  font-size: 15px;
  line-height: 1.8;
  opacity: 0.7;
  white-space: pre-wrap;
}
.journal-entry-philosopher {
  font-size: 10px;
  opacity: 0.2;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

/* ── Map nav bar (home + journal buttons) ── */
.map-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 28px 8px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.2;
  padding: 8px 4px;
}
.nav-btn:hover { opacity: 0.4; }
.nav-btn:focus { outline: none; }

/* ── Transitions ── */
.fade-in {
  animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Staggered fade-in for child elements */
.stagger > :nth-child(1) { animation-delay: 0s; }
.stagger > :nth-child(2) { animation-delay: 0.08s; }
.stagger > :nth-child(3) { animation-delay: 0.16s; }
.stagger > :nth-child(4) { animation-delay: 0.24s; }
.stagger > :nth-child(5) { animation-delay: 0.32s; }
.stagger > * { animation-fill-mode: backwards; }

/* ── Swipe hint on story screen ── */
.swipe-indicator {
  position: fixed;
  left: 0; top: 50%;
  width: 4px; height: 48px;
  margin-top: -24px;
  background: rgba(237,229,211,0.08);
  border-radius: 0 4px 4px 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 11;
}
.swipe-indicator.visible { opacity: 1; }

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(237,229,211,0.08);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
.toast.show {
  opacity: 0.7;
  transform: translateX(-50%) translateY(0);
}

/* ── 正在进行的实践 ── */
.in-progress-practice {
  margin: 0 28px 24px;
  padding: 18px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.in-progress-practice:hover {
  background: var(--bg-card);
  border-color: var(--gold);
}
.ipp-label {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--gold);
  margin-bottom: 8px;
}
.ipp-title {
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.9;
}
.ipp-status {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  color: var(--gold-bright);
  letter-spacing: 0.05em;
}
.ipp-bar {
  height: 2px;
  background: var(--border-faint);
  border-radius: 1px;
  overflow: hidden;
}
.ipp-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}

/* ── 心智之灯 — editorial 雷达图 ── */
.brain-light {
  margin: 0 24px 32px;
  padding: 24px 0 18px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border-faint);
  border-bottom: 1px solid var(--border-faint);
  border-radius: 0;
  position: relative;
  overflow: visible;
  box-shadow: none;
}
.bl-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
  padding: 0 4px;
}
.bl-label {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--text-tertiary);
}
.bl-level {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--crimson);
}
.bl-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 22px 12px 8px;
  position: relative;
  min-height: 280px;
}
.bl-svg { width: 100%; max-width: 320px; height: auto; }
.bl-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-top: 8px;
  padding: 0 4px;
  font-family: var(--font-body);
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 0.04em;
}
.bl-meta .bl-readcount-num {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--crimson);
  margin-right: 4px;
  letter-spacing: 0;
}
.bl-streak {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.bl-streak-flame {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--crimson);
  margin-right: 6px;
  vertical-align: middle;
}
.bl-desc {
  font-family: var(--font-body);
  font-size: 12.5px;
  color: var(--text-tertiary);
  margin-top: 8px;
  text-align: left;
  padding: 0 4px;
  font-style: italic;
  max-width: 30em;
  line-height: 1.5;
}

/* ── 每日挑战 — 简洁卡片 ── */
.daily-challenge {
  margin: 0 28px 32px;
  padding: 20px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.daily-challenge:hover {
  border-color: var(--border-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.daily-challenge:active { transform: translateY(0); }
.dc-label {
  font-size: 12px;
  letter-spacing: 0.2em;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--gold);
}
.dc-text {
  font-size: 17px;
  opacity: 0.95;
  line-height: 1.55;
  font-weight: 500;
}
.dc-action {
  font-size: 13px;
  opacity: 0.65;
  margin-top: 10px;
  color: var(--gold);
  letter-spacing: 0.01em;
}

/* ── 成就弹层 ── */
.achievement-popup {
  position: fixed;
  top: calc(60px + env(safe-area-inset-top, 32px));
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(10,8,7,0.95);
  border: 1px solid var(--accent);
  border-radius: 30px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  z-index: 200;
  transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter: blur(10px);
}
.achievement-popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.ap-icon {
  font-size: 20px;
  color: var(--accent-strong);
}
.ap-text {
  font-size: 13px;
}
.ap-label {
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 0.2em;
}
.ap-name {
  opacity: 0.95;
}

/* ── Achievements screen ── */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.achievement-tile {
  padding: 20px 14px 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
}
/* Heraldic corner ornaments */
.achievement-tile::before,
.achievement-tile::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border: 1px solid var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.achievement-tile::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
.achievement-tile::after { bottom: 3px; right: 3px; border-left: none; border-top: none; }
.achievement-tile.locked {
  opacity: 0.3;
}
.achievement-tile.earned {
  border-color: var(--gold);
  background:
    radial-gradient(circle at 50% 30%, var(--accent-soft) 0%, transparent 60%),
    var(--bg-card);
}
.achievement-tile.earned::before,
.achievement-tile.earned::after {
  opacity: 0.7;
}
.at-icon {
  font-size: 32px;
  opacity: 0.85;
  margin-bottom: 10px;
  color: var(--gold-bright);
  display: block;
}
.achievement-tile.locked .at-icon {
  color: var(--text-tertiary);
}
.at-name {
  font-size: 13px;
  margin-bottom: 6px;
  opacity: 0.95;
  letter-spacing: 0.02em;
}
.at-desc {
  font-size: 11px;
  opacity: 0.5;
  line-height: 1.55;
  font-style: italic;
}

/* ── Mind card (home) ── */
.mind-card {
  margin: 0 28px 32px;
  padding: 22px 24px;
  border: 1px solid rgba(237,229,211,0.06);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
.mind-card:hover { background: rgba(237,229,211,0.02); border-color: rgba(237,229,211,0.12); }
.mind-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.mind-card-label {
  font-size: 10px;
  opacity: 0.35;
  letter-spacing: 0.25em;
}
.mind-card-total {
  font-size: 13px;
  opacity: 0.5;
}
.mind-card-radar {
  display: flex;
  align-items: center;
  gap: 18px;
}
.mind-card-radar svg { flex-shrink: 0; }
.mind-card-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mini-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.mini-bar-label { width: 42px; opacity: 0.5; }
.mini-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(237,229,211,0.06);
  border-radius: 1.5px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: rgba(237,229,211,0.4);
  transition: width 0.6s ease;
}
.mini-bar-val {
  width: 24px;
  text-align: right;
  opacity: 0.4;
  font-size: 10px;
}

/* ── Mind screen ── */
.mind-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 560px;
  margin: 0 auto;
}
.mind-title {
  font-size: 24px;
  opacity: 0.85;
  margin-bottom: 4px;
}
.mind-subtitle {
  font-size: 12px;
  opacity: 0.3;
  margin-bottom: 36px;
  letter-spacing: 0.1em;
}
.mind-radar-wrapper {
  display: flex;
  justify-content: center;
  margin: 0 0 40px;
}
.mind-radar { display: block; }
.dim-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 24px;
}
.dim-row {
  position: relative;
}
.dim-row-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.dim-row-symbol {
  font-size: 14px;
  opacity: 0.5;
}
.dim-row-name {
  font-size: 17px;
  opacity: 0.9;
}
.dim-row-sub {
  font-size: 12px;
  opacity: 0.3;
  margin-left: auto;
  font-style: italic;
}
.dim-row-track {
  height: 4px;
  background: rgba(237,229,211,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.dim-row-fill {
  height: 100%;
  background: rgba(237,229,211,0.45);
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.dim-row-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.4;
}
.dim-level { letter-spacing: 0.1em; }
.dim-score { font-feature-settings: 'tnum'; }
.mind-total {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(237,229,211,0.06);
  text-align: center;
  font-size: 13px;
  opacity: 0.4;
  letter-spacing: 0.15em;
}

/* ── Stat gain animation overlay ── */
.stat-gain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 110;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
}
.stat-gain.show {
  animation: statGainFlow 2.5s ease-out forwards;
}
@keyframes statGainFlow {
  0%   { opacity: 0; transform: translateY(20px); }
  20%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.stat-gain-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  background: rgba(0,0,0,0.85);
  padding: 10px 22px;
  border: 1px solid var(--accent);
  border-radius: 24px;
  opacity: 0.95;
}
.stat-gain-symbol { opacity: 0.7; }
.stat-gain-name { opacity: 0.85; }
.stat-gain-delta {
  color: var(--accent-strong);
  font-weight: 600;
  font-feature-settings: 'tnum';
}

/* ── Level-up overlay ── */
.level-up {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 160;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
}
.level-up-label {
  font-size: 11px;
  opacity: 0.4;
  letter-spacing: 0.35em;
  margin-bottom: 24px;
}
.level-up-symbol {
  font-size: 48px;
  opacity: 0.7;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.level-up-text {
  font-size: 26px;
  line-height: 1.6;
  opacity: 0.85;
  margin-bottom: 36px;
}
.level-up-dim {
  font-size: 14px;
  opacity: 0.45;
  letter-spacing: 0.1em;
}

/* ── Concept card dimension hint ── */
.concept-dim-hint {
  display: inline-flex;
  gap: 4px;
  margin-top: 6px;
  font-size: 10px;
  opacity: 0.3;
  letter-spacing: 0.15em;
}

/* ── Home grouped navigation (illuminated manuscript style) ── */
.home-nav-groups {
  padding: 24px 28px 100px;
  display: flex;
  flex-direction: column;
  gap: 52px;
}
.nav-group {
  display: flex;
  flex-direction: column;
  position: relative;
}
.nav-group-label {
  font-size: 13px;
  letter-spacing: 0.18em;
  opacity: 0.95;
  margin-bottom: 4px;
  color: var(--text-primary);
  text-align: left;
  font-weight: 600;
}
.nav-group-sub {
  font-size: 13px;
  opacity: 0.45;
  text-align: left;
  margin-bottom: 18px;
  letter-spacing: 0.01em;
  color: var(--text-secondary);
}
.nav-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  background: transparent;
  border: none;
  border-radius: 0;
  overflow: visible;
  position: relative;
  box-shadow: none;
}
.nav-entry {
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 20px 20px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 86px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  border-radius: 14px;
  box-shadow: var(--shadow-sm);
}
.nav-entry:hover {
  border-color: var(--border-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.nav-entry:active {
  transform: translateY(0);
  box-shadow: var(--shadow-sm);
}
.nav-entry:focus { outline: none; }
.ne-icon {
  width: 22px;
  height: 22px;
  margin-bottom: 12px;
  opacity: 0.85;
  color: var(--gold);
  display: block;
}
.ne-icon svg {
  width: 100%;
  height: 100%;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.4;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ne-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 4px;
  letter-spacing: 0.005em;
  color: var(--text-primary);
}
.ne-meta {
  font-size: 12px;
  opacity: 0.55;
  letter-spacing: 0.01em;
  line-height: 1.5;
  color: var(--text-secondary);
  font-style: normal;
}

/* ── Settings screen ── */
.settings-section { margin-bottom: 32px; }
.settings-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 12px;
  color: rgba(237,229,211,0.55);
}
.settings-row {
  padding: 14px 0;
  border-bottom: 1px solid rgba(237,229,211,0.05);
}
.settings-input {
  width: 100%;
  background: transparent;
  border: 1px solid var(--accent-soft);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
}
.settings-input:focus { border-color: var(--accent); }
.settings-help {
  font-size: 12px;
  opacity: 0.4;
  margin-top: 8px;
  line-height: 1.7;
}
.settings-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 22px;
  cursor: pointer;
  margin-top: 12px;
  opacity: 0.85;
}
.settings-btn:hover { background: var(--accent-soft); opacity: 1; }
.settings-btn:focus { outline: none; }
.settings-status {
  font-size: 12px;
  margin-top: 12px;
  font-style: italic;
}
.settings-status.ok { color: rgba(150,200,160,0.7); }
.settings-status.err { color: rgba(220,140,120,0.7); }

/* ── Chat screen ── */
.chat-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 680px;
  margin: 0 auto;
  min-height: calc(100vh - 80px);
}
.chat-intro {
  text-align: center;
  padding: 40px 20px;
  opacity: 0.5;
  font-size: 14px;
  line-height: 1.85;
  font-style: italic;
}
.chat-bubble {
  margin-bottom: 18px;
  padding: 14px 18px;
  border-radius: 14px;
  max-width: 85%;
  font-size: 15px;
  line-height: 1.85;
  white-space: pre-wrap;
}
.chat-bubble.user {
  background: rgba(237,229,211,0.06);
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.chat-bubble.philosopher {
  background: rgba(237,229,211,0.02);
  border: 1px solid var(--accent-soft);
  border-bottom-left-radius: 4px;
  position: relative;
}
.chat-bubble-name {
  font-size: 11px;
  opacity: 0.55;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
  color: var(--accent-strong);
}
.chat-bubble.loading::after {
  content: '...';
  display: inline-block;
  animation: chatPulse 1.2s ease-in-out infinite;
}
@keyframes chatPulse {
  0%,100% { opacity: 0.3; }
  50% { opacity: 0.9; }
}
.chat-input-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 14px 20px calc(14px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(to top, var(--bg-base) 70%, transparent);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  z-index: 20;
}
.chat-input {
  flex: 1;
  background: rgba(237,229,211,0.04);
  border: 1px solid rgba(237,229,211,0.08);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  line-height: 1.6;
  padding: 12px 14px;
  border-radius: 20px;
  outline: none;
  resize: none;
  max-height: 120px;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send {
  background: var(--accent);
  border: none;
  color: var(--text-primary);
  font-size: 18px;
  width: 44px;
  height: 44px;
  border-radius: 22px;
  cursor: pointer;
  flex-shrink: 0;
}
.chat-send:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
.chat-send:focus { outline: none; }

/* Chat button on philosopher / archive screen */
.chat-fab {
  display: inline-block;
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 22px;
  border-radius: 22px;
  cursor: pointer;
  opacity: 0.85;
  margin-top: 20px;
}
.chat-fab:hover { background: var(--accent-soft); opacity: 1; }
.chat-fab:focus { outline: none; }

/* ── Extended Masters screens ── */
.extended-scroll, .extended-master-scroll, .extended-concept-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 680px;
  margin: 0 auto;
}
.ext-title {
  font-size: 28px;
  opacity: 0.95;
  margin-bottom: 6px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.ext-subtitle {
  font-size: 13px;
  opacity: 0.55;
  margin-bottom: 32px;
}
.ext-master-card {
  display: block;
  width: 100%;
  padding: 24px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.ext-master-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--border-soft);
}
.ext-master-card:focus { outline: none; }
.ext-master-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 50%;
  background: radial-gradient(circle at 100% 50%, var(--card-accent, transparent) 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
}
.ext-master-card[data-color="nietzsche"] { --card-accent: rgba(140,90,30,0.4); }
.ext-master-card[data-color="foucault"] { --card-accent: rgba(95,60,130,0.4); }
.ext-master-name {
  font-size: 26px;
  line-height: 1.25;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.005em;
}
.ext-master-orig {
  font-size: 13px;
  color: var(--gold);
  font-style: italic;
  margin-left: 10px;
  font-weight: 400;
}
.ext-master-meta {
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 14px;
}
.ext-master-intro {
  font-size: 14px;
  line-height: 1.7;
  opacity: 0.75;
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.ext-master-count {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
}

/* Master detail (intro + concept list) */
.ext-master-header {
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border-faint);
}
.ext-master-bigname {
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.ext-master-bigorig {
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 10px;
}
.ext-master-bigmeta {
  font-size: 12px;
  opacity: 0.5;
  margin-bottom: 20px;
  letter-spacing: 0.03em;
}
.ext-master-bigintro {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.78;
  white-space: pre-wrap;
}
.ext-concepts-label {
  font-size: 13px;
  letter-spacing: 0.18em;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.ext-concept-card {
  display: block;
  width: 100%;
  padding: 20px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
}
.ext-concept-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.ext-concept-card:focus { outline: none; }
.ext-concept-name {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 4px;
}
.ext-concept-orig {
  font-size: 12px;
  color: var(--gold);
  font-style: italic;
  margin-bottom: 8px;
}
.ext-concept-brief {
  font-size: 13px;
  line-height: 1.6;
  opacity: 0.65;
}

/* Concept detail (parable + teaching) */
.ext-c-name {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}
.ext-c-orig {
  font-size: 14px;
  font-style: italic;
  color: var(--gold);
  margin-bottom: 8px;
}
.ext-c-brief {
  font-size: 15px;
  line-height: 1.7;
  opacity: 0.85;
  padding: 14px 18px;
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  margin-bottom: 36px;
}
.ext-c-section {
  margin-bottom: 36px;
}
.ext-c-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
  text-transform: uppercase;
}
.ext-c-parable {
  font-size: 16px;
  line-height: 1.9;
  white-space: pre-wrap;
  font-family: 'Cormorant Garamond', 'Songti SC', Georgia, serif;
  padding: 24px 24px;
  background: var(--bg-deep);
  border-radius: 12px;
  color: var(--text-primary);
}
.ext-c-teaching {
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.85;
  white-space: pre-wrap;
}

/* ── Letters screens ── */
.letters-scroll, .letter-detail-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 80px;
  max-width: 640px;
  margin: 0 auto;
}
.letters-title {
  font-size: 28px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.letters-subtitle {
  font-size: 12px;
  opacity: 0.35;
  font-style: italic;
  margin-bottom: 40px;
}
.letter-card {
  display: block;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(237,229,211,0.05);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 22px 0;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.letter-card:active { opacity: 0.7; transform: translateX(3px); }
.letter-card:focus { outline: none; }
.lc-pair {
  font-size: 16px;
  opacity: 0.9;
  margin-bottom: 6px;
}
.lc-arrow { opacity: 0.4; margin: 0 8px; }
.lc-date {
  font-size: 11px;
  letter-spacing: 0.15em;
  opacity: 0.4;
  margin-bottom: 8px;
}
.lc-summary {
  font-size: 13px;
  opacity: 0.55;
  font-style: italic;
  line-height: 1.6;
}

/* Detail — typed-letter feel */
.letter-paper {
  margin: 20px 0 0;
  padding: 36px 36px 32px;
  background: rgba(237,229,211,0.02);
  border: 1px solid rgba(237,229,211,0.06);
  border-radius: 2px;
  position: relative;
}
.letter-meta-top {
  font-size: 12px;
  opacity: 0.45;
  margin-bottom: 24px;
  line-height: 1.7;
  font-style: italic;
}
.letter-salute {
  font-size: 17px;
  opacity: 0.92;
  margin-bottom: 24px;
  font-style: italic;
}
.letter-body {
  font-size: 16px;
  line-height: 2.0;
  opacity: 0.88;
  white-space: pre-wrap;
  font-family: 'Cormorant Garamond', 'Songti SC', 'STSong', Georgia, serif;
}
.letter-signature {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px dashed rgba(237,229,211,0.08);
  font-size: 15px;
  opacity: 0.85;
  font-style: italic;
  white-space: pre-wrap;
  text-align: right;
}
.letter-summary {
  font-size: 13px;
  opacity: 0.55;
  font-style: italic;
  text-align: center;
  padding: 14px 0;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(237,229,211,0.05);
}

/* ── Practice card progress states ── */
.pr-card-status {
  font-size: 11px;
  letter-spacing: 0.2em;
  opacity: 0.6;
  margin-bottom: 6px;
  padding-left: 14px;
  color: var(--text-secondary);
}
.practice-card.in-progress .pr-card-status { color: var(--gold-bright); opacity: 0.9; }
.practice-card.completed .pr-card-status { color: var(--gold); opacity: 1; }
.practice-card.completed { border-left: 3px solid var(--gold); padding-left: 12px; }
.practice-card.completed::before { background: var(--gold); width: 3px; }
.practice-card.in-progress::before { width: 2px; }
.pr-card-bar {
  margin: 12px 0 0 14px;
  height: 2px;
  background: var(--border-faint);
  border-radius: 1px;
  overflow: hidden;
  max-width: 200px;
}
.pr-card-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}

/* ── Practice detail: locked-step UI ── */
.pr-progress-bar {
  margin: 24px 0 12px;
  height: 3px;
  background: var(--border-soft);
  border-radius: 1.5px;
  overflow: hidden;
}
.pr-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}
.pr-progress-text {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 32px;
  letter-spacing: 0.05em;
  color: var(--gold);
}
.pr-completed-badge {
  margin: 24px 0 32px;
  padding: 16px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 0.3em;
  color: var(--gold-bright);
  background: var(--accent-soft);
  border: 1px solid var(--gold);
  border-radius: 2px;
  position: relative;
}
.pr-completed-badge::before,
.pr-completed-badge::after {
  content: '✦';
  margin: 0 14px;
  opacity: 0.6;
}

.pr-day {
  position: relative;
  padding: 22px 0 22px 80px;
  border-bottom: 1px solid var(--border-faint);
  transition: opacity 0.4s, background 0.3s;
}
.pr-day:last-child { border-bottom: none; }
.pr-day-header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  margin-bottom: 12px;
  position: relative;
}
.pr-day-number {
  position: absolute;
  left: -80px;
  top: 2px;
  width: 60px;
  font-size: 11px;
  letter-spacing: 0.15em;
  opacity: 0.7;
  text-align: right;
  color: var(--gold);
  font-feature-settings: 'tnum';
}
.pr-day-state {
  font-size: 10px;
  letter-spacing: 0.25em;
  opacity: 0.5;
  text-transform: uppercase;
}
.pr-day-state.done { color: var(--gold); opacity: 0.85; }
.pr-day-state.current-label {
  color: var(--gold-bright);
  opacity: 1;
  padding: 3px 10px;
  border: 1px solid var(--gold);
  border-radius: 12px;
}
.pr-day-state.boss-label {
  color: var(--gold-bright);
  opacity: 1;
  padding: 3px 10px;
  border: 1px solid var(--gold-bright);
  border-radius: 12px;
  background: var(--accent-soft);
}

.pr-day.done { opacity: 0.55; }
.pr-day.done .pr-day-task { text-decoration: line-through; text-decoration-color: var(--text-faint); }
.pr-day.locked {
  opacity: 0.3;
}
.pr-day.locked .pr-day-number {
  opacity: 0.3;
}

.pr-day.current {

.cp-title {
  font-size: 26px;

}

  font-size: 13px;

  border-bottom: 1px solid var(--border-faint);
}
.cp-question {
  display: block;
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 18px 22px;
  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  position: relative;
}
.cp-question:hover { border-color: var(--gold); }
.cp-question:focus { outline: none; }
.cp-question.selected {
  background: var(--accent-soft);
  border-color: var(--gold);
}
.cp-question.selected::after {
  content: '× 伪';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--gold-bright);
  letter-spacing: 0.15em;
}
.cp-q-text {
  font-size: 16px;

}

  background: var(--accent-soft);

  font-family: inherit;
  font-size: 14px;
  padding: 12px 36px;
  border-radius: 22px;
  cursor: pointer;
  letter-spacing: 0.15em;
  transition: all 0.2s;
}
.cp-submit-btn:hover { background: var(--accent); }
.cp-submit-btn:active { transform: scale(0.97); }
.cp-submit-btn:focus { outline: none; }
.cp-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  text-align: center;

        protagonist: { name: '林望舒', age: 34, occupation: '律师' },
        body: '林望舒接过 200 个案子——民事、商事、婚姻、遗产。她以为自己看过了所有人性的面相。\n\n直到这个案子。\n\n委托人是个 38 岁的女人，姓陈。陈女士的父亲去年去世，留下一套 3000 万的房产和一个家族企业 20% 的股份。父亲生前的遗嘱说"由女儿继承"。\n\n哥哥不服。理由是: 父亲生前最后两年痴呆，遗嘱是被女儿"哄"出来的。\n\n第一次见面，陈女士哭着说: "他从我 5 岁起就欺负我。我爸最后 10 年生病——都是我在照顾。这房子、这股份——是我应得的。"\n\n林望舒同情她。她准备了详尽的证据——医院记录、护工证词、银行转账——证明这 10 年都是陈女士在照顾父亲。\n\n庭审第一天，林望舒站起来陈述。她讲了 30 分钟——逻辑严密、证据扎实。她以为自己赢了。\n\n对方律师站起来。她讲述哥哥的版本。\n\n那个版本里——哥哥 18 岁就被父亲送到上海读书，他一辈子在尝试"成为父亲想要的人"，他的"不回家"不是不爱——是他知道每次回去都让父亲失望。父亲晚年的痴呆中——他每周都打电话——只是父亲已经不记得他了。陈女士照顾父亲的方式——温柔但也强势——把哥哥的存在从父亲晚年慢慢"剪掉"了。\n\n林望舒坐在被告席听了 40 分钟。\n\n她以为对方在编故事。但她看着对方律师拿出的证据——大学时期父亲给哥哥的信、哥哥每周打电话的记录、心理咨询师的证词。\n\n这些她不知道。\n\n她回到办公室，重新读卷宗。\n\n她发现一件可怕的事——所有的"事实"——根据从哪个位置看——可以构成两个完全不同的故事。\n\n她和陈女士一起看到的——是"我被欺负 30 年，现在要拿回应得的"。哥哥的律师看到的——是"我一辈子在赢得父亲的爱，最后还是输了"。\n\n两个都是真的。\n\n林望舒那一晚没睡。她想——她过去 10 年——每一个案子——她都站在某个委托人的位置上——为他"看清"真相。但她从来没看过对面的位置。\n\n她不是不能。她只是没人请她看。\n\n她的工作——本来就是单边的。\n\n但这一刻——她明白了——"对错"从来不是事件的属性。是从某个位置看事件得出的判断。换一个位置——同一个事件可以构成完全不同的故事。\n\n她第二天去找陈女士: "我建议你考虑调解。"\n\n陈女士愤怒: "你为什么倒戈？"\n\n林望舒: "我没倒戈。我在告诉你一个我看见的事——你哥哥也是从他的位置看的，那个位置上他没错。"\n\n陈女士走了。换了律师。\n\n林望舒那年的成功率从 80% 掉到 50%——她越来越多地建议调解。她在律所的地位下降。\n\n但她内部更安静了。\n\n3 年后她离开律所，开了一家"商业调解咨询公司"。她不再代理任何一边——她让双方坐下来，一起看清。\n\n第一年她的收入只有过去的 1/3。第三年——她服务的客户中有 70% 都成了她的回头客——因为她"调解"过的关系，活得更久。\n\n那年她办公室挂了一句话——是她自己抄的:\n\n**"分别本是后加的。"**\n\n她偶尔会想起那个第一个让她"沉默"的案子。她不知道陈女士和哥哥后来怎么样了。她希望他们的官司——不管谁赢——都没有让他们成为终身的敌人。',
        layers: {
          concept: '"齐物" 是庄子最深的洞察之一。\n\n他说: 万物原本无分别。"美丑"是相对于看的位置。"是非"是相对于立场。"大小"是相对于参照。\n\n把所有相对的二元都看穿——你就回到了"齐物"——一切平等。\n\n这不是相对主义——是看穿"分别"本身。\n\n林望舒做的不是放弃判断——是看清判断从哪里出发。从哪个位置看——决定了你看到的"对错"。\n\n这个洞察让她从"对抗的律师"变成"调解的人"——她不再为某一边赢，她为双方都能继续往下活。',
          now: '这个洞察现代每一刻都在用。\n\n吵架——你和对方都觉得"我对"。但你们没有错——你们只是从不同位置看同一件事。\n\n网络骂战——双方都觉得"对方傻"。但双方从各自的位置看都合理。\n\n职场分歧——你和同事都觉得"我才是对的"。但从你们各自的位置看——都是真的。\n\n齐物不是要你"不判断"。是要你判断之前先问: 我是从哪个位置看的？换一个位置呢？',
          deeper: '齐物有一个更深的层面: 看穿"我"和"非我"的分别。\n\n你以为有一个"我"——这个我在做判断、在喜欢、在恨。但庄子说: 这个"我"也是分别的产物。\n\n庄周梦见自己是蝴蝶——醒来后不确定自己是庄周还是蝴蝶。\n\n如果你能在某一刻——真的进入另一个人的位置——你就同时是他，也是你。\n\n这是齐物的终点: 不只看穿对错，看穿"我"。',

      {

        title: '退休那天种花',
        protagonist: { name: '老周', age: 55, occupation: '刚退休' },
        body: '老周 55 岁退休那天，他朋友给他发了一条祝福: "祝你退休生活精彩——发挥余热，活出第二人生。"\n\n老周看着这条消息——突然有点累。\n\n他在脑子里数——他这一辈子做的所有事，都是"有用"的事:\n\n18 岁高考——为了"有用"的大学。\n22 岁工作——选了"有用"的行业。\n28 岁结婚——找了一个"有用"的对象（门当户对、家境稳定）。\n35 岁买房——为了"有用"的资产。\n45 岁升职——为了"有用"的地位。\n55 岁退休——朋友说应该"发挥余热"——做"有用"的事。\n\n他这一辈子做的所有事都是为了有用。\n\n他想做点没用的事。\n\n那天他去花鸟市场，买了 10 盆兰花。他不懂养兰——他选的全凭"看着喜欢"。\n\n他妻子问: "你买这些干嘛？"\n\n他说: "看。"\n\n妻子: "看什么？"\n\n他说: "就看着。"\n\n妻子摇头: "你也太闲了。"\n\n第一周他每天看 2 小时。第二周他开始研究兰花——但不是为了"养好"——是为了知道每一盆叫什么名字。第三周他写了一个本子——记录每一盆的状态。\n\n他妻子说: "你这样下去，可以开兰花店了——有商机。"\n\n他笑了笑没说话。\n\n那本子他没给任何人看。他不打算开店。他不打算"做成什么"。\n\n他就是想看着这 10 盆兰花。\n\n半年后，他朋友圈里同期退休的人——一个开始做自媒体（发挥余热）、一个开始做投资讲座（发挥余热）、一个开始做志愿者协会会长（发挥余热）。\n\n他和这些朋友聚餐——他们说他: "老周你怎么什么都不做？"\n\n老周说: "我在养兰花。"\n\n"养了多少盆？"\n\n"10 盆。"\n\n"卖多少钱？"\n\n"不卖。"\n\n"那你养它们干嘛？"\n\n老周想了想: "我就喜欢看它们。"\n\n朋友们换话题了。\n\n但 3 年后——老周和这些朋友重逢——他比所有"发挥余热"的同事都健康、都安静、都满足。\n\n开自媒体的那个——焦虑症了。开讲座的那个——血压上了。做协会的那个——天天和理事会斗争。\n\n老周还是在看兰花。\n\n他不"做"任何事。他只是存在、看、偶尔浇水。\n\n那位开自媒体的朋友某天问他: "你怎么这么平静？"\n\n老周想了 30 秒。他说: "因为我不想再被使用了。"\n\n朋友: "什么意思？"\n\n"我一辈子都在做有用的事。我成了被使用的工具——被公司用、被家庭用、被社会用。我现在做点没用的事——是因为我想做自己，不是做工具。"\n\n朋友愣住。\n\n老周继续: "你看一棵大树——它为什么能活几百年？因为它没用。木匠看不上它——所以它没人砍。\n\n人也一样。被使用得越多，活得越短。"\n\n朋友那天回家——把自媒体账号交给了助理。他开始什么都不做。\n\n3 个月后他血压降下来了。\n\n那年春节，老周妻子给他买了 5 盆新兰花。她说: "我也学着——养兰花吧。"\n\n老周笑了笑。',
        layers: {
          concept: '庄子《人间世》里有一个故事——一个匠人和他徒弟路过一棵巨大的栎树。徒弟以为师傅会赞美——但师傅说: "这是散木——没用的木头。所以它能活这么久。"\n\n庄子的洞察: 有用是危险的。一棵树木质好——会被做成家具，3 年后烂掉。木质坏——没人砍它，能活几百年。\n\n人也一样。被"用"得越多——你越快被消耗。\n\n这听起来像鼓励懒惰——但庄子的意思更深。他不是说不要做事——他是说: 不要让"有用"成为你做事的唯一理由。\n\n做一件事——可以为它本身。不为产出、不为别人的评价、不为"成为什么"——只为它本身。\n\n这种"无用"的事——往往才是真正塑造你的事。',
          now: '我们这个时代——所有事都要"有用"。\n\n你看书——朋友会问"有用吗"。\n你健身——是为了"对身体有用"。\n你交朋友——朋友圈被叫做"人脉" (有用)。\n你旅游——目的是"开阔眼界" (有用)。\n你做爱好——必须"变现"。\n\n所有事都被"用"绑架。\n\n庄子会说: 留 10% 的时间做完全"没用"的事。看云、听雨、和老朋友说废话、画一张没人看的画。\n\n这 10% 的"无用"——可能是你"有用"的 90% 之所以可承受的原因。',
          deeper: '"无用之用"最深的层面: 你自己也可以是"无用"的。\n\n你以为你的价值是: 你做了什么、你贡献了什么、你产出了什么。\n\n但如果你失业、生病、被裁——这些都没了——你还是你吗？\n\n大多数现代人答不出。因为他们把"我"和"我有用"等同了。\n\n庄子说: 你应该有一部分是"无用"的。那部分——别人砍不掉、市场夺不走、绩效衡量不到。\n\n那部分——才是真正的"你"。',

        body: '老李是某高端餐厅的主厨，30 年。\n\n他切肉的速度比所有徒弟都快——但他从不"用力"。\n\n年轻厨子小王跟他学了 3 年。他想不通老李怎么做到的。\n\n那天厨房没人。小王问: "李师傅，您怎么切得这么轻松？我用力切，刀很快就钝了。您用了一个月的刀还像新的。"\n\n老李停下手里的活，看了小王 5 秒。\n\n他没回答。他做了一件事——他拿出一块牛肩肉，放在案板上。\n\n"你来切。"\n\n小王拿起刀，开始切。3 分钟后牛肉切完了——刀刃上沾了油，他用了 70% 的力气。\n\n老李拿过另一块同样的牛肩肉。他没说话，开始切。\n\n小王在旁边看。\n\n老李切了 1 分钟。牛肉切完了——同样的厚度、同样的均匀——但刀刃几乎没沾油。\n\n小王看不出他用力。\n\n他问: "您是怎么——"\n\n老李说: "你试着不切。"\n\n小王愣: "什么意思？"\n\n"你刚才切的时候——你脑子里在想怎么切。你想着刀要怎么走、力要怎么用、角度要怎么调。"\n\n"对。"\n\n"我不想。"\n\n"那您想什么？"\n\n老李: "我看着牛肉。"\n\n小王不懂。\n\n老李把刀放下: "你看这块肉——你看见什么？"\n\n小王看: "牛肩肉。"\n\n老李: "再看。"\n\n小王盯着: "纹理。"\n\n老李: "再看。"\n\n小王盯了 30 秒: "我看到——肉块之间有一些……空隙？"\n\n老李笑了: "对。你的刀应该走那些空隙。不是切肉——是让肉自己分开。"\n\n小王第一次明白他做错了什么。\n\n他切肉时——他在"对抗"肉。他用刀"切开"肉的紧密部分——所以费力、刀钝。\n\n老李做的是——他看见肉本身已经有的"分开"的可能性——他的刀只是顺着那些可能性走。\n\n他不"切"——他让肉自己分开。\n\n那天小王试着这样做。\n\n第一刀——他还是用了 60% 的力气，因为他不习惯"看"。\n\n第二刀——他停下来，先盯着肉 10 秒。然后下刀——他用了 40% 的力气。\n\n第十刀——他第一次感到刀几乎是"自己"在走。\n\n他切完那块肉——刀刃干干净净。他比平时快了 2 倍。\n\n他抬头看老李——眼眶湿了。\n\n他不知道为什么。他只是突然明白了什么。\n\n那天下班，小王找老李喝酒。\n\n他问: "李师傅，您这套——能用在切肉之外吗？"\n\n老李喝了一口酒: "可以。"\n\n"用在哪？"\n\n"所有的事。"\n\n小王: "比如？"\n\n老李: "比如和你老婆吵架。"\n\n小王笑了。\n\n老李说: "你和老婆吵架——你是不是在切开她？你用语言切——一句你应该这样、一句你不应该那样。她抵抗——所以你越切越费力，她越伤越深。"\n\n"那应该怎么办？"\n\n"看她——看她真正的纹理在哪。她为什么生气？背后是什么？她想要的真正是什么？看清这些空隙——然后你的话顺着这些空隙说。"\n\n"你不是要切开她——你是要让她自己慢慢松开——松开她不舒服的那部分，留下你们的关系。"\n\n小王那天回家——和老婆吵了 3 个月的事——他第一次没"切"。\n\n他坐下来——看着她——10 秒。\n\n然后他说: "我可能没看清你。你跟我说说。"\n\n老婆哭了。\n\n他们没"和好"——他们做了别的。他们都看清了——那个吵架的根源——他妈每月来看他们的方式。\n\n第二天他和他妈说了一些话。\n\n3 个月没吵的架——从那天起减少了 80%。\n\n小王 35 岁——明白了庄子说的"庖丁解牛"。\n\n他后来 5 年——所有的事都用这套方法。\n\n40 岁那年他自己开了餐厅。他不再用力——他看。',
        layers: {

          now: '"庖丁解牛"是所有专业领域的最高境界。\n\n好的厨师不"做菜"——他让食材自己呈现。\n好的医生不"治病"——他帮身体自己恢复。\n好的老师不"教"——他让学生自己看见。\n好的咨询师不"解决问题"——他帮来访者自己看清。\n好的产品经理不"设计"——他听用户真正的需要。\n好的销售不"说服"——他匹配需求。\n\n用力的人——是看不见结构的人。\n不用力——不是"放弃"——是真的看见了。',
          deeper: '"庖丁解牛"最深的层面: 这种"不用力"——需要 19 年的磨练。\n\n庖丁不是天生会的。他用 3 年从"看到整头牛"——到"看到部位"。再用几年——到"看到空隙"。\n\n每一步都需要练习。\n\n现代人常常误读: "顺势而行 = 躺平"。\n\n错。\n\n"顺势"是看清形势——这需要长期的训练。一个真正"顺势"的人——已经在"势"里浸泡了 10 年。\n\n他的"不用力"——是 10000 次"用力"的结果。',

        body: '周岚 38 岁。她是一家女性内衣电商品牌的创始人兼 CEO。她创业 10 年。公司年营收 8 个亿。\n\n那是一个普通的周三早上。\n\n她 6 点醒来。打开手机——27 条消息、12 个邮件、3 个紧急 Slack。她回了 5 分钟。\n\n然后她下床——洗漱、化妆、穿衣。\n\n她走到衣柜前。她有 200 件衣服——但她每天穿的都差不多——是符合她 CEO 形象的那几套。\n\n她拿了一件西装。\n\n她坐在镜子前——梳头。\n\n那一刻——她看着镜子里的自己——她突然不知道她是谁。\n\n她不是抑郁。她不是疲倦。她在最好的状态——公司在融 D 轮、估值 30 亿、她上了福布斯。\n\n但是镜子里那个人——她不认识。\n\n她试着问自己: 我是谁？\n\n第一反应: 我是周岚——LUME 的 CEO。\n\n但这是答案吗？\n\n她 10 年前的梦——是创办这家公司、成为这样的人。她梦了 10 年——她实现了。\n\n但是现在她在这个梦里——醒不出来了。\n\n她不知道——是她做了这个公司——还是这个公司做了她。\n\n她过去 10 年所有的选择——读什么书、见什么人、说什么话、穿什么衣服、想什么事——都被这个 CEO 周岚塑造。\n\n如果你今天把 CEO 周岚 拿走——剩下的那个人——她不认识。\n\n⋯\n\n她那天没去上班。\n\n她告诉助理: "我今天身体不舒服。"\n\n她在家里坐了 8 个小时。\n\n她试着想: 如果我不是 CEO——我会做什么？\n\n她答不出。\n\n她试着想: 我喜欢什么？\n\n她想了 10 分钟。\n\n第一个答案: 我喜欢工作。\n\n但是她知道这是被训练出来的答案。\n\n她试着再问: 我真正喜欢什么？\n\n她答不出。\n\n她 38 岁了——她在最成功的位置——她不知道自己真正喜欢什么。\n\n那天晚上她哭了。\n\n不是因为悲伤——是因为发现这件事——她以为她在做她的事——但她其实是被这个事做出来的。\n\n她是这家公司的产物——比这家公司是她的产物更彻底。\n\n⋯\n\n第二天她去上班——她照常开会、签字、做决定。\n\n但是她的内部——已经变了。\n\n她开始做一件事——每天给自己留 1 小时——这 1 小时她不能做 CEO 周岚 会做的事。\n\n第一周她不知道做什么。\n\n第二周她试着画画——她小时候喜欢的。她画了 6 张——画得很差。但是她画了。\n\n第三周她开始学陶艺——一个完全不有用的事。\n\n第四周她允许自己——不准备议程——和老朋友吃一顿饭——不谈工作。\n\n3 个月后她瘦了 4 斤——不是减肥——是因为她吃饭时不再用手机。\n\n6 个月后她做了一个决定——她不再做 D 轮融资。她让公司维持现状——不再追求估值 50 亿 的那个梦。\n\n董事会大反对。\n\n她说: "我已经在一个梦里 10 年了。我醒过来一次——我不想再回去。"\n\n⋯\n\n5 年后。\n\n周岚 43 岁。她的公司没有 更大 ——但她活得更 在 了。\n\n她有时候还会想起庄子的那个故事——庄周梦蝶。\n\n醒过来后他不知道——是他在梦蝶，还是蝶在梦他。\n\n她现在明白这个故事了。\n\n不是要回答这个问题——是要停下来问这个问题。\n\n因为只要你不问——你就一直是那只被梦做出来的 自己。',
        layers: {
          concept: '"庄周梦蝶" 出自《庄子·齐物论》的结尾——可能是中国哲学最深的隐喻之一。\n\n原文: "昔者庄周梦为蝴蝶，栩栩然蝴蝶也。自喻适志与！不知周也。俄然觉，则蘧蘧然周也。不知周之梦为蝴蝶与，蝴蝶之梦为周与？"\n\n庄周梦见自己变成蝴蝶——栩栩如生。醒来后——他不知道是庄周梦见自己变成蝴蝶，还是蝴蝶梦见自己变成庄周。\n\n这不是一个关于梦的故事。这是一个关于 "我" 的故事。\n\n你以为有一个稳定的"我"——这个我在做事、在选择、在喜欢、在恨。\n\n庄子说: 这个"我"——也是被梦做出来的。\n\n你今天的 "我"——是 30 年的家庭、教育、社会、工作、关系——一点一点梦出来的。换一个起点——你会是完全不同的人。\n\n所以"我"不是起点——"我"是结果。',
          now: '现代人比庄子时代更深地活在"梦"里。\n\n你 18 岁选大学——选了"有前途"的专业。但这个"前途"是谁的梦？\n\n你 25 岁结婚——选了"合适"的人。但这个"合适"是谁定义的？\n\n你 30 岁买房——为了"稳定"。但这个"稳定"是不是一个被推销给你的梦？\n\n你 35 岁做了"中产"——你以为这是你"选"的——但这条路径是 5 亿人在走的同一条路径。\n\n这不是选择。这是梦。你是被梦做出来的。\n\n醒过来不容易——但有一个时刻——你会突然不认识镜子里的人。\n\n那个时刻——你不要回避。那是庄子说的"觉"。',
          deeper: '"庄周梦蝶"最深的洞察: 醒来之后——也不要急着定义自己。\n\n大多数人醒来——立刻又找一个新的身份钻进去。"我不再是 CEO 了——我现在是一个 修行人 / 自由职业者 / 数字游民"。\n\n这只是换了一个梦。\n\n庄子的意思是: 不要急着回答"我是谁"。\n\n在"庄周"和"蝴蝶"之间——有一个"不知道"的位置。那个位置才是清醒的位置。\n\n大多数人受不了"不知道"——所以他们立刻找一个标签贴上去。\n\n真正的觉——是允许自己长时间不知道。',
          links: { pre: ['齐物'], post: ['心斋'] },

        body: '阿野 41 岁。她做设计 18 年。\n\n她在一家国内 top 5 的设计公司做到了 创意总监——管 20 个人，年薪 70 万。\n\n35 岁那年她离开了。\n\n朋友们以为她要 创业——她拒绝了 3 个邀请。\n\n朋友们以为她要 做自由职业——她也拒绝了。\n\n她做了一件让所有朋友看不懂的事: 她租了一个 30 平米的小工作室——一个人——只做让她想做的项目。\n\n她不扩大——她拒绝了 7 个想找她合作的设计师。\n她不做品牌——她没有 IP、没有社交账号、没有公众号。\n她不做培训——她拒绝了 5 个上课的邀请。\n\n她只做项目——一年大概 6-8 个。\n\n她的收入是过去的 50%。\n\n她的朋友说: "你太可惜了。你应该再起飞一次。"\n\n她说: "我不想起飞。我也不想躺下。"\n\n朋友: "那你要什么？"\n\n阿野想了想: "我要游。"\n\n朋友: "什么意思？"\n\n她说: "我不上升——也不躺平。我游。"\n\n⋯\n\n她做的项目——别人看不出共同点。\n\n她给一个 90 岁老人的回忆录设计封面——花了 4 个月——挣了 3 万。\n她给一个寺庙设计书签——免费——只换两次素斋。\n她给一个独立咖啡馆设计 logo——挣了 2 万。\n她给一个朋友设计婚礼请柬——免费。\n她给一个客户做了一年的品牌咨询——挣了 30 万。\n\n朋友们看不懂。\n\n她不经营自己。她不成长。她不突破。\n\n但是她每天起床——她想去工作。\n\n她每个项目做完——她有一种安静。\n\n她 41 岁——她比 35 岁年轻——这是别人说的。\n\n⋯\n\n那年她去见她以前的老板——他升任了一家大公司的 CCO，管 200 人。\n\n老板说: "阿野你回来吧。我开 150 万。你管创意。"\n\n阿野: "谢谢你。我不想回来。"\n\n老板: "为什么？你在外面 6 年——你的水平是同行最高——但你的平台已经掉了。再过 5 年你就接不到大项目了。"\n\n阿野: "我不需要大项目。"\n\n老板: "那你以后怎么办？你 50 岁怎么办？"\n\n阿野想了想: "我 50 岁——还会想去工作的。"\n\n老板: "你这是逃避。"\n\n阿野: "可能是吧。但是你也是。"\n\n老板: "我是？"\n\n阿野: "你逃避了你想做的事——你以为更大就是更好。我可能逃避了更大——但是我去做了我想做的事。"\n\n老板沉默了。\n\n⋯\n\n阿野的工作室没有名字——她从来没注册过商标。\n\n她有 12 个客户——是 6 年来积累的——这 12 个人之间互相不认识。\n\n她每周工作 4 天。每天工作 6 小时。\n\n她其余的时间在做一些没用的事——逛市场、看小店、坐在江边——什么都不做。\n\n她每年都会有一段时间——3-4 周——彻底关机——去山里。\n\n她的设计——你看不出 风格——因为她不建立风格。\n\n她每个项目都是从那个项目本身出发的——不是从"阿野的风格"出发。\n\n⋯\n\n她 41 岁那年——她朋友圈一个老朋友给她留言: "我现在 200 人公司、年收 8000 万——但是我每天起床想吐。我看到你 6 年前选的路——我现在懂你了。"\n\n阿野没回复。她只是点了个赞。\n\n她想——这个朋友 5 年后——会不会也游。\n\n她希望他会。\n\n但她不能替他选。\n\n她只能继续游她自己的。',

          deeper: '"逍遥游"最深的层面: 你必须先经过"无用之用"——才能"游"。\n\n阿野能"游"——是因为她过去 18 年——已经把"上升"走过了。她不是因为不能上升才选不上升——她是因为知道上升的终点是什么——才选不上升。\n\n这是关键。\n\n一个没经过"用"的人——直接选"无用"——他不是游——他是逃。\n\n真正的逍遥——是 经过"用"之后的"无用"。是看穿之后的不要。\n\n这不是道家的"出世"——是道家的"在世而不在其中"。',

      {

        body: '余清 36 岁。她做 8 年课程项目经理——压力大、收入高、不快乐。\n\n30 岁那年她开始 探索。\n\n她去印度灵修中心 2 次。\n她去藏区 游修 1 次。\n她报名了 5 个不同的冥想课程。\n她跟了一位老师 2 年。\n她读了 200 多本灵性书——从老子到艾克哈特·托利。\n\n她每天打坐 1 小时——5 年没断。\n\n她的朋友圈贴满了"觉知""临在""能量""光"。\n\n她追求 开悟 ——5 年。\n\n她没开悟。\n\n⋯\n\n35 岁那年她去见她的老师——一个 70 岁的居士。\n\n她跟老师说: "我感觉我卡住了。"\n\n老师: "卡在哪？"\n\n余清: "我打坐 5 年了。我觉得我没进步。我看了那么多书——我懂的概念越来越多——但是我实证没有跟上。"\n\n老师听了 10 秒。\n\n老师说: "你的病——是你太想开悟了。"\n\n余清: "什么意思？我不应该想吗？"\n\n老师: "你 30 岁前——你在追求成功、钱、地位。30 岁后——你换了一个东西追求——你追求开悟、觉醒、解脱。但是你的追求本身没变。"\n\n余清不懂。\n\n老师说: "你以前是用 我必须成功 活。现在你是用 我必须开悟 活。这是一样的 必须。你的内部还是一个 追求者 ——只是它追求的东西换了。"\n\n余清安静了。\n\n她回家——那天她坐在打坐垫上——没打坐——只是坐。\n\n她突然明白了一件事。\n\n她过去 5 年——每一次打坐——她都在 努力 ——努力觉知、努力当下、努力放下。\n\n她从来没真的放下——她是在 努力地放下。\n\n那本身就是抓。\n\n她那天没打坐。她只是坐着。她没数呼吸。她没观察念头。她没有 觉知。\n\n她就坐着。\n\n她不知道坐了多久——可能 30 分钟——也可能 2 小时。\n\n她起来时——她内部有一种东西——很安静。\n\n不是 开悟。是别的——是她 5 年第一次没有在努力。\n\n⋯\n\n她不再 修行 了。\n\n她还坐——但她不打坐了。她只是坐。\n\n她还看书——但她不找答案了。她只是看。\n\n她还做项目经理——但她不忍耐工作了。她只是做。\n\n3 个月后她朋友们注意到她变了——但说不出怎么变了。\n\n一个朋友问: "你最近做什么修行？感觉你气色很好。"\n\n余清: "我没修行了。"\n\n朋友: "什么意思？你不打坐了？"\n\n余清: "打。但我不修了。"\n\n朋友: "区别在哪？"\n\n余清想了想: "区别在——我以前打坐是为了什么。现在我打坐——就是打坐。"\n\n朋友不懂。\n\n余清: "庄子说过一个词——心斋。是让心安静下来。不是追求安静——是停止追求。"\n\n朋友: "怎么停止？"\n\n余清: "看到自己在追求——就停了。"\n\n朋友: "看到就停了？"\n\n余清: "不是马上停。是看到很多次——每次都看到——然后慢慢就停了。"\n\n⋯\n\n她 36 岁那年——她在工作里第一次跟她老板提出反对意见——没有恐惧。她不是 勇敢——她只是没在心里去和老板对抗。她说出她的看法——老板听了——老板改了主意。\n\n她不成功——但她每天的事——都在做——不是 应对。\n\n她朋友圈一个最年长的同事问她: "你怎么这么安静了？"\n\n余清: "我不再追了。"\n\n⋯\n\n5 年后她 41 岁。她还是项目经理——但她过去 5 年没换工作——薪水也没大涨。\n\n外面的人看她——觉得她停滞了。\n\n但她内部——一年比一年安静。\n\n她想——她过去 35 年——从来没有 在。\n\n她是在做事——但她是被追求推动着做事——不是真的在做。\n\n现在她——大部分时候——是真的在。\n\n她想——这就够了。\n\n不需要 开悟。\n\n她每天还坐 20 分钟。她不知道她坐的是什么。\n\n她就坐。',
        layers: {
          concept: '"心斋"出自《庄子·人间世》——是一个谈话:\n\n颜回问孔子: 我去卫国劝那个暴君——怎么办才能让他听？\n\n孔子说: 你要 心斋。\n\n颜回: 什么是心斋？\n\n孔子说: 一志——专一你的心志。然后停止用耳朵听——用 心 听。然后停止用 心 听——用 气 听。\n\n气是 虚 而待物。\n\n心斋——是让你的心变成一个空的容器——而不是一个充满判断、欲望、设想的容器。\n\n大多数人误读: 心斋 = 冥想 = 打坐。错。\n\n心斋不是技术——是状态。是 停止追求 的状态。',

function getLevel(score) {
  let lvl = LEVEL_THRESHOLDS[0];

}

function getBrainLevel(readCount) {

}

// ═══ 伪命题挑战进度 ═══
function getChallengeResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/challenge/' + id + '/result'));
  } catch { return null; }
}
function saveChallengeResult(id, score, total) {
  const result = { score, total, at: new Date().toISOString(), perfect: score === total };
  localStorage.setItem('echo/challenge/' + id + '/result', JSON.stringify(result));
  return result;
}
function isChallengePerfect(id) {
  const r = getChallengeResult(id);
  return r && r.perfect;
}
function getCompletedChallenges() {
  return FAKE_CHALLENGES.filter(c => isChallengePerfect(c.id)).map(c => c.id);
}

// ═══ 7 天实践 — 闯关进度跟踪 ═══
function getPracticeProgress(practiceId) {
  try {
    return JSON.parse(localStorage.getItem('echo/practice/' + practiceId + '/progress')) || [];
  } catch { return []; }
}

function completeDay(practiceId, day) {
  const done = getPracticeProgress(practiceId);
  if (done.includes(day)) return 'ALREADY';
  done.push(day);
  done.sort((a,b) => a-b);
  localStorage.setItem('echo/practice/' + practiceId + '/progress', JSON.stringify(done));
  if (done.length === 7) {
    localStorage.setItem('echo/practice/' + practiceId + '/completed-at', new Date().toISOString());
    return 'COMPLETED';
  }
  return 'PROGRESS';
}

function getCurrentDay(practiceId) {
  const done = getPracticeProgress(practiceId);
  if (done.length === 0) return 1;
  if (done.length >= 7) return 7;
  // Find lowest day not yet done
  for (let i = 1; i <= 7; i++) {
    if (!done.includes(i)) return i;
  }
  return 7;
}

function isPracticeStarted(practiceId) {
  return getPracticeProgress(practiceId).length > 0;
}

function isPracticeCompleted(practiceId) {
  return getPracticeProgress(practiceId).length >= 7;
}

function getCompletedPractices() {
  return PRACTICES.filter(p => isPracticeCompleted(p.id)).map(p => p.id);
}

function getInProgressPractices() {
  return PRACTICES.filter(p => isPracticeStarted(p.id) && !isPracticeCompleted(p.id));
}

function calculateOverallStats() {
  const completedP = getCompletedPractices();
  const passedC = getCompletedChallenges();
  const completedA = getCompletedArguments();
  const stats = { readCount: 0, reflectionCount: 0, streak: 0, dims: { awareness:0, criticality:0, composure:0, autonomy:0, action:0 }, nietzsche:0, stoic:0, camus:0, foucault:0, practiceCompleted: completedP.length, completedPractices: completedP, completedPracticesCount: completedP.length, passedChallenges: passedC, completedArguments: completedA };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      const refls = JSON.parse(localStorage.getItem(storageKey(p.id, 'reflections'))) || {};
      const readKeys = Object.keys(prog).filter(k => prog[k]);
      stats.readCount += readKeys.length;
      stats[p.id] = readKeys.length;
      Object.values(refls).forEach(r => {
        const txt = typeof r === 'string' ? r : r?.text;
        if (txt && txt.trim()) stats.reflectionCount++;
      });
      readKeys.forEach(id => {
        const c = CONCEPT_DIMENSIONS[id];
        if (c) Object.entries(c).forEach(([k,v]) => stats.dims[k] += v);
      });
    } catch {}
  });
  stats.streak = computeStreak();
  return stats;
}

function computeStreak() {
  try {
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (visits.length === 0) return 0;
    // Sort descending
    const days = [...new Set(visits)].sort().reverse();
    const today = new Date().toISOString().slice(0,10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (days[0] !== today && days[0] !== yesterday) return 0;
    let streak = 1;
    let prev = new Date(days[0]);
    for (let i = 1; i < days.length; i++) {
      const cur = new Date(days[i]);
      const diff = (prev - cur) / 86400000;
      if (diff === 1) { streak++; prev = cur; }
      else break;
    }
    return streak;
  } catch { return 0; }
}

function recordVisit() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (!visits.includes(today)) {
      visits.push(today);
      // Keep last 90 days
      if (visits.length > 90) visits.shift();
      localStorage.setItem('echo/visits', JSON.stringify(visits));
    }
  } catch {}
}

function checkNewAchievements() {
  const stats = calculateOverallStats();
  const earned = JSON.parse(localStorage.getItem('echo/achievements') || '[]');
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (!earned.includes(a.id) && a.check(stats)) {
      earned.push(a.id);
      newly.push(a);
    }
  });
  localStorage.setItem('echo/achievements', JSON.stringify(earned));
  return { earned, newly };
}

function calculateBrainStats() {
  const stats = { awareness: 0, criticality: 0, composure: 0, autonomy: 0, action: 0 };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      Object.keys(prog).forEach(conceptId => {
        if (!prog[conceptId]) return;
        const contrib = CONCEPT_DIMENSIONS[conceptId];
        if (!contrib) return;
        Object.entries(contrib).forEach(([dim, val]) => { stats[dim] += val; });
      });
    } catch {}
  });
  return stats;
}

function totalBrainScore(stats) {
  return Object.values(stats).reduce((a, b) => a + b, 0);
}

function getArgumentResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/argument/' + id + '/result'));
  } catch { return null; }
}
function saveArgumentResult(id, correct) {
  localStorage.setItem('echo/argument/' + id + '/result', JSON.stringify({ correct, at: new Date().toISOString() }));
}
function isArgumentCompleted(id) {
  const r = getArgumentResult(id);
  return r && r.correct;
}
function getCompletedArguments() {
  return ARGUMENTS.filter(a => isArgumentCompleted(a.id)).map(a => a.id);
}

function haptic(style = 'light') {
  if (navigator.vibrate) {
    if (style === 'light') navigator.vibrate(10);
    else if (style === 'medium') navigator.vibrate(20);
    else if (style === 'success') navigator.vibrate([10, 50, 10]);
  }
}

// Roman numeral helper (RANEPA editorial style)
function toRomanNumeral(n) {
  const map = [['M',1000],['CM',900],['D',500],['CD',400],['C',100],['XC',90],['L',50],['XL',40],['X',10],['IX',9],['V',5],['IV',4],['I',1]];
  let s = '', x = n;
  for (const [r, v] of map) while (x >= v) { s += r; x -= v; }
  return s;
}

// ═══ Radar chart ═══
function buildRadarSVG(stats, size = 200) {
  const cx = size / 2, cy = size / 2;
  const radius = size * 0.38;
  const n = DIMENSIONS.length;
  const maxScore = 60; // visual cap

  // Points on each axis (vertex top, going clockwise)
  function pt(idx, factor) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * idx) / n;
    return [cx + Math.cos(angle) * radius * factor, cy + Math.sin(angle) * radius * factor];
  }

  // Background polygons at 25/50/75/100%
  const bgPolys = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = DIMENSIONS.map((_, i) => pt(i, f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Axis lines
  const axes = DIMENSIONS.map((_, i) => {
    const [x, y] = pt(i, 1);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Actual stat polygon
  const statPts = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    return pt(i, f).join(',');
  }).join(' ');
  const statPoly = `<polygon points="${statPts}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>`;

  // Dots at each point
  const dots = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    const [x, y] = pt(i, f);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent-strong)"/>`;
  }).join('');

  // Labels at vertices
  const labels = DIMENSIONS.map((d, i) => {
    const [x, y] = pt(i, 1.22);
    return `<text x="${x}" y="${y}" fill="rgba(237,229,211,0.5)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="inherit">${d.name}</text>`;
  }).join('');

  return `<svg class="mind-radar" width="${size}" height="${size + 20}" viewBox="0 -10 ${size} ${size + 20}">${bgPolys}${axes}${statPoly}${dots}${labels}</svg>`;
}

function getApiKey() {

async function callDeepSeek(messages) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('请先在设置中填入 DeepSeek API key');

  const resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: messages,
      temperature: 0.7,
      max_tokens: 600,
    }),
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error('API 错误: ' + resp.status + ' ' + txt.slice(0, 100));
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}
