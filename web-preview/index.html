<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>回声 · Echo</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%;
  scroll-behavior: smooth;

  /* ── 默认: 明 (clean modern light, 得到-inspired) ── */
  --bg-base: #fafaf7;
  --bg-elevated: #ffffff;
  --bg-card: #ffffff;
  --bg-deep: #f0eeea;
  --text-primary: #1a1a1a;
  --text-secondary: rgba(26, 26, 26, 0.7);
  --text-tertiary: rgba(26, 26, 26, 0.5);
  --text-faint: rgba(26, 26, 26, 0.32);
  --border-faint: rgba(0, 0, 0, 0.06);
  --border-soft: rgba(0, 0, 0, 0.1);
  --ambient: rgba(180, 50, 30, 0.025);

  /* Single deliberate accent — warm red (得到-like) */
  --gold: #b34428;
  --gold-bright: #c24a2e;
  --gold-deep: #8b3520;
  --copper: #b34428;
  --crimson: #8b3520;

  --accent: rgba(179,68,40,0.7);
  --accent-soft: rgba(179,68,40,0.08);
  --accent-strong: rgba(140,53,32,1);

  /* Shadows for elevation */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 1px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 4px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.08);

  background: var(--bg-base);
  color: var(--text-primary);
}

/* ── 夜读 (dark elegant) ── */
html[data-theme="paper"] {
  --bg-base: #0f0f10;
  --bg-elevated: #18181a;
  --bg-card: #1e1e21;
  --bg-deep: #060606;
  --text-primary: #f3f3f1;
  --text-secondary: rgba(243, 243, 241, 0.7);
  --text-tertiary: rgba(243, 243, 241, 0.5);
  --text-faint: rgba(243, 243, 241, 0.3);
  --border-faint: rgba(255, 255, 255, 0.06);
  --border-soft: rgba(255, 255, 255, 0.1);
  --ambient: rgba(220, 120, 80, 0.04);

  --gold: #e08b6c;
  --gold-bright: #f0a085;
  --gold-deep: #b86a4a;
  --copper: #e08b6c;
  --crimson: #b86a4a;

  --accent: rgba(224,139,108,0.7);
  --accent-soft: rgba(224,139,108,0.1);
  --accent-strong: rgba(240,160,133,1);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}
/* Philosopher accents — light mode (default) */
html[data-philosopher="nietzsche"] {
  --accent: rgba(140,90,30,0.85);
  --accent-soft: rgba(140,90,30,0.08);
  --accent-strong: #6b4515;
  --ambient: rgba(140,90,30,0.03);
}
html[data-philosopher="stoic"] {
  --accent: rgba(40,80,110,0.85);
  --accent-soft: rgba(40,80,110,0.08);
  --accent-strong: #1e4566;
  --ambient: rgba(40,80,110,0.03);
}
html[data-philosopher="camus"] {
  --accent: rgba(170,60,40,0.85);
  --accent-soft: rgba(170,60,40,0.08);
  --accent-strong: #8b3320;
  --ambient: rgba(170,60,40,0.03);
}
html[data-philosopher="foucault"] {
  --accent: rgba(95,60,130,0.85);
  --accent-soft: rgba(95,60,130,0.08);
  --accent-strong: #4a2f70;
  --ambient: rgba(95,60,130,0.03);
}

/* Philosopher accents — dark mode */
html[data-theme="paper"][data-philosopher="nietzsche"] {
  --accent: rgba(220,170,90,0.85);
  --accent-soft: rgba(220,170,90,0.12);
  --accent-strong: #f0c685;
}
html[data-theme="paper"][data-philosopher="stoic"] {
  --accent: rgba(140,180,210,0.85);
  --accent-soft: rgba(140,180,210,0.12);
  --accent-strong: #b0d0e8;
}
html[data-theme="paper"][data-philosopher="camus"] {
  --accent: rgba(230,140,100,0.85);
  --accent-soft: rgba(230,140,100,0.12);
  --accent-strong: #f5b39a;
}
html[data-theme="paper"][data-philosopher="foucault"] {
  --accent: rgba(180,140,210,0.85);
  --accent-soft: rgba(180,140,210,0.12);
  --accent-strong: #d4b8e8;
}

/* Paper theme — keep philosopher accents but darker for legibility on cream */
html[data-theme="paper"][data-philosopher="nietzsche"] {
  --accent: rgba(150,105,40,0.55);
  --accent-soft: rgba(150,105,40,0.12);
  --accent-strong: rgba(120,80,30,0.95);
}
html[data-theme="paper"][data-philosopher="stoic"] {
  --accent: rgba(60,95,115,0.55);
  --accent-soft: rgba(60,95,115,0.12);
  --accent-strong: rgba(40,75,95,0.95);
}
html[data-theme="paper"][data-philosopher="camus"] {
  --accent: rgba(160,75,45,0.55);
  --accent-soft: rgba(160,75,45,0.12);
  --accent-strong: rgba(140,60,30,0.95);
}
html[data-theme="paper"][data-philosopher="foucault"] {
  --accent: rgba(110,75,140,0.55);
  --accent-soft: rgba(110,75,140,0.12);
  --accent-strong: rgba(90,55,120,0.95);
}

body {
  min-height: 100%;
  color: var(--text-primary);
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
  background: var(--bg-base);
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  position: relative;
  transition: background 0.4s ease, color 0.4s ease;
  font-feature-settings: 'tnum';
}

/* 衬线字体只用在 display 标题上 */
.serif-display {
  font-family: 'Cormorant Garamond', 'Songti SC', 'STSong', Georgia, serif;
}

/* Ambient radial glow - very subtle warmth (dark mode only) */
body::before {
  content: '';
  position: fixed;
  inset: -10% -10% auto -10%;
  height: 80vh;
  background: radial-gradient(ellipse at 50% 0%, var(--ambient) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
  transition: background 0.8s ease;
}

/* Subtle vignette */
body > * { position: relative; z-index: 1; }

/* ── Grain texture (only in dark mode for warmth) ── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
  pointer-events: none;
  z-index: 9999;
}
html[data-theme="paper"] body::after { opacity: 0.03; }

/* ── Screens with transitions ── */
.screen { display: none; min-height: 100vh; opacity: 0; }
.screen.active { display: block; animation: screenIn 0.5s ease-out forwards; }
.screen.screen-exit { animation: screenOut 0.3s ease-in forwards; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes screenOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Story slides in from right */
#story-screen.active { animation: slideInRight 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Journal slides up */
#journal-screen.active { animation: slideInUp 0.45s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes slideInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Map (concept list) ── */
.map-header {
  padding: calc(48px + env(safe-area-inset-top, 32px)) 28px 12px;
  font-size: 13px;
  opacity: 0.35;
  letter-spacing: 0.15em;
}
.map-progress {
  padding: 0 28px 12px;
  font-size: 12px;
  opacity: 0.18;
  letter-spacing: 0.05em;
}
.map-bar {
  margin: 0 28px 24px;
  height: 2px;
  background: rgba(237,229,211,0.06);
  border-radius: 1px;
  overflow: hidden;
}
.map-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  transition: width 0.6s ease;
}
.concept-list { padding: 0 0 80px; }
.concept-card {
  display: block;
  width: 100%;
  padding: 22px 28px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(237,229,211,0.06);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: opacity 0.2s;
}
.concept-card:focus { outline: none; }
.concept-card.locked {
  opacity: 0.2;
  cursor: default;
}
.concept-card.read { opacity: 0.5; }
.concept-name {
  font-size: 19px;
  line-height: 1.5;
  margin-bottom: 4px;
}
.concept-orig {
  font-size: 12px;
  opacity: 0.35;
  font-style: italic;
  margin-left: 8px;
}
.concept-brief {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.5;
}
.concept-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  border: 1px solid var(--accent-strong);
  background: transparent;
  margin-right: 12px;
  vertical-align: middle;
  transition: background 0.3s, border-color 0.3s;
}
/* Unlocked but not read: hollow circle */
.concept-card:not(.locked):not(.read) .concept-dot {
  border-color: var(--accent-strong);
}
/* Read: filled circle */
.concept-card.read .concept-dot {
  background: var(--accent);
  border-color: var(--accent);
}
/* Locked: dashed faint circle */
.concept-card.locked .concept-dot {
  border-color: rgba(237,229,211,0.15);
  border-style: dashed;
}
.concept-card.depth-0 { padding-left: 28px; }
.concept-card.depth-1 { padding-left: 44px; }
.concept-card.depth-2 { padding-left: 60px; }
.concept-card.depth-3 { padding-left: 76px; }
.concept-card.depth-4 { padding-left: 92px; }

/* Scroll-reveal: cards start invisible, JS adds .revealed */
.concept-card {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s ease, transform 0.5s ease, background 0.6s ease;
}
.concept-card.revealed {
  transform: translateY(0);
}
.concept-card.revealed:not(.locked) { opacity: 1; }
.concept-card.revealed.locked { opacity: 0.2; }
.concept-card.revealed.read { opacity: 0.5; }

/* Newly-unlocked glow */
.concept-card.just-unlocked {
  background: rgba(237,229,211,0.04);
  animation: unlockPulse 1.5s ease-out forwards;
}
@keyframes unlockPulse {
  0% { background: rgba(237,229,211,0.08); }
  100% { background: transparent; }
}

/* Tap ripple */
.concept-card:not(.locked)::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at var(--tap-x,50%) var(--tap-y,50%), rgba(237,229,211,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.concept-card:not(.locked):active::after { opacity: 1; }
.concept-card { position: relative; overflow: hidden; }

/* ── Story reader ── */
.story-back {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(16px + env(safe-area-inset-top, 32px)) 20px 16px;
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
.back-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  cursor: pointer;
  opacity: 0.5;
  padding: 12px 8px;
  margin: -12px -8px;
}
.back-btn:focus { outline: none; }
.back-btn:active { opacity: 0.8; }
.story-concept-label {
  font-size: 12px;
  opacity: 0.3;
  letter-spacing: 0.1em;
}

.story-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.story-title {
  font-size: 28px;
  line-height: 1.5;
  margin-bottom: 12px;
}
.story-meta {
  font-size: 12px;
  opacity: 0.25;
  margin-bottom: 48px;
}
.story-body {
  font-size: 17px;
  line-height: 1.85;
  white-space: pre-wrap;
  word-break: break-word;
}
.story-body p { margin-bottom: 1.2em; }
.story-body p:first-child::first-letter {
  font-size: 3.2em;
  float: left;
  line-height: 0.8;
  margin: 6px 10px 0 -2px;
  opacity: 0.85;
  font-weight: 400;
}

/* ── Reading progress bar ── */
.reading-progress {
  position: fixed;
  top: 0; left: 0;
  width: 0%;
  height: 2px;
  background: rgba(237,229,211,0.2);
  z-index: 50;
  transition: width 0.15s linear;
  pointer-events: none;
}

/* ── Reading time estimate ── */
.story-reading-time {
  font-size: 11px;
  opacity: 0.15;
  margin-top: 4px;
}

/* ── Layers ── */
.layers-section {
  margin-top: 80px;
  border-top: 1px solid rgba(237,229,211,0.08);
  padding-top: 48px;
}
.layer-tab-bar {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(237,229,211,0.08);
}
.layer-tab {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  padding: 12px 0;
  cursor: pointer;
  opacity: 0.3;
  transition: opacity 0.2s;
  border-bottom: 2px solid transparent;
}
.layer-tab:focus { outline: none; }
.layer-tab.active {
  opacity: 0.95;
  border-bottom-color: var(--accent-strong);
  color: var(--text-primary);
}
.layer-content {
  font-size: 15px;
  line-height: 1.8;
  word-break: break-word;
  min-height: 120px;
}
.layer-content p { margin-bottom: 1.1em; }

/* ── Links ── */
.links-section {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid rgba(237,229,211,0.06);
}
.links-label {
  font-size: 12px;
  opacity: 0.25;
  margin-bottom: 12px;
}
.link-chip {
  display: inline-block;
  background: transparent;
  border: 1px solid rgba(237,229,211,0.12);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 14px;
  margin: 0 8px 8px 0;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.link-chip:hover { opacity: 0.8; }
.link-chip:focus { outline: none; }

/* ── Reflect ── */
.reflect-section {
  margin-top: 60px;
  padding: 32px 24px 28px;
  border: 1px dashed var(--accent-soft);
  border-radius: 4px;
  margin-bottom: 60px;
  position: relative;
}
.reflect-section::before {
  content: '✎';
  position: absolute;
  top: -12px;
  left: 20px;
  background: var(--bg-base);
  padding: 0 8px;
  font-size: 14px;
  opacity: 0.4;
  color: var(--text-primary);
}
.reflect-prompt {
  font-size: 15px;
  opacity: 0.4;
  margin-bottom: 20px;
  line-height: 1.6;
}
.reflect-input {
  width: 100%;
  min-height: 120px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(237,229,211,0.06);
  outline: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 16px;
  line-height: 1.75;
  resize: none;
  padding-bottom: 16px;
}
.reflect-input:focus {
  border-bottom-color: rgba(237,229,211,0.15);
}
.reflect-input::placeholder { color: rgba(237,229,211,0.12); }
.reflect-save {
  display: block;
  margin-top: 20px;
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 16px;
  cursor: pointer;
  padding: 8px 4px;
  opacity: 0.5;
}
.reflect-save:hover { opacity: 0.8; }
.reflect-save:focus { outline: none; }

/* ── Markdown-like rendering ── */
.rendered strong { font-weight: 600; }
.rendered em { font-style: italic; }
.rendered blockquote {
  border-left: 2px solid var(--accent);
  padding-left: 18px;
  margin: 20px 0;
  opacity: 0.78;
  font-style: italic;
}
.rendered ul {
  list-style: none;
  padding-left: 0;
  margin: 12px 0;
}
.rendered li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 6px;
  line-height: 1.8;
}
.rendered li::before {
  content: '\B7';
  position: absolute;
  left: 2px;
  opacity: 0.35;
}

/* ── Horizontal rule ── */
.rendered hr {
  border: none;
  border-top: 1px solid rgba(237,229,211,0.08);
  margin: 28px 0;
}

/* ── Section ornament ── */
.section-divider {
  text-align: center;
  padding: 48px 0 12px;
  font-size: 14px;
  opacity: 0.12;
  letter-spacing: 1em;
}

/* ── Tap feedback ── */
.concept-card:not(.locked):active { opacity: 0.7; }
.link-chip:active { opacity: 0.9; }
.layer-tab:active { opacity: 0.6; }

/* ── Theme toggle ── */
.theme-toggle {
  position: absolute;
  top: calc(20px + env(safe-area-inset-top, 32px));
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(237,229,211,0.04);
  border: 1px solid rgba(237,229,211,0.1);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.3s;
}
.theme-toggle:hover { background: rgba(237,229,211,0.08); }
.theme-toggle:focus { outline: none; }
.theme-toggle:active { transform: scale(0.92); }

/* ── Paper-mode overrides for elements using rgba(237,229,211,X) ── */
html[data-theme="paper"] .theme-toggle {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .theme-toggle:hover {
  background: rgba(42,37,32,0.08);
}

/* Paper mode: dial back the brightness of borders, dividers, surfaces */
html[data-theme="paper"] body::after { opacity: 0.04; }
html[data-theme="paper"] body::before {
  background:
    radial-gradient(ellipse at 50% 0%, var(--ambient) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(160,130,80,0.06) 0%, transparent 70%);
}

/* In paper mode, the cream-tint rgbas become dark-tints */
html[data-theme="paper"] .nav-entry {
  background: var(--bg-base);
}
html[data-theme="paper"] .nav-grid {
  background: rgba(42,37,32,0.1);
  border-color: rgba(42,37,32,0.12);
}
html[data-theme="paper"] .nav-entry:hover {
  background: rgba(42,37,32,0.05);
}
html[data-theme="paper"] .nav-entry:active {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .nav-group-sub {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .brain-light {
  background:
    radial-gradient(ellipse at 50% 0%, rgba(42,37,32,0.04) 0%, transparent 70%),
    rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card {
  border-bottom-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .philosopher-card:hover {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge {
  background: rgba(42,37,32,0.04);
}
html[data-theme="paper"] .daily-challenge:hover {
  background: rgba(42,37,32,0.06);
}
html[data-theme="paper"] .mind-card {
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card {
  background: rgba(42,37,32,0.025);
  border-color: rgba(42,37,32,0.1);
}
html[data-theme="paper"] .continue-card:hover {
  background: rgba(42,37,32,0.05);
  border-color: rgba(42,37,32,0.18);
}
html[data-theme="paper"] .concept-card {
  border-bottom-color: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .concept-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .map-bar,
html[data-theme="paper"] .philosopher-bar,
html[data-theme="paper"] .dim-row-track,
html[data-theme="paper"] .mini-bar-track {
  background: rgba(42,37,32,0.08);
}
html[data-theme="paper"] .story-back,
html[data-theme="paper"] .journal-header {
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .echo-banner {
  background: linear-gradient(to top, var(--bg-base) 60%, transparent);
}
html[data-theme="paper"] .reflect-section {
  border-color: rgba(42,37,32,0.15);
}
html[data-theme="paper"] .reflect-section::before {
  background: var(--bg-base);
}
html[data-theme="paper"] .quote-card:hover,
html[data-theme="paper"] .scenario-card:hover {
  background: rgba(42,37,32,0.025);
}
html[data-theme="paper"] .stat-gain-row {
  background: rgba(244,237,224,0.95);

}
html[data-theme="paper"] .level-up,
html[data-theme="paper"] .celebration {
  background: rgba(244,237,224,0.92);
}
html[data-theme="paper"] .achievement-popup {
  background: rgba(244,237,224,0.95);
}

/* ── Home — clean & confident ── */
.home-header {
  padding: calc(72px + env(safe-area-inset-top, 32px)) 28px 6px;
  text-align: left;
  font-size: 11px;
  opacity: 0.45;
  letter-spacing: 0.35em;
  font-weight: 500;
  color: var(--gold);
}
.home-title {
  padding: 4px 28px 6px;
  font-size: 52px;
  line-height: 1.05;
  opacity: 0.98;
  font-weight: 500;
  letter-spacing: -0.01em;
  text-align: left;
  font-family: 'Cormorant Garamond', 'Songti SC', 'STSong', Georgia, serif;
  color: var(--text-primary);
}
.home-subtitle {
  padding: 0 28px 20px;
  font-size: 13px;
  opacity: 0.45;
  letter-spacing: 0.02em;
  text-align: left;
  color: var(--text-secondary);
}
.home-quote {
  margin: 0 28px 44px;
  padding: 18px 22px;
  font-size: 15px;
  line-height: 1.75;
  font-style: italic;
  max-width: none;
  text-align: left;
  transition: opacity 0.8s ease;
  color: var(--text-secondary);
  background: var(--bg-elevated);
  border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0;
  box-shadow: var(--shadow-sm);
}
.philosopher-list {
  padding: 0 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.philosopher-card {
  display: block;
  width: 100%;
  padding: 24px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 16px;
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.philosopher-card::before {
  display: none;
}
.philosopher-card::after {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 50%;
  background: radial-gradient(circle at 100% 50%, var(--card-accent, transparent) 0%, transparent 70%);
  opacity: 0.5;
  pointer-events: none;
  transition: opacity 0.3s;
}
.philosopher-card:hover {
  transform: translateY(-2px);
  border-color: var(--border-soft);
  box-shadow: var(--shadow-md);
}
.philosopher-card:hover::after { opacity: 0.85; }
.philosopher-card:active { transform: translateY(0); }
.philosopher-card:focus { outline: none; }
.philosopher-name {
  font-size: 26px;
  line-height: 1.3;
  margin-bottom: 4px;
  font-weight: 500;
  font-family: 'Cormorant Garamond', 'Songti SC', Georgia, serif;
}
.philosopher-orig {
  font-size: 13px;
  opacity: 0.5;
  font-style: italic;
  margin-left: 10px;
  color: var(--gold);
  font-weight: 400;
}
.philosopher-dates {
  font-size: 11px;
  opacity: 0.35;
  margin-bottom: 12px;
  letter-spacing: 0.05em;
}
.philosopher-question {
  font-size: 14px;
  line-height: 1.6;
  opacity: 0.7;
  margin-bottom: 14px;
}
.philosopher-progress {
  font-size: 12px;
  opacity: 0.6;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.02em;
}
.philosopher-bar {
  margin-top: 10px;
  height: 3px;
  background: var(--border-faint);
  border-radius: 2px;
  overflow: hidden;
  max-width: 200px;
}
.philosopher-bar-fill {
  height: 100%;
  background: rgba(237,229,211,0.25);
  border-radius: 1px;
  transition: width 0.4s ease;
}
.philosopher-card[data-philosopher] .philosopher-bar-fill { background: var(--card-accent, rgba(237,229,211,0.25)); }
.philosopher-card[data-philosopher="nietzsche"] { --card-accent: rgba(196,164,105,0.45); }
.philosopher-card[data-philosopher="stoic"] { --card-accent: rgba(150,170,180,0.45); }
.philosopher-card[data-philosopher="camus"] { --card-accent: rgba(200,130,100,0.45); }
.philosopher-card[data-philosopher="foucault"] { --card-accent: rgba(165,140,185,0.45); }
.philosopher-card::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  width: 2px; height: 40px;
  margin-top: -20px;
  background: var(--card-accent, rgba(237,229,211,0.15));
  opacity: 0.5;
  transition: opacity 0.3s, height 0.3s;
}
.philosopher-card:hover::before { opacity: 0.9; height: 60px; margin-top: -30px; }

/* ── Loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-base);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 1;
  transition: opacity 0.4s ease;
}
.loading-overlay.fade-out { opacity: 0; pointer-events: none; }
.loading-dots { font-size: 18px; opacity: 0.2; letter-spacing: 0.3em; }
@keyframes pulse { 0%,100%{ opacity:0.15 } 50%{ opacity:0.4 } }
.loading-dots { animation: pulse 1.2s ease-in-out infinite; }

/* ── Journal screen ── */
.journal-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: calc(16px + env(safe-area-inset-top, 32px)) 20px 16px;
  background: linear-gradient(to bottom, var(--bg-base) 60%, transparent);
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
}
.journal-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 60px;
  max-width: 640px;
  margin: 0 auto;
}
.journal-title {
  font-size: 22px;
  margin-bottom: 32px;
  opacity: 0.6;
}
.journal-empty {
  font-size: 15px;
  opacity: 0.2;
  line-height: 1.8;
  padding-top: 40px;
}
.journal-entry {
  margin-bottom: 40px;
  padding-bottom: 40px;
  border-bottom: 1px solid rgba(237,229,211,0.06);
}
.journal-entry-concept {
  font-size: 16px;
  opacity: 0.6;
  margin-bottom: 4px;
}
.journal-entry-date {
  font-size: 11px;
  opacity: 0.15;
  margin-bottom: 12px;
}
.journal-entry-text {
  font-size: 15px;
  line-height: 1.8;
  opacity: 0.7;
  white-space: pre-wrap;
}
.journal-entry-philosopher {
  font-size: 10px;
  opacity: 0.2;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

/* ── Map nav bar (home + journal buttons) ── */
.map-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 28px 8px;
}
.nav-btn {
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  opacity: 0.2;
  padding: 8px 4px;
}
.nav-btn:hover { opacity: 0.4; }
.nav-btn:focus { outline: none; }

/* ── Transitions ── */
.fade-in {
  animation: fadeIn 0.6s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Staggered fade-in for child elements */
.stagger > :nth-child(1) { animation-delay: 0s; }
.stagger > :nth-child(2) { animation-delay: 0.08s; }
.stagger > :nth-child(3) { animation-delay: 0.16s; }
.stagger > :nth-child(4) { animation-delay: 0.24s; }
.stagger > :nth-child(5) { animation-delay: 0.32s; }
.stagger > * { animation-fill-mode: backwards; }

/* ── Swipe hint on story screen ── */
.swipe-indicator {
  position: fixed;
  left: 0; top: 50%;
  width: 4px; height: 48px;
  margin-top: -24px;
  background: rgba(237,229,211,0.08);
  border-radius: 0 4px 4px 0;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 11;
}
.swipe-indicator.visible { opacity: 1; }

/* ── Toast notification ── */
.toast {
  position: fixed;
  bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(237,229,211,0.08);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  padding: 10px 24px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
  pointer-events: none;
  z-index: 200;
  white-space: nowrap;
}
.toast.show {
  opacity: 0.7;
  transform: translateX(-50%) translateY(0);
}

/* ── 正在进行的实践 ── */
.in-progress-practice {
  margin: 0 28px 24px;
  padding: 18px 20px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}
.in-progress-practice:hover {
  background: var(--bg-card);
  border-color: var(--gold);
}
.ipp-label {
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--gold);
  margin-bottom: 8px;
}
.ipp-title {
  font-size: 16px;
  margin-bottom: 8px;
  opacity: 0.9;
}
.ipp-status {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 8px;
  color: var(--gold-bright);
  letter-spacing: 0.05em;
}
.ipp-bar {
  height: 2px;
  background: var(--border-faint);
  border-radius: 1px;
  overflow: hidden;
}
.ipp-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}

/* ── 心智之灯 — 干净版 ── */
.brain-light {
  margin: 0 28px 32px;
  padding: 24px 22px 22px;
  border-radius: 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}
.bl-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}
.bl-label {
  font-size: 13px;
  letter-spacing: 0.18em;
  opacity: 0.95;
  color: var(--text-primary);
  font-weight: 600;
}
.bl-level {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 0.05em;
  color: var(--gold);
  font-weight: 500;
}
.bl-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 150px;
  position: relative;
}
.bl-svg { width: 100%; max-width: 320px; height: auto; }
.bl-meta {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 13px;
  opacity: 0.7;
  margin-top: 10px;
  letter-spacing: 0;
  font-weight: 500;
}
.bl-meta .bl-readcount-num {
  font-size: 18px;
  color: var(--gold-bright);
  font-weight: 600;
  margin-right: 4px;
}
.bl-streak {
  font-size: 12px;
  opacity: 0.7;
  color: var(--gold);
}
.bl-streak-flame {
  color: var(--gold-bright);
  margin-right: 4px;
}
.bl-desc {
  font-size: 13px;
  opacity: 0.55;
  font-style: normal;
  margin-top: 4px;
  text-align: center;
  letter-spacing: 0.02em;
}

/* ── 每日挑战 — 简洁卡片 ── */
.daily-challenge {
  margin: 0 28px 32px;
  padding: 20px 22px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-faint);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  box-shadow: var(--shadow-sm);
}
.daily-challenge:hover {
  border-color: var(--border-soft);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}
.daily-challenge:active { transform: translateY(0); }
.dc-label {
  font-size: 12px;
  letter-spacing: 0.2em;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--gold);
}
.dc-text {
  font-size: 17px;
  opacity: 0.95;
  line-height: 1.55;
  font-weight: 500;
}
.dc-action {
  font-size: 13px;
  opacity: 0.65;
  margin-top: 10px;
  color: var(--gold);
  letter-spacing: 0.01em;
}

/* ── 成就弹层 ── */
.achievement-popup {
  position: fixed;
  top: calc(60px + env(safe-area-inset-top, 32px));
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(10,8,7,0.95);
  border: 1px solid var(--accent);
  border-radius: 30px;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  z-index: 200;
  transition: all 0.5s cubic-bezier(0.16,1,0.3,1);
  backdrop-filter: blur(10px);
}
.achievement-popup.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.ap-icon {
  font-size: 20px;
  color: var(--accent-strong);
}
.ap-text {
  font-size: 13px;
}
.ap-label {
  font-size: 10px;
  opacity: 0.5;
  letter-spacing: 0.2em;
}
.ap-name {
  opacity: 0.95;
}

/* ── Achievements screen ── */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.achievement-tile {
  padding: 20px 14px 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  border-radius: 2px;
  text-align: center;
  transition: all 0.3s;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
}
/* Heraldic corner ornaments */
.achievement-tile::before,
.achievement-tile::after {
  content: '';
  position: absolute;
  width: 8px;
  height: 8px;
  border: 1px solid var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}
.achievement-tile::before { top: 3px; left: 3px; border-right: none; border-bottom: none; }
.achievement-tile::after { bottom: 3px; right: 3px; border-left: none; border-top: none; }
.achievement-tile.locked {
  opacity: 0.3;
}
.achievement-tile.earned {
  border-color: var(--gold);
  background:
    radial-gradient(circle at 50% 30%, var(--accent-soft) 0%, transparent 60%),
    var(--bg-card);
}
.achievement-tile.earned::before,
.achievement-tile.earned::after {
  opacity: 0.7;
}
.at-icon {
  font-size: 32px;
  opacity: 0.85;
  margin-bottom: 10px;
  color: var(--gold-bright);
  display: block;
}
.achievement-tile.locked .at-icon {
  color: var(--text-tertiary);
}
.at-name {
  font-size: 13px;
  margin-bottom: 6px;
  opacity: 0.95;
  letter-spacing: 0.02em;
}
.at-desc {
  font-size: 11px;
  opacity: 0.5;
  line-height: 1.55;
  font-style: italic;
}

/* ── Mind card (home) ── */
.mind-card {
  margin: 0 28px 32px;
  padding: 22px 24px;
  border: 1px solid rgba(237,229,211,0.06);
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.3s, border-color 0.3s;
}
.mind-card:hover { background: rgba(237,229,211,0.02); border-color: rgba(237,229,211,0.12); }
.mind-card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.mind-card-label {
  font-size: 10px;
  opacity: 0.35;
  letter-spacing: 0.25em;
}
.mind-card-total {
  font-size: 13px;
  opacity: 0.5;
}
.mind-card-radar {
  display: flex;
  align-items: center;
  gap: 18px;
}
.mind-card-radar svg { flex-shrink: 0; }
.mind-card-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mini-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.mini-bar-label { width: 42px; opacity: 0.5; }
.mini-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(237,229,211,0.06);
  border-radius: 1.5px;
  overflow: hidden;
}
.mini-bar-fill {
  height: 100%;
  background: rgba(237,229,211,0.4);
  transition: width 0.6s ease;
}
.mini-bar-val {
  width: 24px;
  text-align: right;
  opacity: 0.4;
  font-size: 10px;
}

/* ── Mind screen ── */
.mind-scroll {
  padding: calc(68px + env(safe-area-inset-top, 32px)) 28px 100px;
  max-width: 560px;
  margin: 0 auto;
}
.mind-title {
  font-size: 24px;
  opacity: 0.85;
  margin-bottom: 4px;
}
.mind-subtitle {
  font-size: 12px;
  opacity: 0.3;
  margin-bottom: 36px;
  letter-spacing: 0.1em;
}
.mind-radar-wrapper {
  display: flex;
  justify-content: center;
  margin: 0 0 40px;
}
.mind-radar { display: block; }
.dim-list {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 24px;
}
.dim-row {
  position: relative;
}
.dim-row-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 6px;
}
.dim-row-symbol {
  font-size: 14px;
  opacity: 0.5;
}
.dim-row-name {
  font-size: 17px;
  opacity: 0.9;
}
.dim-row-sub {
  font-size: 12px;
  opacity: 0.3;
  margin-left: auto;
  font-style: italic;
}
.dim-row-track {
  height: 4px;
  background: rgba(237,229,211,0.06);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 6px;
}
.dim-row-fill {
  height: 100%;
  background: rgba(237,229,211,0.45);
  transition: width 1s cubic-bezier(0.16,1,0.3,1);
}
.dim-row-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  opacity: 0.4;
}
.dim-level { letter-spacing: 0.1em; }
.dim-score { font-feature-settings: 'tnum'; }
.mind-total {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(237,229,211,0.06);
  text-align: center;
  font-size: 13px;
  opacity: 0.4;
  letter-spacing: 0.15em;
}

/* ── Stat gain animation overlay ── */
.stat-gain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 110;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
}
.stat-gain.show {
  animation: statGainFlow 2.5s ease-out forwards;
}
@keyframes statGainFlow {
  0%   { opacity: 0; transform: translateY(20px); }
  20%  { opacity: 1; transform: translateY(0); }
  70%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-30px); }
}
.stat-gain-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 17px;
  background: rgba(0,0,0,0.85);
  padding: 10px 22px;
  border: 1px solid var(--accent);
  border-radius: 24px;
  opacity: 0.95;
}
.stat-gain-symbol { opacity: 0.7; }
.stat-gain-name { opacity: 0.85; }
.stat-gain-delta {
  color: var(--accent-strong);
  font-weight: 600;
  font-feature-settings: 'tnum';
}

/* ── Level-up overlay ── */
.level-up {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 160;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  opacity: 0;
  animation: fadeIn 0.6s ease-out forwards;
}
.level-up-label {
  font-size: 11px;
  opacity: 0.4;
  letter-spacing: 0.35em;
  margin-bottom: 24px;
}
.level-up-symbol {
  font-size: 48px;
  opacity: 0.7;
  margin-bottom: 16px;
  color: var(--text-primary);
}
.level-up-text {
  font-size: 26px;
  line-height: 1.6;
  opacity: 0.85;
  margin-bottom: 36px;
}
.level-up-dim {
  font-size: 14px;
  opacity: 0.45;
  letter-spacing: 0.1em;
}

/* ── Concept card dimension hint ── */
.concept-dim-hint {
  display: inline-flex;
  gap: 4px;

.practice-card.completed .pr-card-status { color: var(--gold); opacity: 1; }
.practice-card.completed { border-left: 3px solid var(--gold); padding-left: 12px; }
.practice-card.completed::before { background: var(--gold); width: 3px; }
.practice-card.in-progress::before { width: 2px; }
.pr-card-bar {
  margin: 12px 0 0 14px;
  height: 2px;
  background: var(--border-faint);
  border-radius: 1px;

  max-width: 200px;
}
.pr-card-bar-fill {
  height: 100%;
  background: var(--gold);
  transition: width 0.6s ease;
}

/* ── Practice detail: locked-step UI ── */
.pr-progress-bar {
  margin: 24px 0 12px;
  height: 3px;
  background: var(--border-soft);
  border-radius: 1.5px;
  overflow: hidden;
}
.pr-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-bright));
  transition: width 0.8s cubic-bezier(0.16,1,0.3,1);
}
.pr-progress-text {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 32px;
  letter-spacing: 0.05em;
  color: var(--gold);
}
.pr-completed-badge {
  margin: 24px 0 32px;
  padding: 16px;
  text-align: center;
  font-size: 14px;
  letter-spacing: 0.3em;

  background: var(--accent-soft);
  border: 1px solid var(--gold);
  border-radius: 2px;
  position: relative;
}
.pr-completed-badge::before,
.pr-completed-badge::after {
  content: '✦';
  margin: 0 14px;
  opacity: 0.6;
}

.pr-day {
  position: relative;
  padding: 22px 0 22px 80px;
  border-bottom: 1px solid var(--border-faint);
  transition: opacity 0.4s, background 0.3s;
}
.pr-day:last-child { border-bottom: none; }
.pr-day-header {
  display: flex;
  align-items: baseline;
  gap: 18px;
  margin-bottom: 12px;
  position: relative;
}
.pr-day-number {
  position: absolute;
  left: -80px;
  top: 2px;
  width: 60px;
  font-size: 11px;
  letter-spacing: 0.15em;
  opacity: 0.7;
  text-align: right;
  color: var(--gold);
  font-feature-settings: 'tnum';
}
.pr-day-state {
  font-size: 10px;
  letter-spacing: 0.25em;
  opacity: 0.5;
  text-transform: uppercase;
}
.pr-day-state.done { color: var(--gold); opacity: 0.85; }
.pr-day-state.current-label {
  color: var(--gold-bright);
  opacity: 1;
  padding: 3px 10px;
  border: 1px solid var(--gold);
  border-radius: 12px;
}
.pr-day-state.boss-label {
  color: var(--gold-bright);
  opacity: 1;
  padding: 3px 10px;
  border: 1px solid var(--gold-bright);
  border-radius: 12px;
  background: var(--accent-soft);
}

.pr-day.done { opacity: 0.55; }
.pr-day.done .pr-day-task { text-decoration: line-through; text-decoration-color: var(--text-faint); }
.pr-day.locked {
  opacity: 0.3;
}
.pr-day.locked .pr-day-number {
  opacity: 0.3;
}

.pr-day.current {
  background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 80%);
  border-radius: 0 4px 4px 0;
}
.pr-day.current .pr-day-number {
  color: var(--gold-bright);
  font-weight: 500;
}

.pr-day.boss {
  position: relative;
}
.pr-day.boss::before {
  content: '';
  position: absolute;
  inset: 0;
  border-top: 1px solid var(--border-soft);
  border-bottom: 1px solid var(--border-soft);
  pointer-events: none;
}
.pr-day.boss.current {
  background: linear-gradient(90deg, var(--accent-soft) 0%, transparent 100%);
  padding-top: 28px;
  padding-bottom: 28px;
}
.pr-day.boss.current .pr-day-number {
  color: var(--gold-bright);
  font-size: 13px;
}

.pr-day-task {
  font-size: 16px;
  line-height: 1.75;
  opacity: 0.95;
  margin-bottom: 10px;
}
.pr-day-why {
  font-size: 12px;
  opacity: 0.6;
  font-style: italic;
  line-height: 1.6;
  margin-bottom: 14px;
}
.pr-day-complete-btn {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold-bright);
  font-family: inherit;
  font-size: 13px;
  padding: 9px 22px;
  border-radius: 18px;
  cursor: pointer;
  opacity: 0.95;
  transition: all 0.2s;
  letter-spacing: 0.08em;
}
.pr-day-complete-btn:hover {
  background: var(--accent-soft);
  border-color: var(--gold-bright);
}
.pr-day-complete-btn:active { transform: scale(0.97); }
.pr-day-complete-btn:focus { outline: none; }
.pr-day.boss .pr-day-complete-btn {
  font-size: 14px;
  padding: 12px 32px;
  background: var(--accent-soft);
}

/* ── Boss Victory Overlay ── */
.boss-victory {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10,7,4,0.96);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  animation: bvFadeIn 0.8s ease-out forwards;
}
@keyframes bvFadeIn { to { opacity: 1; } }
.bv-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 50%, var(--accent-soft) 0%, transparent 60%),

  animation: bvPulse 4s ease-in-out infinite;
}
@keyframes bvPulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
.bv-mandala {
  position: absolute;
  top: 50%; left: 50%;
  width: 320px; height: 320px;
  margin: -160px 0 0 -160px;
  border: 1px solid var(--gold);
  border-radius: 50%;
  opacity: 0.25;
  animation: bvSpin 30s linear infinite;

  content: '';

  opacity: 0.5;

  font-size: 30px;
  opacity: 0.95;
  margin-bottom: 18px;
}
.cp-phenomenon {
  font-size: 15px;
  line-height: 1.9;
  opacity: 0.82;
  padding: 22px 24px;
  background: rgba(237,229,211,0.025);
  border-radius: 4px;
  margin-bottom: 24px;
}
.cp-question {
  font-size: 17px;
  opacity: 0.9;
  font-style: italic;
  text-align: center;
  padding: 18px 0;
  margin-bottom: 32px;
  border-top: 1px solid rgba(237,229,211,0.08);
  border-bottom: 1px solid rgba(237,229,211,0.08);
}
.cp-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 18px;
  color: rgba(237,229,211,0.55);
}
.cp-lens {
  margin-bottom: 22px;
  padding: 18px 22px;
  background: rgba(237,229,211,0.02);
  border-left: 2px solid rgba(237,229,211,0.15);
  border-radius: 0 4px 4px 0;
}
.cp-lens-who {
  font-size: 12px;
  letter-spacing: 0.15em;
  opacity: 0.6;
  margin-bottom: 8px;
  color: var(--accent-strong);
}
.cp-lens-text {
  font-size: 14px;
  line-height: 1.85;
  opacity: 0.85;
}
.cp-synthesis {
  margin-top: 32px;
  padding: 22px 24px;
  border: 1px solid var(--accent);
  border-radius: 4px;
  background: var(--accent-soft);
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.92;
  font-style: italic;
}

/* ── Socratic dialogue ── */
.socratic-prompt {
  margin: 32px 0;
  padding: 28px 24px;
  text-align: center;
  background: var(--accent-soft);
  border: 1px solid var(--gold);
  border-radius: 2px;
  position: relative;
}
.socratic-prompt::before,
.socratic-prompt::after {
  content: '';
  position: absolute;
  width: 10px; height: 10px;
  border: 1px solid var(--gold);
}
.socratic-prompt::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
.socratic-prompt::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
.sp-label {
  font-size: 11px;
  letter-spacing: 0.45em;
  color: var(--gold);
  margin-bottom: 14px;
  font-weight: 400;
}
.sp-hint {
  font-size: 13px;
  opacity: 0.75;
  font-style: italic;
  line-height: 1.7;
  margin-bottom: 22px;
}
.socratic-question-hint {
  font-size: 13px;
  opacity: 0.6;
  font-style: italic;
  margin-bottom: 18px;
}
.socratic-option {
  display: block;
  width: 100%;
  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  font-family: inherit;
  text-align: left;
  padding: 16px 20px;
  margin-bottom: 10px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.25s;
}
.socratic-option:hover { border-color: var(--gold); }
.socratic-option:focus { outline: none; }
.socratic-option.correct {
  background: var(--accent-soft);
  border-color: var(--gold-bright);
  animation: socCorrect 0.5s ease;
}
.socratic-option.wrong {
  border-color: rgba(220,90,80,0.5);
  background: rgba(220,90,80,0.05);
  cursor: default;
  pointer-events: none;
}
@keyframes socCorrect {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); box-shadow: 0 0 20px var(--accent); }
  100% { transform: scale(1); }
}
.so-text {
  font-size: 14px;
  line-height: 1.75;
}
.so-hint {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed rgba(220,90,80,0.3);
  font-size: 12px;
  opacity: 0.85;
  font-style: italic;
  color: rgba(220,120,100,0.95);
}

.argument-card.completed {
  border-color: var(--gold) !important;
  background: var(--bg-card);
}

/* ── Arguments screens ── */
.arguments-scroll, .argument-detail-scroll {

/* Detail */

  font-size: 14px;
  opacity: 0.55;

  background: rgba(237,229,211,0.025);
  border-radius: 4px;

}
.ag-detail-who {
  font-size: 11px;
  letter-spacing: 0.2em;
  opacity: 0.4;
  margin-bottom: 6px;
}
.ag-title {
  font-size: 30px;

  line-height: 1.3;
  margin-bottom: 24px;
}
.ag-section {
  margin-bottom: 36px;
}
.ag-section-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.45;
  margin-bottom: 16px;
  color: rgba(237,229,211,0.55);
}
.ag-premise {
  font-size: 17px;
  line-height: 1.85;
  opacity: 0.88;
  padding: 18px 22px;
  border-left: 2px solid var(--accent);
  background: rgba(237,229,211,0.025);
  border-radius: 0 4px 4px 0;
}
.ag-steps {
  counter-reset: ag-step;
}
.ag-step {
  position: relative;
  padding: 14px 0 14px 48px;
  border-bottom: 1px solid rgba(237,229,211,0.04);
  counter-increment: ag-step;
  font-size: 15px;
  line-height: 1.85;
  opacity: 0.85;
}
.ag-step:last-child { border-bottom: none; }
.ag-step::before {
  content: counter(ag-step);
  position: absolute;
  left: 0; top: 14px;
  width: 28px; height: 28px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  opacity: 0.7;
  font-feature-settings: 'tnum';
}
.ag-conclusion {
  font-size: 17px;
  line-height: 1.8;
  opacity: 0.95;
  padding: 22px 24px;
  border: 1px solid var(--accent);
  border-radius: 4px;
  background: var(--accent-soft);
  font-style: italic;
}
.ag-power {
  font-size: 14px;
  line-height: 1.85;
  opacity: 0.7;
  padding: 18px 0;
  border-top: 1px solid rgba(237,229,211,0.06);

}

/* ── Quotes screen ── */

  line-height: 1.75;

  margin-bottom: 12px;
  position: relative;
  padding-left: 18px;
}
.quote-text::before {
  content: '"';

  top: -10px;

}

  font-size: 12px;

}

  font-size: 10px;
  opacity: 0;
  letter-spacing: 0.2em;
  margin-top: 6px;
  transition: opacity 0.3s;

}
.quote-card.copied .quote-copy-hint { opacity: 1; }
.quote-group-label {
  font-size: 11px;
  letter-spacing: 0.3em;
  opacity: 0.4;

  padding-bottom: 8px;
  border-bottom: 1px solid rgba(237,229,211,0.06);

}

/* ── Challenges list + play screens ── */

}

.challenge-card:hover { background: var(--bg-card); border-color: var(--gold); }

.challenge-card.boss { border-left: 3px solid var(--gold); }
.challenge-card.perfect { border-color: var(--gold); background: var(--bg-card); }
.challenge-card.perfect::after {
  content: '✦';
  position: absolute;

}

}

  opacity: 0.55;

  margin-bottom: 10px;
}

  font-size: 11px;
  opacity: 0.55;

}
.cc-status.passed { color: var(--gold); opacity: 0.9; }

/* ── Challenge play ── */
.cp-title {
  font-size: 26px;
  opacity: 0.95;
  margin-bottom: 6px;
}
.cp-subtitle {
  font-size: 13px;
  opacity: 0.55;
  font-style: italic;
  margin-bottom: 32px;

  border-bottom: 1px solid var(--border-faint);
}
.cp-question {
  display: block;

  background: var(--bg-elevated);
  border: 1px solid var(--border-soft);
  color: var(--text-primary);
  font-family: inherit;

  margin-bottom: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
  position: relative;
}
.cp-question:hover { border-color: var(--gold); }
.cp-question:focus { outline: none; }
.cp-question.selected {
  background: var(--accent-soft);
  border-color: var(--gold);
}
.cp-question.selected::after {
  content: '× 伪';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--gold-bright);
  letter-spacing: 0.15em;
}

}

}

}
.cp-submit-btn:hover { background: var(--accent); }
.cp-submit-btn:active { transform: scale(0.97); }
.cp-submit-btn:focus { outline: none; }
.cp-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Challenge result */
.cp-result-header {
  text-align: center;
  padding: 32px 20px 28px;
  margin-bottom: 32px;
  border: 1px solid var(--gold);
  background: radial-gradient(ellipse at 50% 50%, var(--accent-soft) 0%, transparent 70%);
  border-radius: 2px;
  position: relative;
}
.cp-result-header.perfect {
  border-color: var(--gold-bright);
  background:
    radial-gradient(ellipse at 50% 50%, var(--accent-soft) 0%, transparent 70%),
    var(--bg-card);
}
.cp-result-label {
  font-size: 11px;
  letter-spacing: 0.5em;
  color: var(--gold);
  margin-bottom: 12px;
  opacity: 0.85;
}
.cp-result-score {
  font-size: 48px;
  line-height: 1;
  color: var(--gold-bright);
  margin-bottom: 12px;
  background: linear-gradient(180deg, var(--text-primary) 0%, var(--gold) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.cp-result-text {
  font-size: 14px;
  opacity: 0.75;
  font-style: italic;
}
.cp-review-item {
  padding: 18px 22px;
  margin-bottom: 12px;

  border-left: 3px solid;
  border-radius: 0 4px 4px 0;
}
.cp-review-item.correct { border-left-color: rgba(150,180,100,0.6); }
.cp-review-item.wrong { border-left-color: rgba(200,90,80,0.6); }
.cp-review-q {
  font-size: 14px;
  opacity: 0.9;
  margin-bottom: 8px;
  font-style: italic;
}
.cp-review-verdict {
  font-size: 11px;
  letter-spacing: 0.15em;

}
.cp-review-verdict.correct { color: rgba(150,180,100,0.95); }
.cp-review-verdict.wrong { color: rgba(220,120,100,0.95); }
.cp-review-explanation {
  font-size: 13px;
  opacity: 0.75;
  line-height: 1.7;
}

// ═══ 伪命题挑战进度 ═══
function getChallengeResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/challenge/' + id + '/result'));
  } catch { return null; }
}
function saveChallengeResult(id, score, total) {
  const result = { score, total, at: new Date().toISOString(), perfect: score === total };
  localStorage.setItem('echo/challenge/' + id + '/result', JSON.stringify(result));
  return result;
}
function isChallengePerfect(id) {
  const r = getChallengeResult(id);
  return r && r.perfect;
}
function getCompletedChallenges() {
  return FAKE_CHALLENGES.filter(c => isChallengePerfect(c.id)).map(c => c.id);
}

// ═══ 7 天实践 — 闯关进度跟踪 ═══
function getPracticeProgress(practiceId) {
  try {
    return JSON.parse(localStorage.getItem('echo/practice/' + practiceId + '/progress')) || [];
  } catch { return []; }
}

function completeDay(practiceId, day) {
  const done = getPracticeProgress(practiceId);
  if (done.includes(day)) return 'ALREADY';
  done.push(day);
  done.sort((a,b) => a-b);
  localStorage.setItem('echo/practice/' + practiceId + '/progress', JSON.stringify(done));
  if (done.length === 7) {
    localStorage.setItem('echo/practice/' + practiceId + '/completed-at', new Date().toISOString());
    return 'COMPLETED';
  }
  return 'PROGRESS';
}

function getCurrentDay(practiceId) {
  const done = getPracticeProgress(practiceId);
  if (done.length === 0) return 1;
  if (done.length >= 7) return 7;
  // Find lowest day not yet done
  for (let i = 1; i <= 7; i++) {
    if (!done.includes(i)) return i;
  }
  return 7;
}

function isPracticeStarted(practiceId) {
  return getPracticeProgress(practiceId).length > 0;
}

function isPracticeCompleted(practiceId) {
  return getPracticeProgress(practiceId).length >= 7;
}

function getCompletedPractices() {
  return PRACTICES.filter(p => isPracticeCompleted(p.id)).map(p => p.id);
}

function getInProgressPractices() {
  return PRACTICES.filter(p => isPracticeStarted(p.id) && !isPracticeCompleted(p.id));
}

function calculateOverallStats() {
  const completedP = getCompletedPractices();
  const passedC = getCompletedChallenges();
  const completedA = getCompletedArguments();
  const stats = { readCount: 0, reflectionCount: 0, streak: 0, dims: { awareness:0, criticality:0, composure:0, autonomy:0, action:0 }, nietzsche:0, stoic:0, camus:0, foucault:0, practiceCompleted: completedP.length, completedPractices: completedP, completedPracticesCount: completedP.length, passedChallenges: passedC, completedArguments: completedA };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      const refls = JSON.parse(localStorage.getItem(storageKey(p.id, 'reflections'))) || {};
      const readKeys = Object.keys(prog).filter(k => prog[k]);
      stats.readCount += readKeys.length;
      stats[p.id] = readKeys.length;
      Object.values(refls).forEach(r => {
        const txt = typeof r === 'string' ? r : r?.text;
        if (txt && txt.trim()) stats.reflectionCount++;
      });
      readKeys.forEach(id => {
        const c = CONCEPT_DIMENSIONS[id];
        if (c) Object.entries(c).forEach(([k,v]) => stats.dims[k] += v);
      });
    } catch {}
  });
  stats.streak = computeStreak();
  return stats;
}

function computeStreak() {
  try {
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (visits.length === 0) return 0;
    // Sort descending
    const days = [...new Set(visits)].sort().reverse();
    const today = new Date().toISOString().slice(0,10);
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if (days[0] !== today && days[0] !== yesterday) return 0;
    let streak = 1;
    let prev = new Date(days[0]);
    for (let i = 1; i < days.length; i++) {
      const cur = new Date(days[i]);
      const diff = (prev - cur) / 86400000;
      if (diff === 1) { streak++; prev = cur; }
      else break;
    }
    return streak;
  } catch { return 0; }
}

function recordVisit() {
  try {
    const today = new Date().toISOString().slice(0,10);
    const raw = localStorage.getItem('echo/visits') || '[]';
    const visits = JSON.parse(raw);
    if (!visits.includes(today)) {
      visits.push(today);
      // Keep last 90 days
      if (visits.length > 90) visits.shift();
      localStorage.setItem('echo/visits', JSON.stringify(visits));
    }
  } catch {}
}

function checkNewAchievements() {
  const stats = calculateOverallStats();
  const earned = JSON.parse(localStorage.getItem('echo/achievements') || '[]');
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (!earned.includes(a.id) && a.check(stats)) {
      earned.push(a.id);
      newly.push(a);
    }
  });
  localStorage.setItem('echo/achievements', JSON.stringify(earned));
  return { earned, newly };
}

function calculateBrainStats() {
  const stats = { awareness: 0, criticality: 0, composure: 0, autonomy: 0, action: 0 };
  PHILOSOPHERS.forEach(p => {
    try {
      const prog = JSON.parse(localStorage.getItem(storageKey(p.id, 'progress'))) || {};
      Object.keys(prog).forEach(conceptId => {
        if (!prog[conceptId]) return;
        const contrib = CONCEPT_DIMENSIONS[conceptId];
        if (!contrib) return;
        Object.entries(contrib).forEach(([dim, val]) => { stats[dim] += val; });
      });
    } catch {}
  });
  return stats;
}

function totalBrainScore(stats) {
  return Object.values(stats).reduce((a, b) => a + b, 0);
}

function getArgumentResult(id) {
  try {
    return JSON.parse(localStorage.getItem('echo/argument/' + id + '/result'));
  } catch { return null; }
}
function saveArgumentResult(id, correct) {
  localStorage.setItem('echo/argument/' + id + '/result', JSON.stringify({ correct, at: new Date().toISOString() }));
}
function isArgumentCompleted(id) {
  const r = getArgumentResult(id);
  return r && r.correct;
}
function getCompletedArguments() {
  return ARGUMENTS.filter(a => isArgumentCompleted(a.id)).map(a => a.id);
}

  }
}

// ═══ Radar chart ═══
function buildRadarSVG(stats, size = 200) {
  const cx = size / 2, cy = size / 2;
  const radius = size * 0.38;
  const n = DIMENSIONS.length;
  const maxScore = 60; // visual cap

  // Points on each axis (vertex top, going clockwise)
  function pt(idx, factor) {
    const angle = -Math.PI / 2 + (Math.PI * 2 * idx) / n;
    return [cx + Math.cos(angle) * radius * factor, cy + Math.sin(angle) * radius * factor];
  }

  // Background polygons at 25/50/75/100%
  const bgPolys = [0.25, 0.5, 0.75, 1].map(f => {
    const pts = DIMENSIONS.map((_, i) => pt(i, f).join(',')).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Axis lines
  const axes = DIMENSIONS.map((_, i) => {
    const [x, y] = pt(i, 1);
    return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(237,229,211,0.06)" stroke-width="1"/>`;
  }).join('');

  // Actual stat polygon
  const statPts = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    return pt(i, f).join(',');
  }).join(' ');
  const statPoly = `<polygon points="${statPts}" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>`;

  // Dots at each point
  const dots = DIMENSIONS.map((d, i) => {
    const score = stats[d.id] || 0;
    const f = Math.min(1, score / maxScore);
    const [x, y] = pt(i, f);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="var(--accent-strong)"/>`;
  }).join('');

  // Labels at vertices
  const labels = DIMENSIONS.map((d, i) => {
    const [x, y] = pt(i, 1.22);
    return `<text x="${x}" y="${y}" fill="rgba(237,229,211,0.5)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-family="inherit">${d.name}</text>`;
  }).join('');

  return `<svg class="mind-radar" width="${size}" height="${size + 20}" viewBox="0 -10 ${size} ${size + 20}">${bgPolys}${axes}${statPoly}${dots}${labels}</svg>`;
}

function getApiKey() {
  return localStorage.getItem('echo/deepseek-key') || '';
}

function setApiKey(key) {
  localStorage.setItem('echo/deepseek-key', key);
}

async function callDeepSeek(messages) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('请先在设置中填入 DeepSeek API key');

  const resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey,
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: messages,
      temperature: 0.7,
      max_tokens: 600,
    }),
  });

  if (!resp.ok) {
    const txt = await resp.text();
    throw new Error('API 错误: ' + resp.status + ' ' + txt.slice(0, 100));
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}

  const scroll = document.getElementById('chat-scroll');
  // Remove intro if present
  const intro = scroll.querySelector('.chat-intro');
  if (intro) intro.remove();

  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + (role === 'user' ? 'user' : 'philosopher');
  if (isLoading) bubble.classList.add('loading');
  if (role !== 'user' && chatPhilosopher) {
    bubble.innerHTML = `<div class="chat-bubble-name">${escapeHtml(chatPhilosopher.name)}</div>${escapeHtml(text)}`;
  } else {
    bubble.textContent = text;
  }
  scroll.appendChild(bubble);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  return bubble;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const apiKey = getApiKey();
  if (!apiKey) { window.__goToSettings(); return; }

  input.value = '';
  input.style.height = 'auto';
  appendBubble('user', text);
  chatHistory.push({ role: 'user', content: text });

  const loading = appendBubble('philosopher', '', true);
  document.getElementById('chat-send').disabled = true;

  try {
    const response = await callDeepSeek(chatHistory);
    loading.remove();
    appendBubble('philosopher', response);
    chatHistory.push({ role: 'assistant', content: response });
  } catch (e) {
    loading.remove();
    appendBubble('philosopher', '× ' + e.message);
  } finally {
    document.getElementById('chat-send').disabled = false;
  }
}

function renderPracticeDetail(p) {
  const scroll = document.getElementById('practice-detail-scroll');
  const done = getPracticeProgress(p.id);
  const completed = done.length >= 7;
  const currentDay = getCurrentDay(p.id);

  const days = p.days.map(d => {
    const isDone = done.includes(d.day);
    const isCurrent = !completed && d.day === currentDay;
    const isLocked = !isDone && !isCurrent;
    const isBoss = d.day === 7;

    let cls = 'pr-day';
    if (isDone) cls += ' done';
    if (isCurrent) cls += ' current';
    if (isLocked) cls += ' locked';
    if (isBoss) cls += ' boss';

    const button = isCurrent
      ? `<button class="pr-day-complete-btn" data-day="${d.day}">${isBoss ? '完成最终一日 ⚜' : '完成今天'}</button>`
      : '';

    const stateLabel = isDone ? '<span class="pr-day-state done">✓ 已完成</span>'
                     : isCurrent ? (isBoss ? '<span class="pr-day-state boss-label">最 终 关</span>' : '<span class="pr-day-state current-label">今 日</span>')
                     : '<span class="pr-day-state">未解锁</span>';

    return `
      <div class="${cls}" data-day="${d.day}">
        <div class="pr-day-header">
          <span class="pr-day-number">${isBoss ? '⚜ DAY 7' : 'DAY ' + d.day}</span>
          ${stateLabel}
        </div>
        ${isLocked ? '' : `
          <div class="pr-day-task">${escapeHtml(d.task)}</div>
          <div class="pr-day-why">${escapeHtml(d.why)}</div>
          ${button}
        `}
      </div>
    `;
  }).join('');

  const headerStatus = completed
    ? `<div class="pr-completed-badge">✓ 已完成 · 通关</div>`
    : `<div class="pr-progress-bar"><div class="pr-progress-fill" style="width:${(done.length/7)*100}%"></div></div>

  scroll.innerHTML = `
    <div class="pr-title">${escapeHtml(p.title)}</div>
    <div class="pr-who">${escapeHtml(p.philosopher)}</div>
    <div class="pr-intro">${escapeHtml(p.intro)}</div>

  `;

  scroll.querySelectorAll('.pr-day-complete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {

// Socratic interactive state
let socraticArgument = null;
let socraticStepIndex = 0;
let socraticMode = 'premise'; // premise → stepping → choose → done

function openArgument(id) {
  const a = ARGUMENTS.find(x => x.id === id);
  if (!a) return;
  socraticArgument = a;
  socraticStepIndex = 0;
  socraticMode = 'premise';
  renderSocratic();
  showScreen('argument-detail');
  window.scrollTo(0, 0);
}

function renderSocratic() {
  const a = socraticArgument;
  const scroll = document.getElementById('argument-detail-scroll');
  const completed = isArgumentCompleted(a.id);

  // Always show header + premise
  let html = `
    <div class="ag-detail-who">${escapeHtml(a.philosopher)}${completed ? ' · <span style="color:var(--gold);">✦ 已推出</span>' : ''}</div>
    <div class="ag-title">${escapeHtml(a.title)}</div>
    <div class="ag-target">对应迷思: ${escapeHtml(a.target)}</div>

    <div class="ag-section">
      <div class="ag-section-label">起点</div>
      <div class="ag-premise">${escapeHtml(a.premise)}</div>
    </div>
  `;

  if (socraticMode === 'premise') {
    html += `
      <div class="socratic-prompt">
        <div class="sp-label">现 在 开 始 推 导</div>
        <div class="sp-hint">不要急着读结论——让自己先想想接下来会怎么发展。</div>
        <button class="cp-submit-btn" id="socratic-start">开 始</button>
      </div>
    `;
  }

  // Show revealed steps
  if (socraticStepIndex > 0 || socraticMode === 'stepping' || socraticMode === 'choose' || socraticMode === 'done') {
    const shownSteps = a.steps.slice(0, socraticStepIndex);
    if (shownSteps.length > 0) {
      const steps = shownSteps.map(s => `<div class="ag-step">${escapeHtml(s)}</div>`).join('');
      html += `
        <div class="ag-section">
          <div class="ag-section-label">推 理</div>
          <div class="ag-steps">${steps}</div>
        </div>
      `;
    }
  }

  // Show next-step button or stepping prompt
  if (socraticMode === 'stepping') {
    if (socraticStepIndex < a.steps.length) {
      html += `
        <div class="socratic-prompt">
          <div class="sp-label">下 一 步 会 怎 么 发 展？</div>
          <div class="sp-hint">先在心里想一下——然后看你的猜测对不对。</div>
          <button class="cp-submit-btn" id="socratic-next">揭 晓 下 一 步</button>
        </div>
      `;
    } else {
      // All steps shown, now ask for conclusion
      socraticMode = 'choose';
    }
  }

  if (socraticMode === 'choose') {
    const opts = SOCRATIC_OPTIONS[a.id] || [];
    // Shuffle (stable by argument id)
    const shuffled = [...opts].map((o, i) => ({...o, _idx: i})).sort((a, b) => (a.text.length % 7) - (b.text.length % 7));
    const optionsHtml = shuffled.map((o) => `
      <button class="socratic-option" data-correct="${o.correct ? '1' : '0'}" data-hint="${escapeHtml(o.hint || '')}">
        <div class="so-text">${escapeHtml(o.text)}</div>
      </button>
    `).join('');
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论 是 什 么？</div>
        <div class="socratic-question-hint">从下面三个中选——只有一个是这个论证真正得出的结论。</div>
        ${optionsHtml}
      </div>
    `;
  }

  if (socraticMode === 'done') {
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论</div>
        <div class="ag-conclusion">${escapeHtml(a.conclusion)}</div>
      </div>

      <div class="ag-section">
        <div class="ag-section-label">这 个 论 证 的 力 量</div>
        <div class="ag-power">${escapeHtml(a.power)}</div>
      </div>

      <div style="text-align:center; padding:24px 0;">
        <button class="cp-submit-btn" id="socratic-back-list">回 到 论 证 列 表</button>
      </div>
    `;
  }

  scroll.innerHTML = html;

  // Wire buttons
  const startBtn = document.getElementById('socratic-start');
  if (startBtn) startBtn.addEventListener('click', () => {
    haptic('light');
    socraticMode = 'stepping';
    socraticStepIndex = 1;
    renderSocratic();
  });

  const nextBtn = document.getElementById('socratic-next');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    haptic('light');
    socraticStepIndex++;
    if (socraticStepIndex >= a.steps.length + 1) {
      socraticStepIndex = a.steps.length;
      socraticMode = 'choose';
    }
    renderSocratic();
  });

  scroll.querySelectorAll('.socratic-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const correct = opt.getAttribute('data-correct') === '1';
      const hint = opt.getAttribute('data-hint');
      if (correct) {
        haptic('success');
        saveArgumentResult(a.id, true);
        // Show success — gold the option
        opt.classList.add('correct');
        setTimeout(() => {
          showSocraticVictory(a);
        }, 600);
      } else {
        haptic('medium');

let quoteFilter = 'all';

function renderQuotes() {
  const scroll = document.getElementById('quotes-scroll');
  const filterBar = QUOTE_THEMES.map(t => `
    <button class="quote-filter-btn ${quoteFilter === t.id ? 'active' : ''}" data-filter="${t.id}">${escapeHtml(t.name)}</button>
  `).join('');

  // Group by theme (unless filter is 'all'; in that case show grouped; if filtered, just list)
  let body;
  if (quoteFilter === 'all') {
    body = QUOTE_THEMES.filter(t => t.id !== 'all').map(t => {
      const items = QUOTES.filter(q => q.theme === t.id);
      const itemsHtml = items.map((q, idx) => `
        <div class="quote-card" data-quote-idx="${QUOTES.indexOf(q)}">
          <div class="quote-text">${escapeHtml(q.text)}</div>
          <div class="quote-attribution">— <span class="quote-who">${escapeHtml(q.who)}</span> · ${escapeHtml(q.src)}</div>
          <div class="quote-copy-hint">已复制</div>
        </div>
      `).join('');
      return `<div class="quote-group-label">${escapeHtml(t.name)}</div>${itemsHtml}`;
    }).join('');
  } else {
    const items = QUOTES.filter(q => q.theme === quoteFilter);
    body = items.map((q, idx) => `
      <div class="quote-card" data-quote-idx="${QUOTES.indexOf(q)}">
        <div class="quote-text">${escapeHtml(q.text)}</div>
        <div class="quote-attribution">— <span class="quote-who">${escapeHtml(q.who)}</span> · ${escapeHtml(q.src)}</div>
        <div class="quote-copy-hint">已复制</div>
      </div>
    `).join('');
  }

  scroll.innerHTML = `
    <div class="quotes-title">金句</div>
    <div class="quotes-subtitle">${QUOTES.length} 句，按主题分组 · 点击复制</div>
    <div class="quote-filter-bar">${filterBar}</div>
    ${body}
  `;

  scroll.querySelectorAll('.quote-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      quoteFilter = btn.getAttribute('data-filter');
      haptic('light');
      renderQuotes();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  scroll.querySelectorAll('.quote-card').forEach(card => {
    card.addEventListener('click', async () => {
      const idx = parseInt(card.getAttribute('data-quote-idx'));
      const q = QUOTES[idx];
      const text = `"${q.text}" — ${q.who}${q.src ? '《' + q.src.replace(/^《|》$/g, '') + '》' : ''}`;
      try {
        await navigator.clipboard.writeText(text);
        haptic('success');
        card.classList.add('copied');
        setTimeout(() => card.classList.remove('copied'), 1500);
      } catch {}
    });
  });
}

let currentChallenge = null;
let challengeSelection = new Set();
let challengeResultMode = false;

function renderChallenges() {
  const scroll = document.getElementById('challenges-scroll');
  const cards = FAKE_CHALLENGES.map((c, idx) => {
    const result = getChallengeResult(c.id);
    const passed = result && result.perfect;
    const tried = result && !result.perfect;
    let status;
    if (passed) status = `<span class="cc-status passed">✦ 满分通过 · ${result.score}/${result.total}</span>`;
    else if (tried) status = `<span class="cc-status">最近: ${result.score}/${result.total} · 还差一点</span>`;
    else status = `<span class="cc-status">未挑战</span>`;
    const bossCls = c.boss ? ' boss' : '';
    const perfectCls = passed ? ' perfect' : '';
    return `
      <button class="challenge-card${bossCls}${perfectCls}" data-c="${c.id}">
        <div class="cc-title">${escapeHtml(c.title)}</div>
        <div class="cc-subtitle">${escapeHtml(c.subtitle)}</div>
        ${status}
      </button>
    `;
  }).join('');
  scroll.innerHTML = `
    <div class="challenges-title">识破挑战</div>
    <div class="challenges-subtitle">5 关 · 挑出"问错了"的问题——满分通过才解锁勋章</div>
    ${cards}
  `;
  scroll.querySelectorAll('.challenge-card').forEach(card => {
    card.addEventListener('click', () => {
      haptic('light');
      openChallenge(card.getAttribute('data-c'));
    });
  });
}

function openChallenge(id) {
  const c = FAKE_CHALLENGES.find(x => x.id === id);
  if (!c) return;
  currentChallenge = c;
  challengeSelection = new Set();
  challengeResultMode = false;
  renderChallengePlay();
  showScreen('challenge-play');
  window.scrollTo(0, 0);
}

function renderChallengePlay() {
  const c = currentChallenge;
  document.getElementById('challenge-play-label').textContent = c.title;
  const scroll = document.getElementById('challenge-play-scroll');

  if (challengeResultMode) {
    renderChallengeResult();
    return;
  }

  const items = c.items.map((item, idx) => {
    const selected = challengeSelection.has(idx);
    return `
      <button class="cp-question${selected ? ' selected' : ''}" data-idx="${idx}">
        <div class="cp-q-text">"${escapeHtml(item.q)}"</div>
      </button>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="cp-title">${escapeHtml(c.title)}</div>
    <div class="cp-subtitle">${escapeHtml(c.subtitle)} · 点击你认为是"问错了"的问题</div>
    ${items}
    <div class="cp-submit-bar">
      <button class="cp-submit-btn" id="cp-submit-btn">提 交</button>
    </div>
  `;

  scroll.querySelectorAll('.cp-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-idx'));
      if (challengeSelection.has(idx)) challengeSelection.delete(idx);
      else challengeSelection.add(idx);
      haptic('light');
      btn.classList.toggle('selected');
    });
  });

  document.getElementById('cp-submit-btn').addEventListener('click', () => {
    haptic('medium');
    submitChallenge();
  });
}

function submitChallenge() {
  const c = currentChallenge;
  let score = 0;
  c.items.forEach((item, idx) => {
    const userSays = challengeSelection.has(idx);
    if (userSays === item.isFake) score++;
  });
  const result = saveChallengeResult(c.id, score, c.items.length);
  if (result.perfect) {
    showChallengePerfect(c, result);
  } else {
    challengeResultMode = true;
    renderChallengeResult();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  setTimeout(checkAndShowAchievements, 1000);
}

function showChallengePerfect(c, result) {
  const overlay = document.createElement('div');
  overlay.className = 'boss-victory';
  overlay.innerHTML = `
    <div class="bv-bg"></div>

      <button class="bv-dismiss" id="bv-dismiss-btn">看看哪些是陷阱</button>
    </div>
  `;
  document.body.appendChild(overlay);
  haptic('success');

    overlay.style.transition = 'opacity 0.5s';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.remove();

function renderChallengeResult() {
  const c = currentChallenge;
  const result = getChallengeResult(c.id);
  if (!result) return;

  const reviews = c.items.map((item, idx) => {
    const userSays = challengeSelection.has(idx);
    const correct = userSays === item.isFake;
    return `
      <div class="cp-review-item ${correct ? 'correct' : 'wrong'}">
        <div class="cp-review-q">"${escapeHtml(item.q)}"</div>
        <div class="cp-review-verdict ${correct ? 'correct' : 'wrong'}">
          ${correct ? '✓ 你答对了' : '✗ 你判断错了'} —
          这是${item.isFake ? '伪命题' : '真问题'}
        </div>
        <div class="cp-review-explanation">${escapeHtml(item.why)}</div>
      </div>
    `;
  }).join('');

  const scroll = document.getElementById('challenge-play-scroll');
  scroll.innerHTML = `
    <div class="cp-result-header${result.perfect ? ' perfect' : ''}">
      <div class="cp-result-label">${result.perfect ? '满 分' : '结 果'}</div>
      <div class="cp-result-score">${result.score} / ${result.total}</div>
      <div class="cp-result-text">${result.perfect ? '你识破了所有陷阱' : '差一点——看看哪些没看出来'}</div>
    </div>
    ${reviews}
    <div class="cp-submit-bar" style="margin-top: 40px;">
      <button class="cp-submit-btn" id="cp-retry-btn">${result.perfect ? '返回挑战列表' : '再 试 一 次'}</button>
    </div>
  `;
  document.getElementById('cp-retry-btn').addEventListener('click', () => {
    if (result.perfect) {
      renderChallenges();
      showScreen('challenges');
    } else {
      challengeSelection = new Set();
      challengeResultMode = false;

      window.scrollTo(0, 0);

  });
}

let lexiconFilter = 'all';
function renderLexicon() {
  const scroll = document.getElementById('lexicon-scroll');
  const groups = {
    nietzsche: { name: '尼采', entries: [] },
    stoic: { name: '斯多葛', entries: [] },
    camus: { name: '加缪', entries: [] },
    foucault: { name: '福柯', entries: [] },
  };
  LEXICON.forEach(e => {
    if (groups[e.school]) groups[e.school].entries.push(e);
  });

  const filterBar = `
    <div class="lexicon-filter-bar">
      <button class="lexicon-filter-btn ${lexiconFilter==='all' ? 'active' : ''}" data-filter="all">全部</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='nietzsche' ? 'active' : ''}" data-filter="nietzsche">尼采</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='stoic' ? 'active' : ''}" data-filter="stoic">斯多葛</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='camus' ? 'active' : ''}" data-filter="camus">加缪</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='foucault' ? 'active' : ''}" data-filter="foucault">福柯</button>
    </div>
  `;

  const groupHtml = Object.entries(groups).map(([key, g]) => {
    if (lexiconFilter !== 'all' && lexiconFilter !== key) return '';
    if (g.entries.length === 0) return '';
    const entries = g.entries.map(e => {
      const conceptTags = e.concepts.map(cId => {
        const name = CONCEPT_NAMES[cId] || cId;
        return `<button class="lexicon-concept-tag" data-concept="${cId}">${escapeHtml(name)}</button>`;
      }).join('');
      return `
        <div class="lexicon-entry">
          <div class="lexicon-entry-head">
            <span class="lexicon-zh">${escapeHtml(e.zh)}</span>
            <span class="lexicon-orig">${escapeHtml(e.orig)}</span>
            <span class="lexicon-lang">${escapeHtml(e.lang)}</span>
          </div>
          <div class="lexicon-etym">字源：${escapeHtml(e.etym)}</div>
          <div class="lexicon-def">${escapeHtml(e.def)}</div>
          ${conceptTags ? `<div class="lexicon-concepts">${conceptTags}</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="lexicon-group">
        <div class="lexicon-group-label">${g.name}</div>
        ${entries}
      </div>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="lexicon-title">辞海</div>
    <div class="lexicon-subtitle">关键术语 · 字源 · 释义</div>
    ${filterBar}
    ${groupHtml}
  `;

  scroll.querySelectorAll('.lexicon-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lexiconFilter = btn.getAttribute('data-filter');
      haptic('light');
      renderLexicon();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  scroll.querySelectorAll('.lexicon-concept-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const conceptId = tag.getAttribute('data-concept');
      const phId = findPhilosopherForConcept(conceptId);
      const philosopher = PHILOSOPHERS.find(p => p.id === phId);
      if (philosopher) {
        haptic('light');
        enterPhilosopher(philosopher).then(() => {
          setTimeout(() => openStory(conceptId), 400);
        });
      }
    });
  });
}
