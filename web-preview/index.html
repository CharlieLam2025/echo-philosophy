  if (!p) return;
  chatPhilosopher = p;
  chatHistory = [{
    role: 'system',
    content: PHILOSOPHER_PROMPTS[philosopherId] || '你是一位智者。',
  }];

  document.documentElement.setAttribute('data-philosopher', p.id);
  document.getElementById('chat-header-label').textContent = '和' + p.name + '对话';

  const scroll = document.getElementById('chat-scroll');
  const apiKey = getApiKey();
  if (!apiKey) {
    scroll.innerHTML = `
      <div class="chat-intro">
        要和${escapeHtml(p.name)}对话，先在设置里填入 DeepSeek API key。<br><br>
        <button class="chat-fab" onclick="window.__goToSettings()">去设置</button>
      </div>
    `;
  } else {
    scroll.innerHTML = `
      <div class="chat-intro">
        和${escapeHtml(p.name)}对话——按 ${escapeHtml(p.name)} 的方式思考问题。<br>
        <span style="font-size:11px; opacity:0.5;">这是 AI 模拟，不是真正的哲学家。把它当作"用某种风格思考"的工具。</span>
      </div>
    `;
  }
  showScreen('chat');
  setTimeout(() => document.getElementById('chat-input').focus(), 100);
}

window.__goToSettings = function() {
  renderSettings();
  showScreen('settings');
};

function appendBubble(role, text, isLoading = false) {
  const scroll = document.getElementById('chat-scroll');
  // Remove intro if present
  const intro = scroll.querySelector('.chat-intro');
  if (intro) intro.remove();

  const bubble = document.createElement('div');
  bubble.className = 'chat-bubble ' + (role === 'user' ? 'user' : 'philosopher');
  if (isLoading) bubble.classList.add('loading');
  if (role !== 'user' && chatPhilosopher) {
    bubble.innerHTML = `<div class="chat-bubble-name">${escapeHtml(chatPhilosopher.name)}</div>${escapeHtml(text)}`;
  } else {
    bubble.textContent = text;
  }
  scroll.appendChild(bubble);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  return bubble;
}

async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const apiKey = getApiKey();
  if (!apiKey) { window.__goToSettings(); return; }

  input.value = '';
  input.style.height = 'auto';
  appendBubble('user', text);
  chatHistory.push({ role: 'user', content: text });

  const loading = appendBubble('philosopher', '', true);
  document.getElementById('chat-send').disabled = true;

  try {
    const response = await callDeepSeek(chatHistory);
    loading.remove();
    appendBubble('philosopher', response);
    chatHistory.push({ role: 'assistant', content: response });
  } catch (e) {
    loading.remove();
    appendBubble('philosopher', '× ' + e.message);
  } finally {
    document.getElementById('chat-send').disabled = false;
  }
}

function renderPracticeDetail(p) {
  const scroll = document.getElementById('practice-detail-scroll');
  const done = getPracticeProgress(p.id);
  const completed = done.length >= 7;
  const currentDay = getCurrentDay(p.id);

  const days = p.days.map(d => {
    const isDone = done.includes(d.day);
    const isCurrent = !completed && d.day === currentDay;
    const isLocked = !isDone && !isCurrent;
    const isBoss = d.day === 7;

    let cls = 'pr-day';
    if (isDone) cls += ' done';
    if (isCurrent) cls += ' current';
    if (isLocked) cls += ' locked';
    if (isBoss) cls += ' boss';

    const button = isCurrent
      ? `<button class="pr-day-complete-btn" data-day="${d.day}">${isBoss ? '完成最终一日 ⚜' : '完成今天'}</button>`
      : '';

    const stateLabel = isDone ? '<span class="pr-day-state done">✓ 已完成</span>'
                     : isCurrent ? (isBoss ? '<span class="pr-day-state boss-label">最 终 关</span>' : '<span class="pr-day-state current-label">今 日</span>')
                     : '<span class="pr-day-state">未解锁</span>';

    return `
      <div class="${cls}" data-day="${d.day}">
        <div class="pr-day-header">
          <span class="pr-day-number">${isBoss ? '⚜ DAY 7' : 'DAY ' + d.day}</span>
          ${stateLabel}
        </div>
        ${isLocked ? '' : `
          <div class="pr-day-task">${escapeHtml(d.task)}</div>
          <div class="pr-day-why">${escapeHtml(d.why)}</div>
          ${button}
        `}
      </div>
    `;
  }).join('');

  const headerStatus = completed
    ? `<div class="pr-completed-badge">✓ 已完成 · 通关</div>`
    : `<div class="pr-progress-bar"><div class="pr-progress-fill" style="width:${(done.length/7)*100}%"></div></div>
       <div class="pr-progress-text">${done.length} / 7 已完成 · 当前 Day ${currentDay}</div>`;

  scroll.innerHTML = `
    <div class="pr-title">${escapeHtml(p.title)}</div>
    <div class="pr-who">${escapeHtml(p.philosopher)}</div>
    <div class="pr-intro">${escapeHtml(p.intro)}</div>
    ${headerStatus}
    ${days}
  `;

  scroll.querySelectorAll('.pr-day-complete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const day = parseInt(btn.getAttribute('data-day'));
      const result = completeDay(p.id, day);
      haptic('success');
      if (result === 'COMPLETED') {
        showPracticeBossCompletion(p);
      } else {
        showToast('Day ' + day + ' 已完成 ✓');
        renderPracticeDetail(p);
        setTimeout(checkAndShowAchievements, 800);
      }
    });
  });
}

// Socratic interactive state
let socraticArgument = null;
let socraticStepIndex = 0;
let socraticMode = 'premise'; // premise → stepping → choose → done

function openArgument(id) {
  const a = ARGUMENTS.find(x => x.id === id);
  if (!a) return;
  socraticArgument = a;
  socraticStepIndex = 0;
  socraticMode = 'premise';
  renderSocratic();
  showScreen('argument-detail');
  window.scrollTo(0, 0);
}

function renderSocratic() {
  const a = socraticArgument;
  const scroll = document.getElementById('argument-detail-scroll');
  const completed = isArgumentCompleted(a.id);

  // Always show header + premise
  let html = `
    <div class="ag-detail-who">${escapeHtml(a.philosopher)}${completed ? ' · <span style="color:var(--gold);">✦ 已推出</span>' : ''}</div>
    <div class="ag-title">${escapeHtml(a.title)}</div>
    <div class="ag-target">对应迷思: ${escapeHtml(a.target)}</div>

    <div class="ag-section">
      <div class="ag-section-label">起点</div>
      <div class="ag-premise">${escapeHtml(a.premise)}</div>
    </div>
  `;

  if (socraticMode === 'premise') {
    html += `
      <div class="socratic-prompt">
        <div class="sp-label">现 在 开 始 推 导</div>
        <div class="sp-hint">不要急着读结论——让自己先想想接下来会怎么发展。</div>
        <button class="cp-submit-btn" id="socratic-start">开 始</button>
      </div>
    `;
  }

  // Show revealed steps
  if (socraticStepIndex > 0 || socraticMode === 'stepping' || socraticMode === 'choose' || socraticMode === 'done') {
    const shownSteps = a.steps.slice(0, socraticStepIndex);
    if (shownSteps.length > 0) {
      const steps = shownSteps.map(s => `<div class="ag-step">${escapeHtml(s)}</div>`).join('');
      html += `
        <div class="ag-section">
          <div class="ag-section-label">推 理</div>
          <div class="ag-steps">${steps}</div>
        </div>
      `;
    }
  }

  // Show next-step button or stepping prompt
  if (socraticMode === 'stepping') {
    if (socraticStepIndex < a.steps.length) {
      html += `
        <div class="socratic-prompt">
          <div class="sp-label">下 一 步 会 怎 么 发 展？</div>
          <div class="sp-hint">先在心里想一下——然后看你的猜测对不对。</div>
          <button class="cp-submit-btn" id="socratic-next">揭 晓 下 一 步</button>
        </div>
      `;
    } else {
      // All steps shown, now ask for conclusion
      socraticMode = 'choose';
    }
  }

  if (socraticMode === 'choose') {
    const opts = SOCRATIC_OPTIONS[a.id] || [];
    // Shuffle (stable by argument id)
    const shuffled = [...opts].map((o, i) => ({...o, _idx: i})).sort((a, b) => (a.text.length % 7) - (b.text.length % 7));
    const optionsHtml = shuffled.map((o) => `
      <button class="socratic-option" data-correct="${o.correct ? '1' : '0'}" data-hint="${escapeHtml(o.hint || '')}">
        <div class="so-text">${escapeHtml(o.text)}</div>
      </button>
    `).join('');
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论 是 什 么？</div>
        <div class="socratic-question-hint">从下面三个中选——只有一个是这个论证真正得出的结论。</div>
        ${optionsHtml}
      </div>
    `;
  }

  if (socraticMode === 'done') {
    html += `
      <div class="ag-section">
        <div class="ag-section-label">结 论</div>
        <div class="ag-conclusion">${escapeHtml(a.conclusion)}</div>
      </div>

      <div class="ag-section">
        <div class="ag-section-label">这 个 论 证 的 力 量</div>
        <div class="ag-power">${escapeHtml(a.power)}</div>
      </div>

      <div style="text-align:center; padding:24px 0;">
        <button class="cp-submit-btn" id="socratic-back-list">回 到 论 证 列 表</button>
      </div>
    `;
  }

  scroll.innerHTML = html;

  // Wire buttons
  const startBtn = document.getElementById('socratic-start');
  if (startBtn) startBtn.addEventListener('click', () => {
    haptic('light');
    socraticMode = 'stepping';
    socraticStepIndex = 1;
    renderSocratic();
  });

  const nextBtn = document.getElementById('socratic-next');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    haptic('light');
    socraticStepIndex++;
    if (socraticStepIndex >= a.steps.length + 1) {
      socraticStepIndex = a.steps.length;
      socraticMode = 'choose';
    }
    renderSocratic();
  });

  scroll.querySelectorAll('.socratic-option').forEach(opt => {
    opt.addEventListener('click', () => {
      const correct = opt.getAttribute('data-correct') === '1';
      const hint = opt.getAttribute('data-hint');
      if (correct) {
        haptic('success');
        saveArgumentResult(a.id, true);
        // Show success — gold the option
        opt.classList.add('correct');
        setTimeout(() => {
          showSocraticVictory(a);
        }, 600);
      } else {
        haptic('medium');
        opt.classList.add('wrong');
        // Show hint in-place
        const hintEl = document.createElement('div');
        hintEl.className = 'so-hint';
        hintEl.textContent = hint;
        opt.appendChild(hintEl);
      }
    });
  });

  const backBtn = document.getElementById('socratic-back-list');
  if (backBtn) backBtn.addEventListener('click', () => {
    renderArguments();
    showScreen('arguments');
  });
}

function openChallenge(id) {
  const c = FAKE_CHALLENGES.find(x => x.id === id);
  if (!c) return;
  currentChallenge = c;
  challengeSelection = new Set();
  challengeResultMode = false;
  renderChallengePlay();
  showScreen('challenge-play');
  window.scrollTo(0, 0);
}

function renderChallengePlay() {
  const c = currentChallenge;
  document.getElementById('challenge-play-label').textContent = c.title;
  const scroll = document.getElementById('challenge-play-scroll');

  if (challengeResultMode) {
    renderChallengeResult();
    return;
  }

  const items = c.items.map((item, idx) => {
    const selected = challengeSelection.has(idx);
    return `
      <button class="cp-question${selected ? ' selected' : ''}" data-idx="${idx}">
        <div class="cp-q-text">"${escapeHtml(item.q)}"</div>
      </button>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="cp-title">${escapeHtml(c.title)}</div>
    <div class="cp-subtitle">${escapeHtml(c.subtitle)} · 点击你认为是"问错了"的问题</div>
    ${items}
    <div class="cp-submit-bar">
      <button class="cp-submit-btn" id="cp-submit-btn">提 交</button>
    </div>
  `;

  scroll.querySelectorAll('.cp-question').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.getAttribute('data-idx'));
      if (challengeSelection.has(idx)) challengeSelection.delete(idx);
      else challengeSelection.add(idx);
      haptic('light');
      btn.classList.toggle('selected');
    });
  });

  document.getElementById('cp-submit-btn').addEventListener('click', () => {
    haptic('medium');
    submitChallenge();
  });
}

function submitChallenge() {
  const c = currentChallenge;
  let score = 0;
  c.items.forEach((item, idx) => {
    const userSays = challengeSelection.has(idx);
    if (userSays === item.isFake) score++;
  });
  const result = saveChallengeResult(c.id, score, c.items.length);
  if (result.perfect) {
    showChallengePerfect(c, result);
  } else {
    challengeResultMode = true;
    renderChallengeResult();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  setTimeout(checkAndShowAchievements, 1000);
}

function showChallengePerfect(c, result) {
  const overlay = document.createElement('div');
  overlay.className = 'boss-victory';
  overlay.innerHTML = `
    <div class="bv-bg"></div>
    <div class="bv-mandala"></div>
    <div class="bv-content">
      <div class="bv-label">满 分 通 过</div>

  `;
  document.body.appendChild(overlay);
  haptic('success');
  document.getElementById('bv-dismiss-btn').addEventListener('click', () => {
    overlay.style.transition = 'opacity 0.5s';
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.remove();
      challengeResultMode = true;
      renderChallengeResult();
      window.scrollTo(0, 0);

function renderChallengeResult() {
  const c = currentChallenge;
  const result = getChallengeResult(c.id);
  if (!result) return;

  const reviews = c.items.map((item, idx) => {
    const userSays = challengeSelection.has(idx);
    const correct = userSays === item.isFake;
    return `
      <div class="cp-review-item ${correct ? 'correct' : 'wrong'}">
        <div class="cp-review-q">"${escapeHtml(item.q)}"</div>
        <div class="cp-review-verdict ${correct ? 'correct' : 'wrong'}">

        </div>
        <div class="cp-review-explanation">${escapeHtml(item.why)}</div>
      </div>
    `;
  }).join('');

  const scroll = document.getElementById('challenge-play-scroll');
  scroll.innerHTML = `
    <div class="cp-result-header${result.perfect ? ' perfect' : ''}">
      <div class="cp-result-label">${result.perfect ? '满 分' : '结 果'}</div>

      <div class="cp-result-text">${result.perfect ? '你识破了所有陷阱' : '差一点——看看哪些没看出来'}</div>
    </div>
    ${reviews}
    <div class="cp-submit-bar" style="margin-top: 40px;">
      <button class="cp-submit-btn" id="cp-retry-btn">${result.perfect ? '返回挑战列表' : '再 试 一 次'}</button>

  document.getElementById('cp-retry-btn').addEventListener('click', () => {
    if (result.perfect) {
      renderChallenges();
      showScreen('challenges');

      challengeSelection = new Set();

let lexiconFilter = 'all';
function renderLexicon() {
  const scroll = document.getElementById('lexicon-scroll');
  const groups = {
    nietzsche: { name: '尼采', entries: [] },
    stoic: { name: '斯多葛', entries: [] },
    camus: { name: '加缪', entries: [] },
    foucault: { name: '福柯', entries: [] },
  };
  LEXICON.forEach(e => {
    if (groups[e.school]) groups[e.school].entries.push(e);
  });

  const filterBar = `
    <div class="lexicon-filter-bar">
      <button class="lexicon-filter-btn ${lexiconFilter==='all' ? 'active' : ''}" data-filter="all">全部</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='nietzsche' ? 'active' : ''}" data-filter="nietzsche">尼采</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='stoic' ? 'active' : ''}" data-filter="stoic">斯多葛</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='camus' ? 'active' : ''}" data-filter="camus">加缪</button>
      <button class="lexicon-filter-btn ${lexiconFilter==='foucault' ? 'active' : ''}" data-filter="foucault">福柯</button>
    </div>
  `;

  const groupHtml = Object.entries(groups).map(([key, g]) => {
    if (lexiconFilter !== 'all' && lexiconFilter !== key) return '';
    if (g.entries.length === 0) return '';
    const entries = g.entries.map(e => {
      const conceptTags = e.concepts.map(cId => {
        const name = CONCEPT_NAMES[cId] || cId;
        return `<button class="lexicon-concept-tag" data-concept="${cId}">${escapeHtml(name)}</button>`;
      }).join('');
      return `
        <div class="lexicon-entry">
          <div class="lexicon-entry-head">
            <span class="lexicon-zh">${escapeHtml(e.zh)}</span>
            <span class="lexicon-orig">${escapeHtml(e.orig)}</span>
            <span class="lexicon-lang">${escapeHtml(e.lang)}</span>
          </div>
          <div class="lexicon-etym">字源：${escapeHtml(e.etym)}</div>
          <div class="lexicon-def">${escapeHtml(e.def)}</div>
          ${conceptTags ? `<div class="lexicon-concepts">${conceptTags}</div>` : ''}
        </div>
      `;
    }).join('');
    return `
      <div class="lexicon-group">
        <div class="lexicon-group-label">${g.name}</div>
        ${entries}
      </div>
    `;
  }).join('');

  scroll.innerHTML = `
    <div class="lexicon-title">辞海</div>
    <div class="lexicon-subtitle">关键术语 · 字源 · 释义</div>
    ${filterBar}
    ${groupHtml}
  `;

  scroll.querySelectorAll('.lexicon-filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lexiconFilter = btn.getAttribute('data-filter');
      haptic('light');
      renderLexicon();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });

  scroll.querySelectorAll('.lexicon-concept-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const conceptId = tag.getAttribute('data-concept');
      const phId = findPhilosopherForConcept(conceptId);
      const philosopher = PHILOSOPHERS.find(p => p.id === phId);
      if (philosopher) {
        haptic('light');
        enterPhilosopher(philosopher).then(() => {
          setTimeout(() => openStory(conceptId), 400);
        });
      }
    });
  });
}

// ═══ 心智之灯 — editorial hairline 五维雷达 ═══
function buildBrainLightSVG(readCount, maxConcepts = 57) {
  const stats = calculateOverallStats();
  const dims = DIMENSIONS.map(d => ({
    id: d.id,
    label: d.name,
    sub: d.subtitle,
    v: Math.min(1, (stats.dims[d.id] || 0) / 30),
  }));

  const size = 280;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 56;
  const n = dims.length;
  const angleFor = (i) => -Math.PI/2 + (i * 2 * Math.PI / n);

  const ringPts = (factor) =>
    dims.map((_, i) => {
      const a = angleFor(i);
      return [cx + r * factor * Math.cos(a), cy + r * factor * Math.sin(a)];
    });

  const valuePts = dims.map((d, i) => {
    const a = angleFor(i);
    const v = Math.max(d.v, 0.02);
    return [cx + r * v * Math.cos(a), cy + r * v * Math.sin(a)];
  });
  const poly = (pts) => pts.map(p => p.map(c => c.toFixed(1)).join(',')).join(' ');

  const el = [];

  // Concentric ring polygons — hairline
  [0.25, 0.5, 0.75, 1.0].forEach((f, idx) => {
    el.push(`<polygon points="${poly(ringPts(f))}" fill="none" stroke="var(--border-faint)" stroke-width="${idx===3?1:0.5}"/>`);
  });
  // Spokes
  ringPts(1).forEach(([x, y]) => {
    el.push(`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--border-faint)" stroke-width="0.5"/>`);
  });
  // Value polygon
  if (readCount > 0) {
    el.push(`<polygon points="${poly(valuePts)}" fill="rgba(163,2,54,0.08)" stroke="var(--crimson)" stroke-width="1.5"/>`);
    // Value dots
    valuePts.forEach(([x, y]) => {
      el.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#fff" stroke="var(--crimson)" stroke-width="1.5"/>`);
    });
  }
  // Center dot
  el.push(`<circle cx="${cx}" cy="${cy}" r="1.5" fill="var(--text-primary)"/>`);

  // Labels
  dims.forEach((d, i) => {
    const a = angleFor(i);
    const lr = r + 26;
    const x = cx + lr * Math.cos(a);
    const y = cy + lr * Math.sin(a);
    const anchor = Math.abs(Math.cos(a)) < 0.3 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end');
    const pct = Math.round(d.v * 100);
    el.push(`<text x="${x.toFixed(1)}" y="${(y-4).toFixed(1)}" text-anchor="${anchor}" style="font-family: var(--font-display); font-size: 11px; font-weight: 700; fill: var(--text-primary); letter-spacing: 0.04em;">${d.label}</text>`);
    el.push(`<text x="${x.toFixed(1)}" y="${(y+9).toFixed(1)}" text-anchor="${anchor}" style="font-family: var(--font-display); font-size: 9px; font-style: italic; fill: var(--text-tertiary); letter-spacing: 0.04em;">${pct}%</text>`);
  });

  return `<svg class="bl-svg" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="overflow: visible; width: 100%; max-width: 320px;">${el.join('')}</svg>`;
}

// ═══ Concept Map ═══
function getDepthMap(nodes) {
  const depthMap = new Map();
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  function calcDepth(id) {
    if (depthMap.has(id)) return depthMap.get(id);
    const node = nodeMap.get(id);
    if (!node || node.dependencies.length === 0) { depthMap.set(id, 0); return 0; }
    const d = 1 + Math.max(...node.dependencies.map(dep => calcDepth(dep)));
    depthMap.set(id, d);
    return d;
  }
  nodes.forEach(n => calcDepth(n.id));
  return depthMap;
}

function renderMap() {
  const list = document.getElementById('concept-list');
  list.innerHTML = '';

  const readCount = concepts.filter(c => progress[c.id]).length;
  const progressEl = document.getElementById('map-progress');
  const pct = concepts.length > 0 ? Math.round((readCount / concepts.length) * 100) : 0;
  progressEl.innerHTML = readCount > 0
    ? `${readCount}<span style="font-size:13px;color:var(--text-tertiary);margin-left:6px;font-weight:400;">/ ${concepts.length}</span><span style="font-size:10px;color:var(--text-tertiary);margin-left:10px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;">${pct}% 已读</span>`
    : `<span style="font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-tertiary);">${concepts.length} 个概念 · 待启程</span>`;

  // Progress bar (legacy hidden in editorial mode)
  const barFill = document.getElementById('map-bar-fill');
  if (barFill) barFill.style.width = pct + '%';

  // Track currently unlocked set
  const currentUnlocked = new Set();

  const order = topologicalSort(concepts);
  const depthMap = getDepthMap(concepts);

  order.forEach((concept, idx) => {
    const card = document.createElement('button');
    const unlocked = isUnlocked(concept.id);
    const read = !!progress[concept.id];
    const depth = Math.min(depthMap.get(concept.id) || 0, 4);

    if (unlocked) currentUnlocked.add(concept.id);

    // Was this concept just unlocked? (wasn't in previous set)
    const justUnlocked = unlocked && !read && previouslyUnlocked.size > 0 && !previouslyUnlocked.has(concept.id);

    card.className = 'concept-card depth-' + depth
      + (unlocked ? '' : ' locked')
      + (read ? ' read' : '')
      + (justUnlocked ? ' just-unlocked' : '');

    // Dimension hint (only for unlocked, unread)
    let dimHint = '';
    if (unlocked && !read) {
      const dims = CONCEPT_DIMENSIONS[concept.id];
      if (dims) {
        const symbols = Object.entries(dims)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 2)
          .map(([id]) => {
            const meta = DIMENSIONS.find(d => d.id === id);
            return meta ? meta.symbol : '';
          })
          .filter(Boolean)
          .join(' ');
        if (symbols) dimHint = `<div class="concept-dim-hint">${symbols}</div>`;
      }
    }

    card.innerHTML = `
      <div class="concept-numeral">${toRomanNumeral(idx + 1)}</div>
      <div class="concept-body">
        <div class="concept-name">${concept.name}${concept.original ? '<span class="concept-orig">' + concept.original + '</span>' : ''}</div>
        <div class="concept-brief">${concept.brief}</div>
        ${dimHint}
      </div>
      <div class="concept-indicator"></div>
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        haptic('light');
        openStory(concept.id);
      });
    }

    list.appendChild(card);
  });

  // Update previously unlocked set
  previouslyUnlocked = currentUnlocked;

  // Map stats footer
  const statsEl = document.getElementById('map-stats');
  if (statsEl) {
    const unlockedCount = currentUnlocked.size;
    const reflectionCount = Object.values(reflections).filter(r => {
      const text = typeof r === 'string' ? r : r?.text;
      return text && text.trim();
    }).length;
    statsEl.innerHTML = `${currentPhilosopher.ornament} &nbsp; 已解锁 ${unlockedCount} · 已读 ${readCount} · 已记录 ${reflectionCount}`;
  }

  // Scroll-reveal with IntersectionObserver
  requestAnimationFrame(() => {
    const cards = list.querySelectorAll('.concept-card');
    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -20px 0px' });
      cards.forEach(c => observer.observe(c));
    } else {
      cards.forEach(c => c.classList.add('revealed'));
    }
  });

  // Check for philosopher completion
  if (readCount === concepts.length && concepts.length > 0) {
    const celebKey = `echo/${currentPhilosopher.id}/celebrated`;
    if (!localStorage.getItem(celebKey)) {
      localStorage.setItem(celebKey, 'true');
      setTimeout(() => showCelebration(currentPhilosopher), 300);
    }
  }
}

function topologicalSort(nodes) {
  const visited = new Set();
  const result = [];
  const nodeMap = new Map(nodes.map(n => [n.id, n]));

  function visit(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const node = nodeMap.get(id);
    if (!node) return;
    node.dependencies.forEach(dep => visit(dep));
    result.push(node);
  }

  nodes.forEach(n => visit(n.id));
  return result;
}

function openStory(conceptId) {
  currentConceptId = conceptId;
  const story = storyMap.get(conceptId);
  if (!story) return;

  // Track last visit
  if (currentPhilosopher) {
    setLastVisited(currentPhilosopher.id, conceptId);
  }

  const concept = concepts.find(c => c.id === conceptId);
  document.getElementById('story-concept-label').textContent = concept ? concept.name : '';

  // Reset reading progress
  document.getElementById('reading-progress').style.width = '0%';

  const scroll = document.getElementById('story-scroll');
  scroll.innerHTML = '';

  // Title
  const title = document.createElement('div');
  title.className = 'story-title fade-in';
  title.textContent = story.title;
  scroll.appendChild(title);

  // Meta + reading time
  const charCount = (story.body || '').length;
  const readingMin = Math.max(1, Math.round(charCount / 500));
  const meta = document.createElement('div');
  meta.className = 'story-meta fade-in';
  meta.innerHTML = `${story.protagonist.name}，${story.protagonist.age}岁，${story.protagonist.occupation}`
    + `<div class="story-reading-time">约 ${readingMin} 分钟</div>`;
  scroll.appendChild(meta);

  // Re-read prompt (if already read with a reflection)
  const existingRefl = reflections[conceptId];
  const wasRead = !!progress[conceptId];
  if (wasRead && existingRefl) {
    const reread = document.createElement('div');
    reread.className = 'reread-prompt fade-in';
    const oldText = typeof existingRefl === 'string' ? existingRefl : existingRefl.text;
    reread.innerHTML = `<div class="reread-prompt-label">上次你写过</div>${escapeHtml(oldText.slice(0, 80))}${oldText.length > 80 ? '...' : ''}`;
    scroll.appendChild(reread);
  }

  // Epigraph
  const ep = EPIGRAPHS[conceptId];
  if (ep) {
    const epi = document.createElement('div');
    epi.className = 'story-epigraph fade-in';
    epi.innerHTML = `"${escapeHtml(ep.text)}"<span class="story-epigraph-source">— ${escapeHtml(ep.source)}</span>`;
    scroll.appendChild(epi);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'story-body rendered fade-in';
  body.innerHTML = renderMarkdown(story.body);
  scroll.appendChild(body);

  // Divider
  const divider = document.createElement('div');
  divider.className = 'section-divider';
  divider.textContent = '···';
  scroll.appendChild(divider);

  // Layers
  const layersSection = document.createElement('div');
  layersSection.className = 'layers-section fade-in';

  const tabs = [
    { key: 'concept', label: '🜲 概念' },
    { key: 'now', label: '🜂 此刻' },
    { key: 'deeper', label: '🜍 更深' },
  ];

  const tabBar = document.createElement('div');
  tabBar.className = 'layer-tab-bar';

  const contentEl = document.createElement('div');
  contentEl.className = 'layer-content rendered';

  function setTab(key) {
    tabBar.querySelectorAll('.layer-tab').forEach((t, i) => {
      t.classList.toggle('active', tabs[i].key === key);
    });
    contentEl.innerHTML = renderMarkdown(story.layers[key] || '');
  }

  tabs.forEach(tab => {
    const btn = document.createElement('button');
    btn.className = 'layer-tab';
    btn.textContent = tab.label;
    btn.addEventListener('click', () => setTab(tab.key));
    tabBar.appendChild(btn);
  });

  layersSection.appendChild(tabBar);
  layersSection.appendChild(contentEl);
  scroll.appendChild(layersSection);

  setTab('concept');

  // Links
  const allLinks = [...(story.layers.links.pre || []), ...(story.layers.links.post || [])];
  if (allLinks.length > 0) {
    const linksSection = document.createElement('div');
    linksSection.className = 'links-section';

    if (story.layers.links.pre.length > 0) {
      const preLabel = document.createElement('div');
      preLabel.className = 'links-label';
      preLabel.textContent = '前置';
      linksSection.appendChild(preLabel);
      story.layers.links.pre.forEach(name => {
        const chip = createLinkChip(name);
        linksSection.appendChild(chip);
      });
    }

    if (story.layers.links.post.length > 0) {
      const postLabel = document.createElement('div');
      postLabel.className = 'links-label';
      postLabel.style.marginTop = '16px';
      postLabel.textContent = '延伸';
      linksSection.appendChild(postLabel);
      story.layers.links.post.forEach(name => {
        const chip = createLinkChip(name);
        linksSection.appendChild(chip);
      });
    }

    scroll.appendChild(linksSection);
  }

  // Deep read (misreading + modern application + critique)
  const deepRead = DEEP_READS[conceptId];
  const critique = CRITIQUES[conceptId];
  if (deepRead || critique) {
    const dr = document.createElement('div');
    dr.className = 'deep-read';
    let html = `<div class="deep-read-divider">深 读</div>`;
    if (deepRead) {
      html += `
        <div class="deep-read-block">
          <div class="deep-read-label">常见误读</div>
          <div class="deep-read-body">${escapeHtml(deepRead.misread)}</div>
        </div>
        <div class="deep-read-block">
          <div class="deep-read-label">现代应用</div>
          <div class="deep-read-body">${escapeHtml(deepRead.apply).replace(/\n\n/g, '</p><p>').replace(/^/, '<p>').replace(/$/, '</p>')}</div>
        </div>
      `;
    }
    if (critique) {
      html += `
        <div class="deep-read-block critique-block">
          <div class="deep-read-label">批判与反思</div>
          <div class="deep-read-body">${escapeHtml(critique)}</div>
        </div>
      `;
    }
    dr.innerHTML = html;
    scroll.appendChild(dr);
  }

  // Cross-philosopher echo
  const crossText = CROSS_ECHOES[conceptId];
  if (crossText) {
    const cross = document.createElement('div');
    cross.className = 'cross-echo';
    cross.innerHTML = `<div class="cross-echo-label">回声</div>${escapeHtml(crossText)}`;
    scroll.appendChild(cross);
  }

  // Reflect
  const reflectSection = document.createElement('div');
  reflectSection.className = 'reflect-section';

  const existing = reflections[conceptId];
  const reflectPrompt = document.createElement('div');
  reflectPrompt.className = 'reflect-prompt';
  reflectPrompt.textContent = existing
    ? '你之前写过：'
    : '读完这个故事，你想到了什么？';
  reflectSection.appendChild(reflectPrompt);

  const reflectInput = document.createElement('textarea');
  reflectInput.className = 'reflect-input';
  reflectInput.placeholder = '写下你此刻的想法...';
  reflectInput.value = existing ? existing.text || existing : '';
  reflectSection.appendChild(reflectInput);

  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin-top:20px;';

  const reflectSkip = document.createElement('button');
  reflectSkip.className = 'reflect-save';
  reflectSkip.textContent = '读过了';
  reflectSkip.style.opacity = '0.25';
  reflectSkip.addEventListener('click', () => {
    const wasUnread = !progress[conceptId];
    const oldStats = calculateBrainStats();
    progress[conceptId] = true;
    saveProgress();
    document.getElementById('reading-progress').style.width = '0%';
    showScreen('map');
    renderMap();
    if (wasUnread) {
      const newStats = calculateBrainStats();
      showStatGain(conceptId, oldStats, newStats);
      setTimeout(() => showEchoAftertaste(conceptId, concept), 2800);
      setTimeout(checkAndShowAchievements, 5500);
    }
  });
  btnRow.appendChild(reflectSkip);

  const reflectSave = document.createElement('button');
  reflectSave.className = 'reflect-save';
  reflectSave.textContent = '留下';
  reflectSave.addEventListener('click', () => {
    const text = reflectInput.value.trim();
    const wasUnread = !progress[conceptId];
    const oldStats = calculateBrainStats();
    if (text) {
      reflections[conceptId] = {
        text: text,
        date: new Date().toISOString(),
        conceptName: concept ? concept.name : conceptId,
      };
      saveReflections();
      haptic('success');
      showToast('已记录');
    }
    progress[conceptId] = true;
    saveProgress();
    document.getElementById('reading-progress').style.width = '0%';
    showScreen('map');
    renderMap();
    if (wasUnread) {
      const newStats = calculateBrainStats();
      showStatGain(conceptId, oldStats, newStats);
      setTimeout(() => showEchoAftertaste(conceptId, concept), 2800);
      setTimeout(checkAndShowAchievements, 5500);
    }
  });
  btnRow.appendChild(reflectSave);

  reflectSection.appendChild(btnRow);
  scroll.appendChild(reflectSection);

  showScreen('story');
}

// ═══ Journal ═══
let journalGlobal = false; // false = current philosopher, true = all

function renderJournal() {
  const scroll = document.getElementById('journal-scroll');
  scroll.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'journal-title';
  title.textContent = journalGlobal ? '全部思考记录' : (currentPhilosopher ? currentPhilosopher.name + ' · 思考记录' : '思考记录');
  scroll.appendChild(title);

  // Collect entries
  let allEntries = [];

  if (journalGlobal) {
    PHILOSOPHERS.forEach(p => {
      try {
        const refs = JSON.parse(localStorage.getItem(storageKey(p.id, 'reflections'))) || {};
        Object.entries(refs).forEach(([id, val]) => {
          allEntries.push({ id, val, philosopherId: p.id, philosopherName: p.name });
        });
      } catch {}
    });
  } else {
    Object.entries(reflections).forEach(([id, val]) => {
      allEntries.push({ id, val, philosopherId: currentPhilosopher?.id, philosopherName: currentPhilosopher?.name || '' });
    });
  }

  allEntries = allEntries
    .filter(e => {
      const text = typeof e.val === 'string' ? e.val : e.val?.text;
      return text && text.trim();
    })
    .sort((a, b) => {
      const dateA = typeof a.val === 'object' ? a.val.date || '' : '';
      const dateB = typeof b.val === 'object' ? b.val.date || '' : '';
      return dateB.localeCompare(dateA);
    });

  if (allEntries.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'journal-empty';
    empty.textContent = '还没有写过任何反思。\n\n读完一个概念后，在底部的输入框里写下你的想法，点"留下"——它会出现在这里。';
    scroll.appendChild(empty);
    return;
  }

  // Stats
  const dates = allEntries
    .map(e => typeof e.val === 'object' ? e.val.date : null)
    .filter(Boolean)
    .map(d => new Date(d));
  const earliestDate = dates.length > 0
    ? new Date(Math.min(...dates)).toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' })
    : '';
  const stats = document.createElement('div');
  stats.className = 'journal-stats';
  stats.textContent = earliestDate
    ? `${allEntries.length} 条思考 · 始于 ${earliestDate}`
    : `${allEntries.length} 条思考`;
  scroll.appendChild(stats);

  allEntries.forEach(({ id, val, philosopherId, philosopherName }) => {
    const entry = document.createElement('div');
    entry.className = 'journal-entry fade-in';
    entry.setAttribute('data-concept-id', id);
    entry.setAttribute('data-philosopher-id', philosopherId);

    if (journalGlobal) {
      const pTag = document.createElement('div');
      pTag.className = 'journal-entry-philosopher';
      pTag.textContent = philosopherName;
      entry.appendChild(pTag);
    }

    const conceptName = typeof val === 'object' ? (val.conceptName || id) : id;
    const text = typeof val === 'string' ? val : val.text;
    const date = typeof val === 'object' && val.date
      ? new Date(val.date).toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
      : '';

    const nameEl = document.createElement('div');
    nameEl.className = 'journal-entry-concept';
    nameEl.textContent = conceptName;
    entry.appendChild(nameEl);

    if (date) {
      const dateEl = document.createElement('div');
      dateEl.className = 'journal-entry-date';
      dateEl.textContent = date;
      entry.appendChild(dateEl);
    }

    const textEl = document.createElement('div');
    textEl.className = 'journal-entry-text';
    textEl.textContent = text;
    entry.appendChild(textEl);

    // Actions row (hidden until clicked)
    const actions = document.createElement('div');
    actions.className = 'journal-entry-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'journal-action-btn';
    editBtn.textContent = '编辑';
    editBtn.onclick = (e) => {
      e.stopPropagation();
      // Replace text with textarea
      const editor = document.createElement('textarea');
      editor.className = 'journal-entry-editor';
      editor.value = text;
      textEl.replaceWith(editor);
      editor.focus();
      editBtn.style.display = 'none';
      // Add save button
      const saveBtn = document.createElement('button');
      saveBtn.className = 'journal-action-btn';
      saveBtn.textContent = '保存';
      saveBtn.onclick = (ev) => {
        ev.stopPropagation();
        const newText = editor.value.trim();
        if (newText) {
          const refs = JSON.parse(localStorage.getItem(storageKey(philosopherId, 'reflections'))) || {};
          if (typeof refs[id] === 'object') {
            refs[id].text = newText;
          } else {
            refs[id] = { text: newText, date: new Date().toISOString(), conceptName };
          }
          localStorage.setItem(storageKey(philosopherId, 'reflections'), JSON.stringify(refs));
          if (currentPhilosopher && currentPhilosopher.id === philosopherId) {
            reflections = refs;
          }
          haptic('success');
          showToast('已更新');
          renderJournal();
        }
      };
      actions.insertBefore(saveBtn, deleteBtn);
    };

    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'journal-action-btn danger';
    deleteBtn.textContent = '删除';
    let confirmTimer = null;
    deleteBtn.onclick = (e) => {
      e.stopPropagation();
      if (deleteBtn.textContent === '删除') {
        deleteBtn.textContent = '确定删除？';
        confirmTimer = setTimeout(() => {
          deleteBtn.textContent = '删除';
        }, 3000);
      } else {
        clearTimeout(confirmTimer);
        const refs = JSON.parse(localStorage.getItem(storageKey(philosopherId, 'reflections'))) || {};
        delete refs[id];
        localStorage.setItem(storageKey(philosopherId, 'reflections'), JSON.stringify(refs));
        if (currentPhilosopher && currentPhilosopher.id === philosopherId) {
          reflections = refs;
        }
        haptic('medium');
        showToast('已删除');
        renderJournal();
      }
    };

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);
    entry.appendChild(actions);

    entry.addEventListener('click', () => {
      // Close any other editing entries first
      document.querySelectorAll('.journal-entry.editing').forEach(el => {
        if (el !== entry) el.classList.remove('editing');
      });
      entry.classList.toggle('editing');
    });

    scroll.appendChild(entry);
  });
}

// ═══ Markdown-ish rendering ═══
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .split('\n\n')
    .map(para => {
      const trimmed = para.trim();
      if (!trimmed) return '';

      if (/^-{3,}$/.test(trimmed)) return '<hr>';

      if (trimmed.startsWith('> ')) {
        const inner = trimmed.replace(/^> ?/gm, '');
        let html = escapeHtml(inner)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>')
          .replace(/\n/g, '<br>');
        return '<blockquote>' + html + '</blockquote>';
      }

      if (/^- /m.test(trimmed)) {
        const items = trimmed.split('\n').map(line => {
          const stripped = line.replace(/^- /, '');
          let html = escapeHtml(stripped)
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>');
          return '<li>' + html + '</li>';
        });
        return '<ul>' + items.join('') + '</ul>';
      }

      let html = escapeHtml(trimmed)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
      return '<p>' + html + '</p>';
    })
    .join('');
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ═══ Swipe-back gesture ═══
let touchStartX = 0;
let touchStartY = 0;
let swiping = false;
const swipeIndicator = document.getElementById('swipe-indicator');

document.addEventListener('touchstart', (e) => {
  const active = document.querySelector('.screen.active');
  if (active?.id !== 'story-screen' && active?.id !== 'journal-screen') return;
  const touch = e.touches[0];
  if (touch.clientX < 30) { // Left edge
    touchStartX = touch.clientX;
    touchStartY = touch.clientY;
    swiping = true;
    swipeIndicator.classList.add('visible');
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (!swiping) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = Math.abs(e.touches[0].clientY - touchStartY);
  if (dy > dx) { swiping = false; swipeIndicator.classList.remove('visible'); }
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (!swiping) return;
  swipeIndicator.classList.remove('visible');
  const dx = e.changedTouches[0].clientX - touchStartX;
  swiping = false;
  if (dx > 80) {
    haptic('light');
    const active = document.querySelector('.screen.active');
    if (active?.id === 'story-screen') {
      document.getElementById('reading-progress').style.width = '0%';
      showScreen('map');
      renderMap();
    } else if (active?.id === 'journal-screen') {
      if (journalGlobal) { renderHome(); showScreen('home'); }
      else { showScreen('map'); renderMap(); }
    }
  }
});

// ═══ Onboarding ═══
const ONBOARDING_SLIDES = [
  '这不是教科书。',
  '每一个概念，是一个故事。',
  '读完，写下你想到的——\n它会成为你自己的回响。',
];
let onbIdx = 0;
function showOnboarding() {
  const ob = document.getElementById('onboarding');
  const textEl = document.getElementById('onboarding-text');
  const dots = document.querySelectorAll('.onboarding-dot');
  const nextBtn = document.getElementById('onboarding-next');
  onbIdx = 0;
  textEl.textContent = ONBOARDING_SLIDES[0];
  dots.forEach((d, i) => d.classList.toggle('active', i === 0));
  nextBtn.textContent = '继续 →';
  ob.style.display = 'flex';

  nextBtn.onclick = () => {
    haptic('light');
    onbIdx++;
    if (onbIdx >= ONBOARDING_SLIDES.length) {
      localStorage.setItem('echo/onboarded', 'true');
      ob.style.transition = 'opacity 0.6s';
      ob.style.opacity = '0';
      setTimeout(() => { ob.style.display = 'none'; ob.style.opacity = '1'; }, 600);
      return;
    }
    textEl.classList.add('fade');
    setTimeout(() => {
      textEl.textContent = ONBOARDING_SLIDES[onbIdx];
      textEl.classList.remove('fade');
      dots.forEach((d, i) => d.classList.toggle('active', i === onbIdx));
      if (onbIdx === ONBOARDING_SLIDES.length - 1) nextBtn.textContent = '开始 →';
    }, 400);
  };
}

// ═══ Keyboard shortcuts ═══
document.addEventListener('keydown', (e) => {
  // Only when no input is focused
  if (document.activeElement && ['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const active = document.querySelector('.screen.active');
  if (e.key === 'j' || e.key === 'J') {
    if (active?.id === 'map-screen') {
      journalGlobal = false; renderJournal(); showScreen('journal');
    } else if (active?.id === 'home-screen') {
      journalGlobal = true; renderJournal(); showScreen('journal');
    }
  }
  if (active?.id === 'story-screen' && e.key === ' ') {
    e.preventDefault();
    window.scrollBy({ top: window.innerHeight * 0.8, behavior: 'smooth' });
  }
});

// ═══ Service Worker ═══
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ═══ Theme toggle (夜读 / 纸本) ═══
function applyTheme() {
  // Default is light. data-theme="paper" is dark mode (legacy name kept).
  const theme = localStorage.getItem('echo/theme') || 'light';
  if (theme === 'paper') {
    document.documentElement.setAttribute('data-theme', 'paper');
    const icon = document.getElementById('theme-toggle-icon');
    if (icon) icon.textContent = '☀';
  } else {
    document.documentElement.removeAttribute('data-theme');
    const icon = document.getElementById('theme-toggle-icon');
    if (icon) icon.textContent = '☾';
  }
}

function toggleTheme() {
  const current = localStorage.getItem('echo/theme') || 'light';
  const next = current === 'light' ? 'paper' : 'light';
  localStorage.setItem('echo/theme', next);
  applyTheme();
  haptic('light');
}

document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

// ═══ Init ═══
applyTheme();
recordVisit();
if (!localStorage.getItem('echo/onboarded')) {
  showOnboarding();
}
renderHome();
showScreen('home');
// Defer achievement check to allow render
setTimeout(checkAndShowAchievements, 1500);
</script>
</body>
